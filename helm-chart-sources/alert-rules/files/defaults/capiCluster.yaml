capiClusterAlerts:
  enabled: false
  groups:
    capiClusterAlerts:
      enabled: false
      rules:
        BegetCapiClusterNotAlive:
          enabled: false
          spec:
            alert: BegetCapiClusterNotAlive
            annotations:
              summary: "Cluster is not alive"
              description: "Cluster {{ $labels.cluster_namespace }}/{{ $labels.cluster_name }} is not alive for 10m"
            expr: |
              beget_capi_cluster_alive == 0
            for: 10m
            labels:
              severity: critical

        BegetCapiClusterNotReady:
          enabled: false
          spec:
            alert: BegetCapiClusterNotReady
            annotations:
              summary: "Cluster is not ready"
              description: "Cluster {{ $labels.cluster_namespace }}/{{ $labels.cluster_name }} is alive, but not ready"
            expr: |
              (
                beget_capi_cluster_alive == 1
              )
              *
              on(cluster_full_name, cluster_hash, cluster_namespace, cluster_name) (
                beget_capi_cluster_ready != 1
              )
            for: 30m
            labels:
              severity: warning

        BegetCapiClusterNotReadyTooLong:
          enabled: false
          spec:
            alert: BegetCapiClusterNotReadyTooLong
            annotations:
              summary: "Cluster is not ready"
              description: "Cluster {{ $labels.cluster_namespace }}/{{ $labels.cluster_name }} is alive, but not ready too long"
            expr: |
                beget_capi_cluster_ready != 1
            for: 90m
            labels:
              severity: critical

        BegetCapiClusterNodesInconsistent:
          enabled: false
          spec:
            alert: BegetCapiClusterNodesInconsistent
            annotations:
              summary: "Cluster nodes are inconsistent"
              description: "Cluster {{ $labels.cluster_namespace }}/{{ $labels.cluster_name }} has inconsistent node state for 20m"
            expr: |
              (
                beget_capi_cluster_alive == 1
              )
              *
              on(cluster_full_name, cluster_hash, cluster_namespace, cluster_name) (
                beget_capi_cluster_nodes_consistent == 0
              )
              unless
              on(cluster_full_name, cluster_hash, cluster_namespace, cluster_name) (
                beget_capi_cluster_deletion_requested > 0
              )
            for: 20m
            labels:
              severity: warning

        BegetCapiClusterNodesUpdateRequiredTooLong:
          enabled: false
          spec:
            alert: BegetCapiClusterNodesUpdateRequiredTooLong
            annotations:
              summary: "Cluster update required for too long"
              description: "Cluster {{ $labels.cluster_namespace }}/{{ $labels.cluster_name }} requires node updates for more than 120m"
            expr: |
              (
                beget_capi_cluster_nodes_update_required == 1
              )
              unless
              on(cluster_full_name, cluster_hash, cluster_namespace, cluster_name) (
                beget_capi_cluster_deletion_requested > 0
              )
            for: 120m
            labels:
              severity: info

        BegetCapiClusterUpdatingTooLong:
          enabled: false
          spec:
            alert: BegetCapiClusterUpdatingTooLong
            annotations:
              summary: "Cluster updating for too long"
              description: "Cluster {{ $labels.cluster_namespace }}/{{ $labels.cluster_name }} is updating for more than 90m"
            expr: |
              beget_capi_cluster_updating == 1
            for: 90m
            labels:
              severity: warning

        BegetCapiClusterDeletionRequestedTooLong:
          enabled: false
          spec:
            alert: BegetCapiClusterDeletionRequestedTooLong
            annotations:
              summary: "Cluster deletion requested for too long"
              description: "Cluster {{ $labels.cluster_namespace }}/{{ $labels.cluster_name }} is marked for deletion for more than 60m"
            expr: |
              (
                beget_capi_cluster_spec_paused == 0
              )
              *
              on(cluster_full_name, cluster_hash, cluster_namespace, cluster_name) (
                beget_capi_cluster_deletion_requested == 1
              )
            for: 60m
            labels:
              severity: warning

        BegetCapiClusterControlPlaneUpdateRequiredTooLong:
          enabled: false
          spec:
            alert: BegetCapiClusterControlPlaneUpdateRequiredTooLong
            annotations:
              summary: "Control plane update required for too long"
              description: "Cluster {{ $labels.cluster_namespace }}/{{ $labels.cluster_name }} control plane requires update for more than 60m"
            expr: |
              (
                beget_capi_cluster_spec_paused == 0
              )
              *
              on(cluster_full_name, cluster_hash, cluster_namespace, cluster_name) (
                beget_capi_cluster_controlplane_update_required == 1
              )
              unless
              on(cluster_full_name, cluster_hash, cluster_namespace, cluster_name) (
                beget_capi_cluster_deletion_requested > 0
              )
            for: 60m
            labels:
              severity: critical

        BegetCapiClusterPausedButUpdateRequired:
          enabled: false
          spec:
            alert: BegetCapiClusterPausedButUpdateRequired
            annotations:
              summary: "Paused cluster still requires update"
              description: "Cluster {{ $labels.cluster_namespace }}/{{ $labels.cluster_name }} is paused and still has pending updates"
            expr: |
              (
                beget_capi_cluster_spec_paused == 1
              )
              *
              on(cluster_full_name, cluster_hash, cluster_namespace, cluster_name) (
                beget_capi_cluster_nodes_update_required == 1
              )
            for: 30m
            labels:
              severity: info
