kubernetesSystem:
  enabled: false
  groups:
    kubernetesSystem:
      enabled: false
      rules:
        KubeVersionMismatch:
          enabled: false
          spec:
            alert: KubeVersionMismatch
            annotations:
              description: |
                There are {{ $value }} different semantic versions of Kubernetes
                components running on cluster {{ $labels.cluster_full_name }}.
              runbook_url: https://runbooks.prometheus-operator.dev/runbooks/kubernetes/kubeversionmismatch
              summary: Different semantic versions of Kubernetes components running.
              message: |
                {{ $labels.cluster_full_name }}: Kubernetes version mismatch detected

                Cluster: {{ $labels.cluster_full_name }}
                VersionsCount: {{ $value }}
            expr: |
              count by (cluster_full_name) (
                count by (git_version,cluster_full_name) (
                  label_replace(
                    kubernetes_build_info{
                      job!~"kube-dns|coredns"
                    },
                    "git_version",
                    "$1",
                    "git_version",
                    "(v[0-9]*.[0-9]*).*"
                  )
                )
              ) > 1
            for: 15m
            labels:
              severity: warning

        KubeClientErrors:
          enabled: false
          spec:
            alert: KubeClientErrors
            annotations:
              description: |
                Kubernetes API server client '{{ $labels.job }}/{{ $labels.instance }}' is 
                experiencing {{ $value | humanizePercentage }} errors on cluster {{ $labels.cluster_full_name }}.
              runbook_url: https://runbooks.prometheus-operator.dev/runbooks/kubernetes/kubeclienterrors
              summary: Kubernetes API server client is experiencing errors.
              message: |
                {{ $labels.cluster_full_name }}: Elevated Kubernetes API client error rate

                Cluster: {{ $labels.cluster_full_name }}
                Job: {{ $labels.job }}
                Instance: {{ $labels.instance }}
                ErrorRate: {{ $value | humanizePercentage }}
            expr: |-
              (
                sum(
                  rate(
                    rest_client_requests_total{
                      job="apiserver",
                      code=~"5.."
                    }[5m]
                  )
                ) by (instance,job,namespace,cluster_full_name)
                /
                sum(
                  rate(
                    rest_client_requests_total{
                      job="apiserver"
                    }[5m]
                  )
                ) by (instance,job,namespace,cluster_full_name)
              ) > 0.01
            for: 15m
            labels:
              severity: warning
