k8sRulesContainercpulimits:
  enabled: false
  groups:
    k8sRulesContainercpulimits:
      enabled: false
      rules:
        "cluster:namespace:pod_cpu:active:kube_pod_container_resource_limits":
          enabled: false
          spec:
            annotations: {}
            expr: |-
              kube_pod_container_resource_limits{resource="cpu"}  * on (namespace,pod,cluster_full_name)
              group_left() max by (namespace,pod,cluster_full_name) (
              (kube_pod_status_phase{phase=~"Pending|Running"} == 1)
              )
            labels: {}
            record: cluster:namespace:pod_cpu:active:kube_pod_container_resource_limits

        "namespace_cpu:kube_pod_container_resource_limits:sum":
          enabled: false
          spec:
            annotations: {}
            expr: |-
              sum by (namespace,cluster_full_name) (
                  sum by (namespace,pod,cluster_full_name) (
                      max by (namespace,pod,container,cluster_full_name) (
                        kube_pod_container_resource_limits{resource="cpu"}
                      ) * on (namespace,pod,cluster_full_name) group_left() max by (namespace,pod,cluster_full_name) (
                        kube_pod_status_phase{phase=~"Pending|Running"} == 1
                      )
                  )
              )
            labels: {}
            record: namespace_cpu:kube_pod_container_resource_limits:sum
