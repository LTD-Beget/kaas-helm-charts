kubernetesSystemKubelet:
  enabled: false
  groups:
    kubernetesSystemKubelet:
      enabled: false
      rules:
        KubeNodeNotReady:
          enabled: false
          spec:
            alert: KubeNodeNotReady
            annotations:
              description: |
                {{ $labels.node }} has been unready for more than 15 minutes
                on cluster {{ $labels.cluster_full_name }}.
              runbook_url: https://runbooks.prometheus-operator.dev/runbooks/kubernetes/kubenodenotready
              summary: Node is not ready.
              message: |
                {{ $labels.cluster_full_name }}: Node NotReady >15m

                Cluster: {{ $labels.cluster_full_name }}
                Node: {{ $labels.node }}
            expr: |-
              kube_node_status_condition{condition="Ready",status="true"} == 0
              and on (node,cluster_full_name)
              kube_node_spec_unschedulable == 0
            for: 15m
            labels:
              severity: warning

        KubeSystemNodeNotReady:
          enabled: false
          spec:
            alert: KubeNodeNotReady
            annotations:
              description: |
                {{ $labels.node }} has been unready for more than 15 minutes
                on cluster {{ $labels.cluster_full_name }}.
              runbook_url: https://runbooks.prometheus-operator.dev/runbooks/kubernetes/kubenodenotready
              summary: Node is not ready.
              message: |
                {{ $labels.cluster_full_name }}: Node NotReady >15m

                Cluster: {{ $labels.cluster_full_name }}
                Node: {{ $labels.node }}
            expr: |-
              kube_node_status_condition{
                cluster_type="system", 
                job="kube-state-metrics-monitoring", 
                condition="Ready",
                status="true"
              } == 0
              and on (node,cluster_full_name)
              kube_node_spec_unschedulable{
                cluster_type="system",
                job="kube-state-metrics-monitoring"
              } == 0
            for: 15m
            labels:
              severity: critical

        KubeNodePressure:
          enabled: false
          spec:
            alert: KubeNodePressure
            annotations:
              description: |
                {{ $labels.node }} on cluster {{ $labels.cluster_full_name }} 
                has active Condition {{ $labels.condition }}. This is caused by resource
                usage exceeding eviction thresholds.
              runbook_url: https://runbooks.prometheus-operator.dev/runbooks/kubernetes/kubenodepressure
              summary: Node has as active Condition.
              message: |
                {{ $labels.cluster_full_name }}: Node under resource pressure

                Cluster: {{ $labels.cluster_full_name }}
                Node: {{ $labels.node }}
                Condition: {{ $labels.condition }}
            expr: |-
              kube_node_status_condition{
                condition=~"(MemoryPressure|DiskPressure|PIDPressure)",
                status="true",
                cluster_type!="client"
              } == 1
              and on (node,cluster_full_name)
              kube_node_spec_unschedulable == 0
            for: 10m
            labels:
              severity: warning

        KubeNodeUnreachable:
          enabled: false
          spec:
            alert: KubeNodeUnreachable
            annotations:
              description: |
                {{ $labels.node }} is unreachable and some workloads may be
                rescheduled on cluster {{ $labels.cluster_full_name }}.
              runbook_url: https://runbooks.prometheus-operator.dev/runbooks/kubernetes/kubenodeunreachable
              summary: Node is unreachable.
              message: |
                {{ $labels.cluster_full_name }}: Node unreachable

                Cluster: {{ $labels.cluster_full_name }}
                Node: {{ $labels.node }}
            expr: |
              (
                kube_node_spec_taint{
                  key="node.kubernetes.io/unreachable",
                  effect="NoSchedule"
                }
                unless ignoring(key,value)
                kube_node_spec_taint{
                  key=~"ToBeDeletedByClusterAutoscaler|cloud.google.com/impending-node-termination|aws-node-termination-handler/spot-itn"
                }
              )
              == 1
            for: 15m
            labels:
              severity: warning

        KubeletTooManyPods:
          enabled: false
          spec:
            alert: KubeletTooManyPods
            annotations:
              description: |
                Kubelet '{{ $labels.node }}' is running at {{ $value | humanizePercentage }} 
                of its Pod capacity on cluster {{ $labels.cluster_full_name }}.
              runbook_url: https://runbooks.prometheus-operator.dev/runbooks/kubernetes/kubelettoomanypods
              summary: Kubelet is running at capacity.
              message: |
                {{ $labels.cluster_full_name }}: Node nearing pod capacity

                Cluster: {{ $labels.cluster_full_name }}
                Node: {{ $labels.node }}
                Usage: {{ $value | humanizePercentage }}
            expr: |-
              (
                max by (instance,cluster_full_name) (
                  kubelet_running_pods{job="kubelet", metrics_path="/metrics"} > 1
                )
                * on (instance,cluster_full_name) group_left(node)
                max by (instance,node,cluster_full_name) (
                  kubelet_node_name{job="kubelet", metrics_path="/metrics"}
                )
              )
              / on (node,cluster_full_name) group_left()
              max by (node,cluster_full_name) (
                kube_node_status_capacity{resource="pods"} != 1
              ) > 0.95
            for: 15m
            labels:
              severity: warning

        KubeNodeReadinessFlapping:
          enabled: false
          spec:
            alert: KubeNodeReadinessFlapping
            annotations:
              description: |
                The readiness status of node {{ $labels.node }} has changed
                {{ $value }} times in the last 15 minutes on cluster {{ $labels.cluster_full_name }}.
              runbook_url: https://runbooks.prometheus-operator.dev/runbooks/kubernetes/kubenodereadinessflapping
              summary: Node readiness status is flapping.
              message: |
                {{ $labels.cluster_full_name }}: Node readiness flapping

                Cluster: {{ $labels.cluster_full_name }}
                Node: {{ $labels.node }}
                Changes: {{ $value }}
            expr: |-
              sum(changes(kube_node_status_condition{status="true",condition="Ready"}[15m])) by (node,cluster_full_name) > 2
              and on (node,cluster_full_name)
              kube_node_spec_unschedulable == 0
            for: 15m
            labels:
              severity: warning

        KubeNodeEviction:
          enabled: false
          spec:
            alert: KubeNodeEviction
            annotations:
              description: |
                Node {{ $labels.node }} on {{ $labels.cluster_full_name }}
                is evicting Pods due to {{ $labels.eviction_signal }}.  Eviction occurs
                when eviction thresholds are crossed, typically caused by Pods exceeding
                RAM/ephemeral-storage limits.
              runbook_url: https://runbooks.prometheus-operator.dev/runbooks/kubernetes/kubenodeeviction
              summary: Node is evicting pods.
              message: |
                {{ $labels.cluster_full_name }}: Node evicting pods

                Cluster: {{ $labels.cluster_full_name }}
                Node: {{ $labels.node }}
                Signal: {{ $labels.eviction_signal }}
            expr: |-
              sum(rate(kubelet_evictions{job="kubelet", metrics_path="/metrics"}[15m])) by (eviction_signal,instance,cluster_full_name)
              * on (instance,cluster_full_name) group_left(node)
              max by (instance,node,cluster_full_name) (
                kubelet_node_name{job="kubelet", metrics_path="/metrics"}
              ) > 0
            for: 0s
            labels:
              severity: warning

        KubeletPlegDurationHigh:
          enabled: false
          spec:
            alert: KubeletPlegDurationHigh
            annotations:
              description: |
                The Kubelet Pod Lifecycle Event Generator has a 99th percentile
                duration of {{ $value }} seconds on node {{ $labels.node }} on cluster
                {{ $labels.cluster_full_name }}.
              runbook_url: https://runbooks.prometheus-operator.dev/runbooks/kubernetes/kubeletplegdurationhigh
              summary: Kubelet Pod Lifecycle Event Generator is taking too long to relist.
              message: |
                {{ $labels.cluster_full_name }}: Kubelet PLEG relist latency high

                Cluster: {{ $labels.cluster_full_name }}
                Node: {{ $labels.node }}
                PLEG p99: {{ $value }}s
            expr: node_quantile:kubelet_pleg_relist_duration_seconds:histogram_quantile{quantile="0.99"} >= 10
            for: 5m
            labels:
              severity: warning

        KubeletPodStartUpLatencyHigh:
          enabled: false
          spec:
            alert: KubeletPodStartUpLatencyHigh
            annotations:
              description: |
                Kubelet Pod startup 99th percentile latency is {{ $value }}
                seconds on node {{ $labels.node }} on cluster {{ $labels.cluster_full_name }}.
              runbook_url: https://runbooks.prometheus-operator.dev/runbooks/kubernetes/kubeletpodstartuplatencyhigh
              summary: Kubelet Pod startup latency is too high.
              message: |
                {{ $labels.cluster_full_name }}: Pod startup latency high

                Cluster: {{ $labels.cluster_full_name }}
                Node: {{ $labels.node }}
                Startup p99: {{ $value }}s
            expr: histogram_quantile(0.99, sum(rate(kubelet_pod_worker_duration_seconds_bucket{job="kubelet",
              metrics_path="/metrics"}[5m])) by (instance,le,cluster_full_name)) * on
              (instance,cluster_full_name) group_left(node) kubelet_node_name{job="kubelet",
              metrics_path="/metrics"} > 60
            for: 15m
            labels:
              severity: warning

        KubeletClientCertificateExpiration:
          enabled: false
          spec:
            alert: KubeletClientCertificateExpiration
            annotations:
              description: |
                Client certificate for Kubelet on node {{ $labels.node }} expires
                in {{ $value | humanizeDuration }} on cluster {{ $labels.cluster_full_name }}.
              runbook_url: https://runbooks.prometheus-operator.dev/runbooks/kubernetes/kubeletclientcertificateexpiration
              summary: Kubelet client certificate is about to expire.
              message: |
                {{ $labels.cluster_full_name }}: Kubelet client certificate expiring

                Cluster: {{ $labels.cluster_full_name }}
                Node: {{ $labels.node }}
                TTL: {{ $value | humanizeDuration }}
            expr: kubelet_certificate_manager_client_ttl_seconds < 604800
            labels:
              severity: warning

        KubeletClientCertificateExpirationCritical:
          enabled: false
          spec:
            alert: KubeletClientCertificateExpirationCritical
            annotations:
              description: |
                Client certificate for Kubelet on node {{ $labels.node }} expires
                in {{ $value | humanizeDuration }} on cluster {{ $labels.cluster_full_name }}.
              runbook_url: https://runbooks.prometheus-operator.dev/runbooks/kubernetes/kubeletclientcertificateexpiration
              summary: Kubelet client certificate is about to expire.
              message: |
                {{ $labels.cluster_full_name }}: Kubelet client certificate expiring <24h

                Cluster: {{ $labels.cluster_full_name }}
                Node: {{ $labels.node }}
                TTL: {{ $value | humanizeDuration }}
            expr: kubelet_certificate_manager_client_ttl_seconds < 86400
            labels:
              severity: critical

        KubeletServerCertificateExpiration:
          enabled: false
          spec:
            alert: KubeletServerCertificateExpiration
            annotations:
              description: |
                Server certificate for Kubelet on node {{ $labels.node }} expires
                in {{ $value | humanizeDuration }} on cluster {{ $labels.cluster_full_name }}.
              runbook_url: https://runbooks.prometheus-operator.dev/runbooks/kubernetes/kubeletservercertificateexpiration
              summary: Kubelet server certificate is about to expire.
              message: |
                {{ $labels.cluster_full_name }}: Kubelet server certificate expiring

                Cluster: {{ $labels.cluster_full_name }}
                Node: {{ $labels.node }}
                TTL: {{ $value | humanizeDuration }}
            expr: kubelet_certificate_manager_server_ttl_seconds < 604800
            labels:
              severity: warning

        KubeletServerCertificateExpirationCritical:
          enabled: false
          spec:
            alert: KubeletServerCertificateExpirationCritical
            annotations:
              description: |
                Server certificate for Kubelet on node {{ $labels.node }} expires
                in {{ $value | humanizeDuration }} on cluster {{ $labels.cluster_full_name }}.
              runbook_url: https://runbooks.prometheus-operator.dev/runbooks/kubernetes/kubeletservercertificateexpiration
              summary: Kubelet server certificate is about to expire.
              message: |
                {{ $labels.cluster_full_name }}: Kubelet server certificate expiring <24h

                Cluster: {{ $labels.cluster_full_name }}
                Node: {{ $labels.node }}
                TTL: {{ $value | humanizeDuration }}
            expr: kubelet_certificate_manager_server_ttl_seconds < 86400
            labels:
              severity: critical

        KubeletClientCertificateRenewalErrors:
          enabled: false
          spec:
            alert: KubeletClientCertificateRenewalErrors
            annotations:
              description: |
                Kubelet on node {{ $labels.node }} has failed to renew its
                client certificate ({{ $value | humanize }} errors in the last 5 minutes)
                on cluster {{ $labels.cluster_full_name }}.
              runbook_url: https://runbooks.prometheus-operator.dev/runbooks/kubernetes/kubeletclientcertificaterenewalerrors
              summary: Kubelet has failed to renew its client certificate.
              message: |
                {{ $labels.cluster_full_name }}: Kubelet client certificate renewal errors

                Cluster: {{ $labels.cluster_full_name }}
                Node: {{ $labels.node }}
                Errors: {{ $value | humanize }}
            expr: increase(kubelet_certificate_manager_client_expiration_renew_errors[5m])
              > 0
            for: 15m
            labels:
              severity: warning

        KubeletServerCertificateRenewalErrors:
          enabled: false
          spec:
            alert: KubeletServerCertificateRenewalErrors
            annotations:
              description: |
                Kubelet on node {{ $labels.node }} has failed to renew its
                server certificate ({{ $value | humanize }} errors in the last 5 minutes)
                on cluster {{ $labels.cluster_full_name }}.
              runbook_url: https://runbooks.prometheus-operator.dev/runbooks/kubernetes/kubeletservercertificaterenewalerrors
              summary: Kubelet has failed to renew its server certificate.
              message: |
                {{ $labels.cluster_full_name }}: Kubelet server certificate renewal errors

                Cluster: {{ $labels.cluster_full_name }}
                Node: {{ $labels.node }}
                Errors: {{ $value | humanize }}
            expr: increase(kubelet_server_expiration_renew_errors[5m]) > 0
            for: 15m
            labels:
              severity: warning
