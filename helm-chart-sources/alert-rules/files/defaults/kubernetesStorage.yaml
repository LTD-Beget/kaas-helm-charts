kubernetesStorage:
  enabled: false
  groups:
    kubernetesStorage:
      enabled: false
      rules:
        KubePersistentVolumeFillingUpCritical:
          enabled: false
          spec:
            alert: KubePersistentVolumeFillingUpCritical
            annotations:
              description: |
                The PersistentVolume claimed by {{ $labels.persistentvolumeclaim }} in 
                Namespace {{ $labels.namespace }} {{ with $labels.cluster_full_name -}} 
                on Cluster {{ . }} {{- end }} is only {{ $value | humanizePercentage }} free.
              runbook_url: https://runbooks.prometheus-operator.dev/runbooks/kubernetes/kubepersistentvolumefillingup
              summary: PersistentVolume is filling up.
              message: |
                {{ $labels.cluster_full_name }}: PersistentVolume critically low on space

                Cluster: {{ $labels.cluster_full_name }}
                Namespace: {{ $labels.namespace }}
                PVC: {{ $labels.persistentvolumeclaim }}
                FreeSpace: {{ $value | humanizePercentage }}
            expr: |-
              (
                kubelet_volume_stats_available_bytes{
                  job="kubelet",
                  namespace=~".*",
                  metrics_path="/metrics",
                  cluster_type!="client"
                }
                /
                kubelet_volume_stats_capacity_bytes{
                  job="kubelet",
                  namespace=~".*",
                  metrics_path="/metrics",
                  cluster_type!="client"
                }
              ) < 0.03
              and
              kubelet_volume_stats_used_bytes{
                job="kubelet",
                namespace=~".*",
                metrics_path="/metrics",
                cluster_type!="client"
              } > 0
              unless on (namespace,persistentvolumeclaim,cluster_full_name)
              kube_persistentvolumeclaim_access_mode{access_mode="ReadOnlyMany"} == 1
              unless on (namespace,persistentvolumeclaim,cluster_full_name)
              kube_persistentvolumeclaim_labels{label_excluded_from_alerts="true"} == 1
            for: 1m
            labels:
              severity: critical

        KubePersistentVolumeFillingUp:
          enabled: false
          spec:
            alert: KubePersistentVolumeFillingUp
            annotations:
              description: |
                Based on recent sampling, the PersistentVolume claimed by 
                {{ $labels.persistentvolumeclaim }} in Namespace {{ $labels.namespace }}
                {{ with $labels.cluster_full_name -}} on Cluster {{ . }} {{- end }} is
                expected to fill up within four days. Currently {{ $value | humanizePercentage }} 
                is available.
              runbook_url: https://runbooks.prometheus-operator.dev/runbooks/kubernetes/kubepersistentvolumefillingup
              summary: PersistentVolume is filling up.
              message: |
                {{ $labels.cluster_full_name }}: PersistentVolume predicted to fill within 4 days

                Cluster: {{ $labels.cluster_full_name }}
                Namespace: {{ $labels.namespace }}
                PVC: {{ $labels.persistentvolumeclaim }}
                FreeSpace: {{ $value | humanizePercentage }}
            expr: |-
              (
                kubelet_volume_stats_available_bytes{
                  job="kubelet",
                  namespace=~".*",
                  metrics_path="/metrics",
                  cluster_type!="client"
                }
                /
                kubelet_volume_stats_capacity_bytes{
                  job="kubelet",
                  namespace=~".*",
                  metrics_path="/metrics",
                  cluster_type!="client"
                }
              ) < 0.15
              and
              kubelet_volume_stats_used_bytes{
                job="kubelet",
                namespace=~".*",
                metrics_path="/metrics",
                cluster_type!="client"
              } > 0
              and
              predict_linear(
                kubelet_volume_stats_available_bytes{
                  job="kubelet",
                  namespace=~".*",
                  metrics_path="/metrics",
                  cluster_type!="client"
                }[6h], 4 * 24 * 3600) < 0
              unless on (namespace,persistentvolumeclaim,cluster_full_name)
              kube_persistentvolumeclaim_access_mode{access_mode="ReadOnlyMany"} == 1
              unless on (namespace,persistentvolumeclaim,cluster_full_name)
              kube_persistentvolumeclaim_labels{label_excluded_from_alerts="true"} == 1
            for: 1h
            labels:
              severity: warning

        KubePersistentVolumeInodesFillingUpCritical:
          enabled: false
          spec:
            alert: KubePersistentVolumeInodesFillingUpCritical
            annotations:
              description: |
                The PersistentVolume claimed by {{ $labels.persistentvolumeclaim }} 
                in Namespace {{ $labels.namespace }} {{ with $labels.cluster_full_name -}} 
                on Cluster {{ . }} {{- end }} only has {{ $value | humanizePercentage }} 
                free inodes.
              runbook_url: https://runbooks.prometheus-operator.dev/runbooks/kubernetes/kubepersistentvolumeinodesfillingup
              summary: PersistentVolumeInodes are filling up.
              message: |
                {{ $labels.cluster_full_name }}: PersistentVolume critically low on inodes

                Cluster: {{ $labels.cluster_full_name }}
                Namespace: {{ $labels.namespace }}
                PVC: {{ $labels.persistentvolumeclaim }}
                FreeInodes: {{ $value | humanizePercentage }}
            expr: |-
              (
                kubelet_volume_stats_inodes_free{
                  job="kubelet",
                  namespace=~".*",
                  metrics_path="/metrics",
                  cluster_type!="client"
                }
                /
                kubelet_volume_stats_inodes{
                  job="kubelet",
                  namespace=~".*",
                  metrics_path="/metrics",
                  cluster_type!="client"
                }
              ) < 0.03
              and
              kubelet_volume_stats_inodes_used{
                job="kubelet",
                namespace=~".*",
                metrics_path="/metrics",
                cluster_type!="client"
              } > 0
              unless on (namespace,persistentvolumeclaim,cluster_full_name)
              kube_persistentvolumeclaim_access_mode{ access_mode="ReadOnlyMany"} == 1
              unless on (namespace,persistentvolumeclaim,cluster_full_name)
              kube_persistentvolumeclaim_labels{label_excluded_from_alerts="true"} == 1
            for: 1m
            labels:
              severity: critical

        KubePersistentVolumeInodesFillingUp:
          enabled: false
          spec:
            alert: KubePersistentVolumeInodesFillingUp
            annotations:
              description: |
                Based on recent sampling, the PersistentVolume claimed by 
                {{ $labels.persistentvolumeclaim }} in Namespace {{ $labels.namespace }}
                {{ with $labels.cluster_full_name -}} on Cluster {{ . }} {{- end }} is
                expected to run out of inodes within four days. Currently 
                {{ $value | humanizePercentage }} of its inodes are free.
              runbook_url: https://runbooks.prometheus-operator.dev/runbooks/kubernetes/kubepersistentvolumeinodesfillingup
              summary: PersistentVolumeInodes are filling up.
              message: |
                {{ $labels.cluster_full_name }}: PersistentVolume inodes predicted to exhaust within 4 days

                Cluster: {{ $labels.cluster_full_name }}
                Namespace: {{ $labels.namespace }}
                PVC: {{ $labels.persistentvolumeclaim }}
                FreeInodes: {{ $value | humanizePercentage }}
            expr: |-
              (
                kubelet_volume_stats_inodes_free{
                  job="kubelet",
                  namespace=~".*",
                  metrics_path="/metrics",
                  cluster_type!="client"
                }
                /
                kubelet_volume_stats_inodes{
                  job="kubelet",
                  namespace=~".*",
                  metrics_path="/metrics",
                  cluster_type!="client"
                }
              ) < 0.15
              and
              kubelet_volume_stats_inodes_used{
                job="kubelet",
                namespace=~".*",
                metrics_path="/metrics",
                cluster_type!="client"
              } > 0
              and
              predict_linear(
                kubelet_volume_stats_inodes_free{
                  job="kubelet",
                  namespace=~".*",
                  metrics_path="/metrics",
                  cluster_type!="client"
                }[6h], 4 * 24 * 3600
              ) < 0
              unless on (namespace,persistentvolumeclaim,cluster_full_name)
              kube_persistentvolumeclaim_access_mode{access_mode="ReadOnlyMany"} == 1
              unless on (namespace,persistentvolumeclaim,cluster_full_name)
              kube_persistentvolumeclaim_labels{label_excluded_from_alerts="true"} == 1
            for: 1h
            labels:
              severity: warning

        KubePersistentVolumeErrors:
          enabled: false
          spec:
            alert: KubePersistentVolumeErrors
            annotations:
              description: |
                The persistent volume {{ $labels.persistentvolume }} {{ with $labels.cluster_full_name -}} 
                on Cluster {{ . }} {{- end }} has status {{ $labels.phase }}.
              runbook_url: https://runbooks.prometheus-operator.dev/runbooks/kubernetes/kubepersistentvolumeerrors
              summary: PersistentVolume is having issues with provisioning.
              message: |
                {{ $labels.cluster_full_name }}: PersistentVolume in problematic phase

                Cluster: {{ $labels.cluster_full_name }}
                PersistentVolume: {{ $labels.persistentvolume }}
                Phase: {{ $labels.phase }}
            expr: |
              kube_persistentvolume_status_phase{
                phase=~"Failed|Pending",
                job="kube-state-metrics",
                cluster_type!="client"
              } > 0
            for: 5m
            labels:
              severity: critical
