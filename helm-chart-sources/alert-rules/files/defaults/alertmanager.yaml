alertmanager:
  enabled: false
  groups:
    alertmanager:
      enabled: false
      rules:
        Watchdog:
          enabled: false
          spec:
            alert: Watchdog
            annotations:
              summary: "Dead man switch"
              description: "This alert must always be firing to verify alert delivery."
              message: |
                {{ $labels.cluster_full_name }}: Watchdog

                Cluster: {{ $labels.cluster_full_name }}
            expr: vector(1)
            labels:
              severity: info

        AlertmanagerHighNumberOfAlerts:
          enabled: false
          spec:
            alert: "AlertmanagerHighNumberOfAlerts"
            annotations:
              summary: Alertmanager high number of alerts (cluster {{ $labels.cluster_full_name }})
              description: Alertmanager has more than 3000 alerts firing
              message: |
                {{ $labels.cluster_full_name }}: alertmanager alerts above threshold

                Cluster: {{ $labels.cluster_full_name }}
                Value: {{ $value }}
            expr: max by (cluster_full_name) (alertmanager_alerts{}) > 3000
            for: 0m
            labels:
              severity: critical
