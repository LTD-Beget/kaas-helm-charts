vmHealth:
  enabled: false
  groups:
    vmHealth:
      enabled: false
      rules:
        VMTooManyRestarts:
          enabled: false
          spec:
            alert: VMTooManyRestarts
            annotations:
              description: |
                Job {{ $labels.job }} (instance {{ $labels.instance }}) has restarted 
                more than twice in the last 15 minutes. It might be crashlooping.
              summary: |
                {{ $labels.job }} too many restarts (instance {{ $labels.instance }})
              message: |
                {{ $labels.cluster_full_name }}: Too many restarts for job {{ $labels.job }} (instance {{ $labels.instance }})

                Cluster: {{ $labels.cluster_full_name }}
                Job: {{ $labels.job }}
                Instance: {{ $labels.instance }}
            expr: |
              changes(
                process_start_time_seconds{
                  job=~".*(victoriametrics|vmselect|vminsert|vmstorage|vmagent|vmalert|vmsingle|vmalertmanager|vmauth|victorialogs|vlstorage|vlselect|vlinsert).*"
                }[15m]
              ) > 2
            labels:
              severity: critical

        VMServiceDown:
          enabled: false
          spec:
            alert: VMServiceDown
            annotations:
              description: |
                {{ $labels.instance }} of job {{ $labels.job }} has been down
                for more than 2 minutes.
              summary: Service {{ $labels.job }} is down on {{ $labels.instance }}
              message: |
                {{ $labels.cluster_full_name }}: Service down for job {{ $labels.job }} (instance {{ $labels.instance }})

                Cluster: {{ $labels.cluster_full_name }}
                Job: {{ $labels.job }}
                Instance: {{ $labels.instance }}
            expr: |
              up{
                job=~".*(victoriametrics|vmselect|vminsert|vmstorage|vmagent|vmalert|vmsingle|vmalertmanager|vmauth|victorialogs|vlstorage|vlselect|vlinsert).*"
              } == 0
            for: 2m
            labels:
              severity: critical

        VMProcessNearFDLimits:
          enabled: false
          spec:
            alert: VMProcessNearFDLimits
            annotations:
              description: |
                Exhausting OS file descriptors limit can cause severe degradation of the process.
                Consider to increase the limit as fast as possible.
              summary: |
                Number of free file descriptors is less than 100 for "{{ $labels.job }}"("{{ $labels.instance }}") for the last 5m
              message: |
                {{ $labels.cluster_full_name }}: Low number of free file descriptors for job {{ $labels.job }} (instance {{ $labels.instance }})

                Cluster: {{ $labels.cluster_full_name }}
                Job: {{ $labels.job }}
                Instance: {{ $labels.instance }}
            expr: (process_max_fds - process_open_fds) < 100
            for: 5m
            labels:
              severity: critical

        VMTooHighMemoryUsage:
          enabled: false
          spec:
            alert: VMTooHighMemoryUsage
            annotations:
              description: |
                Too high memory usage may result into multiple issues such as OOMs or degraded performance.
                Consider to either increase available memory or decrease the load on the process.
              summary: |
                It is more than 80% of memory used by "{{ $labels.job }}"("{{ $labels.instance }}")
              message: |
                {{ $labels.cluster_full_name }}: High memory usage for job {{ $labels.job }} (instance {{ $labels.instance }})

                Cluster: {{ $labels.cluster_full_name }}
                Job: {{ $labels.job }}
                Instance: {{ $labels.instance }}
            expr: (min_over_time(process_resident_memory_anon_bytes[10m]) / vm_available_memory_bytes) > 0.8
            for: 5m
            labels:
              severity: critical

        VMTooHighCPUUsage:
          enabled: false
          spec:
            alert: VMTooHighCPUUsage
            annotations:
              description: |
                Too high CPU usage may be a sign of insufficient resources and make process unstable. 
                Consider to either increase available CPU resources or decrease the load on the process.
              summary: |
                More than 90% of CPU is used by "{{ $labels.job }}"("{{ $labels.instance }}") during the last 5m
              message: |
                {{ $labels.cluster_full_name }}: High CPU usage for job {{ $labels.job }} (instance {{ $labels.instance }})

                Cluster: {{ $labels.cluster_full_name }}
                Job: {{ $labels.job }}
                Instance: {{ $labels.instance }}
            expr: rate(process_cpu_seconds_total[5m]) / process_cpu_cores_available > 0.9
            for: 5m
            labels:
              severity: critical

        VMTooManyLogs:
          enabled: false
          spec:
            alert: VMTooManyLogs
            annotations:
              description: |
                Logging rate for job \"{{ $labels.job }}\" ({{ $labels.instance }}) is {{ $value }} 
                for last 15m. Worth to check logs for specific error messages.
              summary: Too many logs printed for job "{{ $labels.job }}" ({{ $labels.instance }})
              message: |
                {{ $labels.cluster_full_name }}: Too many error logs for job {{ $labels.job }} (instance {{ $labels.instance }})

                Cluster: {{ $labels.cluster_full_name }}
                Job: {{ $labels.job }}
                Instance: {{ $labels.instance }}
                Error logs increase (5m): {{ $value }}
            expr: sum(increase(vm_log_messages_total{level="error"}[5m])) without (app_version, location) > 0
            for: 15m
            labels:
              severity: warning

        VMTooManyTSIDMisses:
          enabled: false
          spec:
            alert: VMTooManyTSIDMisses
            annotations:
              description: |
                The rate of TSID misses during query lookups is too high for \"{{ $labels.job }}\" ({{ $labels.instance }}).
                Make sure you're running VictoriaMetrics of v1.85.3 or higher.
                Related issue https://github.com/VictoriaMetrics/VictoriaMetrics/issues/3502
              summary: Too many TSID misses for job "{{ $labels.job }}" ({{ $labels.instance }})
              message: |
                {{ $labels.cluster_full_name }}: Too many TSID misses for job {{ $labels.job }} (instance {{ $labels.instance }})

                Cluster: {{ $labels.cluster_full_name }}
                Job: {{ $labels.job }}
                Instance: {{ $labels.instance }}
            expr: rate(vm_missing_tsids_for_metric_id_total[5m]) > 0
            for: 10m
            labels:
              severity: critical

        VMConcurrentInsertsHitTheLimit:
          enabled: false
          spec:
            alert: VMConcurrentInsertsHitTheLimit
            annotations:
              description: |
                The limit of concurrent inserts on instance {{ $labels.instance }} depends on the 
                number of CPUs. Usually, when component constantly hits the limit it is likely the 
                component is overloaded and requires more CPU. In some cases for components like
                vmagent or vminsert the alert might trigger if there are too many clients making 
                write attempts. If vmagent's or vminsert's CPU usage and network saturation are at 
                normal level, then it might be worth adjusting `-maxConcurrentInserts` cmd-line flag.
              summary: |
                {{ $labels.job }} on instance {{ $labels.instance }} is constantly
                hitting concurrent inserts limit'
              message: |
                {{ $labels.cluster_full_name }}: Concurrent inserts limit is being hit for job {{ $labels.job }} (instance {{ $labels.instance }})

                Cluster: {{ $labels.cluster_full_name }}
                Job: {{ $labels.job }}
                Instance: {{ $labels.instance }}
            expr: avg_over_time(vm_concurrent_insert_current[1m]) >= vm_concurrent_insert_capacity
            for: 15m
            labels:
              severity: warning

        VMIndexDBRecordsDrop:
          enabled: false
          spec:
            alert: VMIndexDBRecordsDrop
            annotations:
              description: |
                VictoriaMetrics could skip registering new timeseries during ingestion if they fail 
                the validation process. For example, `reason=too_long_item` means that time series 
                cannot exceed 64KB. Please, reduce the number of labels or label values for such series. 
                Or enforce these limits via `-maxLabelsPerTimeseries` and `-maxLabelValueLen` command-line flags.
              summary: |
                IndexDB skipped registering items during data ingestion with reason={{ $labels.reason }}.
              message: |
                {{ $labels.cluster_full_name }}: IndexDB dropped items during ingestion (reason {{ $labels.reason }})

                Cluster: {{ $labels.cluster_full_name }}
                Job: {{ $labels.job }}
                Instance: {{ $labels.instance }}
                Reason: {{ $labels.reason }}
            expr: increase(vm_indexdb_items_dropped_total[5m]) > 0
            labels:
              severity: critical

        VMRowsRejectedOnIngestion:
          enabled: false
          spec:
            alert: VMRowsRejectedOnIngestion
            annotations:
              description: |
                Ingested rows on instance "{{ $labels.instance }}" are rejected
                due to the following reason: "{{ $labels.reason }}"
              summary: Some rows are rejected on "{{ $labels.instance }}" on ingestion attempt
              message: |
                {{ $labels.cluster_full_name }}: Rows are rejected on ingestion (instance {{ $labels.instance }})

                Cluster: {{ $labels.cluster_full_name }}
                Job: {{ $labels.job }}
                Instance: {{ $labels.instance }}
                Reason: {{ $labels.reason }}
            expr: rate(vm_rows_ignored_total[5m]) > 0
            for: 15m
            labels:
              severity: warning

        VMTooHighQueryLoad:
          enabled: false
          spec:
            alert: VMTooHighQueryLoad
            annotations:
              description: |
                Instance {{ $labels.instance }} ({{ $labels.job }}) is failing to serve read queries during last 15m.
                Concurrency limit `-search.maxConcurrentRequests` was reached on this instance and extra queries were
                put into the queue for `-search.maxQueueDuration` interval. But even after waiting in the queue these queries weren't served.
                This happens if instance is overloaded with the current workload, or datasource is too slow to respond.
                Possible solutions are the following:
                * reduce the query load;
                * increase compute resources or number of replicas;
                * adjust limits `-search.maxConcurrentRequests` and `-search.maxQueueDuration`.
                See more at https://docs.victoriametrics.com/victoriametrics/troubleshooting/#slow-queries.
              summary: Read queries fail with timeout for {{ $labels.job }} on instance {{ $labels.instance }}
              message: |
                {{ $labels.cluster_full_name }}: Read queries fail with timeout for job {{ $labels.job }} (instance {{ $labels.instance }})

                Cluster: {{ $labels.cluster_full_name }}
                Job: {{ $labels.job }}
                Instance: {{ $labels.instance }}
            expr: increase(vm_concurrent_select_limit_timeout_total[5m]) > 0
            for: 15m
            labels:
              severity: warning
