nodeExporter:
  enabled: false
  groups:
    nodeExporter:
      enabled: false
      rules:
        NodeFilesystemSpaceFillingUp:
          enabled: false
          spec:
            alert: NodeFilesystemSpaceFillingUp
            annotations:
              description: |
                Filesystem on {{ $labels.device }}, mounted on {{ $labels.mountpoint }}, 
                at {{ $labels.instance }} has only {{ printf "%.2f" $value }}% available
                space left and is filling up.
              runbook_url: https://runbooks.prometheus-operator.dev/runbooks/node/nodefilesystemspacefillingup
              summary: Filesystem is predicted to run out of space within the next 24 hours.
              message: |
                {{ $labels.cluster_full_name }}: Filesystem is predicted to run out of space within the next 24 hours

                Cluster: {{ $labels.cluster_full_name }}
                Instance: {{ $labels.instance }}
                Device: {{ $labels.device }}
                Mountpoint: {{ $labels.mountpoint }}
                Available: {{ printf "%.2f" $value }}%
            expr: |-
              (
                node_filesystem_avail_bytes{
                  job="prometheus-node-exporter",
                  fstype!="",
                  mountpoint!=""
                }
                /
                node_filesystem_size_bytes{
                  job="prometheus-node-exporter",
                  fstype!="",
                  mountpoint!=""
                } * 100 < 15
                and
                predict_linear(
                  node_filesystem_avail_bytes{
                    job="prometheus-node-exporter",
                    fstype!="",
                    mountpoint!=""
                  }[6h]
                  , 24*60*60
                ) < 0
                and
                node_filesystem_readonly{
                  job="prometheus-node-exporter",
                  fstype!="",
                  mountpoint!=""
                } == 0
              )
            for: 1h
            labels:
              severity: warning

        NodeFilesystemSpaceFillingUpCritical:
          enabled: false
          spec:
            alert: NodeFilesystemSpaceFillingUpCritical
            annotations:
              description: |
                Filesystem on {{ $labels.device }}, mounted on {{ $labels.mountpoint }}, 
                at {{ $labels.instance }} has only {{ printf "%.2f" $value }}% available
                space left and is filling up fast.
              runbook_url: https://runbooks.prometheus-operator.dev/runbooks/node/nodefilesystemspacefillingup
              summary: Filesystem is predicted to run out of space within the next 4 hours.
              message: |
                {{ $labels.cluster_full_name }}: Filesystem is predicted to run out of space within the next 4 hours

                Cluster: {{ $labels.cluster_full_name }}
                Instance: {{ $labels.instance }}
                Device: {{ $labels.device }}
                Mountpoint: {{ $labels.mountpoint }}
                Available: {{ printf "%.2f" $value }}%
            expr: |-
              (
                node_filesystem_avail_bytes{
                  job="prometheus-node-exporter",
                  fstype!="",
                  mountpoint!="",
                  cluster_type!="client"
                }
                /
                node_filesystem_size_bytes{
                  job="prometheus-node-exporter",
                  fstype!="",
                  mountpoint!="",
                  cluster_type!="client"
                } * 100 < 10
              and
                predict_linear(
                  node_filesystem_avail_bytes{
                    job="prometheus-node-exporter",
                    fstype!="",
                    mountpoint!="",
                  cluster_type!="client"
                    }[6h], 4*60*60) < 0
              and
                node_filesystem_readonly{
                  job="prometheus-node-exporter",
                  fstype!="",
                  mountpoint!="",
                  cluster_type!="client"
                } == 0
              )
            for: 1h
            labels:
              severity: critical

        NodeFilesystemAlmostOutOfSpace:
          enabled: false
          spec:
            alert: NodeFilesystemAlmostOutOfSpace
            annotations:
              description: |
                Filesystem on {{ $labels.device }}, mounted on {{ $labels.mountpoint }}, 
                at {{ $labels.instance }} has only {{ printf "%.2f" $value }}% available
                space left.
              runbook_url: https://runbooks.prometheus-operator.dev/runbooks/node/nodefilesystemalmostoutofspace
              summary: Filesystem has less than 5% space left.
              message: |
                {{ $labels.cluster_full_name }}: Filesystem has less than 5% space left

                Cluster: {{ $labels.cluster_full_name }}
                Instance: {{ $labels.instance }}
                Device: {{ $labels.device }}
                Mountpoint: {{ $labels.mountpoint }}
                Available: {{ printf "%.2f" $value }}%
            expr: |-
              (
                node_filesystem_avail_bytes{
                  job="prometheus-node-exporter",
                  fstype!="",
                  mountpoint!=""
                }
                /
                node_filesystem_size_bytes{
                  job="prometheus-node-exporter",
                  fstype!="",
                  mountpoint!=""
                } * 100 < 5
                and
                node_filesystem_readonly{
                  job="prometheus-node-exporter",
                  fstype!="",
                  mountpoint!=""
                } == 0
              )
            for: 30m
            labels:
              severity: warning

        NodeFilesystemAlmostOutOfSpaceCritical:
          enabled: false
          spec:
            alert: NodeFilesystemAlmostOutOfSpaceCritical
            annotations:
              description: |
                Filesystem on {{ $labels.device }}, mounted on {{ $labels.mountpoint }}, 
                at {{ $labels.instance }} has only {{ printf "%.2f" $value }}% available
                space left.
              runbook_url: https://runbooks.prometheus-operator.dev/runbooks/node/nodefilesystemalmostoutofspace
              summary: Filesystem has less than 3% space left.
              message: |
                {{ $labels.cluster_full_name }}: Filesystem has less than 3% space left

                Cluster: {{ $labels.cluster_full_name }}
                Instance: {{ $labels.instance }}
                Device: {{ $labels.device }}
                Mountpoint: {{ $labels.mountpoint }}
                Available: {{ printf "%.2f" $value }}%
            expr: |-
              (
                node_filesystem_avail_bytes{
                  job="prometheus-node-exporter",
                  fstype!="",
                  mountpoint!="",
                  cluster_type!="client"
                }
                /
                node_filesystem_size_bytes{
                  job="prometheus-node-exporter",
                  fstype!="",
                  mountpoint!="",
                  cluster_type!="client"
                } * 100 < 3
              and
                node_filesystem_readonly{
                  job="prometheus-node-exporter",
                  fstype!="",
                  mountpoint!="",
                  cluster_type!="client"
                } == 0
              )
            for: 30m
            labels:
              severity: critical

        NodeFilesystemFilesFillingUp:
          enabled: false
          spec:
            alert: NodeFilesystemFilesFillingUp
            annotations:
              description: |
                Filesystem on {{ $labels.device }}, mounted on {{ $labels.mountpoint }}, 
                at {{ $labels.instance }} has only {{ printf "%.2f" $value }}% available
                inodes left and is filling up.
              runbook_url: https://runbooks.prometheus-operator.dev/runbooks/node/nodefilesystemfilesfillingup
              summary: Filesystem is predicted to run out of inodes within the next 24 hours.
              message: |
                {{ $labels.cluster_full_name }}: Filesystem is predicted to run out of inodes within the next 24 hours

                Cluster: {{ $labels.cluster_full_name }}
                Instance: {{ $labels.instance }}
                Device: {{ $labels.device }}
                Mountpoint: {{ $labels.mountpoint }}
                Inodes available: {{ printf "%.2f" $value }}%
            expr: |-
              (
                node_filesystem_files_free{
                  job="prometheus-node-exporter",
                  fstype!="",
                  mountpoint!=""
                }
                /
                node_filesystem_files{
                  job="prometheus-node-exporter",
                  fstype!="",
                  mountpoint!=""
                } * 100 < 40
                and
                predict_linear(node_filesystem_files_free{job="prometheus-node-exporter",fstype!="",mountpoint!=""}[6h], 24*60*60) < 0
              and
                node_filesystem_readonly{job="prometheus-node-exporter",fstype!="",mountpoint!=""} == 0
              )
            for: 1h
            labels:
              severity: warning

        NodeFilesystemFilesFillingUpCritical:
          enabled: false
          spec:
            alert: NodeFilesystemFilesFillingUpCritical
            annotations:
              description: |
                Filesystem on {{ $labels.device }}, mounted on {{ $labels.mountpoint }}, 
                at {{ $labels.instance }} has only {{ printf "%.2f" $value }}% available
                inodes left and is filling up fast.
              runbook_url: https://runbooks.prometheus-operator.dev/runbooks/node/nodefilesystemfilesfillingup
              summary: Filesystem is predicted to run out of inodes within the next 4 hours.
              message: |
                {{ $labels.cluster_full_name }}: Filesystem is predicted to run out of inodes within the next 4 hours

                Cluster: {{ $labels.cluster_full_name }}
                Instance: {{ $labels.instance }}
                Device: {{ $labels.device }}
                Mountpoint: {{ $labels.mountpoint }}
                Inodes available: {{ printf "%.2f" $value }}%
            expr: |-
              (
                node_filesystem_files_free{
                  job="prometheus-node-exporter",
                  fstype!="",
                  mountpoint!="",
                  cluster_type!="client"
                }
                /
                node_filesystem_files{
                  job="prometheus-node-exporter",
                  fstype!="",
                  mountpoint!="",
                  cluster_type!="client"
                } * 100 < 20
              and
                predict_linear(
                  node_filesystem_files_free{
                    job="prometheus-node-exporter",
                    fstype!="",
                    mountpoint!="",
                    cluster_type!="client"
                  }[6h], 4*60*60
                ) < 0
              and
                node_filesystem_readonly{
                  job="prometheus-node-exporter",
                  fstype!="",
                  mountpoint!="",
                  cluster_type!="client"
                } == 0
              )
            for: 1h
            labels:
              severity: critical

        NodeFilesystemAlmostOutOfFiles:
          enabled: false
          spec:
            alert: NodeFilesystemAlmostOutOfFiles
            annotations:
              description: |
                Filesystem on {{ $labels.device }}, mounted on {{ $labels.mountpoint }}, 
                at {{ $labels.instance }} has only {{ printf "%.2f" $value }}% available
                inodes left.
              runbook_url: https://runbooks.prometheus-operator.dev/runbooks/node/nodefilesystemalmostoutoffiles
              summary: Filesystem has less than 5% inodes left.
              message: |
                {{ $labels.cluster_full_name }}: Filesystem has less than 5% inodes left

                Cluster: {{ $labels.cluster_full_name }}
                Instance: {{ $labels.instance }}
                Device: {{ $labels.device }}
                Mountpoint: {{ $labels.mountpoint }}
                Inodes available: {{ printf "%.2f" $value }}%
            expr: |-
              (
                node_filesystem_files_free{
                  job="prometheus-node-exporter",
                  fstype!="",
                  mountpoint!=""
                }
                /
                node_filesystem_files{
                  job="prometheus-node-exporter",
                  fstype!="",
                  mountpoint!=""
                } * 100 < 5
                and
                node_filesystem_readonly{
                  job="prometheus-node-exporter",
                  fstype!="",
                  mountpoint!=""
                } == 0
              )
            for: 1h
            labels:
              severity: warning

        NodeFilesystemAlmostOutOfFilesCritical:
          enabled: false
          spec:
            alert: NodeFilesystemAlmostOutOfFilesCritical
            annotations:
              description: |
                Filesystem on {{ $labels.device }}, mounted on {{ $labels.mountpoint }}, 
                at {{ $labels.instance }} has only {{ printf "%.2f" $value }}% available
                inodes left.
              runbook_url: https://runbooks.prometheus-operator.dev/runbooks/node/nodefilesystemalmostoutoffiles
              summary: Filesystem has less than 3% inodes left.
              message: |
                {{ $labels.cluster_full_name }}: Filesystem has less than 3% inodes left

                Cluster: {{ $labels.cluster_full_name }}
                Instance: {{ $labels.instance }}
                Device: {{ $labels.device }}
                Mountpoint: {{ $labels.mountpoint }}
                Inodes available: {{ printf "%.2f" $value }}%
            expr: |-
              (
                node_filesystem_files_free{
                  job="prometheus-node-exporter",
                  fstype!="",
                  mountpoint!="",
                  cluster_type!="client"
                }
                /
                node_filesystem_files{
                  job="prometheus-node-exporter",
                  fstype!="",
                  mountpoint!="",
                  cluster_type!="client"
                } * 100 < 3
              and
                node_filesystem_readonly{
                  job="prometheus-node-exporter",
                  fstype!="",
                  mountpoint!="",
                  cluster_type!="client"
                } == 0
              )
            for: 1h
            labels:
              severity: critical

        NodeNetworkReceiveErrs:
          enabled: false
          spec:
            alert: NodeNetworkReceiveErrs
            annotations:
              description: |
                {{ $labels.instance }} interface {{ $labels.device }} has
                encountered {{ printf "%.0f" $value }} receive errors in the last two
                minutes.
              runbook_url: https://runbooks.prometheus-operator.dev/runbooks/node/nodenetworkreceiveerrs
              summary: Network interface is reporting many receive errors.
              message: |
                {{ $labels.cluster_full_name }}: Network interface is reporting many receive errors

                Cluster: {{ $labels.cluster_full_name }}
                Instance: {{ $labels.instance }}
                Interface: {{ $labels.device }}
                Receive errors: {{ printf "%.0f" $value }}
            expr: |
              rate(
                node_network_receive_errs_total{
                  job="prometheus-node-exporter"
                }[2m]
              )
              /
              rate(
                node_network_receive_packets_total{
                  job="prometheus-node-exporter"
                }[2m]
              ) > 0.01
            for: 1h
            labels:
              severity: warning

        NodeNetworkTransmitErrs:
          enabled: false
          spec:
            alert: NodeNetworkTransmitErrs
            annotations:
              description: |
                {{ $labels.instance }} interface {{ $labels.device }} has
                encountered {{ printf "%.0f" $value }} transmit errors in the last two
                minutes.
              runbook_url: https://runbooks.prometheus-operator.dev/runbooks/node/nodenetworktransmiterrs
              summary: Network interface is reporting many transmit errors.
              message: |
                {{ $labels.cluster_full_name }}: Network interface is reporting many transmit errors

                Cluster: {{ $labels.cluster_full_name }}
                Instance: {{ $labels.instance }}
                Interface: {{ $labels.device }}
                Transmit errors: {{ printf "%.0f" $value }}
            expr: |
              rate(
                node_network_transmit_errs_total{
                  job="prometheus-node-exporter"
                }[2m]
              )
              /
              rate(
                node_network_transmit_packets_total{
                  job="prometheus-node-exporter"
                }[2m]
              ) > 0.01
            for: 1h
            labels:
              severity: warning

        NodeHighNumberConntrackEntriesUsed:
          enabled: false
          spec:
            alert: NodeHighNumberConntrackEntriesUsed
            annotations:
              description: |
                {{ $labels.instance }} {{ $value | humanizePercentage }} of
                conntrack entries are used.
              runbook_url: https://runbooks.prometheus-operator.dev/runbooks/node/nodehighnumberconntrackentriesused
              summary: Number of conntrack are getting close to the limit.
              message: |
                {{ $labels.cluster_full_name }}: Number of conntrack are getting close to the limit

                Cluster: {{ $labels.cluster_full_name }}
                Instance: {{ $labels.instance }}
                Conntrack used: {{ $value | humanizePercentage }}
            expr: |
              (
                node_nf_conntrack_entries{
                  job="prometheus-node-exporter"
                }
                /
                node_nf_conntrack_entries_limit
              ) > 0.75
            labels:
              severity: warning

        NodeTextFileCollectorScrapeError:
          enabled: false
          spec:
            alert: NodeTextFileCollectorScrapeError
            annotations:
              description: |
                Node Exporter text file collector on {{ $labels.instance }}
                failed to scrape.
              runbook_url: https://runbooks.prometheus-operator.dev/runbooks/node/nodetextfilecollectorscrapeerror
              summary: Node Exporter text file collector failed to scrape.
              message: |
                {{ $labels.cluster_full_name }}: Node Exporter text file collector failed to scrape

                Cluster: {{ $labels.cluster_full_name }}
                Instance: {{ $labels.instance }}
            expr: |
              node_textfile_scrape_error{
                job="prometheus-node-exporter"
              } == 1
            labels:
              severity: warning

        NodeClockSkewDetected:
          enabled: false
          spec:
            alert: NodeClockSkewDetected
            annotations:
              description: |
                Clock at {{ $labels.instance }} is out of sync by more than
                0.05s. Ensure NTP is configured correctly on this host.
              runbook_url: https://runbooks.prometheus-operator.dev/runbooks/node/nodeclockskewdetected
              summary: Clock skew detected.
              message: |
                {{ $labels.cluster_full_name }}: Clock skew detected

                Cluster: {{ $labels.cluster_full_name }}
                Instance: {{ $labels.instance }}
                Offset: {{ $value }}s
            expr: |-
              (
                node_timex_offset_seconds{
                  job="prometheus-node-exporter"
                } > 0.05
                and
                deriv(
                  node_timex_offset_seconds{
                    job="prometheus-node-exporter"
                  }[5m]
                ) >= 0
              )
              or
              (
                node_timex_offset_seconds{
                  job="prometheus-node-exporter"
                } < -0.05
                and
                deriv(
                  node_timex_offset_seconds{
                    job="prometheus-node-exporter"
                  }[5m]
                ) <= 0
              )
            for: 10m
            labels:
              severity: warning

        NodeClockNotSynchronising:
          enabled: false
          spec:
            alert: NodeClockNotSynchronising
            annotations:
              description: |
                Clock at {{ $labels.instance }} is not synchronising. Ensure
                NTP is configured on this host.
              runbook_url: https://runbooks.prometheus-operator.dev/runbooks/node/nodeclocknotsynchronising
              summary: Clock not synchronising.
              message: |
                {{ $labels.cluster_full_name }}: Clock not synchronising

                Cluster: {{ $labels.cluster_full_name }}
                Instance: {{ $labels.instance }}
            expr: |-
              min_over_time(
                node_timex_sync_status{
                  job="prometheus-node-exporter"
                }[5m]
              ) == 0
              and
              node_timex_maxerror_seconds{
                job="prometheus-node-exporter"
              } >= 16
            for: 10m
            labels:
              severity: warning

        NodeRAIDDegraded:
          enabled: false
          spec:
            alert: NodeRAIDDegraded
            annotations:
              description: |
                RAID array '{{ $labels.device }}' at {{ $labels.instance }}
                is in degraded state due to one or more disks failures. Number of spare
                drives is insufficient to fix issue automatically.
              runbook_url: https://runbooks.prometheus-operator.dev/runbooks/node/noderaiddegraded
              summary: RAID Array is degraded.
              message: |
                {{ $labels.cluster_full_name }}: RAID Array is degraded

                Cluster: {{ $labels.cluster_full_name }}
                Instance: {{ $labels.instance }}
                RAID device: {{ $labels.device }}
            expr: |
              node_md_disks_required{
                job="prometheus-node-exporter",
                device=~"(/dev/)?(mmcblk.p.+|nvme.+|rbd.+|sd.+|vd.+|xvd.+|dm-.+|md.+|dasd.+)"
              }
              -
              ignoring (state) (
                node_md_disks{
                  state="active",
                  job="prometheus-node-exporter",
                  device=~"(/dev/)?(mmcblk.p.+|nvme.+|rbd.+|sd.+|vd.+|xvd.+|dm-.+|md.+|dasd.+)"
                }
              ) > 0
            for: 15m
            labels:
              severity: critical

        NodeRAIDDiskFailure:
          enabled: false
          spec:
            alert: NodeRAIDDiskFailure
            annotations:
              description: |
                At least one device in RAID array at {{ $labels.instance }}
                failed. Array '{{ $labels.device }}' needs attention and possibly a disk
                swap.
              runbook_url: https://runbooks.prometheus-operator.dev/runbooks/node/noderaiddiskfailure
              summary: Failed device in RAID array.
              message: |
                {{ $labels.cluster_full_name }}: Failed device in RAID array

                Cluster: {{ $labels.cluster_full_name }}
                Instance: {{ $labels.instance }}
                RAID device: {{ $labels.device }}
            expr: |
              node_md_disks{
                state="failed",
                job="prometheus-node-exporter",
                device=~"(/dev/)?(mmcblk.p.+|nvme.+|rbd.+|sd.+|vd.+|xvd.+|dm-.+|md.+|dasd.+)"
              } > 0
            labels:
              severity: warning

        NodeFileDescriptorLimit:
          enabled: false
          spec:
            alert: NodeFileDescriptorLimit
            annotations:
              description: |
                File descriptors limit at {{ $labels.instance }} is currently
                at {{ printf "%.2f" $value }}%.
              runbook_url: https://runbooks.prometheus-operator.dev/runbooks/node/nodefiledescriptorlimit
              summary: Kernel is predicted to exhaust file descriptors limit soon.
              message: |
                {{ $labels.cluster_full_name }}: Kernel is predicted to exhaust file descriptors limit soon

                Cluster: {{ $labels.cluster_full_name }}
                Instance: {{ $labels.instance }}
                FD usage: {{ printf "%.2f" $value }}%
            expr: |-
              (
                node_filefd_allocated{
                  job="prometheus-node-exporter"
                } * 100
                /
                node_filefd_maximum{
                  job="prometheus-node-exporter"
                } > 70
              )
            for: 15m
            labels:
              severity: warning

        NodeFileDescriptorLimitCritical:
          enabled: false
          spec:
            alert: NodeFileDescriptorLimitCritical
            annotations:
              description: |
                File descriptors limit at {{ $labels.instance }} is currently
                at {{ printf "%.2f" $value }}%.
              runbook_url: https://runbooks.prometheus-operator.dev/runbooks/node/nodefiledescriptorlimit
              summary: Kernel is predicted to exhaust file descriptors limit soon.
              message: |
                {{ $labels.cluster_full_name }}: Kernel is predicted to exhaust file descriptors limit soon

                Cluster: {{ $labels.cluster_full_name }}
                Instance: {{ $labels.instance }}
                FD usage: {{ printf "%.2f" $value }}%
            expr: |-
              (
                node_filefd_allocated{
                  job="prometheus-node-exporter",
                  cluster_type!="client"
                } * 100
                /
                node_filefd_maximum{
                  job="prometheus-node-exporter",
                  cluster_type!="client"
                } > 90
              )
            for: 15m
            labels:
              severity: critical

        NodeCPUHighUsage:
          enabled: false
          spec:
            alert: NodeCPUHighUsage
            annotations:
              description: |
                CPU usage at {{ $labels.instance }} has been above 90% for the last 15 minutes, is currently at {{ printf "%.2f" $value }}%.
              runbook_url: https://runbooks.prometheus-operator.dev/runbooks/node/nodecpuhighusage
              summary: High CPU usage.
              message: |
                {{ $labels.cluster_full_name }}: High CPU usage

                Cluster: {{ $labels.cluster_full_name }}
                Instance: {{ $labels.instance }}
                CPU usage: {{ printf "%.2f" $value }}%
            expr: |
              sum without(mode) (
                avg without (cpu) (
                  rate(
                    node_cpu_seconds_total{
                      job="prometheus-node-exporter",
                      mode!~"idle|iowait"
                    }[2m]
                  )
                )
              ) * 100 > 90
            for: 15m
            labels:
              severity: warning

        NodeSystemSaturation:
          enabled: false
          spec:
            alert: NodeSystemSaturation
            annotations:
              description: |
                System load per core at {{ $labels.instance }} has been above 2 for the last 15 minutes, is currently at {{ printf "%.2f" $value }}.
                This might indicate this instance resources saturation and can cause it becoming unresponsive.
              runbook_url: https://runbooks.prometheus-operator.dev/runbooks/node/nodesystemsaturation
              summary: System saturated, load per core is very high.
              message: |
                {{ $labels.cluster_full_name }}: System saturated, load per core is very high

                Cluster: {{ $labels.cluster_full_name }}
                Instance: {{ $labels.instance }}
                Load per core: {{ printf "%.2f" $value }}
            expr: |-
              node_load1{
                job="prometheus-node-exporter"
              }
              /
              count without (cpu, mode) (
                node_cpu_seconds_total{
                  job="prometheus-node-exporter",
                  mode="idle"
                }
              ) > 2
            for: 15m
            labels:
              severity: warning

        NodeMemoryMajorPagesFaults:
          enabled: false
          spec:
            alert: NodeMemoryMajorPagesFaults
            annotations:
              description: |
                Memory major pages are occurring at very high rate at {{ $labels.instance }}, 500 major page faults per second for the last 15 minutes, is currently at {{ printf "%.2f" $value }}.
                Please check that there is enough memory available at this instance.
              runbook_url: https://runbooks.prometheus-operator.dev/runbooks/node/nodememorymajorpagesfaults
              summary: Memory major page faults are occurring at very high rate.
              message: |
                {{ $labels.cluster_full_name }}: Memory major page faults are occurring at very high rate

                Cluster: {{ $labels.cluster_full_name }}
                Instance: {{ $labels.instance }}
                Major page faults rate: {{ printf "%.2f" $value }}
            expr: |
              rate(
                node_vmstat_pgmajfault{
                  job="prometheus-node-exporter"
                }[5m]
              ) > 500
            for: 15m
            labels:
              severity: warning

        NodeMemoryHighUtilization:
          enabled: false
          spec:
            alert: NodeMemoryHighUtilization
            annotations:
              description: |
                Memory is filling up at {{ $labels.instance }}, has been above 80% for 
                the last 15 minutes, is currently at {{ printf "%.2f" $value }}%.
              runbook_url: https://runbooks.prometheus-operator.dev/runbooks/node/nodememoryhighutilization
              summary: Host is running out of memory.
              message: |
                {{ $labels.cluster_full_name }}: Host is running out of memory

                Cluster: {{ $labels.cluster_full_name }}
                Instance: {{ $labels.instance }}
                Memory utilization: {{ printf "%.2f" $value }}%
            expr: |
              100 - (
                node_memory_MemAvailable_bytes{
                  job="prometheus-node-exporter"
                }
                /
                node_memory_MemTotal_bytes{
                  job="prometheus-node-exporter"
                } * 100
              ) > 80
            for: 15m
            labels:
              severity: critical

        NodeDiskIOSaturation:
          enabled: false
          spec:
            alert: NodeDiskIOSaturation
            annotations:
              description: |
                Disk IO queue (aqu-sq) is high on {{ $labels.device }} at {{ $labels.instance }},
                has been above 10 for the last 30 minutes, is currently at {{ printf "%.2f" $value }}.
                This symptom might indicate disk saturation.
              runbook_url: https://runbooks.prometheus-operator.dev/runbooks/node/nodediskiosaturation
              summary: Disk IO queue is high.
              message: |
                {{ $labels.cluster_full_name }}: Disk IO queue is high

                Cluster: {{ $labels.cluster_full_name }}
                Instance: {{ $labels.instance }}
                Device: {{ $labels.device }}
                aqu-sq: {{ printf "%.2f" $value }}
            expr: |
              rate(
                node_disk_io_time_weighted_seconds_total{
                  job="prometheus-node-exporter",
                  device=~"(/dev/)?(mmcblk.p.+|nvme.+|rbd.+|sd.+|vd.+|xvd.+|dm-.+|md.+|dasd.+)"
                }[5m]
              ) > 10
            for: 30m
            labels:
              severity: warning

        NodeSystemdServiceFailed:
          enabled: false
          spec:
            alert: NodeSystemdServiceFailed
            annotations:
              description: |
                Systemd service {{ $labels.name }} has entered failed state
                at {{ $labels.instance }}
              runbook_url: https://runbooks.prometheus-operator.dev/runbooks/node/nodesystemdservicefailed
              summary: Systemd service has entered failed state.
              message: |
                {{ $labels.cluster_full_name }}: Systemd service has entered failed state

                Cluster: {{ $labels.cluster_full_name }}
                Instance: {{ $labels.instance }}
                Service: {{ $labels.name }}
            expr: |
              node_systemd_unit_state{
                job="prometheus-node-exporter",
                state="failed"
              } == 1
            for: 5m
            labels:
              severity: warning

        NodeSystemdServiceCrashlooping:
          enabled: false
          spec:
            alert: NodeSystemdServiceCrashlooping
            annotations:
              description: |
                Systemd service {{ $labels.name }} has being restarted too
                many times at {{ $labels.instance }} for the last 15 minutes. Please check
                if service is crash looping.
              runbook_url: https://runbooks.prometheus-operator.dev/runbooks/node/nodesystemdservicecrashlooping
              summary: Systemd service keeps restaring, possibly crash looping.
              message: |
                {{ $labels.cluster_full_name }}: Systemd service keeps restaring, possibly crash looping

                Cluster: {{ $labels.cluster_full_name }}
                Instance: {{ $labels.instance }}
                Service: {{ $labels.name }}
            expr: |
              increase(
                node_systemd_service_restart_total{
                  job="prometheus-node-exporter"
                }[5m]
              ) > 2
            for: 15m
            labels:
              severity: warning

        NodeBondingDegraded:
          enabled: false
          spec:
            alert: NodeBondingDegraded
            annotations:
              description: |
                Bonding interface {{ $labels.master }} on {{ $labels.instance }} 
                is in degraded state due to one or more slave failures.
              runbook_url: https://runbooks.prometheus-operator.dev/runbooks/node/nodebondingdegraded
              summary: Bonding interface is degraded
              message: |
                {{ $labels.cluster_full_name }}: Bonding interface is degraded

                Cluster: {{ $labels.cluster_full_name }}
                Instance: {{ $labels.instance }}
                Bond master: {{ $labels.master }}
            expr: |
              (
                node_bonding_slaves
                -
                node_bonding_active
              ) != 0
            for: 5m
            labels:
              severity: warning
