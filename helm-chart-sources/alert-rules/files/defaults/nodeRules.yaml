nodeRules:
  enabled: false
  groups:
    nodeRules:
      enabled: false
      rules:
        "node_namespace_pod:kube_pod_info:":
          enabled: false
          spec:
            annotations: {}
            expr: |-
              topk by (namespace,pod,cluster_full_name) (1,
                max by (node,namespace,pod,cluster_full_name) (
                  label_replace(kube_pod_info{node!=""}, "pod", "$1", "pod", "(.*)")
              ))
            labels: {}
            record: 'node_namespace_pod:kube_pod_info:'

        "node:node_num_cpu:sum":
          enabled: false
          spec:
            annotations: {}
            expr: |-
              count by (node,cluster_full_name) (
                node_cpu_seconds_total{mode="idle",job="prometheus-node-exporter"}
                * on (namespace,pod,cluster_full_name) group_left(node)
                topk by (namespace,pod,cluster_full_name) (1, node_namespace_pod:kube_pod_info:)
              )
            labels: {}
            record: node:node_num_cpu:sum

        ":node_memory_MemAvailable_bytes:sum":
          enabled: false
          spec:
            annotations: {}
            expr: |-
              sum(
                node_memory_MemAvailable_bytes{job="prometheus-node-exporter"} or
                (
                  node_memory_Buffers_bytes{job="prometheus-node-exporter"} +
                  node_memory_Cached_bytes{job="prometheus-node-exporter"} +
                  node_memory_MemFree_bytes{job="prometheus-node-exporter"} +
                  node_memory_Slab_bytes{job="prometheus-node-exporter"}
                )
              ) by (cluster_full_name)
            labels: {}
            record: :node_memory_MemAvailable_bytes:sum

        "node:node_cpu_utilization:ratio_rate5m":
          enabled: false
          spec:
            annotations: {}
            expr: |-
              avg by (node,cluster_full_name) (
                sum without (mode) (
                  rate(node_cpu_seconds_total{mode!="idle",mode!="iowait",mode!="steal",job="prometheus-node-exporter"}[5m])
                )
              )
            labels: {}
            record: node:node_cpu_utilization:ratio_rate5m

        "cluster:node_cpu:ratio_rate5m":
          enabled: false
          spec:
            annotations: {}
            expr: |-
              avg by (cluster_full_name) (
                node:node_cpu_utilization:ratio_rate5m
              )
            labels: {}
            record: cluster:node_cpu:ratio_rate5m
