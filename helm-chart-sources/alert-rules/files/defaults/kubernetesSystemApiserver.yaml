kubernetesSystemApiserver:
  enabled: false
  groups:
    kubernetesSystemApiserver:
      enabled: false
      rules:
        KubeClientCertificateExpiration:
          enabled: false
          spec:
            alert: KubeClientCertificateExpiration
            annotations:
              description: |
                A client certificate used to authenticate to kubernetes apiserver
                is expiring in less than 7.0 days on cluster {{ $labels.cluster_full_name }}.
              runbook_url: https://runbooks.prometheus-operator.dev/runbooks/kubernetes/kubeclientcertificateexpiration
              summary: Client certificate is about to expire.
              message: |
                {{ $labels.cluster_full_name }}: Kubernetes client certificate expiring in <7 days

                Cluster: {{ $labels.cluster_full_name }}
            expr: |-
              histogram_quantile(
                0.01,
                sum without (namespace, service, endpoint) (
                  rate(
                    apiserver_client_certificate_expiration_seconds_bucket{
                      job="apiserver"
                    }[5m]
                  )
                )
              ) < 604800
              and
              on (job,instance,cluster_full_name) (
                apiserver_client_certificate_expiration_seconds_count{
                  job="apiserver"
                }
              ) > 0
            for: 5m
            labels:
              severity: warning

        KubeClientCertificateExpirationCritical:
          enabled: false
          spec:
            alert: KubeClientCertificateExpirationCritical
            annotations:
              description: 
                A client certificate used to authenticate to kubernetes apiserver
                is expiring in less than 24.0 hours on cluster {{ $labels.cluster_full_name }}.
              runbook_url: https://runbooks.prometheus-operator.dev/runbooks/kubernetes/kubeclientcertificateexpiration
              summary: Client certificate is about to expire.
              message: |
                {{ $labels.cluster_full_name }}: Kubernetes client certificate expiring in <24h

                Cluster: {{ $labels.cluster_full_name }}
            expr: |-
              histogram_quantile(
                0.01,
                sum without (namespace, service, endpoint) (
                  rate(
                    apiserver_client_certificate_expiration_seconds_bucket{
                      job="apiserver"
                    }[5m]
                  )
                )
              ) < 86400
              and
              on (job,instance,cluster_full_name) (
                apiserver_client_certificate_expiration_seconds_count{
                  job="apiserver"
                }
              ) > 0
            for: 5m
            labels:
              severity: critical

        KubeAggregatedAPIErrors:
          enabled: false
          spec:
            alert: KubeAggregatedAPIErrors
            annotations:
              description: |
                Kubernetes aggregated API {{ $labels.instance }}/{{ $labels.name }} 
                has reported {{ $labels.reason }} errors on cluster {{ $labels.cluster_full_name }}.
              runbook_url: https://runbooks.prometheus-operator.dev/runbooks/kubernetes/kubeaggregatedapierrors
              summary: Kubernetes aggregated API has reported errors.
              message: |
                {{ $labels.cluster_full_name }}: Aggregated API reporting errors

                Cluster: {{ $labels.cluster_full_name }}
                Instance: {{ $labels.instance }}
                APIService: {{ $labels.name }}
                Reason: {{ $labels.reason }}
            expr: |
              sum by (instance,name,reason,cluster_full_name)(
                increase(
                  aggregator_unavailable_apiservice_total{
                    job="apiserver"
                  }[1m]
                )
              ) > 0
            for: 10m
            labels:
              severity: warning

        KubeAggregatedAPIDown:
          enabled: false
          spec:
            alert: KubeAggregatedAPIDown
            annotations:
              description: |
                Kubernetes aggregated API {{ $labels.name }}/{{ $labels.namespace }} 
                has been only {{ $value | humanize }}% available over the last 10m
                on cluster {{ $labels.cluster_full_name }}.
              runbook_url: https://runbooks.prometheus-operator.dev/runbooks/kubernetes/kubeaggregatedapidown
              summary: Kubernetes aggregated API is down.
              message: |
                {{ $labels.cluster_full_name }}: Aggregated API availability degraded

                Cluster: {{ $labels.cluster_full_name }}
                APIService: {{ $labels.name }}
                Namespace: {{ $labels.namespace }}
                Availability: {{ $value | humanize }}%
            expr: |
              (
                1 - max by (name,namespace,cluster_full_name) (
                  avg_over_time(
                    aggregator_unavailable_apiservice{
                      job="apiserver"
                    }[10m]
                  )
                )
              ) * 100 < 85
            for: 5m
            labels:
              severity: warning

        KubeAPITerminatedRequests:
          enabled: false
          spec:
            alert: KubeAPITerminatedRequests
            annotations:
              description: |
                The kubernetes apiserver has terminated {{ $value | humanizePercentage }} 
                of its incoming requests on cluster {{ $labels.cluster_full_name }}.
              runbook_url: https://runbooks.prometheus-operator.dev/runbooks/kubernetes/kubeapiterminatedrequests
              summary: |
                The kubernetes apiserver has terminated 
                {{ $value | humanizePercentage }} of its incoming requests.
              message: |
                {{ $labels.cluster_full_name }}: Elevated API request termination rate

                Cluster: {{ $labels.cluster_full_name }}
                TerminatedRate: {{ $value | humanizePercentage }}
            expr: |
              sum by (cluster_full_name) (
                rate(
                  apiserver_request_terminations_total{
                    job="apiserver"
                  }[10m]
                )
              )
              /
              (
                sum by (cluster_full_name) (
                  rate(
                    apiserver_request_total{
                      job="apiserver"
                    }[10m]
                  )
                )
                +
                sum by (cluster_full_name) (
                  rate(
                    apiserver_request_terminations_total{
                      job="apiserver"
                    }[10m]
                  )
                )
              ) > 0.20
            for: 5m
            labels:
              severity: warning
