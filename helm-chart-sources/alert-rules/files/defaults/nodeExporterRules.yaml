nodeExporterRules:
  enabled: false
  groups:
    nodeExporterRules:
      enabled: false
      rules:
        "instance:node_num_cpu:sum":
          enabled: false
          spec:
            annotations: {}
            expr: |-
              count without (cpu, mode) (
                node_cpu_seconds_total{job="prometheus-node-exporter",mode="idle"}
              )
            labels: {}
            record: instance:node_num_cpu:sum
        "instance:node_cpu_utilisation:rate5m":
          enabled: false
          spec:
            annotations: {}
            expr: |-
              1 - avg without (cpu) (
                sum without (mode) (rate(node_cpu_seconds_total{job="prometheus-node-exporter", mode=~"idle|iowait|steal"}[5m]))
              )
            labels: {}
            record: instance:node_cpu_utilisation:rate5m
        "instance:node_load1_per_cpu:ratio":
          enabled: false
          spec:
            annotations: {}
            expr: |-
              (
                node_load1{job="prometheus-node-exporter"}
              /
                instance:node_num_cpu:sum{job="prometheus-node-exporter"}
              )
            labels: {}
            record: instance:node_load1_per_cpu:ratio
        "instance:node_memory_utilisation:ratio":
          enabled: false
          spec:
            annotations: {}
            expr: |-
              1 - (
                (
                  node_memory_MemAvailable_bytes{job="prometheus-node-exporter"}
                  or
                  (
                    node_memory_Buffers_bytes{job="prometheus-node-exporter"}
                    +
                    node_memory_Cached_bytes{job="prometheus-node-exporter"}
                    +
                    node_memory_MemFree_bytes{job="prometheus-node-exporter"}
                    +
                    node_memory_Slab_bytes{job="prometheus-node-exporter"}
                  )
                )
              /
                node_memory_MemTotal_bytes{job="prometheus-node-exporter"}
              )
            labels: {}
            record: instance:node_memory_utilisation:ratio
        "instance:node_vmstat_pgmajfault:rate5m":
          enabled: false
          spec:
            annotations: {}
            expr: rate(node_vmstat_pgmajfault{job="prometheus-node-exporter"}[5m])
            labels: {}
            record: instance:node_vmstat_pgmajfault:rate5m
        "instance_device:node_disk_io_time_seconds:rate5m":
          enabled: false
          spec:
            annotations: {}
            expr: |
              rate(
                node_disk_io_time_seconds_total{
                  job="prometheus-node-exporter",
                  device=~"(/dev/)?(mmcblk.p.+|nvme.+|rbd.+|sd.+|vd.+|xvd.+|dm-.+|md.+|dasd.+)"
                }[5m]
              )
            labels: {}
            record: instance_device:node_disk_io_time_seconds:rate5m
        "instance_device:node_disk_io_time_weighted_seconds:rate5m":
          enabled: false
          spec:
            annotations: {}
            expr: |
              rate(
                node_disk_io_time_weighted_seconds_total{
                  job="prometheus-node-exporter",
                  device=~"(/dev/)?(mmcblk.p.+|nvme.+|rbd.+|sd.+|vd.+|xvd.+|dm-.+|md.+|dasd.+)"
                }[5m]
              )
            labels: {}
            record: instance_device:node_disk_io_time_weighted_seconds:rate5m
        "instance:node_network_receive_bytes_excluding_lo:rate5m":
          enabled: false
          spec:
            annotations: {}
            expr: |-
              sum without (device) (
                rate(node_network_receive_bytes_total{job="prometheus-node-exporter", device!="lo"}[5m])
              )
            labels: {}
            record: instance:node_network_receive_bytes_excluding_lo:rate5m
        "instance:node_network_transmit_bytes_excluding_lo:rate5m":
          enabled: false
          spec:
            annotations: {}
            expr: |-
              sum without (device) (
                rate(node_network_transmit_bytes_total{job="prometheus-node-exporter", device!="lo"}[5m])
              )
            labels: {}
            record: instance:node_network_transmit_bytes_excluding_lo:rate5m
        "instance:node_network_receive_drop_excluding_lo:rate5m":
          enabled: false
          spec:
            annotations: {}
            expr: |-
              sum without (device) (
                rate(node_network_receive_drop_total{job="prometheus-node-exporter", device!="lo"}[5m])
              )
            labels: {}
            record: instance:node_network_receive_drop_excluding_lo:rate5m
        "instance:node_network_transmit_drop_excluding_lo:rate5m":
          enabled: false
          spec:
            annotations: {}
            expr: |-
              sum without (device) (
                rate(node_network_transmit_drop_total{job="prometheus-node-exporter", device!="lo"}[5m])
              )
            labels: {}
            record: instance:node_network_transmit_drop_excluding_lo:rate5m
