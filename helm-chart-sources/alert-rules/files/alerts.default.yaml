kube-state-metrics:
  enabled: false
  groups:
    kube-state-metrics:
      enabled: false
      rules:
        KubeStateMetricsListErrors:
          enabled: false
          spec:
            alert: KubeStateMetricsListErrors
            annotations:
              description: |
                kube-state-metrics is experiencing errors at an elevated rate
                in list operations. This is likely causing it to not be able to expose
                metrics about Kubernetes objects correctly or at all.
              runbook_url: https://runbooks.prometheus-operator.dev/runbooks/kube-state-metrics/kubestatemetricslisterrors
              summary: kube-state-metrics is experiencing errors in list operations.
              message: |
                {{ $labels.cluster_full_name }}: kube-state-metrics elevated list errors rate

                Cluster: {{ $labels.cluster_full_name }}
                ErrorRate: {{ $value | humanizePercentage }}
            expr: |-
              (sum(rate(kube_state_metrics_list_total{job="kube-state-metrics",result="error"}[5m])) by (cluster_full_name)
                /
              sum(rate(kube_state_metrics_list_total{job="kube-state-metrics"}[5m])) by (cluster_full_name))
              > 0.01
            for: 15m
            labels:
              severity: critical
        KubeStateMetricsWatchErrors:
          enabled: false
          spec:
            alert: KubeStateMetricsWatchErrors
            annotations:
              description: |
                kube-state-metrics is experiencing errors at an elevated rate
                in watch operations. This is likely causing it to not be able to expose
                metrics about Kubernetes objects correctly or at all.
              runbook_url: https://runbooks.prometheus-operator.dev/runbooks/kube-state-metrics/kubestatemetricswatcherrors
              summary: kube-state-metrics is experiencing errors in watch operations.
              message: |
                {{ $labels.cluster_full_name }}: kube-state-metrics elevated watch errors rate

                Cluster: {{ $labels.cluster_full_name }}
                ErrorRate: {{ $value | humanizePercentage }}
            expr: |-
              (sum(rate(kube_state_metrics_watch_total{job="kube-state-metrics",result="error"}[5m])) by (cluster_full_name)
                /
              sum(rate(kube_state_metrics_watch_total{job="kube-state-metrics"}[5m])) by (cluster_full_name))
              > 0.01
            for: 15m
            labels:
              severity: critical
        KubeStateMetricsShardingMismatch:
          enabled: false
          spec:
            alert: KubeStateMetricsShardingMismatch
            annotations:
              description: |
                kube-state-metrics pods are running with different --total-shards
                configuration, some Kubernetes objects may be exposed multiple times or
                not exposed at all.
              runbook_url: https://runbooks.prometheus-operator.dev/runbooks/kube-state-metrics/kubestatemetricsshardingmismatch
              summary: kube-state-metrics sharding is misconfigured.
              message: |-
                {{ $labels.cluster_full_name }}: kube-state-metrics sharding mismatch detected

                Cluster: {{ $labels.cluster_full_name }}
            expr: stdvar (kube_state_metrics_total_shards{job="kube-state-metrics"}) by
              (cluster_full_name) != 0
            for: 15m
            labels:
              severity: critical
        KubeStateMetricsShardsMissing:
          enabled: false
          spec:
            alert: KubeStateMetricsShardsMissing
            annotations:
              description: kube-state-metrics shards are missing, some Kubernetes objects
                are not being exposed.
              runbook_url: https://runbooks.prometheus-operator.dev/runbooks/kube-state-metrics/kubestatemetricsshardsmissing
              summary: kube-state-metrics shards are missing.
              message: |-
                {{ $labels.cluster_full_name }}: kube-state-metrics shards missing

                Cluster: {{ $labels.cluster_full_name }}
            expr: |-
              2^max(kube_state_metrics_total_shards{job="kube-state-metrics"}) by (cluster_full_name) - 1
                -
              sum( 2 ^ max by (shard_ordinal,cluster_full_name) (kube_state_metrics_shard_ordinal{job="kube-state-metrics"}) ) by (cluster_full_name)
              != 0
            for: 15m
            labels:
              severity: critical

kubernetes-storage:
  enabled: false
  groups:
    kubernetes-storage:
      enabled: false
      rules:
        KubePersistentVolumeFillingUpCritical:
          enabled: false
          spec:
            alert: KubePersistentVolumeFillingUpCritical
            annotations:
              description: The PersistentVolume claimed by {{ $labels.persistentvolumeclaim
                }} in Namespace {{ $labels.namespace }} {{ with $labels.cluster_full_name
                -}} on Cluster {{ . }} {{- end }} is only {{ $value | humanizePercentage
                }} free.
              runbook_url: https://runbooks.prometheus-operator.dev/runbooks/kubernetes/kubepersistentvolumefillingup
              summary: PersistentVolume is filling up.
            expr: |-
              (
                kubelet_volume_stats_available_bytes{job="kubelet", namespace=~".*", metrics_path="/metrics"}
                  /
                kubelet_volume_stats_capacity_bytes{job="kubelet", namespace=~".*", metrics_path="/metrics"}
              ) < 0.03
              and
              kubelet_volume_stats_used_bytes{job="kubelet", namespace=~".*", metrics_path="/metrics"} > 0
              unless on (namespace,persistentvolumeclaim,cluster_full_name)
              kube_persistentvolumeclaim_access_mode{ access_mode="ReadOnlyMany"} == 1
              unless on (namespace,persistentvolumeclaim,cluster_full_name)
              kube_persistentvolumeclaim_labels{label_excluded_from_alerts="true"} == 1
            for: 1m
            labels:
              severity: critical
        KubePersistentVolumeFillingUp:
          enabled: false
          spec:
            alert: KubePersistentVolumeFillingUp
            annotations:
              description: Based on recent sampling, the PersistentVolume claimed by {{
                $labels.persistentvolumeclaim }} in Namespace {{ $labels.namespace }}
                {{ with $labels.cluster_full_name -}} on Cluster {{ . }} {{- end }} is
                expected to fill up within four days. Currently {{ $value | humanizePercentage
                }} is available.
              runbook_url: https://runbooks.prometheus-operator.dev/runbooks/kubernetes/kubepersistentvolumefillingup
              summary: PersistentVolume is filling up.
            expr: |-
              (
                kubelet_volume_stats_available_bytes{job="kubelet", namespace=~".*", metrics_path="/metrics"}
                  /
                kubelet_volume_stats_capacity_bytes{job="kubelet", namespace=~".*", metrics_path="/metrics"}
              ) < 0.15
              and
              kubelet_volume_stats_used_bytes{job="kubelet", namespace=~".*", metrics_path="/metrics"} > 0
              and
              predict_linear(kubelet_volume_stats_available_bytes{job="kubelet", namespace=~".*", metrics_path="/metrics"}[6h], 4 * 24 * 3600) < 0
              unless on (namespace,persistentvolumeclaim,cluster_full_name)
              kube_persistentvolumeclaim_access_mode{ access_mode="ReadOnlyMany"} == 1
              unless on (namespace,persistentvolumeclaim,cluster_full_name)
              kube_persistentvolumeclaim_labels{label_excluded_from_alerts="true"} == 1
            for: 1h
            labels:
              severity: warning
        KubePersistentVolumeInodesFillingUpCritical:
          enabled: false
          spec:
            alert: KubePersistentVolumeInodesFillingUpCritical
            annotations:
              description: The PersistentVolume claimed by {{ $labels.persistentvolumeclaim
                }} in Namespace {{ $labels.namespace }} {{ with $labels.cluster_full_name
                -}} on Cluster {{ . }} {{- end }} only has {{ $value | humanizePercentage
                }} free inodes.
              runbook_url: https://runbooks.prometheus-operator.dev/runbooks/kubernetes/kubepersistentvolumeinodesfillingup
              summary: PersistentVolumeInodes are filling up.
            expr: |-
              (
                kubelet_volume_stats_inodes_free{job="kubelet", namespace=~".*", metrics_path="/metrics"}
                  /
                kubelet_volume_stats_inodes{job="kubelet", namespace=~".*", metrics_path="/metrics"}
              ) < 0.03
              and
              kubelet_volume_stats_inodes_used{job="kubelet", namespace=~".*", metrics_path="/metrics"} > 0
              unless on (namespace,persistentvolumeclaim,cluster_full_name)
              kube_persistentvolumeclaim_access_mode{ access_mode="ReadOnlyMany"} == 1
              unless on (namespace,persistentvolumeclaim,cluster_full_name)
              kube_persistentvolumeclaim_labels{label_excluded_from_alerts="true"} == 1
            for: 1m
            labels:
              severity: critical
        KubePersistentVolumeInodesFillingUp:
          enabled: false
          spec:
            alert: KubePersistentVolumeInodesFillingUp
            annotations:
              description: Based on recent sampling, the PersistentVolume claimed by {{
                $labels.persistentvolumeclaim }} in Namespace {{ $labels.namespace }}
                {{ with $labels.cluster_full_name -}} on Cluster {{ . }} {{- end }} is
                expected to run out of inodes within four days. Currently {{ $value |
                humanizePercentage }} of its inodes are free.
              runbook_url: https://runbooks.prometheus-operator.dev/runbooks/kubernetes/kubepersistentvolumeinodesfillingup
              summary: PersistentVolumeInodes are filling up.
            expr: |-
              (
                kubelet_volume_stats_inodes_free{job="kubelet", namespace=~".*", metrics_path="/metrics"}
                  /
                kubelet_volume_stats_inodes{job="kubelet", namespace=~".*", metrics_path="/metrics"}
              ) < 0.15
              and
              kubelet_volume_stats_inodes_used{job="kubelet", namespace=~".*", metrics_path="/metrics"} > 0
              and
              predict_linear(kubelet_volume_stats_inodes_free{job="kubelet", namespace=~".*", metrics_path="/metrics"}[6h], 4 * 24 * 3600) < 0
              unless on (namespace,persistentvolumeclaim,cluster_full_name)
              kube_persistentvolumeclaim_access_mode{ access_mode="ReadOnlyMany"} == 1
              unless on (namespace,persistentvolumeclaim,cluster_full_name)
              kube_persistentvolumeclaim_labels{label_excluded_from_alerts="true"} == 1
            for: 1h
            labels:
              severity: warning
        KubePersistentVolumeErrors:
          enabled: false
          spec:
            alert: KubePersistentVolumeErrors
            annotations:
              description: The persistent volume {{ $labels.persistentvolume }} {{ with
                $labels.cluster_full_name -}} on Cluster {{ . }} {{- end }} has status
                {{ $labels.phase }}.
              runbook_url: https://runbooks.prometheus-operator.dev/runbooks/kubernetes/kubepersistentvolumeerrors
              summary: PersistentVolume is having issues with provisioning.
            expr: kube_persistentvolume_status_phase{phase=~"Failed|Pending",job="kube-state-metrics"}
              > 0
            for: 5m
            labels:
              severity: critical

kubernetes-system:
  enabled: false
  groups:
    kubernetes-system:
      enabled: false
      rules:
        KubeVersionMismatch:
          enabled: false
          spec:
            alert: KubeVersionMismatch
            annotations:
              description: There are {{ $value }} different semantic versions of Kubernetes
                components running on cluster {{ $labels.cluster_full_name }}.
              runbook_url: https://runbooks.prometheus-operator.dev/runbooks/kubernetes/kubeversionmismatch
              summary: Different semantic versions of Kubernetes components running.
            expr: count by (cluster_full_name) (count by (git_version,cluster_full_name)
              (label_replace(kubernetes_build_info{job!~"kube-dns|coredns"},"git_version","$1","git_version","(v[0-9]*.[0-9]*).*")))
              > 1
            for: 15m
            labels:
              severity: warning
        KubeClientErrors:
          enabled: false
          spec:
            alert: KubeClientErrors
            annotations:
              description: |
                Kubernetes API server client '{{ $labels.job }}/{{ $labels.instance }}' is 
                experiencing {{ $value | humanizePercentage }} errors on cluster {{ $labels.cluster_full_name }}.
              runbook_url: https://runbooks.prometheus-operator.dev/runbooks/kubernetes/kubeclienterrors
              summary: Kubernetes API server client is experiencing errors.
            expr: |-
              (sum(rate(rest_client_requests_total{job="apiserver",code=~"5.."}[5m])) by (instance,job,namespace,cluster_full_name)
                /
              sum(rate(rest_client_requests_total{job="apiserver"}[5m])) by (instance,job,namespace,cluster_full_name))
              > 0.01
            for: 15m
            labels:
              severity: warning

kubernetes-system-apiserver:
  enabled: false
  groups:
    kubernetes-system-apiserver:
      enabled: false
      rules:
        KubeClientCertificateExpiration:
          enabled: false
          spec:
            alert: KubeClientCertificateExpiration
            annotations:
              description: A client certificate used to authenticate to kubernetes apiserver
                is expiring in less than 7.0 days on cluster {{ $labels.cluster_full_name
                }}.
              runbook_url: https://runbooks.prometheus-operator.dev/runbooks/kubernetes/kubeclientcertificateexpiration
              summary: Client certificate is about to expire.
            expr: |-
              histogram_quantile(0.01, sum without (namespace, service, endpoint) (rate(apiserver_client_certificate_expiration_seconds_bucket{job="apiserver"}[5m]))) < 604800
              and
              on (job,instance,cluster_full_name) apiserver_client_certificate_expiration_seconds_count{job="apiserver"} > 0
            for: 5m
            labels:
              severity: warning
        KubeClientCertificateExpirationCritical:
          enabled: false
          spec:
            alert: KubeClientCertificateExpirationCritical
            annotations:
              description: A client certificate used to authenticate to kubernetes apiserver
                is expiring in less than 24.0 hours on cluster {{ $labels.cluster_full_name
                }}.
              runbook_url: https://runbooks.prometheus-operator.dev/runbooks/kubernetes/kubeclientcertificateexpiration
              summary: Client certificate is about to expire.
            expr: |-
              histogram_quantile(0.01, sum without (namespace, service, endpoint) (rate(apiserver_client_certificate_expiration_seconds_bucket{job="apiserver"}[5m]))) < 86400
              and
              on (job,instance,cluster_full_name) apiserver_client_certificate_expiration_seconds_count{job="apiserver"} > 0
            for: 5m
            labels:
              severity: critical
        KubeAggregatedAPIErrors:
          enabled: false
          spec:
            alert: KubeAggregatedAPIErrors
            annotations:
              description: Kubernetes aggregated API {{ $labels.instance }}/{{ $labels.name
                }} has reported {{ $labels.reason }} errors on cluster {{ $labels.cluster_full_name
                }}.
              runbook_url: https://runbooks.prometheus-operator.dev/runbooks/kubernetes/kubeaggregatedapierrors
              summary: Kubernetes aggregated API has reported errors.
            expr: sum by (instance,name,reason,cluster_full_name)(increase(aggregator_unavailable_apiservice_total{job="apiserver"}[1m]))
              > 0
            for: 10m
            labels:
              severity: warning
        KubeAggregatedAPIDown:
          enabled: false
          spec:
            alert: KubeAggregatedAPIDown
            annotations:
              description: Kubernetes aggregated API {{ $labels.name }}/{{ $labels.namespace
                }} has been only {{ $value | humanize }}% available over the last 10m
                on cluster {{ $labels.cluster_full_name }}.
              runbook_url: https://runbooks.prometheus-operator.dev/runbooks/kubernetes/kubeaggregatedapidown
              summary: Kubernetes aggregated API is down.
            expr: (1 - max by (name,namespace,cluster_full_name)(avg_over_time(aggregator_unavailable_apiservice{job="apiserver"}[10m])))
              * 100 < 85
            for: 5m
            labels:
              severity: warning
        KubeAPITerminatedRequests:
          enabled: false
          spec:
            alert: KubeAPITerminatedRequests
            annotations:
              description: The kubernetes apiserver has terminated {{ $value | humanizePercentage
                }} of its incoming requests on cluster {{ $labels.cluster_full_name }}.
              runbook_url: https://runbooks.prometheus-operator.dev/runbooks/kubernetes/kubeapiterminatedrequests
              summary: The kubernetes apiserver has terminated {{ $value | humanizePercentage
                }} of its incoming requests.
            expr: sum by (cluster_full_name) (rate(apiserver_request_terminations_total{job="apiserver"}[10m]))
              / ( sum by (cluster_full_name) (rate(apiserver_request_total{job="apiserver"}[10m]))
              + sum by (cluster_full_name) (rate(apiserver_request_terminations_total{job="apiserver"}[10m]))
              ) > 0.20
            for: 5m
            labels:
              severity: warning

kubernetes-system-kubelet:
  enabled: false
  groups:
    kubernetes-system-kubelet:
      enabled: false
      rules:
        KubeNodeNotReady:
          enabled: false
          spec:
            alert: KubeNodeNotReady
            annotations:
              description: '{{ $labels.node }} has been unready for more than 15 minutes
                on cluster {{ $labels.cluster_full_name }}.'
              runbook_url: https://runbooks.prometheus-operator.dev/runbooks/kubernetes/kubenodenotready
              summary: Node is not ready.
            expr: |-
              kube_node_status_condition{job="kube-state-metrics",condition="Ready",status="true"} == 0
              and on (node,cluster_full_name)
              kube_node_spec_unschedulable{job="kube-state-metrics"} == 0
            for: 15m
            labels:
              severity: warning
        KubeNodePressure:
          enabled: false
          spec:
            alert: KubeNodePressure
            annotations:
              description: '{{ $labels.node }} on cluster {{ $labels.cluster_full_name
                }} has active Condition {{ $labels.condition }}. This is caused by resource
                usage exceeding eviction thresholds.'
              runbook_url: https://runbooks.prometheus-operator.dev/runbooks/kubernetes/kubenodepressure
              summary: Node has as active Condition.
            expr: |-
              kube_node_status_condition{job="kube-state-metrics",condition=~"(MemoryPressure|DiskPressure|PIDPressure)",status="true"} == 1
              and on (node,cluster_full_name)
              kube_node_spec_unschedulable{job="kube-state-metrics"} == 0
            for: 10m
            labels:
              severity: info
        KubeNodeUnreachable:
          enabled: false
          spec:
            alert: KubeNodeUnreachable
            annotations:
              description: '{{ $labels.node }} is unreachable and some workloads may be
                rescheduled on cluster {{ $labels.cluster_full_name }}.'
              runbook_url: https://runbooks.prometheus-operator.dev/runbooks/kubernetes/kubenodeunreachable
              summary: Node is unreachable.
            expr: (kube_node_spec_taint{job="kube-state-metrics",key="node.kubernetes.io/unreachable",effect="NoSchedule"}
              unless ignoring(key,value) kube_node_spec_taint{job="kube-state-metrics",key=~"ToBeDeletedByClusterAutoscaler|cloud.google.com/impending-node-termination|aws-node-termination-handler/spot-itn"})
              == 1
            for: 15m
            labels:
              severity: warning
        KubeletTooManyPods:
          enabled: false
          spec:
            alert: KubeletTooManyPods
            annotations:
              description: Kubelet '{{ $labels.node }}' is running at {{ $value | humanizePercentage
                }} of its Pod capacity on cluster {{ $labels.cluster_full_name }}.
              runbook_url: https://runbooks.prometheus-operator.dev/runbooks/kubernetes/kubelettoomanypods
              summary: Kubelet is running at capacity.
            expr: |-
              (
                max by (instance,cluster_full_name) (
                  kubelet_running_pods{job="kubelet", metrics_path="/metrics"} > 1
                )
                * on (instance,cluster_full_name) group_left(node)
                max by (instance,node,cluster_full_name) (
                  kubelet_node_name{job="kubelet", metrics_path="/metrics"}
                )
              )
              / on (node,cluster_full_name) group_left()
              max by (node,cluster_full_name) (
                kube_node_status_capacity{job="kube-state-metrics", resource="pods"} != 1
              ) > 0.95
            for: 15m
            labels:
              severity: info
        KubeNodeReadinessFlapping:
          enabled: false
          spec:
            alert: KubeNodeReadinessFlapping
            annotations:
              description: The readiness status of node {{ $labels.node }} has changed
                {{ $value }} times in the last 15 minutes on cluster {{ $labels.cluster_full_name
                }}.
              runbook_url: https://runbooks.prometheus-operator.dev/runbooks/kubernetes/kubenodereadinessflapping
              summary: Node readiness status is flapping.
            expr: |-
              sum(changes(kube_node_status_condition{job="kube-state-metrics",status="true",condition="Ready"}[15m])) by (node,cluster_full_name) > 2
              and on (node,cluster_full_name)
              kube_node_spec_unschedulable{job="kube-state-metrics"} == 0
            for: 15m
            labels:
              severity: warning
        KubeNodeEviction:
          enabled: false
          spec:
            alert: KubeNodeEviction
            annotations:
              description: Node {{ $labels.node }} on {{ $labels.cluster_full_name }}
                is evicting Pods due to {{ $labels.eviction_signal }}.  Eviction occurs
                when eviction thresholds are crossed, typically caused by Pods exceeding
                RAM/ephemeral-storage limits.
              runbook_url: https://runbooks.prometheus-operator.dev/runbooks/kubernetes/kubenodeeviction
              summary: Node is evicting pods.
            expr: |-
              sum(rate(kubelet_evictions{job="kubelet", metrics_path="/metrics"}[15m])) by (eviction_signal,instance,cluster_full_name)
              * on (instance,cluster_full_name) group_left(node)
              max by (instance,node,cluster_full_name) (
                kubelet_node_name{job="kubelet", metrics_path="/metrics"}
              )
              > 0
            for: 0s
            labels:
              severity: info
        KubeletPlegDurationHigh:
          enabled: false
          spec:
            alert: KubeletPlegDurationHigh
            annotations:
              description: The Kubelet Pod Lifecycle Event Generator has a 99th percentile
                duration of {{ $value }} seconds on node {{ $labels.node }} on cluster
                {{ $labels.cluster_full_name }}.
              runbook_url: https://runbooks.prometheus-operator.dev/runbooks/kubernetes/kubeletplegdurationhigh
              summary: Kubelet Pod Lifecycle Event Generator is taking too long to relist.
            expr: node_quantile:kubelet_pleg_relist_duration_seconds:histogram_quantile{quantile="0.99"}
              >= 10
            for: 5m
            labels:
              severity: warning
        KubeletPodStartUpLatencyHigh:
          enabled: false
          spec:
            alert: KubeletPodStartUpLatencyHigh
            annotations:
              description: Kubelet Pod startup 99th percentile latency is {{ $value }}
                seconds on node {{ $labels.node }} on cluster {{ $labels.cluster_full_name
                }}.
              runbook_url: https://runbooks.prometheus-operator.dev/runbooks/kubernetes/kubeletpodstartuplatencyhigh
              summary: Kubelet Pod startup latency is too high.
            expr: histogram_quantile(0.99, sum(rate(kubelet_pod_worker_duration_seconds_bucket{job="kubelet",
              metrics_path="/metrics"}[5m])) by (instance,le,cluster_full_name)) * on
              (instance,cluster_full_name) group_left(node) kubelet_node_name{job="kubelet",
              metrics_path="/metrics"} > 60
            for: 15m
            labels:
              severity: warning
        KubeletClientCertificateExpiration:
          enabled: false
          spec:
            alert: KubeletClientCertificateExpiration
            annotations:
              description: Client certificate for Kubelet on node {{ $labels.node }} expires
                in {{ $value | humanizeDuration }} on cluster {{ $labels.cluster_full_name
                }}.
              runbook_url: https://runbooks.prometheus-operator.dev/runbooks/kubernetes/kubeletclientcertificateexpiration
              summary: Kubelet client certificate is about to expire.
            expr: kubelet_certificate_manager_client_ttl_seconds < 604800
            labels:
              severity: warning
        KubeletClientCertificateExpirationCritical:
          enabled: false
          spec:
            alert: KubeletClientCertificateExpirationCritical
            annotations:
              description: Client certificate for Kubelet on node {{ $labels.node }} expires
                in {{ $value | humanizeDuration }} on cluster {{ $labels.cluster_full_name
                }}.
              runbook_url: https://runbooks.prometheus-operator.dev/runbooks/kubernetes/kubeletclientcertificateexpiration
              summary: Kubelet client certificate is about to expire.
            expr: kubelet_certificate_manager_client_ttl_seconds < 86400
            labels:
              severity: critical
        KubeletServerCertificateExpiration:
          enabled: false
          spec:
            alert: KubeletServerCertificateExpiration
            annotations:
              description: Server certificate for Kubelet on node {{ $labels.node }} expires
                in {{ $value | humanizeDuration }} on cluster {{ $labels.cluster_full_name
                }}.
              runbook_url: https://runbooks.prometheus-operator.dev/runbooks/kubernetes/kubeletservercertificateexpiration
              summary: Kubelet server certificate is about to expire.
            expr: kubelet_certificate_manager_server_ttl_seconds < 604800
            labels:
              severity: warning
        KubeletServerCertificateExpirationCritical:
          enabled: false
          spec:
            alert: KubeletServerCertificateExpirationCritical
            annotations:
              description: Server certificate for Kubelet on node {{ $labels.node }} expires
                in {{ $value | humanizeDuration }} on cluster {{ $labels.cluster_full_name
                }}.
              runbook_url: https://runbooks.prometheus-operator.dev/runbooks/kubernetes/kubeletservercertificateexpiration
              summary: Kubelet server certificate is about to expire.
            expr: kubelet_certificate_manager_server_ttl_seconds < 86400
            labels:
              severity: critical
        KubeletClientCertificateRenewalErrors:
          enabled: false
          spec:
            alert: KubeletClientCertificateRenewalErrors
            annotations:
              description: Kubelet on node {{ $labels.node }} has failed to renew its
                client certificate ({{ $value | humanize }} errors in the last 5 minutes)
                on cluster {{ $labels.cluster_full_name }}.
              runbook_url: https://runbooks.prometheus-operator.dev/runbooks/kubernetes/kubeletclientcertificaterenewalerrors
              summary: Kubelet has failed to renew its client certificate.
            expr: increase(kubelet_certificate_manager_client_expiration_renew_errors[5m])
              > 0
            for: 15m
            labels:
              severity: warning
        KubeletServerCertificateRenewalErrors:
          enabled: false
          spec:
            alert: KubeletServerCertificateRenewalErrors
            annotations:
              description: Kubelet on node {{ $labels.node }} has failed to renew its
                server certificate ({{ $value | humanize }} errors in the last 5 minutes)
                on cluster {{ $labels.cluster_full_name }}.
              runbook_url: https://runbooks.prometheus-operator.dev/runbooks/kubernetes/kubeletservercertificaterenewalerrors
              summary: Kubelet has failed to renew its server certificate.
            expr: increase(kubelet_server_expiration_renew_errors[5m]) > 0
            for: 15m
            labels:
              severity: warning

node-exporter:
  enabled: false
  groups:
    node-exporter:
      enabled: false
      rules:
        NodeFilesystemSpaceFillingUp:
          enabled: false
          spec:
            alert: NodeFilesystemSpaceFillingUp
            annotations:
              description: Filesystem on {{ $labels.device }}, mounted on {{ $labels.mountpoint
                }}, at {{ $labels.instance }} has only {{ printf "%.2f" $value }}% available
                space left and is filling up.
              runbook_url: https://runbooks.prometheus-operator.dev/runbooks/node/nodefilesystemspacefillingup
              summary: Filesystem is predicted to run out of space within the next 24
                hours.
            expr: |-
              (
                node_filesystem_avail_bytes{job="node-exporter",fstype!="",mountpoint!=""} / node_filesystem_size_bytes{job="node-exporter",fstype!="",mountpoint!=""} * 100 < 15
              and
                predict_linear(node_filesystem_avail_bytes{job="node-exporter",fstype!="",mountpoint!=""}[6h], 24*60*60) < 0
              and
                node_filesystem_readonly{job="node-exporter",fstype!="",mountpoint!=""} == 0
              )
            for: 1h
            labels:
              severity: warning
        NodeFilesystemSpaceFillingUpCritical:
          enabled: false
          spec:
            alert: NodeFilesystemSpaceFillingUpCritical
            annotations:
              description: Filesystem on {{ $labels.device }}, mounted on {{ $labels.mountpoint
                }}, at {{ $labels.instance }} has only {{ printf "%.2f" $value }}% available
                space left and is filling up fast.
              runbook_url: https://runbooks.prometheus-operator.dev/runbooks/node/nodefilesystemspacefillingup
              summary: Filesystem is predicted to run out of space within the next 4 hours.
            expr: |-
              (
                node_filesystem_avail_bytes{job="node-exporter",fstype!="",mountpoint!=""} / node_filesystem_size_bytes{job="node-exporter",fstype!="",mountpoint!=""} * 100 < 10
              and
                predict_linear(node_filesystem_avail_bytes{job="node-exporter",fstype!="",mountpoint!=""}[6h], 4*60*60) < 0
              and
                node_filesystem_readonly{job="node-exporter",fstype!="",mountpoint!=""} == 0
              )
            for: 1h
            labels:
              severity: critical
        NodeFilesystemAlmostOutOfSpace:
          enabled: false
          spec:
            alert: NodeFilesystemAlmostOutOfSpace
            annotations:
              description: Filesystem on {{ $labels.device }}, mounted on {{ $labels.mountpoint
                }}, at {{ $labels.instance }} has only {{ printf "%.2f" $value }}% available
                space left.
              runbook_url: https://runbooks.prometheus-operator.dev/runbooks/node/nodefilesystemalmostoutofspace
              summary: Filesystem has less than 5% space left.
            expr: |-
              (
                node_filesystem_avail_bytes{job="node-exporter",fstype!="",mountpoint!=""} / node_filesystem_size_bytes{job="node-exporter",fstype!="",mountpoint!=""} * 100 < 5
              and
                node_filesystem_readonly{job="node-exporter",fstype!="",mountpoint!=""} == 0
              )
            for: 30m
            labels:
              severity: warning
        NodeFilesystemAlmostOutOfSpaceCritical:
          enabled: false
          spec:
            alert: NodeFilesystemAlmostOutOfSpaceCritical
            annotations:
              description: Filesystem on {{ $labels.device }}, mounted on {{ $labels.mountpoint
                }}, at {{ $labels.instance }} has only {{ printf "%.2f" $value }}% available
                space left.
              runbook_url: https://runbooks.prometheus-operator.dev/runbooks/node/nodefilesystemalmostoutofspace
              summary: Filesystem has less than 3% space left.
            expr: |-
              (
                node_filesystem_avail_bytes{job="node-exporter",fstype!="",mountpoint!=""} / node_filesystem_size_bytes{job="node-exporter",fstype!="",mountpoint!=""} * 100 < 3
              and
                node_filesystem_readonly{job="node-exporter",fstype!="",mountpoint!=""} == 0
              )
            for: 30m
            labels:
              severity: critical
        NodeFilesystemFilesFillingUp:
          enabled: false
          spec:
            alert: NodeFilesystemFilesFillingUp
            annotations:
              description: Filesystem on {{ $labels.device }}, mounted on {{ $labels.mountpoint
                }}, at {{ $labels.instance }} has only {{ printf "%.2f" $value }}% available
                inodes left and is filling up.
              runbook_url: https://runbooks.prometheus-operator.dev/runbooks/node/nodefilesystemfilesfillingup
              summary: Filesystem is predicted to run out of inodes within the next 24
                hours.
            expr: |-
              (
                node_filesystem_files_free{job="node-exporter",fstype!="",mountpoint!=""} / node_filesystem_files{job="node-exporter",fstype!="",mountpoint!=""} * 100 < 40
              and
                predict_linear(node_filesystem_files_free{job="node-exporter",fstype!="",mountpoint!=""}[6h], 24*60*60) < 0
              and
                node_filesystem_readonly{job="node-exporter",fstype!="",mountpoint!=""} == 0
              )
            for: 1h
            labels:
              severity: warning
        NodeFilesystemFilesFillingUpCritical:
          enabled: false
          spec:
            alert: NodeFilesystemFilesFillingUpCritical
            annotations:
              description: Filesystem on {{ $labels.device }}, mounted on {{ $labels.mountpoint
                }}, at {{ $labels.instance }} has only {{ printf "%.2f" $value }}% available
                inodes left and is filling up fast.
              runbook_url: https://runbooks.prometheus-operator.dev/runbooks/node/nodefilesystemfilesfillingup
              summary: Filesystem is predicted to run out of inodes within the next 4
                hours.
            expr: |-
              (
                node_filesystem_files_free{job="node-exporter",fstype!="",mountpoint!=""} / node_filesystem_files{job="node-exporter",fstype!="",mountpoint!=""} * 100 < 20
              and
                predict_linear(node_filesystem_files_free{job="node-exporter",fstype!="",mountpoint!=""}[6h], 4*60*60) < 0
              and
                node_filesystem_readonly{job="node-exporter",fstype!="",mountpoint!=""} == 0
              )
            for: 1h
            labels:
              severity: critical
        NodeFilesystemAlmostOutOfFiles:
          enabled: false
          spec:
            alert: NodeFilesystemAlmostOutOfFiles
            annotations:
              description: Filesystem on {{ $labels.device }}, mounted on {{ $labels.mountpoint
                }}, at {{ $labels.instance }} has only {{ printf "%.2f" $value }}% available
                inodes left.
              runbook_url: https://runbooks.prometheus-operator.dev/runbooks/node/nodefilesystemalmostoutoffiles
              summary: Filesystem has less than 5% inodes left.
            expr: |-
              (
                node_filesystem_files_free{job="node-exporter",fstype!="",mountpoint!=""} / node_filesystem_files{job="node-exporter",fstype!="",mountpoint!=""} * 100 < 5
              and
                node_filesystem_readonly{job="node-exporter",fstype!="",mountpoint!=""} == 0
              )
            for: 1h
            labels:
              severity: warning
        NodeFilesystemAlmostOutOfFilesCritical:
          enabled: false
          spec:
            alert: NodeFilesystemAlmostOutOfFilesCritical
            annotations:
              description: Filesystem on {{ $labels.device }}, mounted on {{ $labels.mountpoint
                }}, at {{ $labels.instance }} has only {{ printf "%.2f" $value }}% available
                inodes left.
              runbook_url: https://runbooks.prometheus-operator.dev/runbooks/node/nodefilesystemalmostoutoffiles
              summary: Filesystem has less than 3% inodes left.
            expr: |-
              (
                node_filesystem_files_free{job="node-exporter",fstype!="",mountpoint!=""} / node_filesystem_files{job="node-exporter",fstype!="",mountpoint!=""} * 100 < 3
              and
                node_filesystem_readonly{job="node-exporter",fstype!="",mountpoint!=""} == 0
              )
            for: 1h
            labels:
              severity: critical
        NodeNetworkReceiveErrs:
          enabled: false
          spec:
            alert: NodeNetworkReceiveErrs
            annotations:
              description: '{{ $labels.instance }} interface {{ $labels.device }} has
                encountered {{ printf "%.0f" $value }} receive errors in the last two
                minutes.'
              runbook_url: https://runbooks.prometheus-operator.dev/runbooks/node/nodenetworkreceiveerrs
              summary: Network interface is reporting many receive errors.
            expr: rate(node_network_receive_errs_total{job="node-exporter"}[2m]) / rate(node_network_receive_packets_total{job="node-exporter"}[2m])
              > 0.01
            for: 1h
            labels:
              severity: warning
        NodeNetworkTransmitErrs:
          enabled: false
          spec:
            alert: NodeNetworkTransmitErrs
            annotations:
              description: '{{ $labels.instance }} interface {{ $labels.device }} has
                encountered {{ printf "%.0f" $value }} transmit errors in the last two
                minutes.'
              runbook_url: https://runbooks.prometheus-operator.dev/runbooks/node/nodenetworktransmiterrs
              summary: Network interface is reporting many transmit errors.
            expr: rate(node_network_transmit_errs_total{job="node-exporter"}[2m]) / rate(node_network_transmit_packets_total{job="node-exporter"}[2m])
              > 0.01
            for: 1h
            labels:
              severity: warning
        NodeHighNumberConntrackEntriesUsed:
          enabled: false
          spec:
            alert: NodeHighNumberConntrackEntriesUsed
            annotations:
              description: '{{ $labels.instance }} {{ $value | humanizePercentage }} of
                conntrack entries are used.'
              runbook_url: https://runbooks.prometheus-operator.dev/runbooks/node/nodehighnumberconntrackentriesused
              summary: Number of conntrack are getting close to the limit.
            expr: (node_nf_conntrack_entries{job="node-exporter"} / node_nf_conntrack_entries_limit)
              > 0.75
            labels:
              severity: warning
        NodeTextFileCollectorScrapeError:
          enabled: false
          spec:
            alert: NodeTextFileCollectorScrapeError
            annotations:
              description: Node Exporter text file collector on {{ $labels.instance }}
                failed to scrape.
              runbook_url: https://runbooks.prometheus-operator.dev/runbooks/node/nodetextfilecollectorscrapeerror
              summary: Node Exporter text file collector failed to scrape.
            expr: node_textfile_scrape_error{job="node-exporter"} == 1
            labels:
              severity: warning
        NodeClockSkewDetected:
          enabled: false
          spec:
            alert: NodeClockSkewDetected
            annotations:
              description: Clock at {{ $labels.instance }} is out of sync by more than
                0.05s. Ensure NTP is configured correctly on this host.
              runbook_url: https://runbooks.prometheus-operator.dev/runbooks/node/nodeclockskewdetected
              summary: Clock skew detected.
            expr: |-
              (
                node_timex_offset_seconds{job="node-exporter"} > 0.05
              and
                deriv(node_timex_offset_seconds{job="node-exporter"}[5m]) >= 0
              )
              or
              (
                node_timex_offset_seconds{job="node-exporter"} < -0.05
              and
                deriv(node_timex_offset_seconds{job="node-exporter"}[5m]) <= 0
              )
            for: 10m
            labels:
              severity: warning
        NodeClockNotSynchronising:
          enabled: false
          spec:
            alert: NodeClockNotSynchronising
            annotations:
              description: Clock at {{ $labels.instance }} is not synchronising. Ensure
                NTP is configured on this host.
              runbook_url: https://runbooks.prometheus-operator.dev/runbooks/node/nodeclocknotsynchronising
              summary: Clock not synchronising.
            expr: |-
              min_over_time(node_timex_sync_status{job="node-exporter"}[5m]) == 0
              and
              node_timex_maxerror_seconds{job="node-exporter"} >= 16
            for: 10m
            labels:
              severity: warning
        NodeRAIDDegraded:
          enabled: false
          spec:
            alert: NodeRAIDDegraded
            annotations:
              description: RAID array '{{ $labels.device }}' at {{ $labels.instance }}
                is in degraded state due to one or more disks failures. Number of spare
                drives is insufficient to fix issue automatically.
              runbook_url: https://runbooks.prometheus-operator.dev/runbooks/node/noderaiddegraded
              summary: RAID Array is degraded.
            expr: node_md_disks_required{job="node-exporter",device=~"(/dev/)?(mmcblk.p.+|nvme.+|rbd.+|sd.+|vd.+|xvd.+|dm-.+|md.+|dasd.+)"}
              - ignoring (state) (node_md_disks{state="active",job="node-exporter",device=~"(/dev/)?(mmcblk.p.+|nvme.+|rbd.+|sd.+|vd.+|xvd.+|dm-.+|md.+|dasd.+)"})
              > 0
            for: 15m
            labels:
              severity: critical
        NodeRAIDDiskFailure:
          enabled: false
          spec:
            alert: NodeRAIDDiskFailure
            annotations:
              description: At least one device in RAID array at {{ $labels.instance }}
                failed. Array '{{ $labels.device }}' needs attention and possibly a disk
                swap.
              runbook_url: https://runbooks.prometheus-operator.dev/runbooks/node/noderaiddiskfailure
              summary: Failed device in RAID array.
            expr: node_md_disks{state="failed",job="node-exporter",device=~"(/dev/)?(mmcblk.p.+|nvme.+|rbd.+|sd.+|vd.+|xvd.+|dm-.+|md.+|dasd.+)"}
              > 0
            labels:
              severity: warning
        NodeFileDescriptorLimit:
          enabled: false
          spec:
            alert: NodeFileDescriptorLimit
            annotations:
              description: File descriptors limit at {{ $labels.instance }} is currently
                at {{ printf "%.2f" $value }}%.
              runbook_url: https://runbooks.prometheus-operator.dev/runbooks/node/nodefiledescriptorlimit
              summary: Kernel is predicted to exhaust file descriptors limit soon.
            expr: |-
              (
                node_filefd_allocated{job="node-exporter"} * 100 / node_filefd_maximum{job="node-exporter"} > 70
              )
            for: 15m
            labels:
              severity: warning
        NodeFileDescriptorLimitCritical:
          enabled: false
          spec:
            alert: NodeFileDescriptorLimitCritical
            annotations:
              description: File descriptors limit at {{ $labels.instance }} is currently
                at {{ printf "%.2f" $value }}%.
              runbook_url: https://runbooks.prometheus-operator.dev/runbooks/node/nodefiledescriptorlimit
              summary: Kernel is predicted to exhaust file descriptors limit soon.
            expr: |-
              (
                node_filefd_allocated{job="node-exporter"} * 100 / node_filefd_maximum{job="node-exporter"} > 90
              )
            for: 15m
            labels:
              severity: critical
        NodeCPUHighUsage:
          enabled: false
          spec:
            alert: NodeCPUHighUsage
            annotations:
              description: |
                CPU usage at {{ $labels.instance }} has been above 90% for the last 15 minutes, is currently at {{ printf "%.2f" $value }}%.
              runbook_url: https://runbooks.prometheus-operator.dev/runbooks/node/nodecpuhighusage
              summary: High CPU usage.
            expr: sum without(mode) (avg without (cpu) (rate(node_cpu_seconds_total{job="node-exporter",
              mode!~"idle|iowait"}[2m]))) * 100 > 90
            for: 15m
            labels:
              severity: info
        NodeSystemSaturation:
          enabled: false
          spec:
            alert: NodeSystemSaturation
            annotations:
              description: |
                System load per core at {{ $labels.instance }} has been above 2 for the last 15 minutes, is currently at {{ printf "%.2f" $value }}.
                This might indicate this instance resources saturation and can cause it becoming unresponsive.
              runbook_url: https://runbooks.prometheus-operator.dev/runbooks/node/nodesystemsaturation
              summary: System saturated, load per core is very high.
            expr: |-
              node_load1{job="node-exporter"}
              / count without (cpu, mode) (node_cpu_seconds_total{job="node-exporter", mode="idle"}) > 2
            for: 15m
            labels:
              severity: warning
        NodeMemoryMajorPagesFaults:
          enabled: false
          spec:
            alert: NodeMemoryMajorPagesFaults
            annotations:
              description: |
                Memory major pages are occurring at very high rate at {{ $labels.instance }}, 500 major page faults per second for the last 15 minutes, is currently at {{ printf "%.2f" $value }}.
                Please check that there is enough memory available at this instance.
              runbook_url: https://runbooks.prometheus-operator.dev/runbooks/node/nodememorymajorpagesfaults
              summary: Memory major page faults are occurring at very high rate.
            expr: rate(node_vmstat_pgmajfault{job="node-exporter"}[5m]) > 500
            for: 15m
            labels:
              severity: warning
        NodeMemoryHighUtilization:
          enabled: false
          spec:
            alert: NodeMemoryHighUtilization
            annotations:
              description: |
                Memory is filling up at {{ $labels.instance }}, has been above 90% for the last 15 minutes, is currently at {{ printf "%.2f" $value }}%.
              runbook_url: https://runbooks.prometheus-operator.dev/runbooks/node/nodememoryhighutilization
              summary: Host is running out of memory.
            expr: 100 - (node_memory_MemAvailable_bytes{job="node-exporter"} / node_memory_MemTotal_bytes{job="node-exporter"}
              * 100) > 90
            for: 15m
            labels:
              severity: warning
        NodeDiskIOSaturation:
          enabled: false
          spec:
            alert: NodeDiskIOSaturation
            annotations:
              description: |
                Disk IO queue (aqu-sq) is high on {{ $labels.device }} at {{ $labels.instance }}, has been above 10 for the last 30 minutes, is currently at {{ printf "%.2f" $value }}.
                This symptom might indicate disk saturation.
              runbook_url: https://runbooks.prometheus-operator.dev/runbooks/node/nodediskiosaturation
              summary: Disk IO queue is high.
            expr: rate(node_disk_io_time_weighted_seconds_total{job="node-exporter", device=~"(/dev/)?(mmcblk.p.+|nvme.+|rbd.+|sd.+|vd.+|xvd.+|dm-.+|md.+|dasd.+)"}[5m])
              > 10
            for: 30m
            labels:
              severity: warning
        NodeSystemdServiceFailed:
          enabled: false
          spec:
            alert: NodeSystemdServiceFailed
            annotations:
              description: Systemd service {{ $labels.name }} has entered failed state
                at {{ $labels.instance }}
              runbook_url: https://runbooks.prometheus-operator.dev/runbooks/node/nodesystemdservicefailed
              summary: Systemd service has entered failed state.
            expr: node_systemd_unit_state{job="node-exporter", state="failed"} == 1
            for: 5m
            labels:
              severity: warning
        NodeSystemdServiceCrashlooping:
          enabled: false
          spec:
            alert: NodeSystemdServiceCrashlooping
            annotations:
              description: Systemd service {{ $labels.name }} has being restarted too
                many times at {{ $labels.instance }} for the last 15 minutes. Please check
                if service is crash looping.
              runbook_url: https://runbooks.prometheus-operator.dev/runbooks/node/nodesystemdservicecrashlooping
              summary: Systemd service keeps restaring, possibly crash looping.
            expr: increase(node_systemd_service_restart_total{job="node-exporter"}[5m])
              > 2
            for: 15m
            labels:
              severity: warning
        NodeBondingDegraded:
          enabled: false
          spec:
            alert: NodeBondingDegraded
            annotations:
              description: Bonding interface {{ $labels.master }} on {{ $labels.instance
                }} is in degraded state due to one or more slave failures.
              runbook_url: https://runbooks.prometheus-operator.dev/runbooks/node/nodebondingdegraded
              summary: Bonding interface is degraded
            expr: (node_bonding_slaves - node_bonding_active) != 0
            for: 5m
            labels:
              severity: warning

node-exporter-rules:
  enabled: false
  groups:
    node-exporter-rules:
      enabled: false
      rules:
        "instance:node_num_cpu:sum":
          enabled: false
          spec:
            annotations: {}
            expr: |-
              count without (cpu, mode) (
                node_cpu_seconds_total{job="node-exporter",mode="idle"}
              )
            labels: {}
            record: instance:node_num_cpu:sum
        "instance:node_cpu_utilisation:rate5m":
          enabled: false
          spec:
            annotations: {}
            expr: |-
              1 - avg without (cpu) (
                sum without (mode) (rate(node_cpu_seconds_total{job="node-exporter", mode=~"idle|iowait|steal"}[5m]))
              )
            labels: {}
            record: instance:node_cpu_utilisation:rate5m
        "instance:node_load1_per_cpu:ratio":
          enabled: false
          spec:
            annotations: {}
            expr: |-
              (
                node_load1{job="node-exporter"}
              /
                instance:node_num_cpu:sum{job="node-exporter"}
              )
            labels: {}
            record: instance:node_load1_per_cpu:ratio
        "instance:node_memory_utilisation:ratio":
          enabled: false
          spec:
            annotations: {}
            expr: |-
              1 - (
                (
                  node_memory_MemAvailable_bytes{job="node-exporter"}
                  or
                  (
                    node_memory_Buffers_bytes{job="node-exporter"}
                    +
                    node_memory_Cached_bytes{job="node-exporter"}
                    +
                    node_memory_MemFree_bytes{job="node-exporter"}
                    +
                    node_memory_Slab_bytes{job="node-exporter"}
                  )
                )
              /
                node_memory_MemTotal_bytes{job="node-exporter"}
              )
            labels: {}
            record: instance:node_memory_utilisation:ratio
        "instance:node_vmstat_pgmajfault:rate5m":
          enabled: false
          spec:
            annotations: {}
            expr: rate(node_vmstat_pgmajfault{job="node-exporter"}[5m])
            labels: {}
            record: instance:node_vmstat_pgmajfault:rate5m
        "instance_device:node_disk_io_time_seconds:rate5m":
          enabled: false
          spec:
            annotations: {}
            expr: rate(node_disk_io_time_seconds_total{job="node-exporter", device=~"(/dev/)?(mmcblk.p.+|nvme.+|rbd.+|sd.+|vd.+|xvd.+|dm-.+|md.+|dasd.+)"}[5m])
            labels: {}
            record: instance_device:node_disk_io_time_seconds:rate5m
        "instance_device:node_disk_io_time_weighted_seconds:rate5m":
          enabled: false
          spec:
            annotations: {}
            expr: rate(node_disk_io_time_weighted_seconds_total{job="node-exporter", device=~"(/dev/)?(mmcblk.p.+|nvme.+|rbd.+|sd.+|vd.+|xvd.+|dm-.+|md.+|dasd.+)"}[5m])
            labels: {}
            record: instance_device:node_disk_io_time_weighted_seconds:rate5m
        "instance:node_network_receive_bytes_excluding_lo:rate5m":
          enabled: false
          spec:
            annotations: {}
            expr: |-
              sum without (device) (
                rate(node_network_receive_bytes_total{job="node-exporter", device!="lo"}[5m])
              )
            labels: {}
            record: instance:node_network_receive_bytes_excluding_lo:rate5m
        "instance:node_network_transmit_bytes_excluding_lo:rate5m":
          enabled: false
          spec:
            annotations: {}
            expr: |-
              sum without (device) (
                rate(node_network_transmit_bytes_total{job="node-exporter", device!="lo"}[5m])
              )
            labels: {}
            record: instance:node_network_transmit_bytes_excluding_lo:rate5m
        "instance:node_network_receive_drop_excluding_lo:rate5m":
          enabled: false
          spec:
          - annotations: {}
            expr: |-
              sum without (device) (
                rate(node_network_receive_drop_total{job="node-exporter", device!="lo"}[5m])
              )
            labels: {}
            record: instance:node_network_receive_drop_excluding_lo:rate5m
        "instance:node_network_transmit_drop_excluding_lo:rate5m":
          enabled: false
          spec:
          - annotations: {}
            expr: |-
              sum without (device) (
                rate(node_network_transmit_drop_total{job="node-exporter", device!="lo"}[5m])
              )
            labels: {}
            record: instance:node_network_transmit_drop_excluding_lo:rate5m

node-network:
  enabled: false
  groups:
    node-network:
      enabled: false
      rules:
        NodeNetworkInterfaceFlapping:
          enabled: false
          spec:
            alert: NodeNetworkInterfaceFlapping
            annotations:
              description: Network interface "{{ $labels.device }}" changing its up status
                often on node-exporter {{ $labels.namespace }}/{{ $labels.pod }}
              runbook_url: https://runbooks.prometheus-operator.dev/runbooks/general/nodenetworkinterfaceflapping
              summary: Network interface is often changing its status
            expr: changes(node_network_up{job="node-exporter",device!~"veth.+"}[2m]) >
              2
            for: 2m
            labels:
              severity: warning

node-rules:
  enabled: false
  groups:
    node-rules:
      enabled: false
      rules:
        "node_namespace_pod:kube_pod_info:":
          enabled: false
          spec:
            annotations: {}
            expr: |-
              topk by (namespace,pod,cluster_full_name) (1,
                max by (node,namespace,pod,cluster_full_name) (
                  label_replace(kube_pod_info{job="kube-state-metrics",node!=""}, "pod", "$1", "pod", "(.*)")
              ))
            labels: {}
            record: 'node_namespace_pod:kube_pod_info:'
        "node:node_num_cpu:sum":
          enabled: false
          spec:
          - annotations: {}
            expr: |-
              count by (node,cluster_full_name) (
                node_cpu_seconds_total{mode="idle",job="node-exporter"}
                * on (namespace,pod,cluster_full_name) group_left(node)
                topk by (namespace,pod,cluster_full_name) (1, node_namespace_pod:kube_pod_info:)
              )
            labels: {}
            record: node:node_num_cpu:sum
        ":node_memory_MemAvailable_bytes:sum":
          enabled: false
          spec:
          - annotations: {}
            expr: |-
              sum(
                node_memory_MemAvailable_bytes{job="node-exporter"} or
                (
                  node_memory_Buffers_bytes{job="node-exporter"} +
                  node_memory_Cached_bytes{job="node-exporter"} +
                  node_memory_MemFree_bytes{job="node-exporter"} +
                  node_memory_Slab_bytes{job="node-exporter"}
                )
              ) by (cluster_full_name)
            labels: {}
            record: :node_memory_MemAvailable_bytes:sum
        "node:node_cpu_utilization:ratio_rate5m":
          enabled: false
          spec:
          - annotations: {}
            expr: |-
              avg by (node,cluster_full_name) (
                sum without (mode) (
                  rate(node_cpu_seconds_total{mode!="idle",mode!="iowait",mode!="steal",job="node-exporter"}[5m])
                )
              )
            labels: {}
            record: node:node_cpu_utilization:ratio_rate5m
        "cluster:node_cpu:ratio_rate5m":
          enabled: false
          spec:
          - annotations: {}
            expr: |-
              avg by (cluster_full_name) (
                node:node_cpu_utilization:ratio_rate5m
              )
            labels: {}
            record: cluster:node_cpu:ratio_rate5m

vm-health:
  enabled: false
  groups:
    vm-health:
      enabled: false
      rules:
        TooManyRestarts:
          enabled: false
          spec:
            alert: TooManyRestarts
            annotations:
              description: |
                Job {{ $labels.job }} (instance {{ $labels.instance }}) has restarted more than twice in the last 15 minutes. It might be crashlooping.
              summary: '{{ $labels.job }} too many restarts (instance {{ $labels.instance
                }})'
            expr: changes(process_start_time_seconds{job=~".*(victoriametrics|vmselect|vminsert|vmstorage|vmagent|vmalert|vmsingle|vmalertmanager|vmauth|victorialogs|vlstorage|vlselect|vlinsert).*"}[15m])
              > 2
            labels:
              severity: critical

        ServiceDown:
          enabled: false
          spec:
            alert: ServiceDown
            annotations:
              description: '{{ $labels.instance }} of job {{ $labels.job }} has been down
                for more than 2 minutes.'
              summary: Service {{ $labels.job }} is down on {{ $labels.instance }}
            expr: up{job=~".*(victoriametrics|vmselect|vminsert|vmstorage|vmagent|vmalert|vmsingle|vmalertmanager|vmauth|victorialogs|vlstorage|vlselect|vlinsert).*"}
              == 0
            for: 2m
            labels:
              severity: critical

        ProcessNearFDLimits:
          enabled: false
          spec:
            alert: ProcessNearFDLimits
            annotations:
              description: |
                Exhausting OS file descriptors limit can cause severe degradation of the process.
                Consider to increase the limit as fast as possible.
              summary: |
                Number of free file descriptors is less than 100 for "{{ $labels.job
                }}"("{{ $labels.instance }}") for the last 5m
            expr: (process_max_fds - process_open_fds) < 100
            for: 5m
            labels:
              severity: critical

        TooHighMemoryUsage:
          enabled: false
          spec:
            alert: TooHighMemoryUsage
            annotations:
              description: |
                Too high memory usage may result into multiple issues such as OOMs or degraded performance.
                Consider to either increase available memory or decrease the load on the process.
              summary: |
                It is more than 80% of memory used by "{{ $labels.job }}"("{{ $labels.instance
                }}")
            expr: (min_over_time(process_resident_memory_anon_bytes[10m]) / vm_available_memory_bytes)
              > 0.8
            for: 5m
            labels:
              severity: critical

        TooHighCPUUsage:
          enabled: false
          spec:
            alert: TooHighCPUUsage
            annotations:
              description: |
                Too high CPU usage may be a sign of insufficient resources and make process unstable. Consider to either increase available CPU resources or decrease the load on the process.
              summary: |
                More than 90% of CPU is used by "{{ $labels.job }}"("{{ $labels.instance
                }}") during the last 5m
            expr: rate(process_cpu_seconds_total[5m]) / process_cpu_cores_available >
              0.9
            for: 5m
            labels:
              severity: critical

        TooManyLogs:
          enabled: false
          spec:
            alert: TooManyLogs
            annotations:
              description: |
                Logging rate for job \"{{ $labels.job }}\" ({{ $labels.instance }}) is {{ $value }} for last 15m. Worth to check logs for specific error messages.
              summary: Too many logs printed for job "{{ $labels.job }}" ({{ $labels.instance
                }})
            expr: sum(increase(vm_log_messages_total{level="error"}[5m])) without (app_version,
              location) > 0
            for: 15m
            labels:
              severity: warning

        TooManyTSIDMisses:
          enabled: false
          spec:
            alert: TooManyTSIDMisses
            annotations:
              description: |
                The rate of TSID misses during query lookups is too high for \"{{ $labels.job }}\" ({{ $labels.instance }}).
                Make sure you're running VictoriaMetrics of v1.85.3 or higher.
                Related issue https://github.com/VictoriaMetrics/VictoriaMetrics/issues/3502
              summary: Too many TSID misses for job "{{ $labels.job }}" ({{ $labels.instance
                }})
            expr: rate(vm_missing_tsids_for_metric_id_total[5m]) > 0
            for: 10m
            labels:
              severity: critical

        ConcurrentInsertsHitTheLimit:
          enabled: false
          spec:
            alert: ConcurrentInsertsHitTheLimit
            annotations:
              description: "The limit of concurrent inserts on instance {{ $labels.instance
                }} depends on the number of CPUs.\nUsually, when component constantly
                hits the limit it is likely the component is overloaded and requires more
                CPU.\nIn some cases for components like vmagent or vminsert the alert
                might trigger if there are too many clients\nmaking write attempts. If
                vmagent's or vminsert's CPU usage and network saturation are at normal
                level, then \nit might be worth adjusting `-maxConcurrentInserts` cmd-line
                flag.\n"
              summary: '{{ $labels.job }} on instance {{ $labels.instance }} is constantly
                hitting concurrent inserts limit'
            expr: avg_over_time(vm_concurrent_insert_current[1m]) >= vm_concurrent_insert_capacity
            for: 15m
            labels:
              severity: warning

        IndexDBRecordsDrop:
          enabled: false
          spec:
            alert: IndexDBRecordsDrop
            annotations:
              description: "VictoriaMetrics could skip registering new timeseries during
                ingestion if they fail the validation process. \nFor example, `reason=too_long_item`
                means that time series cannot exceed 64KB. Please, reduce the number \nof
                labels or label values for such series. Or enforce these limits via `-maxLabelsPerTimeseries`
                and \n`-maxLabelValueLen` command-line flags.\n"
              summary: IndexDB skipped registering items during data ingestion with reason={{
                $labels.reason }}.
            expr: increase(vm_indexdb_items_dropped_total[5m]) > 0
            labels:
              severity: critical

        RowsRejectedOnIngestion:
          enabled: false
          spec:
            alert: RowsRejectedOnIngestion
            annotations:
              description: 'Ingested rows on instance "{{ $labels.instance }}" are rejected
                due to the following reason: "{{ $labels.reason }}"'
              summary: Some rows are rejected on "{{ $labels.instance }}" on ingestion
                attempt
            expr: rate(vm_rows_ignored_total[5m]) > 0
            for: 15m
            labels:
              severity: warning

        TooHighQueryLoad:
          enabled: false
          spec:
            alert: TooHighQueryLoad
            annotations:
              description: |
                Instance {{ $labels.instance }} ({{ $labels.job }}) is failing to serve read queries during last 15m.
                Concurrency limit `-search.maxConcurrentRequests` was reached on this instance and extra queries were
                put into the queue for `-search.maxQueueDuration` interval. But even after waiting in the queue these queries weren't served.
                This happens if instance is overloaded with the current workload, or datasource is too slow to respond.
                Possible solutions are the following:
                * reduce the query load;
                * increase compute resources or number of replicas;
                * adjust limits `-search.maxConcurrentRequests` and `-search.maxQueueDuration`.
                See more at https://docs.victoriametrics.com/victoriametrics/troubleshooting/#slow-queries.
              summary: Read queries fail with timeout for {{ $labels.job }} on instance
                {{ $labels.instance }}
            expr: increase(vm_concurrent_select_limit_timeout_total[5m]) > 0
            for: 15m
            labels:
              severity: warning

vmagent:
  enabled: false
  groups:
    vmagent:
      enabled: false
      concurrency: 2
      interval: 30s
      rules:
        PersistentQueueIsDroppingData:
          enabled: false
          spec:
            alert: PersistentQueueIsDroppingData
            annotations:
              dashboard: /d/G7Z9GzMGz?viewPanel=49&var-instance={{ $labels.instance }}
              description: Vmagent dropped {{ $value | humanize1024 }} from persistent
                queue on instance {{ $labels.instance }} for the last 10m.
              summary: Instance {{ $labels.instance }} is dropping data from persistent
                queue
            expr: sum(increase(vm_persistentqueue_bytes_dropped_total[5m])) without (path)
              > 0
            for: 10m
            labels:
              severity: critical
        RejectedRemoteWriteDataBlocksAreDropped:
          enabled: false
          spec:
            alert: RejectedRemoteWriteDataBlocksAreDropped
            annotations:
              dashboard: /d/G7Z9GzMGz?viewPanel=79&var-instance={{ $labels.instance }}
              description: Job "{{ $labels.job }}" on instance {{ $labels.instance }}
                drops the rejected by remote-write server data blocks. Check the logs
                to find the reason for rejects.
              summary: Vmagent is dropping data blocks that are rejected by remote storage
            expr: sum(increase(vmagent_remotewrite_packets_dropped_total[5m])) without
              (url) > 0
            for: 15m
            labels:
              severity: warning
        TooManyScrapeErrors:
          enabled: false
          spec:
            alert: TooManyScrapeErrors
            annotations:
              dashboard: /d/G7Z9GzMGz?viewPanel=31&var-instance={{ $labels.instance }}
              description: Job "{{ $labels.job }}" on instance {{ $labels.instance }}
                fails to scrape targets for last 15m
              summary: Vmagent fails to scrape one or more targets
            expr: increase(vm_promscrape_scrapes_failed_total[5m]) > 0
            for: 15m
            labels:
              severity: warning
        ScrapePoolHasNoTargets:
          enabled: false
          spec:
            alert: ScrapePoolHasNoTargets
            annotations:
              description: |
                Vmagent "{{ $labels.job }}" has scrape_pool "{{ $labels.scrape_job
                }}" with 0 discovered targets. It is likely a misconfiguration. Please
                follow https://docs.victoriametrics.com/victoriametrics/vmagent/#debugging-scrape-targets
                to troubleshoot the scraping config.
              summary: Vmagent has scrape_pool with 0 configured/discovered targets
            expr: sum(vm_promscrape_scrape_pool_targets) without (status, instance, pod)
              == 0
            for: 30m
            labels:
              severity: warning
        TooManyWriteErrors:
          enabled: false
          spec:
            alert: TooManyWriteErrors
            annotations:
              dashboard: /d/G7Z9GzMGz?viewPanel=77&var-instance={{ $labels.instance }}
              description: Job "{{ $labels.job }}" on instance {{ $labels.instance }}
                responds with errors to write requests for last 15m.
              summary: Vmagent responds with too many errors on data ingestion protocols
            expr: |-
              (sum(increase(vm_ingestserver_request_errors_total[5m])) without (name,net,type)
              +
              sum(increase(vmagent_http_request_errors_total[5m])) without (path,protocol)) > 0
            for: 15m
            labels:
              severity: warning
        TooManyRemoteWriteErrors:
          enabled: false
          spec:
            alert: TooManyRemoteWriteErrors
            annotations:
              dashboard: /d/G7Z9GzMGz?viewPanel=61&var-instance={{ $labels.instance }}
              description: |-
                Vmagent fails to push data via remote write protocol to destination "{{ $labels.url }}"
                Ensure that destination is up and reachable.
              summary: Job "{{ $labels.job }}" on instance {{ $labels.instance }} fails
                to push to remote storage
            expr: rate(vmagent_remotewrite_retries_count_total[5m]) > 0
            for: 15m
            labels:
              severity: warning
        RemoteWriteConnectionIsSaturated:
          enabled: false
          spec:
            alert: RemoteWriteConnectionIsSaturated
            annotations:
              dashboard: /d/G7Z9GzMGz?viewPanel=84&var-instance={{ $labels.instance }}
              description: |-
                The remote write connection between vmagent "{{ $labels.job }}" (instance {{ $labels.instance }}) and destination "{{ $labels.url }}" is saturated by more than 90% and vmagent won't be able to keep up.
                There could be the following reasons for this:
                * vmagent can't send data fast enough through the existing network connections. Increase `-remoteWrite.queues` cmd-line flag value to establish more connections per destination.
                * remote destination can't accept data fast enough. Check if remote destination has enough resources for processing.
              summary: Remote write connection from "{{ $labels.job }}" (instance {{ $labels.instance
                }}) to {{ $labels.url }} is saturated
            expr: "(\n rate(vmagent_remotewrite_send_duration_seconds_total[5m])\n / \n
              vmagent_remotewrite_queues\n) > 0.9"
            for: 15m
            labels:
              severity: warning
        PersistentQueueForWritesIsSaturated:
          enabled: false
          spec:
            alert: PersistentQueueForWritesIsSaturated
            annotations:
              dashboard: /d/G7Z9GzMGz?viewPanel=98&var-instance={{ $labels.instance }}
              description: Persistent queue writes for vmagent "{{ $labels.job }}" (instance
                {{ $labels.instance }}) are saturated by more than 90% and vmagent won't
                be able to keep up with flushing data on disk. In this case, consider
                to decrease load on the vmagent or improve the disk throughput.
              summary: Persistent queue writes for instance {{ $labels.instance }} are
                saturated
            expr: rate(vm_persistentqueue_write_duration_seconds_total[5m]) > 0.9
            for: 15m
            labels:
              severity: warning
        PersistentQueueForReadsIsSaturated:
          enabled: false
          spec:
            alert: PersistentQueueForReadsIsSaturated
            annotations:
              dashboard: /d/G7Z9GzMGz?viewPanel=99&var-instance={{ $labels.instance }}
              description: Persistent queue reads for vmagent "{{ $labels.job }}" (instance
                {{ $labels.instance }}) are saturated by more than 90% and vmagent won't
                be able to keep up with reading data from the disk. In this case, consider
                to decrease load on the vmagent or improve the disk throughput.
              summary: Persistent queue reads for instance {{ $labels.instance }} are
                saturated
            expr: rate(vm_persistentqueue_read_duration_seconds_total[5m]) > 0.9
            for: 15m
            labels:
              severity: warning
        SeriesLimitHourReached:
          enabled: false
          spec:
            alert: SeriesLimitHourReached
            annotations:
              dashboard: /d/G7Z9GzMGz?viewPanel=88&var-instance={{ $labels.instance }}
              description: Max series limit set via -remoteWrite.maxHourlySeries flag
                is close to reaching the max value. Then samples for new time series will
                be dropped instead of sending them to remote storage systems.
              summary: Instance {{ $labels.instance }} reached 90% of the limit
            expr: (vmagent_hourly_series_limit_current_series / vmagent_hourly_series_limit_max_series)
              > 0.9
            labels:
              severity: critical
        SeriesLimitDayReached:
          enabled: false
          spec:
            alert: SeriesLimitDayReached
            annotations:
              dashboard: /d/G7Z9GzMGz?viewPanel=90&var-instance={{ $labels.instance }}
              description: Max series limit set via -remoteWrite.maxDailySeries flag is
                close to reaching the max value. Then samples for new time series will
                be dropped instead of sending them to remote storage systems.
              summary: Instance {{ $labels.instance }} reached 90% of the limit
            expr: (vmagent_daily_series_limit_current_series / vmagent_daily_series_limit_max_series)
              > 0.9
            labels:
              severity: critical
        ConfigurationReloadFailure:
          enabled: false
          spec:
            alert: ConfigurationReloadFailure
            annotations:
              description: Configuration hot-reload failed for vmagent on instance {{
                $labels.instance }}. Check vmagent's logs for detailed error message.
              summary: Configuration reload failed for vmagent instance {{ $labels.instance
                }}
            expr: |-
              vm_promscrape_config_last_reload_successful != 1
              or
              vmagent_relabel_config_last_reload_successful != 1
            labels:
              severity: warning
        StreamAggrFlushTimeout:
          enabled: false
          spec:
            alert: StreamAggrFlushTimeout
            annotations:
              description: 'Stream aggregation process can''t keep up with the load and
                might produce incorrect aggregation results. Check logs for more details.
                Possible solutions: increase aggregation interval; aggregate smaller number
                of series; reduce samples'' ingestion rate to stream aggregation.'
              summary: Streaming aggregation at "{{ $labels.job }}" (instance {{ $labels.instance
                }}) can't be finished within the configured aggregation interval.
            expr: increase(vm_streamaggr_flush_timeouts_total[5m]) > 0
            labels:
              severity: warning
        StreamAggrDedupFlushTimeout:
          enabled: false
          spec:
            alert: StreamAggrDedupFlushTimeout
            annotations:
              description: 'Deduplication process can''t keep up with the load and might
                produce incorrect results. Check docs https://docs.victoriametrics.com/victoriametrics/stream-aggregation/#deduplication
                and logs for more details. Possible solutions: increase deduplication
                interval; deduplicate smaller number of series; reduce samples'' ingestion
                rate.'
              summary: Deduplication "{{ $labels.job }}" (instance {{ $labels.instance
                }}) can't be finished within configured deduplication interval.
            expr: increase(vm_streamaggr_dedup_flush_timeouts_total[5m]) > 0
            labels:
              severity: warning

vmcluster:
  enabled: false
  groups:
    vmcluster:
      enabled: false
      concurrency: 2
      interval: 30s
      rules:
        DiskRunsOutOfSpaceIn3Days:
          enabled: false
          spec:
            alert: DiskRunsOutOfSpaceIn3Days
            annotations:
              dashboard: /d/oS7Bi_0Wz?viewPanel=20&var-instance={{ $labels.instance }}
              description: |-
                Taking into account current ingestion rate, free disk space will be enough only for {{ $value | humanizeDuration }} on instance {{ $labels.instance }}.
                Consider to limit the ingestion rate, decrease retention or scale the disk space up if possible.
              summary: Instance {{ $labels.instance }} will run out of disk space in 3
                days
            expr: |-
              sum(vm_free_disk_space_bytes) without(path) /
              (
                (rate(vm_rows_added_to_storage_total[1d]) - sum(rate(vm_deduplicated_samples_total[1d])) without (type)) * (
                  sum(vm_data_size_bytes{type!~"indexdb.*"}) without(type) /
                  sum(vm_rows{type!~"indexdb.*"}) without(type)
                )
                +
                rate(vm_new_timeseries_created_total[1d]) * (
                  sum(vm_data_size_bytes{type="indexdb/file"}) /
                  sum(vm_rows{type="indexdb/file"})
                )
              ) < 3 * 24 * 3600 > 0
            for: 30m
            labels:
              severity: critical
        NodeBecomesReadonlyIn3Days:
          enabled: false
          spec:
            alert: NodeBecomesReadonlyIn3Days
            annotations:
              dashboard: /d/oS7Bi_0Wz?viewPanel=20&var-instance={{ $labels.instance }}
              description: |-
                Taking into account current ingestion rate, free disk space and -storage.minFreeDiskSpaceBytes instance {{ $labels.instance }} will remain writable for {{ $value | humanizeDuration }}.
                Consider to limit the ingestion rate, decrease retention or scale the disk space up if possible.
              summary: Instance {{ $labels.instance }} will become read-only in 3 days
            expr: |-
              sum(vm_free_disk_space_bytes - vm_free_disk_space_limit_bytes) without(path) /
              (
                  (rate(vm_rows_added_to_storage_total[1d]) - sum(rate(vm_deduplicated_samples_total[1d])) without (type)) * (
                    sum(vm_data_size_bytes{type!~"indexdb.*"}) without(type) /
                    sum(vm_rows{type!~"indexdb.*"}) without(type)
                  )
                  +
                  rate(vm_new_timeseries_created_total[1d]) * (
                    sum(vm_data_size_bytes{type="indexdb/file"}) /
                    sum(vm_rows{type="indexdb/file"})
                  )
              ) < 3 * 24 * 3600 > 0
            for: 30m
            labels:
              severity: warning
        DiskRunsOutOfSpace:
          enabled: false
          spec:
            alert: DiskRunsOutOfSpace
            annotations:
              dashboard: /d/oS7Bi_0Wz?viewPanel=20&var-instance={{ $labels.instance }}
              description: |-
                Disk utilisation on instance {{ $labels.instance }} is more than 80%.
                Having less than 20% of free disk space could cripple merges processes and overall performance. Consider to limit the ingestion rate, decrease retention or scale the disk space if possible.
              summary: Instance {{ $labels.instance }} (job={{ $labels.job }}) will run
                out of disk space soon
            expr: |-
              sum(vm_data_size_bytes) by (job,instance,cluster_full_name) /
              (
              sum(vm_free_disk_space_bytes) by (job,instance,cluster_full_name) +
              sum(vm_data_size_bytes) by (job,instance,cluster_full_name)
              ) > 0.8
            for: 30m
            labels:
              severity: critical
        RequestErrorsToAPI:
          enabled: false
          spec:
            alert: RequestErrorsToAPI
            annotations:
              dashboard: /d/oS7Bi_0Wz?viewPanel=52&var-instance={{ $labels.instance }}
              description: Requests to path {{ $labels.path }} are receiving errors. Please
                verify if clients are sending correct requests.
              summary: Too many errors served for {{ $labels.job }} path {{ $labels.path
                }} (instance {{ $labels.instance }})
            expr: increase(vm_http_request_errors_total[5m]) > 0
            for: 15m
            labels:
              severity: warning
              show_at: dashboard
        RPCErrors:
          enabled: false
          spec:
            alert: RPCErrors
            annotations:
              dashboard: /d/oS7Bi_0Wz?viewPanel=44&var-instance={{ $labels.instance }}
              description: |-
                RPC errors are interconnection errors between cluster components.
                Possible reasons for errors are misconfiguration, overload, network blips or unreachable components.
              summary: Too many RPC errors for {{ $labels.job }} (instance {{ $labels.instance
                }})
            expr: |-
              (
              sum(increase(vm_rpc_connection_errors_total[5m])) by (job,instance,cluster_full_name)
              +
              sum(increase(vm_rpc_dial_errors_total[5m])) by (job,instance,cluster_full_name)
              +
              sum(increase(vm_rpc_handshake_errors_total[5m])) by (job,instance,cluster_full_name)
              ) > 0
            for: 15m
            labels:
              severity: warning
              show_at: dashboard
        TooHighChurnRate:
          enabled: false
          spec:
            alert: TooHighChurnRate
            annotations:
              dashboard: /d/oS7Bi_0Wz?viewPanel=102
              description: |-
                VM constantly creates new time series.
                This effect is known as Churn Rate.
                High Churn Rate tightly connected with database performance and may result in unexpected OOM's or slow queries.
              summary: Churn rate is more than 10% for the last 15m
            expr: |-
              (
                sum(rate(vm_new_timeseries_created_total[5m])) by (job,cluster_full_name)
                /
                sum(rate(vm_rows_inserted_total[5m])) by (job,cluster_full_name)
              ) > 0.1
            for: 15m
            labels:
              severity: warning
        TooHighChurnRate24h:
          enabled: false
          spec:
            alert: TooHighChurnRate24h
            annotations:
              dashboard: /d/oS7Bi_0Wz?viewPanel=102
              description: |-
                The number of created new time series over last 24h is 3x times higher than current number of active series.
                This effect is known as Churn Rate.
                High Churn Rate tightly connected with database performance and may result in unexpected OOM's or slow queries.
              summary: Too high number of new series created over last 24h
            expr: |-
              sum(increase(vm_new_timeseries_created_total[24h])) by (job,cluster_full_name)
              >
              (sum(vm_cache_entries{type="storage/hour_metric_ids"}) by (job,cluster_full_name) * 3)
            for: 15m
            labels:
              severity: warning
        TooHighSlowInsertsRate:
          enabled: false
          spec:
            alert: TooHighSlowInsertsRate
            annotations:
              dashboard: /d/oS7Bi_0Wz?viewPanel=108
              description: High rate of slow inserts may be a sign of resource exhaustion
                for the current load. It is likely more RAM is needed for optimal handling
                of the current number of active time series. See also https://github.com/VictoriaMetrics/VictoriaMetrics/issues/3976#issuecomment-1476883183
              summary: Percentage of slow inserts is more than 5% for the last 15m
            expr: |-
              (
                sum(rate(vm_slow_row_inserts_total[5m])) by (job,cluster_full_name)
                /
                sum(rate(vm_rows_inserted_total[5m])) by (job,cluster_full_name)
              ) > 0.05
            for: 15m
            labels:
              severity: warning
        VminsertVmstorageConnectionIsSaturated:
          enabled: false
          spec:
            alert: VminsertVmstorageConnectionIsSaturated
            annotations:
              dashboard: /d/oS7Bi_0Wz?viewPanel=139&var-instance={{ $labels.instance }}
              description: |-
                The connection between vminsert (instance {{ $labels.instance }}) and vmstorage (instance {{ $labels.addr }}) is saturated by more than 90% and vminsert won't be able to keep up.
                This usually means that more vminsert or vmstorage nodes must be added to the cluster in order to increase the total number of vminsert -> vmstorage links.
              summary: Connection between vminsert on {{ $labels.instance }} and vmstorage
                on {{ $labels.addr }} is saturated
            expr: rate(vm_rpc_send_duration_seconds_total[5m]) > 0.9
            for: 15m
            labels:
              severity: warning
              show_at: dashboard
