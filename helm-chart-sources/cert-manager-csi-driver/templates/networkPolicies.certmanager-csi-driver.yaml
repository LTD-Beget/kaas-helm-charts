{{- if .Values.networkPolicies.enabled }}
---
# host to cert-manager-csi-driver — metrics (9809)
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-host-probes-cert-manager-csi-driver-9809
  namespace: {{ .Release.Namespace }}
spec:
  description: "Allow kubelet probes to cert-manager-csi-driver"
  endpointSelector:
    matchLabels:
      k8s:io.kubernetes.pod.namespace: {{ .Release.Namespace }}
      k8s:io.cilium.k8s.policy.serviceaccount: cert-manager-csi-driver
  ingress:
  - fromEntities:
    - host
    toPorts:
    - ports:
      - port: "9809"
        protocol: TCP

---
# Allow `cert-manager-csi-driver` to talk to the Kubernetes API server.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-egress-cert-manager-csi-driver-to-kube-apiserver-6443
  namespace: {{ .Release.Namespace }}
spec:
  endpointSelector:
    matchLabels:
      k8s:io.cilium.k8s.policy.serviceaccount: cert-manager-csi-driver
      k8s:io.kubernetes.pod.namespace: {{ .Release.Namespace }}
  egress:
  - toEntities:
    - kube-apiserver
    toPorts:
    - ports:
      - port: '6443'
        protocol: TCP
  description: Allows egress from cert-manager-csi-driver to the Kubernetes API server
    on 6443 for control-plane interactions.

---
# Allow vmagent to scrape `cert-manager-csi-driver` metrics.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-ingress-vmagent-to-cert-manager-csi-driver-11043
  namespace: {{ .Release.Namespace }}
spec:
  endpointSelector:
    matchLabels:
      k8s:io.cilium.k8s.policy.serviceaccount: cert-manager-csi-driver
      k8s:io.kubernetes.pod.namespace: {{ .Release.Namespace }}
  ingress:
  - fromEndpoints:
    - matchLabels:
        k8s:io.cilium.k8s.policy.serviceaccount: vmagent-vmagent
        k8s:io.kubernetes.pod.namespace: {{ .Values.companyPrefix }}-vmagent
    toPorts:
    - ports:
      - port: '11043'
        protocol: TCP
  description: Allows ingress from vmagent to cert-manager-csi-driver on 11043 for
    metrics collection.
{{- end }}
