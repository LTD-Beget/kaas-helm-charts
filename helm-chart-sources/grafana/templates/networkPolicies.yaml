{{- if .Values.networkPolicies.enabled }}
{{- $dataSourceServer := regexReplaceAll "https?://([^/:]+).*" .Values.grafanaDataSources.victoriametrics.spec.datasource.url "$1" -}}

---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-egress-grafana-to-vmselect-8481
  namespace: {{ .Release.Namespace }}
spec:
  endpointSelector:
    matchLabels:
      k8s:io.cilium.k8s.policy.serviceaccount: grafana-sa
      k8s:io.kubernetes.pod.namespace: {{ .Release.Namespace }}
  egress:
  - toEndpoints:
    - matchLabels:
        k8s:io.cilium.k8s.policy.serviceaccount: vmcluster-vm-cluster-victoria-metrics-k8s-stack
        k8s:io.kubernetes.pod.namespace: {{ .Values.companyPrefix }}-vmcluster
        k8s:app.kubernetes.io/name: vmselect
    toPorts:
    - ports:
      - port: '8481'
        protocol: TCP
  description: Allows egress from grafana to vmselect on 8481 for datasources.

---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-egress-grafana-to-istio-gw-443
  namespace: {{ .Release.Namespace }}
spec:
  endpointSelector:
    matchLabels:
      k8s:io.cilium.k8s.policy.serviceaccount: grafana-sa
      k8s:io.kubernetes.pod.namespace: {{ .Release.Namespace }}
  egress:
    - toEndpoints:
      - matchLabels:
          k8s:io.cilium.k8s.policy.serviceaccount: istio-gw
          k8s:io.kubernetes.pod.namespace: {{ .Values.companyPrefix }}-istio-gw
      toPorts:
        - ports:
            - port: '443'
              protocol: TCP
  description: Allows egress from grafana to istio-gw on 443 for dex auth

---
# Allow kubelet to probe `grafana` health.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-host-probes-grafana-3000
  namespace: {{ .Release.Namespace }}
spec:
  description: "Allow kubelet probes to grafana on :3000"
  endpointSelector:
    matchLabels:
      k8s:io.kubernetes.pod.namespace: {{ .Release.Namespace }}
      k8s:io.cilium.k8s.policy.serviceaccount: grafana-sa
  ingress:
  - fromEntities:
    - host
    toPorts:
    - ports:
      - port: "3000"
        protocol: TCP

