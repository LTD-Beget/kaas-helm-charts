---
# Allow `grafana` to talk to the Kubernetes API server.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-egress-grafana-to-kube-apiserver-6443
  namespace: {{ .Release.Namespace }}
spec:
  endpointSelector:
    matchLabels:
      k8s:io.cilium.k8s.policy.serviceaccount: grafana-sa
      k8s:io.kubernetes.pod.namespace: {{ .Release.Namespace }}
  egress:
  - toEntities:
    - kube-apiserver
    toPorts:
    - ports:
      - port: '6443'
        protocol: TCP
  description: Allows egress from grafana to the Kubernetes API server on 6443 for
    control-plane interactions.

---
# Allow `grafana` to resolve external names via CoreDNS.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-egress-grafana-to-coredns-53
  namespace: {{ .Release.Namespace }}
spec:
  endpointSelector:
    matchLabels:
      k8s:io.cilium.k8s.policy.serviceaccount: grafana-sa
      k8s:io.kubernetes.pod.namespace: {{ .Release.Namespace }}
  egress:
  - toEndpoints:
    - matchLabels:
        k8s:io.cilium.k8s.policy.serviceaccount: coredns
        k8s:io.kubernetes.pod.namespace: {{ .Values.companyPrefix }}-coredns
    toPorts:
    - ports:
      - port: '53'
        protocol: UDP
      - port: '53'
        protocol: TCP
      rules:
        dns:
        - matchName: grafana.com
        - matchName: grafana.com.{{ .Values.clusterDomain }}
        - matchName: grafana.com.svc.{{ .Values.clusterDomain }}
        - matchName: grafana.com.{{ .Release.Namespace }}.svc.{{ .Values.clusterDomain }}
        - matchName: storage.googleapis.com
        - matchName: storage.googleapis.com.{{ .Values.clusterDomain }}
        - matchName: storage.googleapis.com.svc.{{ .Values.clusterDomain }}
        - matchName: storage.googleapis.com.{{ .Release.Namespace }}.svc.{{ .Values.clusterDomain }}
        - matchName: {{ $dataSourceServer }}
        - matchName: {{ $dataSourceServer }}.{{ .Values.clusterDomain }}
        - matchName: {{ $dataSourceServer }}.svc.{{ .Values.clusterDomain }}
        - matchName: {{ $dataSourceServer }}.{{ .Release.Namespace }}.svc.{{ .Values.clusterDomain }}
{{- if .Values.systemIstioGwDomain }}
        - matchName: {{ .Values.systemIstioGwDomain }}
        - matchName: {{ .Values.systemIstioGwDomain }}.{{ .Values.clusterDomain }}
        - matchName: {{ .Values.systemIstioGwDomain }}.svc.{{ .Values.clusterDomain }}
        - matchName: {{ .Values.systemIstioGwDomain }}.{{ .Release.Namespace }}.svc.{{ .Values.clusterDomain }}
{{- end }}
  description: Allows egress from grafana to CoreDNS on 53 for external name resolution.

---
# Allow `grafana` to reach grafana.com for plugin downloads.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-egress-grafana-to-grafana-com-443
  namespace: {{ .Release.Namespace }}
spec:
  endpointSelector:
    matchLabels:
      k8s:io.cilium.k8s.policy.serviceaccount: grafana-sa
      k8s:io.kubernetes.pod.namespace: {{ .Release.Namespace }}
  egress:
  - toFQDNs:
    - matchName: grafana.com
    toPorts:
    - ports:
      - port: '443'
        protocol: TCP
  description: Allows egress from grafana to grafana.com on 443 for plugin downloads.

