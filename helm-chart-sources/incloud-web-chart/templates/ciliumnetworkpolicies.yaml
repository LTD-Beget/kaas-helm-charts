---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-egress-incloud-web-chart-oauth2-proxy-to-coredns-53
  namespace: {{ .Release.Namespace }}
spec:
  endpointSelector:
    matchLabels:
      k8s:io.cilium.k8s.policy.serviceaccount: incloud-web-chart-oauth2-proxy
      k8s:io.kubernetes.pod.namespace: {{ .Release.Namespace }}
  egress:
  - toEndpoints:
    - matchLabels:
        k8s:io.cilium.k8s.policy.serviceaccount: coredns
        k8s:io.kubernetes.pod.namespace: {{ .Values.companyPrefix }}-coredns
    toPorts:
    - ports:
      - port: '53'
        protocol: TCP
      - port: '53'
        protocol: UDP
      rules:
        dns:
        - matchPattern: "*"
  description: |
    Allows egress from incloud-web-chart-oauth2-proxy to coredns on 53. Ingress remains
    open in this policy.

---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-egress-incloud-web-chart-oauth2-proxy-to-dex-fqdn
  namespace: {{ .Release.Namespace }}
spec:
  endpointSelector:
    matchLabels:
      k8s:io.cilium.k8s.policy.serviceaccount: incloud-web-chart-oauth2-proxy
      k8s:io.kubernetes.pod.namespace: {{ .Release.Namespace }}
  egress:
    - toFQDNs:
        - matchName: {{ .Values.systemDomain }}
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP

