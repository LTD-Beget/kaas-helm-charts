                                            apiVersion: '{7}'
                                            cluster: '{2}'
                                            namespace: '{3}'
                                            plural: '{8}'

                  # ---- Row 2: Runtime facts ----
                  - type: antdRow
                    data:
                      gutter: [24, 0]
                    children:

