                      - type: antdCol
                        data:
                          span: 8
                        children:
                          
                          # Content card with PodDisruptionBudget runtime facts (two columns)
                          - type: ContentCard
                            data:
                              id: poddisruptionbudget-runtime-facts-card
                            children:
                          
                              - type: antdRow
                                data:
                                  gutter: [24, 12]
                                  id: poddisruptionbudget-runtime-grid
                                children:
                                  # LEFT COLUMN — Spec
                                  - type: antdCol
                                    data:
                                      id: poddisruptionbudget-col-left
                                      span: 12
                                      xs: 24
                                      xl: 12
                                    children:
                                      # Card title with icon
                                      - type: DefaultDiv
                                        data:
                                          id: poddisruptionbudget-spec-card-title
                                          style:
                                            display: flex
                                            gap: 12px
                                            marginBottom: 12px
                                            alignItems: center
                                        children:
                                          - type: antdIcons
                                            data:
                                              id: poddisruptionbudget-spec-icon
