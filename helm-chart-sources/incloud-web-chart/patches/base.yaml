                              cluster: "{2}"
                              customizationId: "container-status-containers-list"
                              baseprefix: "/openapi-ui"
                              withoutControls: true
                              pathToItems: .items.0.status.containerStatuses
                              pathToKey: .name
                              k8sResourceToFetch:
                                apiVersion: '{6}'
                                namespace: '{3}'
                                plural: '{7}'
                              fieldSelector:
                                metadata.name: "{8}"
                              additionalReqsDataToEachItem:
                                - 1

                  # =========================
                  # Conditions (only when present)
                  # =========================
                  
                  # Visibility wrapper for conditions card (renders only when conditions exist)
                  - type: VisibilityContainer
                    data:
                      id: conditions-visibility-guard
                      value: '{reqsJsonPath[0][".items.0.status.conditions"]}'
                    children:
                      
                      # Content card with resource conditions table
                      - type: ContentCard
                        data:
                          id: conditions-card
                          title: Conditions
                        children:
                      
                          # =========================
                          # Header: icon + title
                          # =========================
                          - type: DefaultDiv
                            data:
                              id: conditions-card-title
                              style:
                                display: flex
                                gap: 12px
                                marginBottom: 12px
                                alignItems: center
                            children:
                              - type: antdIcons
                                data:
                                  id: conditions-info-icon
                                  iconName: CheckCircleOutlined
                                  iconProps:
                                    size: 24
                                    color: token.colorInfo
                                    style:
                                      fontSize: 24
                                      color: token.colorInfo
                      
                              - type: antdText
                                data:
                                  id: conditions-title-text
                                  text: "Conditions"
                                  style:
                                    fontSize: 16px
                                    lineHeight: 24px
                      
                          # =========================
                          # Conditions table
                          # =========================
                          - type: EnrichedTable
                            data:
                              baseprefix: /openapi-ui
                              cluster: '{2}'
                              customizationId: factory-status-conditions
                              id: conditions-table
                              pathToItems: .items.0.status.conditions
                              withoutControls: true
                      
                              # K8s resource to fetch conditions from
                              k8sResourceToFetch:
                                
                                    apiVersion: '{6}'
                                    cluster: '{2}'
                                    namespace: '{3}'
                                    plural: '{7}'
                      
                              # Field selector to bind conditions to a concrete resource
                              fieldSelector:
                                
                                    metadata.name: '{8}'

          # =========================
          # YAML TAB
          # =========================
          - key: yaml
            label: YAML
            children:
              
              - type: ContentCard
                data:
                  id: yaml-editor-card
                  style:
                    marginBottom: 24px
                children:
                  - type: YamlEditorSingleton
                    data:
                      id: yaml-editor
              
                      # =========================
                      # Base editor configuration
                      # =========================
              
                      # Request index used to prefill editor with fetched resource
                      prefillValuesRequestIndex: 0
              
                      # Height subtracted from viewport to fit layout
                      substractHeight: 350
              
                      # JSONPath to resource root in API response
                      pathToData: .items.0
              
                      # Indicates whether resource is namespaced or cluster-scoped
                      isNameSpaced: true
              
                      # Editor mode/type (e.g. "api", "builtin")
                      type: builtin
              
                      # =========================
                      # API target (resource addressing)
                      # =========================
                      # Defines Kubernetes API location for resource CRUD
                      
                      apiVersion: '{6}'
                      cluster: '{2}'
                      namespace: '{3}'
                      plural: '{7}'
              
                      # =========================
                      # Permission context
                      # =========================
                      # Used by UI to validate RBAC permissions for edit actions
                      permissionContext:
                        
                        cluster: '{2}'
                        namespace: '{3}'
                        plural: '{7}'

          # =========================
          # POD LOGS TAB
          # =========================
          - key: logs
            label: Logs
            children:
              - type: ContentCard
                data:
                  id: details-card
                  style:
                    marginBottom: 24px
                children:
                  - type: PodLogs
                    data:
                      id: pod-logs
                      cluster: "{2}"
                      namespace: "{reqsJsonPath[0]['.items.0.metadata.namespace']['-']}"
                      podName: "{reqsJsonPath[0]['.items.0.metadata.name']['-']}"
                      substractHeight: 350
                      tailLines: 1000

          # =========================
          # POD TERMINAL TAB
          # =========================
          - key: terminal
            label: Terminal
            children:
              - type: ContentCard
                data:
                  id: details-card
                  style:
                    marginBottom: 24px
                children:
                  - type: PodTerminal
                    data:
                      id: pod-terminal
                      cluster: "{2}"
                      namespace: "{reqsJsonPath[0]['.items.0.metadata.namespace']['-']}"
                      podName: "{reqsJsonPath[0]['.items.0.metadata.name']['-']}"
                      substractHeight: 350

          # =========================
          # EVENTS TAB
          # =========================
          - key: events
            label: Events
            children:
              # Kubernetes events related to this resource
              
              - type: ContentCard
                data:
                  id: details-card
                  style:
                    marginBottom: 24px
                children:
                  - type: Events
                    data:
                      id: events
              
                      # =========================
                      # Base configuration
                      # =========================
              
                      # Base UI prefix for resource links
                      baseprefix: "/openapi-ui"
              
                      # Target cluster identifier
                      cluster: "{2}"
              
                      # WebSocket endpoint for live events stream
                      wsUrl: "/api/clusters/{2}/openapi-bff-ws/events/eventsWs"
              
                      # Pagination and layout tuning
                      pageSize: 50
                      limit: 40
                      substractHeight: 315
              
                      # =========================
                      # Field selector: bind events to current resource
                      # =========================
                      fieldSelector:
                        regarding.kind: "{reqsJsonPath[0]['.items.0.kind']['-']}"
                        regarding.name: "{reqsJsonPath[0]['.items.0.metadata.name']['-']}"
                        regarding.namespace: "{reqsJsonPath[0]['.items.0.metadata.namespace']['-']}"
                        regarding.apiVersion: "{reqsJsonPath[0]['.items.0.apiVersion']['-']}"
                      # =========================
                      # Factory routing keys
                      # =========================
                      # Used to navigate from Event objects to resource details pages
                      baseFactoryNamespacedAPIKey: base-factory-namespaced-api
                      baseFactoryClusterSceopedAPIKey: base-factory-clusterscoped-api
                      baseFactoryNamespacedBuiltinKey: base-factory-namespaced-builtin
                      baseFactoryClusterSceopedBuiltinKey: base-factory-clusterscoped-builtin
                      baseNamespaceFactoryKey: namespace-details

          # =========================
          # MONITORING TAB
          # =========================
          - key: monitoring
            label: Monitoring
            children:
              # Embedded Grafana dashboard for node metrics
              - type: DefaultIframe
                data:
                  id: DefaultIframe
                  width: 100%
                  height: 1100px
                  style:
                    border: 0
                  # Grafana dashboard path (same dashboard, extracted to template param)
                  src: >-
                    https://grafana.in-cloud.io/d/k8s_views_pods/kubernetes-views-pods?orgId=1&from=now-1h&to=now&timezone=utc&var-datasource=P4169E866C3094E38&var-namespace={reqsJsonPath[0]['.items.0.metadata.namespace']['-']}&var-pod={reqsJsonPath[0]['.items.0.metadata.name']['-']}&var-resolution=30s&var-job=kube-state-metrics&refresh=5s&kiosk=true&theme={theme}# =========================
          # AQUA SECURITY TAB (optional)
          # =========================
          - key: reports
            label: Reports
            children:
              # Content card with configuration/security report table
              - type: ContentCard
                data:
                  id: config-report-card
                  style:
                    marginBottom: 24px
                children:
                  # =========================
                  # Report table
                  # =========================
                  - type: EnrichedTable
                    data:
                      id: ds-pods-table
                      # Base prefix for navigation and links (passed from template context)
                      baseprefix: "/openapi-ui"
                      # Target cluster identifier
                      cluster: "{2}"
                      # UI customization preset for Trivy Operator reports table
                      customizationId: "factory-aquasecurity.github.io.v1alpha1.vulnerabilityreports"
                      # API endpoint to fetch ClusterInfraAssessmentReports
                      fetchUrl: "/api/clusters/{2}/k8s/apis/aquasecurity.github.io/v1alpha1/namespaces/{3}/vulnerabilityreports"
                      # Label selector to bind report to current resource (kind/name)
                      labelSelector:
                        trivy-operator.resource.kind: '{reqsJsonPath[0][''.items.0.metadata.ownerReferences[?(@.kind==''ReplicaSet''
                          || @.kind==''DaemonSet'' || @.kind==''StatefulSet'')].kind''][''-'']}'
                        trivy-operator.resource.name: '{reqsJsonPath[0][''.items.0.metadata.ownerReferences[?(@.kind==''ReplicaSet''
                          || @.kind==''DaemonSet'' || @.kind==''StatefulSet'')].name''][''-'']}'
                      # Path to report checks inside API response
                      pathToItems: ".items[*].report.vulnerabilities"

          - key: config-reports
            label: Config reports
            children:
              # Content card with configuration/security report table
              - type: ContentCard
                data:
                  id: config-report-card
                  style:
                    marginBottom: 24px
                children:
                  # =========================
                  # Report table
                  # =========================
                  - type: EnrichedTable
                    data:
                      id: ds-pods-table
                      # Base prefix for navigation and links (passed from template context)
                      baseprefix: "/openapi-ui"
                      # Target cluster identifier
                      cluster: "{2}"
                      # UI customization preset for Trivy Operator reports table
                      customizationId: "factory-aquasecurity.github.io.v1alpha1.configauditreports"
                      # API endpoint to fetch ClusterInfraAssessmentReports
                      fetchUrl: "/api/clusters/{2}/k8s/apis/aquasecurity.github.io/v1alpha1/namespaces/{3}/configauditreports"
                      # Label selector to bind report to current resource (kind/name)
                      labelSelector:
                        trivy-operator.resource.kind: '{reqsJsonPath[0][''.items.0.metadata.ownerReferences[?(@.kind==''ReplicaSet''
                          || @.kind==''DaemonSet'' || @.kind==''StatefulSet'')].kind''][''-'']}'
                        trivy-operator.resource.name: '{reqsJsonPath[0][''.items.0.metadata.ownerReferences[?(@.kind==''ReplicaSet''
                          || @.kind==''DaemonSet'' || @.kind==''StatefulSet'')].name''][''-'']}'
                      # Path to report checks inside API response
                      pathToItems: ".items[*].report.checks"
