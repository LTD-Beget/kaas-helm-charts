# =================================================
# Cluster-scoped Node list columns override
# =================================================
apiVersion: front.in-cloud.io/v1alpha1
kind: CustomColumnsOverride
metadata:
  # Name of this CustomColumnsOverride resource
  name: stock-cluster-v1.nodes
spec:
  # Unique identifier of this CustomColumnsOverride
  id: stock-cluster-/v1/nodes

  # =================================================
  # Table columns rendered in the Nodes list
  # =================================================
  additionalPrinterColumns:

    # =================================================
    # Resource name with link to Node details Factory
    # =================================================
    - name: Name
      type: factory
      
      jsonPath: .metadata.name
      customProps:
        disableEventBubbling: true
        items:
          - type: antdFlex
            data:
              id: resource-badge-link-row
              align: center
              direction: row
              gap: 6
            children:
              - type: ResourceBadge
                data:
                  id: example-resource-badge
                  value: "{reqsJsonPath[0]['.kind']['-']}"
              - type: antdLink
                data:
                  id: name-link
                  href: "/openapi-ui/{2}/factory/node-details/v1/nodes/{reqsJsonPath[0]['.metadata.name']['-']}"
                  text: "{reqsJsonPath[0]['.metadata.name']['-']}"

    # =================================================
    # MachineConfigPool name (taken from node annotation)
    # =================================================
    - name: Machine Pool
      type: factory
      
      jsonPath: .metadata.annotations["mco.in-cloud.io/pool"]
      customProps:
        disableEventBubbling: true
        items:
          - type: antdFlex
            data:
              id: resource-badge-link-row
              align: center
              direction: row
              gap: 6
            children:
              - type: ResourceBadge
                data:
                  id: example-resource-badge
                  value: "MachineConfigPool"
              - type: antdLink
                data:
                  id: name-link
                  href: "/openapi-ui/{2}/factory/base-factory-clusterscoped-api/mco.in-cloud.io/v1alpha1/machineconfigpools/{reqsJsonPath[0]['.metadata.annotations[\"mco.in-cloud.io/pool\"]']['-']}"
                  text: "{reqsJsonPath[0]['.metadata.annotations[\"mco.in-cloud.io/pool\"]']['-']}"

    # =================================================
    # RenderedMachineConfig revision currently applied
    # =================================================
    - name: Render Config
      type: factory
      
      jsonPath: .metadata.annotations["mco.in-cloud.io/current-revision"]
      customProps:
        disableEventBubbling: true
        items:
          - type: antdFlex
            data:
              id: resource-badge-link-row
              align: center
              direction: row
              gap: 6
            children:
              - type: ResourceBadge
                data:
                  id: example-resource-badge
                  value: "RenderedMachineConfig"
              - type: antdLink
                data:
                  id: name-link
                  href: "/openapi-ui/{2}/factory/base-factory-clusterscoped-api/mco.in-cloud.io/v1alpha1/renderedmachineconfigs/{reqsJsonPath[0]['.metadata.annotations[\"mco.in-cloud.io/current-revision\"]']['-']}"
                  text: "{reqsJsonPath[0]['.metadata.annotations[\"mco.in-cloud.io/current-revision\"]']['-']}"

    # =================================================
    # Node memory usage / capacity visualization
    # =================================================
    - name: Memory
      type: factory
      
      customProps:
        disableEventBubbling: true
        items:
          - type: ConverterBytes
            data:
              bytesValue: "{reqsJsonPath[0]['.additionalReqsData.0.items[?(@.metadata.name==\"{reqsJsonPath[0][\".metadata.name\"]}\")].usage.memory']['-']}"
              notANumberText: "-"

    # =================================================
    # Node CPU usage / capacity visualization
    # =================================================
    - name: CPU
      type: factory
      
      customProps:
        disableEventBubbling: true
        items:
          - type: ConverterCores
            data:
              coresValue: "{reqsJsonPath[0]['.additionalReqsData.0.items[?(@.metadata.name==\"{reqsJsonPath[0][\".metadata.name\"]}\")].usage.cpu']['-']}"
              format: true
              precision: 4
              unit: true
              notANumberText: "-"

    # =================================================
    # Internal IP address of the node
    # =================================================
    - name: Internal IP
      type: factory
      
      customProps:
        disableEventBubbling: true
        items:
          - type: parsedText
            data:
              id: value-text
              text: "{reqsJsonPath[0]['.status.addresses[?(@.type==\"InternalIP\")].address']['-']}"

    # =================================================
    # External IP address of the node (if present)
    # =================================================
    - name: External IP
      type: factory
      
      customProps:
        disableEventBubbling: true
        items:
          - type: parsedText
            data:
              id: value-text
              text: "{reqsJsonPath[0]['.status.addresses[?(@.type==\"ExternalIP\")].address']['-']}"

    # =================================================
    # Operating system image of the node
    # =================================================
    - name: OS Image
      type: string
      jsonPath: .status.nodeInfo.osImage

    # =================================================
    # Kernel version running on the node
    # =================================================
    - name: Kernel Version
      type: string
      jsonPath: .status.nodeInfo.kernelVersion

    # =================================================
    # Kubelet version on the node
    # =================================================
    - name: Kubelet Version
      type: string
      jsonPath: .status.nodeInfo.kubeletVersion

    # =================================================
    # Node readiness / scheduling status
    # =================================================
    - name: Status
      type: factory
      
      customProps:
        disableEventBubbling: true
        items:
          
          - type: StatusText
            data:
              id: node-status
          
              # Match strategy for success conditions
              criteriaSuccess: equals
              strategySuccess: every
              successText: Available
              valueToCompareSuccess: KubeletReady
          
              # Match strategy for error conditions
              criteriaError: equals
              strategyError: every
              errorText: Unavailable
              valueToCompareError:
                - KernelDeadlock
                - ReadonlyFilesystem
                - NetworkUnavailable
                - MemoryPressure
                - DiskPressure
                - PIDPressure
          
              # Fallback text when neither success nor error matched
              fallbackText: Progressing
          
              # Values extracted from Node conditions with status=True
              values:
                - >-
                  {reqsJsonPath[0]['.status.conditions[?(@.status==''True'')].reason']['-']}

    # =================================================
    # Resource creation timestamp (formatted)
    # =================================================
    - name: Created
      type: factory
      jsonPath: .metadata.creationTimestamp
      
      customProps:
        disableEventBubbling: true
        items:
          - type: antdFlex
            data:
              id: time-block
              align: center
              gap: 6
            children:
              - type: antdText
                data:
                  id: time-icon
                  text: "🌐"
              - type: parsedText
                data:
                  id: time-value
                  formatter: timestamp
                  text: "{reqsJsonPath[0]['.metadata.creationTimestamp']['-']}"

  # Trim long values for selected columns in tables
  additionalPrinterColumnsTrimLengths:
    - key: Name
      value: 64
