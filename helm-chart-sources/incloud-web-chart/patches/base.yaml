# =================================================
# CustomColumnsOverride definition
# =================================================
apiVersion: front.in-cloud.io/v1alpha1
kind: CustomColumnsOverride
metadata:
  # Name of this CustomColumnsOverride resource
  name: stock-namespace-apps.v1.deployments
spec:
  # Table columns rendered in the resource list
  additionalPrinterColumns:
    # =================================================
    # Column: Name
    # =================================================
    - name: Name
      type: factory
      
      jsonPath: .metadata.name
      customProps:
        disableEventBubbling: true
        items:
          - type: antdFlex
            data:
              id: resource-badge-link-row
              align: center
              direction: row
              gap: 6
            children:
              - type: ResourceBadge
                data:
                  id: example-resource-badge
                  value: "{reqsJsonPath[0]['.kind']['-']}"
              - type: antdLink
                data:
                  id: name-link
                  href: "/openapi-ui/{2}/{reqsJsonPath[0]['.metadata.namespace']['-']}/factory/deployment-details/apps/v1/deployments/{reqsJsonPath[0]['.metadata.name']['-']}"
                  text: "{reqsJsonPath[0]['.metadata.name']['-']}"
    # =================================================
    # Column: Labels
    # =================================================
    - name: Labels
      type: factory
      
      jsonPath: .metadata.labels
      customProps:
        disableEventBubbling: true
        items:
          - type: Labels
            data:
              id: labels-editor
              reqIndex: 0
              jsonPathToLabels: .metadata.labels
              endpoint: "/api/clusters/{2}/k8s/apis/apps/v1/namespaces/{3}/deployments/{6}"
              pathToValue: /metadata/labels
              linkPrefix: "/openapi-ui/{2}/{3}/search?kinds=apps~v1~deployments"
              inputLabel: "false"
              modalTitle: Edit labels
              modalDescriptionText: ""
              editModalWidth: 650
              maxEditTagTextLength: 35
              paddingContainerEnd: 24px
              notificationSuccessMessage: Updated successfully
              notificationSuccessMessageDescription: Labels have been updated
              selectProps:
                maxTagTextLength: 35
              readOnly: true
              verticalViewList: true
    # =================================================
    # Column: Pod Selector
    # =================================================
    - name: Pod Selector
      type: factory
      
      jsonPath: .spec.template.metadata.labels
      customProps:
        disableEventBubbling: true
        items:
          - type: LabelsToSearchParams
            data:
              id: pod-to-search-params
              reqIndex: 0
              jsonPathToLabels: .spec.template.metadata.labels
              linkPrefix: "/openapi-ui/{2}/{3}/search?kinds=~v1~pods"
              errorText: No selector
              maxTextLength: 11
              # textLink: Search
              renderLabelsAsRows: true
    # =================================================
    # Column: Status
    # =================================================
    - name: Status
      type: factory
      
      customProps:
        disableEventBubbling: true
        items:
          
          - type: StatusText
            data:
              id: header-status
              # 1) Collect all possible Deployment conditions
              values:
                - "{reqsJsonPath[0]['.status.conditions[*].reason']['-']}"
          
              # 2) Criteria: positive / negative; neutral goes to fallback
              criteriaSuccess: equals
              valueToCompareSuccess:
                # Positive reasons
                - "MinimumReplicasAvailable"     # Available: all replicas are healthy
                - "NewReplicaSetAvailable"       # Progressing: new RS serves traffic
                - "ReplicaSetUpdated"            # Progressing: RS is updated/synced
                - "Complete"                     # Update completed successfully
          
              criteriaError: equals
              valueToCompareError:
                # Negative reasons
                - "DeploymentReplicaFailure"     # General replica failure
                - "FailedCreate"                 # Failed to create Pod/RS
                - "FailedDelete"                 # Failed to delete resource
                - "FailedScaleUp"                # Failed to scale up
                - "FailedScaleDown"              # Failed to scale down
          
              # 3) Texts to display
              successText:  "Available"
              errorText:    "Error"
              fallbackText: "Progressing"
          
              # Notes on neutral/fallback cases:
              # - ReplicaSetUpdated        → neutral/positive (update in progress)
              # - ScalingReplicaSet        → neutral (normal scale up/down)
              # - Paused / DeploymentPaused→ neutral (manually paused by admin)
              # - NewReplicaSetCreated     → neutral (new RS created, not yet serving)
              # - FoundNewReplicaSet       → neutral (RS found, syncing)
              # - MinimumReplicasUnavailable → neutral (some replicas not ready yet)
              # - ProgressDeadlineExceeded → error-like, stuck in progress
    # =================================================
    # Column: Created
    # =================================================
    - name: Created
      type: factory
      
      jsonPath: .metadata.creationTimestamp
      customProps:
        disableEventBubbling: true
        items:
          - type: antdFlex
            data:
              id: time-block
              align: center
              gap: 6
            children:
              - type: antdText
                data:
                  id: time-icon
                  text: "🌐"
              - type: parsedText
                data:
                  id: time-value
                  formatter: timestamp
                  text: "{reqsJsonPath[0]['.metadata.creationTimestamp']['-']}"

  # Trim long values for selected columns
  additionalPrinterColumnsTrimLengths:
    
    - key: Name
      value: 64
    
    - key: Labels
      value: 1
    
    - key: Pod Selector
      value: 5

  # Fallback values for empty or missing fields
  additionalPrinterColumnsUndefinedValues:
    
    - key: Labels
      value: "-"
    
    - key: Pod Selector
      value: "-"

  # Stable identifier used by frontend mapping
  id: stock-namespace-/apps/v1/deployments
