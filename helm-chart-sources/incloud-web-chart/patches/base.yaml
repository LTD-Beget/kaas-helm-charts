                      namespace: '{3}'
                      plural: '{8}'
              
                      # =========================
                      # Permission context
                      # =========================
                      # Used by UI to validate RBAC permissions for edit actions
                      permissionContext:
                        
                        apiGroup: '{6}'
                        cluster: '{2}'
                        namespace: '{3}'
                        plural: '{8}'

          # =========================
          # PODS TAB
          # =========================
          - key: pods
            label: Pod Selector
            children:
              # Related Pods list
              - type: ContentCard
                data:
                  id: pod-list-card
                  style:
                    marginBottom: 24px
                children:
                  - type: EnrichedTable
                    data:
                      id: pods-table
                      baseprefix: /openapi-ui
                      cluster: "{2}"
                      customizationId: "factory-/v1/pods"
              
                      k8sResourceToFetch:
                        apiVersion: "v1"
                        plural: "pods"
                        namespace: "{3}"
              
                      dataForControls:
                        cluster: "{2}"
                        apiVersion: "v1"
                        plural: "pods"
                        namespace: "{3}"
              
                      # Label selector (optional)
                      labelSelectorFull:
                        pathToLabels: .items.0.spec.podSelector.matchLabels
                        reqIndex: 0
              
                      # Field selector (optional)
              
                      pathToItems: ".items"
              
                      additionalReqsDataToEachItem:
                        - 1

          # =========================
          # EVENTS TAB
          # =========================
          - key: events
            label: Events
            children:
              # Kubernetes events related to this resource
              
              - type: ContentCard
                data:
                  id: details-card
                  style:
                    marginBottom: 24px
                children:
                  - type: Events
                    data:
                      id: events
              
                      # =========================
                      # Base configuration
                      # =========================
              
                      # Base UI prefix for resource links
                      baseprefix: "/openapi-ui"
              
                      # Target cluster identifier
                      cluster: "{2}"
              
                      # WebSocket endpoint for live events stream
                      wsUrl: "/api/clusters/{2}/openapi-bff-ws/events/eventsWs"
              
                      # Pagination and layout tuning
                      pageSize: 50
                      limit: 40
                      substractHeight: 315
              
                      # =========================
                      # Field selector: bind events to current resource
                      # =========================
                      fieldSelector:
                        regarding.kind: "{reqsJsonPath[0]['.items.0.kind']['-']}"
                        regarding.name: "{reqsJsonPath[0]['.items.0.metadata.name']['-']}"
                        regarding.namespace: "{reqsJsonPath[0]['.items.0.metadata.namespace']['-']}"
                        regarding.apiVersion: "{reqsJsonPath[0]['.items.0.apiVersion']['-']}"
                      # =========================
                      # Factory routing keys
                      # =========================
                      # Used to navigate from Event objects to resource details pages
                      baseFactoryNamespacedAPIKey: base-factory-namespaced-api
                      baseFactoryClusterSceopedAPIKey: base-factory-clusterscoped-api
                      baseFactoryNamespacedBuiltinKey: base-factory-namespaced-builtin
                      baseFactoryClusterSceopedBuiltinKey: base-factory-clusterscoped-builtin
                      baseNamespaceFactoryKey: namespace-details
---
# Source: incloud-web-chart/charts/incloud-web-chart/templates/factory/default/node-details.yaml
apiVersion: front.in-cloud.io/v1alpha1
kind: Factory
metadata:
  name: node-details

spec:
  key: node-details

  # =========================
  # Data sources
  # =========================
  urlsToFetch:
    # Fetch selected resource by name from target cluster
    # Primary resource request (from shared factory context)
    - apiVersion: '{5}'
      cluster: '{2}'
      fieldSelector: metadata.name={7}
      plural: '{6}'

    # Related pods metrics request (metrics.k8s.io)
    - apiGroup: metrics.k8s.io
      apiVersion: v1beta1
      cluster: '{2}'
      plural: pods

  # Disable scroll wrapper for main content card
  withScrollableMainContentCard: false

  # =========================
  # Sidebar tags for navigation
  # =========================
  sidebarTags:
    # Used to group resources in sidebar navigation
    - "{5}/{6}"

  # =========================
  # Page layout
  # =========================
  data:

    # =========================
    # Header row (resource title + actions)
    # =========================
    - type: antdFlex
      data:
        id: header-row
        align: center
        justify: space-between
        style:
          marginBottom: 24px
      children:

        # =========================
        # LEFT SIDE: Resource identity
        # =========================
        - type: antdFlex
          data:
            align: center
            gap: 6
          children:
            
            # =========================
            # Resource kind badge
            # =========================
            - type: ResourceBadge
              data:
                id: factory-resource-badge
                style:
                  fontSize: 20px
                value: '{reqsJsonPath[0][".items.0.kind"]["-"]}'
            
            # =========================
            # Resource name dropdown with redirect
            # =========================
            - type: DropdownRedirect
              data:
                # K8s resource addressing (parameterized)
                
                apiVersion: '{5}'
                cluster: '{2}'
                plural: '{6}'
            
                currentValue: "{reqsJsonPath[0]['.items.0.metadata.name']['Select item...']}"
                id: resource-name-dropdown
                jsonPath: .metadata.name
                placeholder: Select item...
                popupMatchSelectWidth: 350
            
                # Redirect URL template (parameterized)
                redirectUrl: "/openapi-ui/{2}/factory/{4}/{5}/{6}/{chosenEntryValue}"
            
            # =========================
            # Copy resource name action
            # =========================
            - type: CopyButton
              data:
                id: copy-resource-name
                copyText: "{reqsJsonPath[0]['.items.0.metadata.name']['-']}"
                successMessage: Name copied to clipboard.
                tooltip: Copy {reqsJsonPath[0]['.items.0.kind']['-']} name

            # Node availability badge
            - type: DefaultDiv
              data:
                id: node-status-badge
                style:
                  display: inline-flex
                  alignItems: center
                  gap: 6px
                  fontSize: 13
                  fontWeight: 500
                  color: "#065f46"
              children:
                # Node Ready / NotReady / Progressing indicator
                - type: StatusText
                  data:
                    id: node-status
                
                    # Match strategy for success conditions
                    criteriaSuccess: equals
                    strategySuccess: every
                    successText: Available
                    valueToCompareSuccess: KubeletReady
                
                    # Match strategy for error conditions
                    criteriaError: equals
                    strategyError: every
                    errorText: Unavailable
                    valueToCompareError:
                      - KernelDeadlock
                      - ReadonlyFilesystem
                      - NetworkUnavailable
                      - MemoryPressure
                      - DiskPressure
                      - PIDPressure
                
                    # Fallback text when neither success nor error matched
                    fallbackText: Progressing
                
                    # Values extracted from Node conditions with status=True
                    values:
                      - >-
                        {reqsJsonPath[0]['.items.0.status.conditions[?(@.status==''True'')].reason']['-']}

        # =========================
        # RIGHT SIDE: Resource actions dropdown
        # =========================
        - type: ActionsDropdown
          data:
            id: resource-actions
            buttonText: Actions
            actions:

              # ---- Edit resource manifest ----
              
              - type: edit
                props:
                  # =========================
                  # UI metadata
                  # =========================
                  text: Edit
                  icon: EditOutlined
              
                  # =========================
                  # PERMISSION CHECK
                  # =========================
                  permissionContext:
                    
                    apiVersion: '{5}'
                    cluster: '{2}'
                    plural: '{6}'
              
                  # =========================
                  # API target (resource addressing)
                  # =========================
                  
                  apiVersion: '{5}'
                  cluster: '{2}'
                  name: '{reqsJsonPath[0][''.items.0.metadata.name''][''-'']}'
                  plural: '{6}'
              
                  # =========================
                  # Target resource identity
                  # =========================
              
                  # =========================
                  # Navigation prefix
                  # =========================
                  baseprefix: /openapi-ui

              # ---- Edit labels ----
              
              - type: editLabels
                props:
                  # =========================
                  # UI metadata
                  # =========================
                  text: Edit Labels
                  icon: TagsOutlined
              
                  # =========================
                  # PERMISSION CHECK
                  # =========================
                  permissionContext:
                    
                    apiVersion: '{5}'
                    cluster: '{2}'
                    plural: '{6}'
              
                  # =========================
                  # Data binding
                  # =========================
                  reqIndex: "0"
                  jsonPathToLabels: ".items.0.metadata.labels"
              
                  # =========================
                  # API endpoint (parameterized)
                  # =========================
                  endpoint: "/api/clusters/{2}/k8s/api/{5}/{6}/{reqsJsonPath[0]['.items.0.metadata.name']['-']}"
              
                  # =========================
                  # Patch configuration
                  # =========================
                  pathToValue: "/metadata/labels"
              
                  # =========================
                  # Modal configuration
                  # =========================
                  modalTitle: Edit Labels
                  editModalWidth: 650
                  paddingContainerEnd: "24px"
                  maxEditTagTextLength: 35

              # ---- Edit annotations ----
              
              - type: editAnnotations
                props:
                  # =========================
                  # UI metadata
                  # =========================
                  text: Edit Annotations
                  icon: FileTextOutlined
              
                  # =========================
                  # PERMISSION CHECK
                  # =========================
                  permissionContext:
                    
                    apiVersion: '{5}'
                    cluster: '{2}'
                    plural: '{6}'
              
                  # =========================
                  # API endpoint (parameterized)
                  # =========================
                  endpoint: "/api/clusters/{2}/k8s/api/{5}/{6}/{reqsJsonPath[0]['.items.0.metadata.name']['-']}"
              
                  # =========================
                  # Data binding
                  # =========================
                  reqIndex: "0"
                  jsonPathToObj: ".items.0.metadata.annotations"
              
                  # =========================
                  # Patch configuration
                  # =========================
                  pathToValue: "/metadata/annotations"
              
                  # =========================
                  # Modal configuration
                  # =========================
                  modalTitle: Edit Annotations
                  cols: [11, 11, 2]
                  editModalWidth: 800px

              # ---- Edit taints on node ----
              
              - type: editTaints
                props:
                  # =========================
                  # UI metadata
                  # =========================
                  text: Edit Taints
              
                  # =========================
                  # PERMISSION CHECK
                  # =========================
                  permissionContext:
                    
                    apiVersion: '{5}'
                    cluster: '{2}'
                    plural: '{6}'
              
                  # =========================
                  # Data binding
                  # =========================
                  reqIndex: "0"
                  jsonPathToArray: ".items.0.spec.taints"
              
                  # =========================
                  # API endpoint (parameterized)
                  # =========================
                  endpoint: "/api/clusters/{2}/k8s/api/{5}/{6}/{reqsJsonPath[0]['.items.0.metadata.name']['-']}"
              
                  # =========================
                  # Patch configuration
                  # =========================
                  pathToValue: "/spec/taints"
              
                  # =========================
                  # Modal configuration
                  # =========================
                  modalTitle: Edit Taints
                  cols: [8, 8, 6]
                  editModalWidth: 800px
              
                  # =========================
                  # Icon
                  # =========================
                  iconBase64Encoded: 

              # ---- Cordon node ----
              
              - type: cordon
                props:
                  # =========================
                  # API endpoint (parameterized)
                  # =========================
                  endpoint: "/api/clusters/{2}/k8s/api/{5}/{6}/{reqsJsonPath[0]['.items.0.metadata.name']['-']}"
              
                  # =========================
                  # PERMISSION CHECK
                  # =========================
                  permissionContext:
                    
                    apiVersion: '{5}'
                    cluster: '{2}'
                    plural: '{6}'
              
                  # =========================
                  # UI metadata
                  # =========================
                  icon: StopOutlined
                  text: Cordon
              
                  # =========================
                  # Patch configuration
                  # =========================
                  pathToValue: /spec/unschedulable
                  value: true
              
                  # =========================
                  # Visibility rules
                  # =========================
                  visibleWhen:
                    criteria: notEquals
                    value: "{reqsJsonPath[0]['.items.0.spec.unschedulable']['-']}"
                    valueToCompare: "true"

              # ---- Uncordon node ----
              
              - type: uncordon
                props:
                  # =========================
                  # API endpoint (parameterized)
                  # =========================
                  endpoint: "/api/clusters/{2}/k8s/api/{5}/{6}/{reqsJsonPath[0]['.items.0.metadata.name']['-']}"
              
                  # =========================
                  # PERMISSION CHECK
                  # =========================
                  permissionContext:
                    
                    apiVersion: '{5}'
                    cluster: '{2}'
                    plural: '{6}'
              
                  # =========================
                  # UI metadata
                  # =========================
                  icon: CheckCircleOutlined
                  text: Uncordon
              
                  # =========================
                  # Patch configuration
                  # =========================
                  pathToValue: /spec/unschedulable
                  value: false
              
                  # =========================
                  # Visibility rules
                  # =========================
                  visibleWhen:
                    criteria: equals
                    value: "{reqsJsonPath[0]['.items.0.spec.unschedulable']['-']}"
                    valueToCompare: "true"

              # ---- Open kubelet /configz endpoint ----
              
              - type: openKubeletConfig
                props:
                  # =========================
                  # UI metadata
                  # =========================
                  icon: SettingOutlined
                  target: _blank
                  text: Kubelet Config
              
                  # =========================
                  # PERMISSION CHECK
                  # =========================
                  permissionContext:
                    
                    apiVersion: '{5}'
                    cluster: '{2}'
                    plural: '{6}'
                    subresource: proxy
              
                  # =========================
                  # Target URL (parameterized)
                  # =========================
                  url: "/api/clusters/{2}/k8s/api/{5}/{6}/{reqsJsonPath[0]['.items.0.metadata.name']['-']}/proxy/configz"

              # ---- Delete resource ----
              
              - type: delete
                props:
                  # =========================
                  # UI metadata
                  # =========================
                  text: Delete
                  icon: DeleteOutlined
                  danger: true
              
                  # =========================
                  # PERMISSION CHECK
                  # =========================
                  permissionContext:
                    
                    apiVersion: '{5}'
                    cluster: '{2}'
                    plural: '{6}'
              
                  # =========================
                  # API endpoint (parameterized)
                  # =========================
                  endpoint: "/api/clusters/{2}/k8s/api/{5}/{6}/{reqsJsonPath[0]['.items.0.metadata.name']['-']}"
              
                  # =========================
                  # Target resource identity
                  # =========================
                  name: "{reqsJsonPath[0]['.items.0.metadata.name']['-']}"
              
                  # =========================
                  # Post-delete redirect (parameterized)
                  # =========================
                  redirectTo: "/openapi-ui/{2}/builtin-table/{6}"

    # =========================
    # Tabs root
    # =========================
    - type: antdTabs
      data:
        id: tabs-root
        defaultActiveKey: details
        items:

          # =========================
          # DETAILS TAB
          # =========================
          - key: details
            label: Details
            children:
              - type: antdFlex
                data:
                  id: details-stack
                  vertical: true
                  gap: 24
                children:

                  # ---- Row 1: Resource info + Metadata counters ----
                  
                  # Reusable row with resource info (left) and metadata counters (right).
                  # Expected params:
                  # - namespaced (required)
                  # - endpoint / permissionContext (required for default metadata template)
                  # - metadataTemplate (optional, default: metadataCounters)
                  # - fieldSelector / k8sResourceToFetch (optional, used by custom metadata templates)
                  # - withResponsive (optional, default: true)
                  - type: antdRow
                    data:
                      # Keep vertical gap when columns collapse to stacked layout on smaller widths/zoom.
                      gutter: [24, 24]
                    children:
                      - type: antdCol
                        data:
                          span: 12
                          xs: 24
                          xl: 12
                        children:
                          
                          - type: ContentCard
                            data:
                              id: resource-info-card
                            children:
                          
                              # =========================
                              # Header: icon + title
                              # =========================
                              - type: DefaultDiv
                                data:
                                  id: resource-info-card-title
                                  style:
                                    display: flex
                                    gap: 12px
                                    marginBottom: 12px
                                    alignItems: center
                                children:
                                  - type: antdIcons
                                    data:
                                      id: resource-info-icon
                                      iconName: InfoCircleOutlined
                                      iconProps:
                                        size: 24
                                        color: token.colorInfo
                                        style:
                                          fontSize: 24
                                          color: token.colorInfo
                          
                                  - type: parsedText
                                    data:
                                      id: resource-info-title-text
                                      text: "{reqsJsonPath[0]['.items.0.kind']['-']} Info"
                                      style:
                                        fontSize: 16px
                                        lineHeight: 24px
                          
                              # =========================
                              # Main content grid
                              # =========================
                              - type: antdRow
                                data:
                                  gutter: [24, 0]
                                children:
                          
                                  # -------------------------
                                  # Created
                                  # -------------------------
                                  - type: antdCol
                                    data:
                                      span: 8
                                      id: resource-info-col-created
                                    children:
                                      - type: antdFlex
                                        data: { vertical: true, gap: 4 }
                                        children:
                                          - type: antdText
                                            data:
                                              strong: true
                                              text: Created
                                          - type: parsedText
                                            data:
                                              formatter: timestamp
                                              text: "{reqsJsonPath[0]['.items.0.metadata.creationTimestamp']['-']}"
                          
                                  # -------------------------
                                  # OwnerRefs
                                  # -------------------------
                          
                                  - type: antdCol
                                    data:
                                      span: 8
                                      id: resource-info-col-ownerrefs
                                    children:
                                      - type: VisibilityContainer
                                        data:
                                          id: ds-init-containers-container
                                          value: "{reqsJsonPath[0]['.items.0.metadata.ownerReferences']['-']}"
                                          style:
                                            margin: 0
                                            padding: 0
                                        children:
                                          - type: antdFlex
                                            data:
                                              id: ref-link-block
                                              vertical: true
                                              gap: 8
                                            children:
                                              - type: antdText
                                                data:
                                                  id: meta-ref
                                                  text: OwnerRef
                                                  strong: true
                          
                                              - type: OwnerRefs
                                                data:
                                                  id: refs
                                                  baseprefix: /openapi-ui
                                                  cluster: '{2}'
                                                  #forcedNamespace: '{3}'
                                                  reqIndex: 0
                                                  errorText: error getting refs
                                                  notArrayErrorText: refs on path are not arr
                                                  emptyArrayErrorText: "-"
                                                  isNotRefsArrayErrorText: objects in arr are not refs
                                                  jsonPathToArrayOfRefs: ".items.0.metadata.ownerReferences"
                                                  baseFactoryClusterSceopedAPIKey: base-factory-clusterscoped-api
                                                  baseFactoryClusterSceopedBuiltinKey: base-factory-clusterscoped-builtin
                                                  baseFactoryNamespacedAPIKey: base-factory-namespaced-api
                                                  baseFactoryNamespacedBuiltinKey: base-factory-namespaced-builtin
                                                  baseNamespaceFactoryKey: namespace-details
                                                  baseNavigationPlural: navigations
                                                  baseNavigationName: navigation
                  
                      - type: antdCol
                        data:
                          span: 12
                          xs: 24
                          xl: 12
                        children:
                          
                          # Content card with Node metadata counters (labels, annotations, taints, images)
                          - type: ContentCard
                            data:
                              id: metadata-card
                              title: Metadata
                            style:
                              marginBottom: 24px
                            children:
                              - type: DefaultDiv
                                data:
                                  id: cards-container
                                  style:
                                    display: grid
                                    gridTemplateColumns: repeat(auto-fit, minmax(220px, 1fr))
                                    columnGap: 16
                                    rowGap: 10
                                    marginBottom: 16px
                                children:
                                  
                                  - type: AggregatedCounterCard
                                    data:
                                      id: labels-counter-card
                                      text: Labels
                                      # Icon for Labels card (Base64-encoded SVG)
                                      iconBase64Encoded: 
                                      counter:
                                        type: "key"
                                        props:
                                          reqIndex: "0"
                                          # JSONPath to labels object for counter calculation
                                          jsonPathToObj: .items.0.metadata.labels
                                      activeType:
                                        type: "labels"
                                        props:
                                          reqIndex: "0"
                                          # JSONPath to labels for edit modal
                                          jsonPathToLabels: .items.0.metadata.labels
                                          notificationSuccessMessage: Updated successfully
                                          notificationSuccessMessageDescription: Labels have been updated
                                          modalTitle: Edit labels
                                          modalDescriptionText: ""
                                          inputLabel: ""
                                          maxEditTagTextLength: 35
                                          # API endpoint for PATCH/UPDATE
                                          endpoint: "/api/clusters/{2}/k8s/api/{5}/{6}/{reqsJsonPath[0]['.items.0.metadata.name']['-']}"
                                          # JSON Pointer path for patch operation
                                          pathToValue: /metadata/labels
                                          editModalWidth: 650
                                          paddingContainerEnd: 24px
                                          permissionContext:
                                            # RBAC/permission context for edit actions
                                            apiVersion: '{5}'
                                            cluster: '{2}'
                                            plural: '{6}'
                                  
                                  - type: AggregatedCounterCard
                                    data:
                                      id: annotations-counter-card
                                      text: Annotations
                                      # Icon for Annotations card (Base64-encoded SVG)
                                      iconBase64Encoded: 
                                      counter:
                                        type: "key"
                                        props:
                                          reqIndex: "0"
                                          # JSONPath to annotations object for counter calculation
                                          jsonPathToObj: .items.0.metadata.annotations
                                      activeType:
                                        type: "annotations"
                                        props:
                                          reqIndex: "0"
                                          # JSONPath to annotations for edit modal
                                          jsonPathToObj: .items.0.metadata.annotations
                                          notificationSuccessMessage: Updated successfully
                                          notificationSuccessMessageDescription: Annotations have been updated
                                          modalTitle: Edit annotations
                                          modalDescriptionText: ""
                                          inputLabel: ""
                                          # API endpoint for PATCH/UPDATE
                                          endpoint: "/api/clusters/{2}/k8s/api/{5}/{6}/{reqsJsonPath[0]['.items.0.metadata.name']['-']}"
                                          # JSON Pointer path for patch operation
                                          pathToValue: /metadata/annotations
                                          editModalWidth: 800px
                                          cols: [11, 11, 2]
                                          permissionContext:
                                            # RBAC/permission context for edit actions
                                            apiVersion: '{5}'
                                            cluster: '{2}'
                                            plural: '{6}'
                                  
                                  - type: AggregatedCounterCard
                                    data:
                                      id: taints-counter-card
                                      text: Taints
                                      # Icon for Taints card (Base64-encoded SVG)
                                      iconBase64Encoded: 
                                      counter:
                                        type: "item"
                                        props:
                                          reqIndex: "0"
                                          # JSONPath to taints array for counter calculation
                                          jsonPathToArray: .items.0.spec.taints
                                      activeType:
                                        type: "taints"
                                        props:
                                          reqIndex: "0"
                                          # JSONPath to taints array for edit modal
                                          jsonPathToArray: .items.0.spec.taints
                                          notificationSuccessMessage: Updated successfully
                                          notificationSuccessMessageDescription: Taints have been updated
                                          modalTitle: Edit taints
                                          modalDescriptionText: ""
                                          inputLabel: ""
                                          # API endpoint for PATCH/UPDATE
                                          endpoint: "/api/clusters/{2}/k8s/api/{5}/{6}/{reqsJsonPath[0]['.items.0.metadata.name']['-']}"
                                          # JSON Pointer path for patch operation
                                          pathToValue: /spec/taints
                                          editModalWidth: 800px
                                          cols: [8, 8, 6]
                                          permissionContext:
                                            # RBAC/permission context for edit actions
                                            apiVersion: '{5}'
                                            cluster: '{2}'
                                            plural: '{6}'
                                  
                                  - type: AggregatedCounterCard
                                    data:
                                      id: images-counter-card
                                      text: Images
                                      # Icon for Images card (Base64-encoded SVG)
                                      iconBase64Encoded: 
                                      counter:
                                        type: "item"
                                        props:
                                          reqIndex: "0"
                                          # JSONPath to images array for counter calculation
                                          jsonPathToArray: .items.0.status.images
                                      activeType:
                                        type: "table"
                                        props:
                                          id: images-table
                                          modalTitle: "Images"
                                          editModalWidth: 80vw
                                          baseprefix: /openapi-ui
                                          cluster: "{2}"
                                          customizationId: factory-node-images
                                          # JSONPath to images array for table rendering
                                          pathToItems: .items.0.status.images
                                          # Key used as unique row identifier
                                          pathToKey: .names[0]
                                          fieldSelector:
                                            # Field selector for server-side filtering
                                            metadata.name: '{7}'
                                          k8sResourceToFetch:
                                            # K8s resource descriptor for table data source
                                            apiVersion: '{5}'
                                            cluster: '{2}'
                                            plural: '{6}'
                                          permissionContext:
                                            # RBAC/permission context for read actions
                                            apiVersion: '{5}'
                                            cluster: '{2}'
                                            plural: '{6}'

                  # ---- Row 2: Runtime facts and selectors ----
                  - type: antdRow
                    data:
                      gutter: [24, 0]
                    children:

                      # Resource runtime details
                      - type: antdCol
                        data:
                          span: 8
                        children:
                          
                          # Content card with runtime and OS information about the Node
                          - type: ContentCard
                            data:
                              id: node-info-card
                            children:
                              # Card title with icon
                              - type: DefaultDiv
                                data:
                                  id: node-info-card-title
                                  style:
                                    display: flex
                                    gap: 12px
                                    marginBottom: 12px
                                    alignItems: center
                                children:
                                  - type: antdIcons
                                    data:
                                      id: node-info-icon
                                      iconName: InfoCircleOutlined
                                      iconProps:
                                        size: 24
                                        style:
                                          fontSize: 24
                                          color: token.colorInfo
                                  - type: antdText
                                    data:
                                      id: node-info-title-text
                                      text: "Node Overview"
                                      style:
                                        fontSize: 16px
                                        lineHeight: 24px
                          
                              # Main content: Node runtime / OS fields
                              - type: antdRow
                                data:
                                  gutter: [24, 0]
                                children:
                                  # Left column: kubelet, OS, container runtime, addresses
                                  - type: antdCol
                                    data:
                                      span: 12
                                      xs: 24
                                      xl: 12
                                    children:
                                      - type: antdFlex
                                        data:
                                          vertical: true
                                          gap: 12
                                        children:
                                          - type: antdFlex
                                            data: { vertical: true, gap: 4 }
                                            children:
                                              - type: antdText
                                                data:
                                                  strong: true
                                                  text: Kubelet version
                                              - type: parsedText
                                                data:
                                                  text: "{reqsJsonPath[0]['.items.0.status.nodeInfo.kubeletVersion']['Not reported']}"
                          
                                          - type: antdFlex
                                            data: { vertical: true, gap: 4 }
                                            children:
                                              - type: antdText
                                                data:
                                                  strong: true
                                                  text: OS image
                                              - type: parsedText
                                                data:
                                                  text: "{reqsJsonPath[0]['.items.0.status.nodeInfo.osImage']['Not reported']}"
                          
                                          - type: antdFlex
                                            data: { vertical: true, gap: 4 }
                                            children:
                                              - type: antdText
                                                data:
                                                  strong: true
                                                  text: Container runtime
                                              - type: parsedText
                                                data:
                                                  text: "{reqsJsonPath[0]['.items.0.status.nodeInfo.containerRuntimeVersion']['Not reported']}"
                          
                                          - type: antdFlex
                                            data:
                                              vertical: true
                                              gap: 4
                                            children:
                                              - type: antdText
                                                data:
                                                  strong: true
                                                  text: Node address
                                              - type: ArrayOfObjectsToKeyValues
                                                data:
                                                  reqIndex: 0
                                                  jsonPathToArray: .items.0.status.addresses
                                                  keyFieldName: type
                                                  keyFieldStyle:
                                                    color: "#aaabac"
                                                  valueFieldName: address
                          
                                  # Right column: architecture and kernel version
                                  - type: antdCol
                                    data:
                                      span: 12
                                      xs: 24
                                      xl: 12
                                    children:
                                      - type: antdFlex
                                        data:
                                          vertical: true
                                          gap: 12
                                        children:
                                          - type: antdFlex
                                            data: { vertical: true, gap: 4 }
                                            children:
                                              - type: antdText
                                                data:
                                                  strong: true
                                                  text: Architecture
                                              - type: parsedText
                                                data:
                                                  text: "{reqsJsonPath[0]['.items.0.status.nodeInfo.architecture']['Not reported']}"
                          
                                          - type: antdFlex
                                            data: { vertical: true, gap: 4 }
                                            children:
                                              - type: antdText
                                                data:
                                                  strong: true
                                                  text: Kernel version
                                              - type: parsedText
                                                data:
                                                  text: "{reqsJsonPath[0]['.items.0.status.nodeInfo.kernelVersion']['Not reported']}"

                      # Selectors and labels
                      - type: antdCol
                        data:
                          span: 7
                        children:
                          
                          # Content card with immutable node identifiers and machine facts
                          - type: ContentCard
                            data:
                              id: node-facts-card
                            children:
                              # Card title with icon
                              - type: DefaultDiv
                                data:
                                  id: node-facts-card-title
                                  style:
                                    display: flex
                                    gap: 12px
                                    marginBottom: 12px
                                    alignItems: center
                                children:
                                  - type: antdIcons
                                    data:
                                      id: node-facts-icon
                                      iconName: TagsOutlined
                                      iconProps:
                                        size: 24
                                        style:
                                          fontSize: 24
                                          color: token.colorInfo
                                  - type: antdText
                                    data:
                                      id: node-facts-title-text
                                      text: "Node IDs"
                                      style:
                                        fontSize: 16px
                                        lineHeight: 24px
                          
                              # Main content: immutable identifiers
                              - type: antdFlex
                                data:
                                  vertical: true
                                  gap: 12
                                children:
                                  - type: antdFlex
                                    data: { vertical: true, gap: 4 }
                                    children:
                                      - type: antdText
                                        data:
                                          strong: true
                                          text: Boot ID
                                      - type: parsedText
                                        data:
                                          text: "{reqsJsonPath[0]['.items.0.status.nodeInfo.bootID']['Not reported']}"
                          
                                  - type: antdFlex
                                    data: { vertical: true, gap: 4 }
                                    children:
                                      - type: antdText
                                        data:
                                          strong: true
                                          text: System UUID
                                      - type: parsedText
                                        data:
                                          text: "{reqsJsonPath[0]['.items.0.status.nodeInfo.systemUUID']['Not reported']}"
                          
                                  - type: antdFlex
                                    data: { vertical: true, gap: 4 }
                                    children:
                                      - type: antdText
                                        data:
                                          strong: true
                                          text: Machine ID
                                      - type: parsedText
                                        data:
                                          text: "{reqsJsonPath[0]['.items.0.status.nodeInfo.machineID']['Not reported']}"

                      # Resource usage graphs (CPU, Memory, Storage)
                      - type: antdCol
                        data:
                          span: 9
                        children:
                          - type: DefaultDiv
                            data:
                              style:
                                display: grid
                                gridTemplateColumns: repeat(auto-fit, minmax(320px, 1fr))
                                gap: 16px
                            children:
                              # CPU usage graph
                              - type: UsageGraphCard
                                data:
                                  title: CPU, cores
                                  # Base URL of Prometheus-compatible API (overridable via values)
                                  baseUrl: "https://demo.in-cloud.io/monitoring/api/v1/"
                                  containerStyle:
                                    # Card container height
                                    height: 200px
                                  # Strategy used by UI to interpret values
                                  valueStrategy: cpu
                                  # Time range for the graph
                                  range: 15m
                                  # Auto refresh interval in ms
                                  refetchInterval: 10000
                                  # Conversion settings: raw values -> CPU cores
                                  converterCoresProps:
                                    id: cpu
                                    precision: 2
                                    format: true
                                    toUnit: core
                                    showUnit: false
                                  # Gradient colors for usage visualization
                                  minColor: "#2A7B9B"
                                  midColor: "#57C785"
                                  maxColor: "#EDDD53"
                                  # Main query: actual CPU usage per node instance
                                  query: |
                                    sum by (instance) (
                                      rate(
                                        node_cpu_seconds_total{
                                          mode!~"idle|iowait|steal"
                                        }[$__rate_interval]
                                      )
                                    )
                                    * on(instance)
                                    label_replace(
                                      kube_node_info{node="{reqsJsonPath[0]['.items.0.metadata.name']['-']}"},
                                      "instance", "$1:9100", "internal_ip", "(.*)"
                                    )
                                  # Used resources query (same as main query)
                                  usedQuery: |
                                    sum by (instance) (
                                      rate(
                                        node_cpu_seconds_total{
                                          mode!~"idle|iowait|steal"
                                        }[$__rate_interval]
                                      )
                                    )
                                    * on(instance)
                                    label_replace(
                                      kube_node_info{node="{reqsJsonPath[0]['.items.0.metadata.name']['-']}"},
                                      "instance", "$1:9100", "internal_ip", "(.*)"
                                    )
                                  # Requested CPU by pods scheduled on this node
                                  requestedQuery: |
                                    sum(
                                      kube_pod_container_resource_requests{
                                        resource="cpu",
                                        node="{reqsJsonPath[0]['.items.0.metadata.name']['-']}"
                                      }
                                    )
                                  # CPU capacity of the node (limits baseline)
                                  limitQuery: |
                                    machine_cpu_cores{
                                      node="{reqsJsonPath[0]['.items.0.metadata.name']['-']}"
                                    }
                              # Memory usage graph
                              - type: UsageGraphCard
                                data:
                                  title: Memory, GB
                                  # Base URL of Prometheus-compatible API (overridable via values)
                                  baseUrl: "https://demo.in-cloud.io/monitoring/api/v1/"
                                  # Strategy used by UI to interpret values
                                  valueStrategy: memory
                                  # Time range for the graph
                                  range: 15m
                                  # Auto refresh interval in ms
                                  refetchInterval: 10000
                                  containerStyle:
                                    # Card container height
                                    height: 200px
                                  # Conversion settings: bytes -> GiB (IEC)
                                  converterBytesProps:
                                    toUnit: "gi"
                                    format: true
                                    showUnit: false
                                    precision: 1
                                    standard: iec
                                  # Gradient colors for usage visualization
                                  minColor: "#2A7B9B"
                                  midColor: "#57C785"
                                  maxColor: "#EDDD53"
                                  # Main query: used memory on node
                                  query: |
                                    (
                                      sum by (instance) (node_memory_MemTotal_bytes)
                                    -
                                      sum by (instance) (node_memory_MemAvailable_bytes)
                                    )
                                    * on(instance) group_left(node)
                                    label_replace(
                                      kube_node_info{node="{reqsJsonPath[0]['.items.0.metadata.name']['-']}"},
                                      "instance", "$1:9100", "internal_ip", "(.*)"
                                    )
                                  # Used resources query (same as main query)
                                  usedQuery: |
                                    (
                                      sum by (instance) (node_memory_MemTotal_bytes)
                                    -
                                      sum by (instance) (node_memory_MemAvailable_bytes)
                                    )
                                    * on(instance) group_left(node)
                                    label_replace(
                                      kube_node_info{node="{reqsJsonPath[0]['.items.0.metadata.name']['-']}"},
                                      "instance", "$1:9100", "internal_ip", "(.*)"
                                    )
                                  # Requested memory by running pods on this node
                                  requestedQuery: |
                                    sum by (node)(
                                      kube_pod_container_resource_requests{
                                        resource="memory",
                                        node="{reqsJsonPath[0]['.items.0.metadata.name']['-']}"
                                      }
                                      *
                                      on(namespace, pod)
                                      group_left()
                                      (
                                        kube_pod_status_phase{phase="Running"} == 1
                                      )
                                    )
                                  # Memory capacity of the node (limits baseline)
                                  limitQuery: |
                                    machine_memory_bytes{
                                      node="{reqsJsonPath[0]['.items.0.metadata.name']['-']}"
                                    }
                              # Storage usage graph
                              - type: UsageGraphCard
                                data:
                                  title: Storage, bytes
                                  # Base URL of Prometheus-compatible API (overridable via values)
                                  baseUrl: "https://demo.in-cloud.io/monitoring/api/v1/"
                                  # Strategy used by UI to interpret values
                                  valueStrategy: storage
                                  # Time range for the graph
                                  range: 15m
                                  # Auto refresh interval in ms
                                  refetchInterval: 10000
                                  containerStyle:
                                    # Card container height
                                    height: 200px
                                  # Conversion settings: bytes -> GiB (IEC)
                                  converterBytesProps:
                                    toUnit: "gi"
                                    format: true
                                    showUnit: false
                                    precision: 1
                                  # Gradient colors for usage visualization
                                  minColor: "#2A7B9B"
                                  midColor: "#57C785"
                                  maxColor: "#EDDD53"
                                  # Main query: raw container FS usage (coarse usage signal)
                                  query: |
                                    sum(
                                      container_fs_usage_bytes{
                                        node="{reqsJsonPath[0]['.items.0.metadata.name']['-']}"
                                      }
                                    )
                                  # Used resources query: filesystem used on root mount
                                  usedQuery: |
                                    (
                                      node_filesystem_size_bytes{mountpoint="/", fstype!~"tmpfs|overlay|squashfs"}
                                    -
                                      node_filesystem_avail_bytes{mountpoint="/", fstype!~"tmpfs|overlay|squashfs"}
                                    )
                                    * on(instance) group_left(node)
                                    label_replace(
                                      kube_node_info{node="{reqsJsonPath[0]['.items.0.metadata.name']['-']}"},
                                      "instance", "$1:9100", "internal_ip", "(.*)"
                                    )
                                  # Requested ephemeral storage by running pods on this node
                                  requestedQuery: |
                                    sum by (node)(
                                      sum by (namespace, pod) (
                                        kube_pod_container_resource_requests{
                                          resource="ephemeral_storage"
                                        }
                                      )
                                      *
                                      on(namespace, pod)
                                      group_left(node)
                                      kube_pod_info{
                                        node="{reqsJsonPath[0]['.items.0.metadata.name']['-']}"
                                      }
                                      *
                                      on(namespace, pod)
                                      (
                                        kube_pod_status_phase{phase="Running"} == 1
                                      )
                                    )
                                  # Total filesystem capacity on root mount (limits baseline)
                                  limitQuery: |
                                    node_filesystem_size_bytes{
                                      mountpoint="/",
                                      fstype!~"tmpfs|overlay|squashfs"
                                    }
                                    * on(instance) group_left(node)
                                    label_replace(
                                      kube_node_info{
                                        node="{reqsJsonPath[0]['.items.0.metadata.name']['-']}"
                                      },
                                      "instance",
                                      "$1:9100",
                                      "internal_ip",
                                      "(.*)"
                                    )

                  # ---- Row 3: Node conditions (visible only if present) ----
                  
                  # Visibility wrapper for conditions card (renders only when conditions exist)
                  - type: VisibilityContainer
                    data:
                      id: conditions-visibility-guard
                      value: '{reqsJsonPath[0][".items.0.status.conditions"]}'
                    children:
                      
                      # Content card with resource conditions table
                      - type: ContentCard
                        data:
                          id: conditions-card
                          title: Conditions
                        children:
                      
                          # =========================
                          # Header: icon + title
                          # =========================
                          - type: DefaultDiv
                            data:
                              id: conditions-card-title
                              style:
                                display: flex
                                gap: 12px
                                marginBottom: 12px
                                alignItems: center
                            children:
                              - type: antdIcons
                                data:
                                  id: conditions-info-icon
                                  iconName: CheckCircleOutlined
                                  iconProps:
                                    size: 24
                                    color: token.colorInfo
                                    style:
                                      fontSize: 24
                                      color: token.colorInfo
                      
                              - type: antdText
                                data:
                                  id: conditions-title-text
                                  text: "Conditions"
                                  style:
                                    fontSize: 16px
                                    lineHeight: 24px
                      
                          # =========================
                          # Conditions table
                          # =========================
                          - type: EnrichedTable
                            data:
                              baseprefix: /openapi-ui
                              cluster: '{2}'
                              customizationId: factory-status-conditions
                              id: conditions-table
                              pathToItems: .items.0.status.conditions
                              withoutControls: true
                      
                              # K8s resource to fetch conditions from
                              k8sResourceToFetch:
                                
                                    apiVersion: '{5}'
                                    cluster: '{2}'
                                    plural: '{6}'
                      
                              # Field selector to bind conditions to a concrete resource
                              fieldSelector:
                                
                                    metadata.name: '{7}'

          # =========================
          # YAML TAB
          # =========================
          - key: yaml
            label: YAML
            children:
              # YAML editor for raw Node manifest
              
              - type: ContentCard
                data:
                  id: yaml-editor-card
                  style:
                    marginBottom: 24px
                children:
                  - type: YamlEditorSingleton
                    data:
                      id: yaml-editor
              
                      # =========================
                      # Base editor configuration
                      # =========================
              
                      # Request index used to prefill editor with fetched resource
                      prefillValuesRequestIndex: 0
              
                      # Height subtracted from viewport to fit layout
                      substractHeight: 350
              
                      # JSONPath to resource root in API response
                      pathToData: .items.0
              
                      # Indicates whether resource is namespaced or cluster-scoped
                      isNameSpaced: false
              
                      # Editor mode/type (e.g. "api", "builtin")
                      type: builtin
              
                      # =========================
                      # API target (resource addressing)
                      # =========================
                      # Defines Kubernetes API location for resource CRUD
                      
                      apiVersion: '{5}'
                      cluster: '{2}'
                      plural: '{6}'
              
                      # =========================
                      # Permission context
                      # =========================
                      # Used by UI to validate RBAC permissions for edit actions
                      permissionContext:
                        
                        cluster: '{2}'
                        plural: '{6}'

          # =========================
          # PODS TAB
          # =========================
          - key: pods
            label: Pods
            children:
              # Related Pods list
              - type: ContentCard
                data:
                  id: pod-list-card
                  style:
                    marginBottom: 24px
                children:
                  - type: EnrichedTable
                    data:
                      id: pods-table
                      baseprefix: /openapi-ui
                      cluster: "{2}"
                      customizationId: "factory-/v1/pods"
              
                      k8sResourceToFetch:
                        apiVersion: "v1"
                        plural: "pods"
              
                      dataForControls:
                        cluster: "{2}"
                        apiVersion: "v1"
                        plural: "pods"
              
                      # Label selector (optional)
              
                      # Field selector (optional)
                      fieldSelector:
                        spec.nodeName: '{reqsJsonPath[0][''.items.0.metadata.name''][''-'']}'
              
                      pathToItems: ".items"
              
                      additionalReqsDataToEachItem:
                        - 1

          # =========================
          # TERMINAL TAB
          # =========================
          - key: terminal
            label: Terminal
            children:
              # Web terminal attached to this node
              # Content card with Node terminal session
              - type: ContentCard
                data:
                  id: node-terminal-card
                  style:
                    marginBottom: 24px
                children:
                  - type: NodeTerminal
                    data:
                      id: terminal
                      # Cluster identifier for terminal connection
                      cluster: "{2}"
                      # Namespace with predefined pod templates for terminal
                      listPodTemplatesNs: in-cloud-web
                      # Node name used to attach terminal session
                      nodeName: "{reqsJsonPath[0]['.items.0.metadata.name']['-']}"
                      # Height offset for terminal viewport
                      substractHeight: 350

          # =========================
          # EVENTS TAB
          # =========================
          - key: events
            label: Events
            children:
              # Kubernetes events related to this node
              
              - type: ContentCard
                data:
                  id: details-card
                  style:
                    marginBottom: 24px
                children:
                  - type: Events
                    data:
                      id: events
              
                      # =========================
                      # Base configuration
                      # =========================
              
                      # Base UI prefix for resource links
                      baseprefix: "/openapi-ui"
              
                      # Target cluster identifier
                      cluster: "{2}"
              
                      # WebSocket endpoint for live events stream
                      wsUrl: "/api/clusters/{2}/openapi-bff-ws/events/eventsWs"
              
                      # Pagination and layout tuning
                      pageSize: 50
                      limit: 40
                      substractHeight: 315
              
                      # =========================
                      # Field selector: bind events to current resource
                      # =========================
                      fieldSelector:
                        regarding.kind: "{reqsJsonPath[0]['.items.0.kind']['-']}"
                        regarding.name: "{reqsJsonPath[0]['.items.0.metadata.name']['-']}"
                        regarding.namespace: "{reqsJsonPath[0]['.items.0.metadata.namespace']['-']}"
                        regarding.apiVersion: "{reqsJsonPath[0]['.items.0.apiVersion']['-']}"
                      # =========================
                      # Factory routing keys
                      # =========================
                      # Used to navigate from Event objects to resource details pages
                      baseFactoryNamespacedAPIKey: base-factory-namespaced-api
                      baseFactoryClusterSceopedAPIKey: base-factory-clusterscoped-api
                      baseFactoryNamespacedBuiltinKey: base-factory-namespaced-builtin
                      baseFactoryClusterSceopedBuiltinKey: base-factory-clusterscoped-builtin
                      baseNamespaceFactoryKey: namespace-details

          # =========================
          # MONITORING TAB
          # =========================
          - key: monitoring
            label: Monitoring
            children:
              # Embedded Grafana dashboard for node metrics
              - type: DefaultIframe
                data:
                  id: DefaultIframe
                  width: 100%
                  height: 1100px
                  style:
                    border: 0
                  # Grafana dashboard path (same dashboard, extracted to template param)
                  src: >-
                    https://grafana.in-cloud.io/d/k8s_views_nodes/kubernetes-views-nodes?orgId=1&from=now-1h&to=now&timezone=utc&var-datasource=P4169E866C3094E38&var-resolution=30s&var-node={reqsJsonPath[0]['.items.0.metadata.name']['-']}&var-instance=&refresh=30s&kiosk=true&theme={theme}

          # =========================
          # AQUA SECURITY TAB (optional)
          # =========================
          - key: config-reports
            label: Config reports
            children:
              # Content card with configuration/security report table
              - type: ContentCard
                data:
                  id: config-report-card
                  style:
                    marginBottom: 24px
                children:
                  # =========================
                  # Report table
                  # =========================
                  - type: EnrichedTable
                    data:
                      id: ds-pods-table
                      # Base prefix for navigation and links (passed from template context)
                      baseprefix: "/openapi-ui"
                      # Target cluster identifier
                      cluster: "{2}"
                      # UI customization preset for Trivy Operator reports table
                      customizationId: "factory-aquasecurity.github.io.v1alpha1.clusterinfraassessmentreports"
                      # API endpoint to fetch ClusterInfraAssessmentReports
                      fetchUrl: "/api/clusters/{2}/k8s/apis/aquasecurity.github.io/v1alpha1/clusterinfraassessmentreports"
                      # Label selector to bind report to current resource (kind/name)
                      labelSelector:
                        trivy-operator.resource.kind: '{reqsJsonPath[0][''.items.0.kind''][''-'']}'
                        trivy-operator.resource.name: '{reqsJsonPath[0][''.items.0.metadata.name''][''-'']}'
                      # Path to report checks inside API response
                      pathToItems: ".items[*].report.checks"
---
# Source: incloud-web-chart/charts/incloud-web-chart/templates/factory/default/pod-details.yaml
apiVersion: front.in-cloud.io/v1alpha1
kind: Factory
metadata:
  name: pod-details

spec:
  key: pod-details

  # =========================
  # Data sources
  # =========================
  urlsToFetch:
    # Fetch selected resource by name from target cluster
    # Primary resource request (from shared factory context)
    - apiVersion: '{6}'
      cluster: '{2}'
      fieldSelector: metadata.name={8}
      namespace: '{3}'
      plural: '{7}'

    # Related pods metrics request (metrics.k8s.io)
    - apiGroup: metrics.k8s.io
      apiVersion: v1beta1
      cluster: '{2}'
      plural: pods

  # Disable scroll wrapper for main content card
  withScrollableMainContentCard: false

  # =========================
  # Sidebar tags for navigation
  # =========================
  sidebarTags:
    # Used to group resources in sidebar navigation
    - '{6}/{7}'

  # =========================
  # Page layout
  # =========================
  data:

    # =========================
    # Header row (resource title + actions)
    # =========================
    - type: antdFlex
      data:
        id: header-row
        align: center
        justify: space-between
        style:
          marginBottom: 24px
      children:

        # =========================
        # LEFT SIDE: Resource identity
        # =========================
        - type: antdFlex
          data:
            align: center
            gap: 6
          children:
            
            # =========================
            # Resource kind badge
            # =========================
            - type: ResourceBadge
              data:
                id: factory-resource-badge
                style:
                  fontSize: 20px
                value: '{reqsJsonPath[0][".items.0.kind"]["-"]}'
            
            # =========================
            # Resource name dropdown with redirect
            # =========================
            - type: DropdownRedirect
              data:
                # K8s resource addressing (parameterized)
                
                apiVersion: '{6}'
                cluster: '{2}'
                namespace: '{3}'
                plural: '{7}'
            
                currentValue: "{reqsJsonPath[0]['.items.0.metadata.name']['Select item...']}"
                id: resource-name-dropdown
                jsonPath: .metadata.name
                placeholder: Select item...
                popupMatchSelectWidth: 350
            
                # Redirect URL template (parameterized)
                redirectUrl: "/openapi-ui/{2}/{3}/factory/{5}/{6}/{7}/{chosenEntryValue}"
            
            # =========================
            # Copy resource name action
            # =========================
            - type: CopyButton
              data:
                id: copy-resource-name
                copyText: "{reqsJsonPath[0]['.items.0.metadata.name']['-']}"
                successMessage: Name copied to clipboard.
                tooltip: Copy {reqsJsonPath[0]['.items.0.kind']['-']} name

            # pod availability badge
            - type: DefaultDiv
              data:
                id: pod-status-badge
                style:
                  display: inline-flex
                  alignItems: center
                  gap: 6px
                  fontSize: 13
                  fontWeight: 500
                  color: "#065f46"
              children:
                - type: StatusText
                  data:
                    id: pod-status
                
                    # --- Collected values from Pod status -----------------------------------
                    values:
                      # Init containers
                      - "{reqsJsonPath[0]['.items.0.status.initContainerStatuses[*].state.waiting.reason']}"
                      - "{reqsJsonPath[0]['.items.0.status.initContainerStatuses[*].state.terminated.reason']}"
                      - "{reqsJsonPath[0]['.items.0.status.initContainerStatuses[*].lastState.terminated.reason']}"
                
                      # Main containers
                      - "{reqsJsonPath[0]['.items.0.status.containerStatuses[*].state.waiting.reason']}"
                      - "{reqsJsonPath[0]['.items.0.status.containerStatuses[*].state.terminated.reason']}"
                      - "{reqsJsonPath[0]['.items.0.status.containerStatuses[*].lastState.terminated.reason']}"
                
                      # Pod phase and general reason
                      - "{reqsJsonPath[0]['.items.0.status.phase']}"
                      - "{reqsJsonPath[0]['.items.0.status.reason']}"
                
                      # Condition reasons (PodScheduled / Initialized / ContainersReady / Ready)
                      - "{reqsJsonPath[0]['.items.0.status.conditions[*].reason']}"
                
                    # --- Success criteria ---------------------------------------------------
                    criteriaSuccess: notEquals
                    strategySuccess: every
                    valueToCompareSuccess:
                      # Graceful or expected state transitions
                      - "Preempted"
                      - "Shutdown"
                      - "NodeShutdown"
                      - "DisruptionTarget"
                
                      # Transitional states (may require timeout)
                      - "Unschedulable"
                      - "SchedulingGated"
                      - "ContainersNotReady"
                      - "ContainersNotInitialized"
                
                      # Temporary failures
                      - "BackOff"
                
                      # Controlled shutdowns or benign errors
                      - "PreStopHookError"
                      - "KillError"
                      - "ContainerStatusUnknown"
                
                    # --- Error criteria -----------------------------------------------------
                    criteriaError: equals
                    strategyError: every
                    valueToCompareError:
                      # Pod-level fatal phases or errors
                      - "Failed"
                      - "Unknown"
                      - "Evicted"
                      - "NodeLost"
                      - "UnexpectedAdmissionError"
                
                      # Scheduler-related failures
                      - "SchedulerError"
                      - "FailedScheduling"
                
                      # Container-level fatal errors
                      - "CrashLoopBackOff"
                      - "ImagePullBackOff"
                      - "ErrImagePull"
                      - "ErrImageNeverPull"
                      - "InvalidImageName"
                      - "ImageInspectError"
                      - "CreateContainerConfigError"
                      - "CreateContainerError"
                      - "RunContainerError"
                      - "StartError"
                      - "PostStartHookError"
                      - "ContainerCannotRun"
                      - "OOMKilled"
                      - "Error"
                      - "DeadlineExceeded"
                      - "CreatePodSandboxError"
                
                    # --- Output text rendering ----------------------------------------------
                    successText:  "{reqsJsonPath[0]['.items.0.status.phase']}"
                    errorText:    "{reqsJsonPath[0]['.items.0.status.phase']}"
                    fallbackText: "{reqsJsonPath[0]['.items.0.status.phase']}"

