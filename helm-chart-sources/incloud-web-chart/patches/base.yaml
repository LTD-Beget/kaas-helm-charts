# Source: incloud-web-chart/charts/incloud-web-chart/templates/customcolumnsoverride/factory/factory-node-details-v1.pods.yaml
# =================================================
# CustomColumnsOverride definition
# =================================================
apiVersion: front.in-cloud.io/v1alpha1
kind: CustomColumnsOverride
metadata:
  # Name of this CustomColumnsOverride resource
  name: factory-node-details-v1.pods
spec:
  # Table columns rendered in the resource list
  additionalPrinterColumns:
    # =================================================
    # Column: Name
    # =================================================
    - name: Name
      type: factory
      
      jsonPath: .metadata.name
      customProps:
        disableEventBubbling: true
        items:
          - type: antdFlex
            data:
              id: resource-badge-link-row
              align: center
              direction: row
              gap: 6
            children:
              - type: ResourceBadge
                data:
                  id: example-resource-badge
                  value: "{reqsJsonPath[0]['.kind']['-']}"
              - type: antdLink
                data:
                  id: name-link
                  href: "/openapi-ui/{2}/{reqsJsonPath[0]['.metadata.namespace']['-']}/factory/pod-details/v1/pods/{reqsJsonPath[0]['.metadata.name']['-']}"
                  text: "{reqsJsonPath[0]['.metadata.name']['-']}"
    # =================================================
    # Column: Namespace
    # =================================================
    - name: Namespace
      type: factory
      
      jsonPath: .metadata.namespace
      customProps:
        disableEventBubbling: true
        items:
          - type: antdFlex
            data:
              id: resource-badge-link-row
              align: center
              direction: row
              gap: 6
            children:
              - type: ResourceBadge
                data:
                  id: example-resource-badge
                  value: "Namespace"
              - type: antdLink
                data:
                  id: name-link
                  href: "/openapi-ui/{2}/factory/namespace-details/v1/namespaces/{reqsJsonPath[0]['.metadata.namespace']['-']}"
                  text: "{reqsJsonPath[0]['.metadata.namespace']['-']}"
    # =================================================
    # Column: Restart Policy
    # =================================================
    - name: Restart Policy
      type: string
      jsonPath: .spec.restartPolicy
    # =================================================
    # Column: Pod IP
    # =================================================
    - name: Pod IP
      type: string
      jsonPath: .status.podIP
    # =================================================
    # Column: QOS
    # =================================================
    - name: QOS
      type: string
      jsonPath: .status.qosClass
    # =================================================
    # Column: Memory
    # =================================================
    - name: Memory
      type: factory
      
      customProps:
        disableEventBubbling: true
        items:
          - type: ConverterBytes
            data:
              bytesValue: "{reqsJsonPath[0]['.additionalReqsData.0.items[?(@.metadata.name==\"{reqsJsonPath[0][\".metadata.name\"]}\")].containers[*].usage.memory']['-']}"
              notANumberText: "-"
    # =================================================
    # Column: CPU
    # =================================================
    - name: CPU
      type: factory
      
      customProps:
        disableEventBubbling: true
        items:
          - type: ConverterCores
            data:
              coresValue: "{reqsJsonPath[0]['.additionalReqsData.0.items[?(@.metadata.name==\"{reqsJsonPath[0][\".metadata.name\"]}\")].containers[*].usage.cpu']['-']}"
              format: true
              precision: 4
              unit: true
              notANumberText: "-"
    # =================================================
    # Column: Status
    # =================================================
    - name: Status
      type: factory
      
      customProps:
        disableEventBubbling: true
        items:
          
          - type: StatusText
            data:
              id: pod-status
          
              # --- Collected values from Pod status -----------------------------------
              values:
                # Init containers
                - "{reqsJsonPath[0]['.status.initContainerStatuses[*].state.waiting.reason']}"
                - "{reqsJsonPath[0]['.status.initContainerStatuses[*].state.terminated.reason']}"
                - "{reqsJsonPath[0]['.status.initContainerStatuses[*].lastState.terminated.reason']}"
          
                # Main containers
                - "{reqsJsonPath[0]['.status.containerStatuses[*].state.waiting.reason']}"
                - "{reqsJsonPath[0]['.status.containerStatuses[*].state.terminated.reason']}"
                - "{reqsJsonPath[0]['.status.containerStatuses[*].lastState.terminated.reason']}"
          
                # Pod phase and general reason
                - "{reqsJsonPath[0]['.status.phase']}"
                - "{reqsJsonPath[0]['.status.reason']}"
          
                # Condition reasons (PodScheduled / Initialized / ContainersReady / Ready)
                - "{reqsJsonPath[0]['.status.conditions[*].reason']}"
          
              # --- Success criteria ---------------------------------------------------
              criteriaSuccess: notEquals
              strategySuccess: every
              valueToCompareSuccess:
                # Graceful or expected state transitions
                - "Preempted"
                - "Shutdown"
                - "NodeShutdown"
                - "DisruptionTarget"
          
                # Transitional states (may require timeout)
                - "Unschedulable"
                - "SchedulingGated"
                - "ContainersNotReady"
                - "ContainersNotInitialized"
          
                # Temporary failures
                - "BackOff"
          
                # Controlled shutdowns or benign errors
                - "PreStopHookError"
                - "KillError"
                - "ContainerStatusUnknown"
          
              # --- Error criteria -----------------------------------------------------
              criteriaError: equals
              strategyError: every
              valueToCompareError:
                # Pod-level fatal phases or errors
                - "Failed"
                - "Unknown"
                - "Evicted"
                - "NodeLost"
                - "UnexpectedAdmissionError"
          
                # Scheduler-related failures
                - "SchedulerError"
                - "FailedScheduling"
          
                # Container-level fatal errors
                - "CrashLoopBackOff"
                - "ImagePullBackOff"
                - "ErrImagePull"
                - "ErrImageNeverPull"
                - "InvalidImageName"
                - "ImageInspectError"
                - "CreateContainerConfigError"
                - "CreateContainerError"
                - "RunContainerError"
                - "StartError"
                - "PostStartHookError"
                - "ContainerCannotRun"
                - "OOMKilled"
                - "Error"
                - "DeadlineExceeded"
                - "CreatePodSandboxError"
          
              # --- Output text rendering ----------------------------------------------
              successText:  "{reqsJsonPath[0]['.status.phase']}"
              errorText:    "{reqsJsonPath[0]['.status.phase']}"
              fallbackText: "{reqsJsonPath[0]['.status.phase']}"
    # =================================================
    # Column: Created
    # =================================================
    - name: Created
      type: factory
      
      jsonPath: .metadata.creationTimestamp
      customProps:
        disableEventBubbling: true
        items:
          - type: antdFlex
            data:
              id: time-block
              align: center
              gap: 6
            children:
              - type: antdText
                data:
                  id: time-icon
                  text: "🌐"
              - type: parsedText
                data:
                  id: time-value
                  formatter: timestamp
                  text: "{reqsJsonPath[0]['.metadata.creationTimestamp']['-']}"

  # Sorters and filters for computed resource metrics
  additionalPrinterColumnsCustomSortersAndFilters:
    
    - key: Memory
      type: memory
    
    - key: CPU
      type: cpu

