                    apiVersion: '{7}'
                    cluster: '{2}'
                    namespace: '{3}'
                    plural: '{8}'
              
                  # =========================
                  # API target (resource addressing)
                  # =========================
                  
                  apiGroup: '{6}'
                  apiVersion: '{7}'
                  cluster: '{2}'
                  name: '{reqsJsonPath[0][''.items.0.metadata.name''][''-'']}'
                  namespace: '{3}'
                  plural: '{8}'
              
                  # =========================
                  # Target resource identity
                  # =========================
              
                  # =========================
                  # Navigation prefix
                  # =========================
                  baseprefix: /openapi-ui

              # ---- Edit labels ----
              
              - type: editLabels
                props:
                  # =========================
                  # UI metadata
