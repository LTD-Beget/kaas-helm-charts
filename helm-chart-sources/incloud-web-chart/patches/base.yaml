# Source: incloud-web-chart/templates/vmServiceScrape.incloud-ui-oauth2-proxy.yaml
apiVersion: operator.victoriametrics.com/v1beta1
kind: VMServiceScrape
metadata:
  name: incloud-web-chart
  namespace: default
spec:
  selector:
    matchLabels:
      monitoring.in-cloud.io/service: incloud-web-chart-oauth2-proxy
  endpoints:
    - port: https-metrics
      path: /metrics
      scheme: HTTPS
      bearerTokenFile: /var/run/secrets/kubernetes.io/serviceaccount/token
      tlsConfig:
        serverName: incloud-web-chart-oauth2-proxy
  jobLabel: incloud-web-chart-oauth2-proxy
---
# Source: incloud-web-chart/templates/virtualService.incloud-ui.yaml
apiVersion: networking.istio.io/v1
kind: VirtualService
metadata:
  name: incloud-web-chart
  namespace: default
spec:
  gateways:
    - "beget-istio-gw/default"
  hosts:
    - "*"
  http:
    - name: incloud-web-chart-redirect
      match:
        - uri:
            exact: /
      rewrite:
        uri: /openapi-ui/ #если как изначально на "/", то nginx внутри отдает свой 8081 порт и все ломается (надо править конфигмапу nginx ui)
      headers:
        request:
          set:
            x-forwarded-proto: "https"
            x-forwarded-port: "8443"
            x-forwarded-host: "localhost:8443"
      route:
        - destination:
            host: incloud-web-chart-oauth2-proxy
            port:
              number: 4080
    - name: incloud-web-chart-all
      match:
        - uri: { prefix: /openapi-ui }
        - uri: { prefix: /oauth2/ }           # oauth2-proxy endpoints
        - uri: { prefix: /clusterlist }       # статический JSON
        - uri: { prefix: /api/ }              # API маршруты UI
        - uri: { prefix: /k8s }               # прокси на k8s apiserver
        - uri: { prefix: /openapi-bff }       # BFF
      headers:
        request:
          set:
            x-forwarded-proto: "https"
            x-forwarded-port: "8443"
            x-forwarded-host: "localhost:8443"
      route:
        - destination:
            host: incloud-web-chart-oauth2-proxy
            port:
              number: 4080
