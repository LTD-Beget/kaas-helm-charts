            - name: BASE_FACTORY_NAMESPACED_API_KEY
              value: "base-factory-namespaced-api"
            - name: BASE_FACTORY_NAMESPACED_BUILTIN_KEY
              value: "base-factory-namespaced-builtin"
            - name: BASE_FRONTEND_PREFIX
              value: "/openapi-ui"
            - name: BASE_NAMESPACE_FACTORY_KEY
              value: "namespace-details/v1/namespaces"
            - name: BASE_NAVIGATION_RESOURCE_NAME
              value: "fallback"
            - name: BASE_NAVIGATION_RESOURCE_PLURAL
              value: "navigations"
            - name: KUBE_API_URL
              value: "https://kubernetes.default.svc"
            - name: LOGGER
              value: "TRUE"
            - name: LOGGER_WITH_HEADERS
              value: "TRUE"
            - name: PORT
              value: "8082"

          # Probes (enabled-gated, 'enabled' key stripped)
          livenessProbe:
            failureThreshold: 3
            httpGet:
              path: /healthcheck
              port: 8082
              scheme: HTTP
            initialDelaySeconds: 3
            periodSeconds: 10
            successThreshold: 1
            timeoutSeconds: 2

          # Security context (enabled-gated, 'enabled' key stripped)
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              add:
              - CAP_CHOWN
              - CAP_NET_BIND_SERVICE
              - CAP_SETGID
              - CAP_SETUID
              drop:
              - ALL
            privileged: false
            readOnlyRootFilesystem: false
            runAsGroup: 0
            runAsNonRoot: true
            runAsUser: 101

          # Resources / mounts
          resources:
