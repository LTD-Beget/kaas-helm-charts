---
# Source: incloud-web-chart/charts/incloud-web-chart/templates/factory/default/horizontalpodautoscaler-details.yaml
apiVersion: front.in-cloud.io/v1alpha1
kind: Factory
metadata:
  name: horizontalpodautoscaler-details

spec:
  key: horizontalpodautoscaler-details

  # =========================
  # Data sources
  # =========================
  urlsToFetch:
    # Fetch selected resource by name from target cluster
    # Primary resource request (from shared factory context)
    - apiGroup: '{6}'
      apiVersion: '{7}'
      cluster: '{2}'
      fieldSelector: metadata.name={9}
      namespace: '{3}'
      plural: '{8}'

  # Disable scroll wrapper for main content card
  withScrollableMainContentCard: false

  # =========================
  # Sidebar tags for navigation
  # =========================
  sidebarTags:
    # Used to group resources in sidebar navigation
    - '{6}/{7}/{8}'

  # =========================
  # Page layout
  # =========================
  data:

    # =========================
    # Header row (resource title + actions)
    # =========================
    - type: antdFlex
      data:
        id: header-row
        align: center
        justify: space-between
        style:
          marginBottom: 24px
      children:

        # =========================
        # LEFT SIDE: Resource identity
        # =========================
        - type: antdFlex
          data:
            align: center
            gap: 6
          children:
            
            # =========================
            # Resource kind badge
            # =========================
            - type: ResourceBadge
              data:
                id: factory-resource-badge
                style:
                  fontSize: 20px
                value: '{reqsJsonPath[0][".items.0.kind"]["-"]}'
            
            # =========================
            # Resource name dropdown with redirect
            # =========================
            - type: DropdownRedirect
              data:
                # K8s resource addressing (parameterized)
                
                apiGroup: '{6}'
                apiVersion: '{7}'
                cluster: '{2}'
                namespace: '{3}'
                plural: '{8}'
            
                currentValue: "{reqsJsonPath[0]['.items.0.metadata.name']['Select item...']}"
                id: resource-name-dropdown
                jsonPath: .metadata.name
                placeholder: Select item...
                popupMatchSelectWidth: 350
            
                # Redirect URL template (parameterized)
                redirectUrl: "/openapi-ui/{2}/{3}/factory/{5}/{6}/{7}/{8}/{chosenEntryValue}"
            
            # =========================
            # Copy resource name action
            # =========================
            - type: CopyButton
              data:
                id: copy-resource-name
                copyText: "{reqsJsonPath[0]['.items.0.metadata.name']['-']}"
                successMessage: Name copied to clipboard.
                tooltip: Copy {reqsJsonPath[0]['.items.0.kind']['-']} name

        # =========================
        # RIGHT SIDE: Resource actions dropdown
        # =========================
        - type: ActionsDropdown
          data:
            id: resource-actions
            buttonText: Actions
            actions:

              # ---- Edit resource manifest ----
              
              - type: edit
                props:
                  # =========================
                  # UI metadata
                  # =========================
                  text: Edit
                  icon: EditOutlined
              
                  # =========================
                  # PERMISSION CHECK
                  # =========================
                  permissionContext:
                    
                    apiGroup: '{6}'
                    apiVersion: '{7}'
                    cluster: '{2}'
                    namespace: '{3}'
                    plural: '{8}'
              
                  # =========================
                  # API target (resource addressing)
                  # =========================
                  
                  apiGroup: '{6}'
                  apiVersion: '{7}'
                  cluster: '{2}'
                  name: '{reqsJsonPath[0][''.items.0.metadata.name''][''-'']}'
                  namespace: '{3}'
                  plural: '{8}'
              
                  # =========================
                  # Target resource identity
                  # =========================
              
                  # =========================
                  # Navigation prefix
                  # =========================
                  baseprefix: /openapi-ui

              # ---- Edit labels ----
              
              - type: editLabels
                props:
                  # =========================
                  # UI metadata
                  # =========================
                  text: Edit Labels
                  icon: TagsOutlined
              
                  # =========================
                  # PERMISSION CHECK
                  # =========================
                  permissionContext:
                    
                    apiGroup: '{6}'
                    apiVersion: '{7}'
                    cluster: '{2}'
                    namespace: '{3}'
                    plural: '{8}'
              
                  # =========================
                  # Data binding
                  # =========================
                  reqIndex: "0"
                  jsonPathToLabels: ".items.0.metadata.labels"
              
                  # =========================
                  # API endpoint (parameterized)
                  # =========================
                  endpoint: "/api/clusters/{2}/k8s/apis/{6}/{7}/namespaces/{3}/{8}/{reqsJsonPath[0]['.items.0.metadata.name']['-']}"
              
                  # =========================
                  # Patch configuration
                  # =========================
                  pathToValue: "/metadata/labels"
              
                  # =========================
                  # Modal configuration
                  # =========================
                  modalTitle: Edit Labels
                  editModalWidth: 650
                  paddingContainerEnd: "24px"
                  maxEditTagTextLength: 35

              # ---- Edit annotations ----
              
              - type: editAnnotations
                props:
                  # =========================
                  # UI metadata
                  # =========================
                  text: Edit Annotations
                  icon: FileTextOutlined
              
                  # =========================
                  # PERMISSION CHECK
                  # =========================
                  permissionContext:
                    
                    apiGroup: '{6}'
                    apiVersion: '{7}'
                    cluster: '{2}'
                    namespace: '{3}'
                    plural: '{8}'
              
                  # =========================
                  # API endpoint (parameterized)
                  # =========================
                  endpoint: "/api/clusters/{2}/k8s/apis/{6}/{7}/namespaces/{3}/{8}/{reqsJsonPath[0]['.items.0.metadata.name']['-']}"
              
                  # =========================
                  # Data binding
                  # =========================
                  reqIndex: "0"
                  jsonPathToObj: ".items.0.metadata.annotations"
              
                  # =========================
                  # Patch configuration
                  # =========================
                  pathToValue: "/metadata/annotations"
              
                  # =========================
                  # Modal configuration
                  # =========================
                  modalTitle: Edit Annotations
                  cols: [11, 11, 2]
                  editModalWidth: 800px


              # ---- Delete resource ----
              
              - type: delete
                props:
                  # =========================
                  # UI metadata
                  # =========================
                  text: Delete
                  icon: DeleteOutlined
                  danger: true
              
                  # =========================
                  # PERMISSION CHECK
                  # =========================
                  permissionContext:
                    
                    apiGroup: '{6}'
                    apiVersion: '{7}'
                    cluster: '{2}'
                    namespace: '{3}'
                    plural: '{8}'
              
                  # =========================
                  # API endpoint (parameterized)
                  # =========================
                  endpoint: "/api/clusters/{2}/k8s/apis/{6}/{7}/namespaces/{3}/{8}/{reqsJsonPath[0]['.items.0.metadata.name']['-']}"
              
                  # =========================
                  # Target resource identity
                  # =========================
                  name: "{reqsJsonPath[0]['.items.0.metadata.name']['-']}"
              
                  # =========================
                  # Post-delete redirect (parameterized)
                  # =========================
                  redirectTo: "/openapi-ui/{2}/{3}/api-table/{6}/{7}/{8}"

    # =========================
    # Tabs root
    # =========================
    - type: antdTabs
      data:
        id: tabs-root
        defaultActiveKey: details
        items:

          # =========================
          # DETAILS TAB
          # =========================
          - key: details
            label: Details
            children:
              - type: antdFlex
                data:
                  id: details-stack
                  vertical: true
                  gap: 24
                children:

                  # ---- Row 1: Resource info + Metadata counters ----
                  
                  # Reusable row with resource info (left) and metadata counters (right).
                  # Expected params:
                  # - namespaced (required)
                  # - endpoint / permissionContext (required for default metadata template)
                  # - metadataTemplate (optional, default: metadataCounters)
                  # - fieldSelector / k8sResourceToFetch (optional, used by custom metadata templates)
                  # - withResponsive (optional, default: true)
                  - type: antdRow
                    data:
                      # Keep vertical gap when columns collapse to stacked layout on smaller widths/zoom.
                      gutter: [24, 24]
                    children:
                      - type: antdCol
                        data:
                          span: 12
                          xs: 24
                          xl: 12
                        children:
                          
                          - type: ContentCard
                            data:
                              id: resource-info-card
                            children:
                          
                              # =========================
                              # Header: icon + title
                              # =========================
                              - type: DefaultDiv
                                data:
                                  id: resource-info-card-title
                                  style:
                                    display: flex
                                    gap: 12px
                                    marginBottom: 12px
                                    alignItems: center
                                children:
                                  - type: antdIcons
                                    data:
                                      id: resource-info-icon
                                      iconName: InfoCircleOutlined
                                      iconProps:
                                        size: 24
                                        color: token.colorInfo
                                        style:
                                          fontSize: 24
                                          color: token.colorInfo
                          
                                  - type: parsedText
                                    data:
                                      id: resource-info-title-text
                                      text: "{reqsJsonPath[0]['.items.0.kind']['-']} Info"
                                      style:
                                        fontSize: 16px
                                        lineHeight: 24px
                          
                              # =========================
                              # Main content grid
                              # =========================
                              - type: antdRow
                                data:
                                  gutter: [24, 0]
                                children:
                          
                                  # -------------------------
                                  # Created
                                  # -------------------------
                                  - type: antdCol
                                    data:
                                      span: 8
                                      id: resource-info-col-created
                                    children:
                                      - type: antdFlex
                                        data: { vertical: true, gap: 4 }
                                        children:
                                          - type: antdText
                                            data:
                                              strong: true
                                              text: Created
                                          - type: parsedText
                                            data:
                                              formatter: timestamp
                                              text: "{reqsJsonPath[0]['.items.0.metadata.creationTimestamp']['-']}"
                          
                                  # -------------------------
                                  # Namespace
                                  # -------------------------
                                  - type: antdCol
                                    data:
                                      span: 8
                                      id: resource-info-col-namespace
                                    children:
                                      - type: antdFlex
                                        data: { vertical: true, gap: 4 }
                                        children:
                                          - type: antdText
                                            data:
                                              id: meta-namespace-label
                                              strong: true
                                              text: Namespace
                                          - type: antdFlex
                                            data:
                                              id: namespace-badge-link-row
                                              align: center
                                              direction: row
                                              gap: 6
                                            children:
                                              - type: ResourceBadge
                                                data:
                                                  id: namespace-resource-badge
                                                  value: Namespace
                                              - type: antdLink
                                                data:
                                                  id: namespace-link
                                                  href: /openapi-ui/{2}/factory/namespace-details/v1/namespaces/{reqsJsonPath[0]['.items.0.metadata.namespace']['-']}
                                                  text: '{reqsJsonPath[0][".items.0.metadata.namespace"]["-"]}'
                          
                                  # -------------------------
                                  # OwnerRefs
                                  # -------------------------
                          
                                  - type: antdCol
                                    data:
                                      span: 8
                                      id: resource-info-col-ownerrefs
                                    children:
                                      - type: VisibilityContainer
                                        data:
                                          id: ds-init-containers-container
                                          value: "{reqsJsonPath[0]['.items.0.metadata.ownerReferences']['-']}"
                                          style:
                                            margin: 0
                                            padding: 0
                                        children:
                                          - type: antdFlex
                                            data:
                                              id: ref-link-block
                                              vertical: true
                                              gap: 8
                                            children:
                                              - type: antdText
                                                data:
                                                  id: meta-ref
                                                  text: OwnerRef
                                                  strong: true
                          
                                              - type: OwnerRefs
                                                data:
                                                  id: refs
                                                  baseprefix: /openapi-ui
                                                  cluster: '{2}'
                                                  #forcedNamespace: '{3}'
                                                  reqIndex: 0
                                                  errorText: error getting refs
                                                  notArrayErrorText: refs on path are not arr
                                                  emptyArrayErrorText: "-"
                                                  isNotRefsArrayErrorText: objects in arr are not refs
                                                  jsonPathToArrayOfRefs: ".items.0.metadata.ownerReferences"
                                                  baseFactoryClusterSceopedAPIKey: base-factory-clusterscoped-api
                                                  baseFactoryClusterSceopedBuiltinKey: base-factory-clusterscoped-builtin
                                                  baseFactoryNamespacedAPIKey: base-factory-namespaced-api
                                                  baseFactoryNamespacedBuiltinKey: base-factory-namespaced-builtin
                                                  baseNamespaceFactoryKey: namespace-details
                                                  baseNavigationPlural: navigations
                                                  baseNavigationName: navigation
                  
                      - type: antdCol
                        data:
                          span: 12
                          xs: 24
                          xl: 12
                        children:
                          
                          # Content card with metadata counters (labels and annotations)
                          - type: ContentCard
                            data:
                              id: metadata-card
                              title: Metadata
                            style:
                              marginBottom: 24px
                            children:
                              - type: DefaultDiv
                                data:
                                  id: cards-container
                                  style:
                                    display: grid
                                    gridTemplateColumns: repeat(auto-fit, minmax(220px, 1fr))
                                    columnGap: 16
                                    rowGap: 10
                                    marginBottom: 16px
                                children:
                                  
                                  - type: AggregatedCounterCard
                                    data:
                                      id: labels-counter-card
                                      text: Labels
                                      # Icon for Labels card (Base64-encoded SVG)
                                      iconBase64Encoded: 
                                      counter:
                                        type: "key"
                                        props:
                                          reqIndex: "0"
                                          # JSONPath to labels object for counter calculation
                                          jsonPathToObj: .items.0.metadata.labels
                                      activeType:
                                        type: "labels"
                                        props:
                                          reqIndex: "0"
                                          # JSONPath to labels for edit modal
                                          jsonPathToLabels: .items.0.metadata.labels
                                          notificationSuccessMessage: Updated successfully
                                          notificationSuccessMessageDescription: Labels have been updated
                                          modalTitle: Edit labels
                                          modalDescriptionText: ""
                                          inputLabel: ""
                                          maxEditTagTextLength: 35
                                          # API endpoint for PATCH/UPDATE
                                          endpoint: "/api/clusters/{2}/k8s/apis/{6}/{7}/namespaces/{3}/{8}/{reqsJsonPath[0]['.items.0.metadata.name']['-']}"
                                          # JSON Pointer path for patch operation
                                          pathToValue: /metadata/labels
                                          editModalWidth: 650
                                          paddingContainerEnd: 24px
                                          permissionContext:
                                            # RBAC/permission context for edit actions
                                            apiGroup: '{6}'
                                            apiVersion: '{7}'
                                            cluster: '{2}'
                                            namespace: '{3}'
                                            plural: '{8}'
                                  
                                  - type: AggregatedCounterCard
                                    data:
                                      id: annotations-counter-card
                                      text: Annotations
                                      # Icon for Annotations card (Base64-encoded SVG)
                                      iconBase64Encoded: 
                                      counter:
                                        type: "key"
                                        props:
                                          reqIndex: "0"
                                          # JSONPath to annotations object for counter calculation
                                          jsonPathToObj: .items.0.metadata.annotations
                                      activeType:
                                        type: "annotations"
                                        props:
                                          reqIndex: "0"
                                          # JSONPath to annotations for edit modal
                                          jsonPathToObj: .items.0.metadata.annotations
                                          notificationSuccessMessage: Updated successfully
                                          notificationSuccessMessageDescription: Annotations have been updated
                                          modalTitle: Edit annotations
                                          modalDescriptionText: ""
                                          inputLabel: ""
                                          # API endpoint for PATCH/UPDATE
                                          endpoint: "/api/clusters/{2}/k8s/apis/{6}/{7}/namespaces/{3}/{8}/{reqsJsonPath[0]['.items.0.metadata.name']['-']}"
                                          # JSON Pointer path for patch operation
                                          pathToValue: /metadata/annotations
                                          editModalWidth: 800px
                                          cols: [11, 11, 2]
                                          permissionContext:
                                            # RBAC/permission context for edit actions
                                            apiGroup: '{6}'
                                            apiVersion: '{7}'
                                            cluster: '{2}'
                                            namespace: '{3}'
                                            plural: '{8}'

                  # ---- Row 2: Runtime facts ----
                  - type: antdRow
                    data:
                      gutter: [24, 0]
                    children:

                      # Resource runtime details
                      - type: antdCol
                        data:
                          span: 8
                        children:
                          
                          # Content card with HPA runtime facts (two columns)
                          - type: ContentCard
                            data:
                              id: horizontalpodautoscaler-runtime-facts-card
                            children:
                              # Card title with icon
                              - type: DefaultDiv
                                data:
                                  id: horizontalpodautoscaler-info-card-title
                                  style:
                                    display: flex
                                    gap: 12px
                                    marginBottom: 12px
                                    alignItems: center
                                children:
                                  - type: antdIcons
                                    data:
                                      id: horizontalpodautoscaler-info-icon
                                      iconName: SettingOutlined
                                      iconProps:
                                        size: 24
                                        style:
                                          fontSize: 24
                                          color: token.colorInfo
                                  - type: antdText
                                    data:
                                      id: horizontalpodautoscaler-info-title-text
                                      text: "Scaling Configuration"
                                      style:
                                        fontSize: 16px
                                        lineHeight: 24px
                          
                              - type: antdRow
                                data:
                                  gutter: [24, 12]
                                  id: horizontalpodautoscaler-runtime-grid
                                children:
                                  # LEFT COLUMN — Scale target
                                  - type: antdCol
                                    data:
                                      id: horizontalpodautoscaler-col-left
                                      span: 12
                                      xs: 24
                                      xl: 12
                                    children:
                                      - type: antdFlex
                                        data:
                                          gap: 12
                                          id: horizontalpodautoscaler-col-left-stack
                                          vertical: true
                                        children:
                                          - type: antdFlex
                                            data:
                                              gap: 4
                                              id: scale-target-ref-block
                                              vertical: true
                                            children:
                                              - type: antdText
                                                data:
                                                  id: scale-target-ref-label
                                                  strong: true
                                                  text: Scale target ref
                          
                                              - type: OwnerRefs
                                                data:
                                                  id: refs
                                                  baseprefix: /openapi-ui
                                                  cluster: '{2}'
                                                  #forcedNamespace: '{3}'
                                                  reqIndex: 0
                                                  errorText: error getting refs
                                                  notArrayErrorText: refs on path are not arr
                                                  emptyArrayErrorText: "-"
                                                  isNotRefsArrayErrorText: objects in arr are not refs
                                                  jsonPathToArrayOfRefs: ".items.0.spec.scaleTargetRef"
                                                  baseFactoryClusterSceopedAPIKey: base-factory-clusterscoped-api
                                                  baseFactoryClusterSceopedBuiltinKey: base-factory-clusterscoped-builtin
                                                  baseFactoryNamespacedAPIKey: base-factory-namespaced-api
                                                  baseFactoryNamespacedBuiltinKey: base-factory-namespaced-builtin
                                                  baseNamespaceFactoryKey: namespace-details
                                                  baseNavigationPlural: navigations
                                                  baseNavigationName: navigation
                          
                          
                          
                                  # RIGHT COLUMN — Replicas & metrics
                                  - type: antdCol
                                    data:
                                      id: horizontalpodautoscaler-col-right
                                      span: 12
                                      xs: 24
                                      xl: 12
                                    children:
                                      - type: DefaultDiv
                                        data:
                                          id: horizontalpodautoscaler-col-right-grid
                                          style:
                                            display: grid
                                            gridTemplateColumns: repeat(auto-fit, minmax(320px, 1fr))
                                            columnGap: 24px
                                            rowGap: 12px
                                        children:
                                          - type: antdFlex
                                            data:
                                              gap: 12
                                              id: horizontalpodautoscaler-col-right-stack-a
                                              vertical: true
                                            children:
                                              - type: antdFlex
                                                data:
                                                  gap: 4
                                                  id: min-replicas-block
                                                  vertical: true
                                                children:
                                                  - type: antdText
                                                    data:
                                                      id: min-replicas-label
                                                      strong: true
                                                      text: Min replicas
                                                  - type: parsedText
                                                    data:
                                                      id: min-replicas-value
                                                      text: "{reqsJsonPath[0]['.items.0.spec.minReplicas']['1 (default)']}"
                          
                                              - type: antdFlex
                                                data:
                                                  gap: 4
                                                  id: max-replicas-block
                                                  vertical: true
                                                children:
                                                  - type: antdText
                                                    data:
                                                      id: max-replicas-label
                                                      strong: true
                                                      text: Max replicas
                                                  - type: parsedText
                                                    data:
                                                      id: max-replicas-value
                                                      text: "{reqsJsonPath[0]['.items.0.spec.maxReplicas']['Not configured']}"
                          
                                          - type: antdFlex
                                            data:
                                              gap: 12
                                              id: horizontalpodautoscaler-col-right-stack-b
                                              vertical: true
                                            children:
                                              - type: antdFlex
                                                data:
                                                  gap: 4
                                                  id: current-replicas-block
                                                  vertical: true
                                                children:
                                                  - type: antdText
                                                    data:
                                                      id: current-replicas-label
                                                      strong: true
                                                      text: Current replicas
                                                  - type: parsedText
                                                    data:
                                                      id: current-replicas-value
                                                      text: "{reqsJsonPath[0]['.items.0.status.currentReplicas']['Not reported yet']}"
                          
                                              - type: antdFlex
                                                data:
                                                  gap: 4
                                                  id: desired-replicas-block
                                                  vertical: true
                                                children:
                                                  - type: antdText
                                                    data:
                                                      id: desired-replicas-label
                                                      strong: true
                                                      text: Desired replicas
                                                  - type: parsedText
                                                    data:
                                                      id: desired-replicas-value
                                                      text: "{reqsJsonPath[0]['.items.0.status.desiredReplicas']['Not reported yet']}"

                  # =========================
                  # Conditions (only when present)
                  # =========================
                  
                  # Visibility wrapper for conditions card (renders only when conditions exist)
                  - type: VisibilityContainer
                    data:
                      id: conditions-visibility-guard
                      value: '{reqsJsonPath[0][".items.0.status.conditions"]}'
                    children:
                      
                      # Content card with resource conditions table
                      - type: ContentCard
                        data:
                          id: conditions-card
                          title: Conditions
                        children:
                      
                          # =========================
                          # Header: icon + title
                          # =========================
                          - type: DefaultDiv
                            data:
                              id: conditions-card-title
                              style:
                                display: flex
                                gap: 12px
                                marginBottom: 12px
                                alignItems: center
                            children:
                              - type: antdIcons
                                data:
                                  id: conditions-info-icon
                                  iconName: CheckCircleOutlined
                                  iconProps:
                                    size: 24
                                    color: token.colorInfo
                                    style:
                                      fontSize: 24
                                      color: token.colorInfo
                      
                              - type: antdText
                                data:
                                  id: conditions-title-text
                                  text: "Conditions"
                                  style:
                                    fontSize: 16px
                                    lineHeight: 24px
                      
                          # =========================
                          # Conditions table
                          # =========================
                          - type: EnrichedTable
                            data:
                              baseprefix: /openapi-ui
                              cluster: '{2}'
                              customizationId: factory-status-conditions
                              id: conditions-table
                              pathToItems: .items.0.status.conditions
                              withoutControls: true
                      
                              # K8s resource to fetch conditions from
                              k8sResourceToFetch:
                                
                                    apiGroup: '{6}'
                                    apiVersion: '{7}'
                                    cluster: '{2}'
                                    namespace: '{3}'
                                    plural: '{8}'
                      
                              # Field selector to bind conditions to a concrete resource
                              fieldSelector:
                                
                                    metadata.name: '{9}'

          # =========================
          # YAML TAB
          # =========================
          - key: yaml
            label: YAML
            children:
              
              - type: ContentCard
                data:
                  id: yaml-editor-card
                  style:
                    marginBottom: 24px
                children:
                  - type: YamlEditorSingleton
                    data:
                      id: yaml-editor
              
                      # =========================
                      # Base editor configuration
                      # =========================
              
                      # Request index used to prefill editor with fetched resource
                      prefillValuesRequestIndex: 0
              
                      # Height subtracted from viewport to fit layout
                      substractHeight: 350
              
                      # JSONPath to resource root in API response
                      pathToData: .items.0
              
                      # Indicates whether resource is namespaced or cluster-scoped
                      isNameSpaced: true
              
                      # Editor mode/type (e.g. "api", "builtin")
                      type: api
              
                      # =========================
                      # API target (resource addressing)
                      # =========================
                      # Defines Kubernetes API location for resource CRUD
                      
                      apiGroup: '{6}'
                      apiVersion: '{7}'
                      cluster: '{2}'
                      namespace: '{3}'
                      plural: '{8}'
              
                      # =========================
                      # Permission context
                      # =========================
                      # Used by UI to validate RBAC permissions for edit actions
                      permissionContext:
                        
                        apiGroup: '{6}'
                        apiVersion: '{7}'
                        cluster: '{2}'
                        namespace: '{3}'
                        plural: '{8}'

          # =========================
          # EVENTS TAB
          # =========================
          - key: events
            label: Events
            children:
              # Kubernetes events related to this resource
              
              - type: ContentCard
                data:
                  id: details-card
                  style:
                    marginBottom: 24px
                children:
                  - type: Events
                    data:
                      id: events
              
                      # =========================
                      # Base configuration
                      # =========================
              
                      # Base UI prefix for resource links
                      baseprefix: "/openapi-ui"
              
                      # Target cluster identifier
                      cluster: "{2}"
              
                      # WebSocket endpoint for live events stream
                      wsUrl: "/api/clusters/{2}/openapi-bff-ws/events/eventsWs"
              
                      # Pagination and layout tuning
                      pageSize: 50
                      limit: 40
                      substractHeight: 315
              
                      # =========================
                      # Field selector: bind events to current resource
                      # =========================
                      fieldSelector:
                        regarding.kind: "{reqsJsonPath[0]['.items.0.kind']['-']}"
                        regarding.name: "{reqsJsonPath[0]['.items.0.metadata.name']['-']}"
                        regarding.namespace: "{reqsJsonPath[0]['.items.0.metadata.namespace']['-']}"
                        regarding.apiVersion: "{reqsJsonPath[0]['.items.0.apiVersion']['-']}"
                      # =========================
                      # Factory routing keys
                      # =========================
                      # Used to navigate from Event objects to resource details pages
                      baseFactoryNamespacedAPIKey: base-factory-namespaced-api
                      baseFactoryClusterSceopedAPIKey: base-factory-clusterscoped-api
                      baseFactoryNamespacedBuiltinKey: base-factory-namespaced-builtin
                      baseFactoryClusterSceopedBuiltinKey: base-factory-clusterscoped-builtin
                      baseNamespaceFactoryKey: namespace-details
---
# Source: incloud-web-chart/charts/incloud-web-chart/templates/factory/default/job-details.yaml
apiVersion: front.in-cloud.io/v1alpha1
kind: Factory
metadata:
  name: job-details

spec:
  key: job-details

  # =========================
  # Data sources
  # =========================
  urlsToFetch:
    # Fetch selected resource by name from target cluster
    # Primary resource request (from shared factory context)
    - apiGroup: '{6}'
      apiVersion: '{7}'
      cluster: '{2}'
      fieldSelector: metadata.name={9}
      namespace: '{3}'
      plural: '{8}'

    # Related pods metrics request (metrics.k8s.io)
    - apiGroup: metrics.k8s.io
      apiVersion: v1beta1
      cluster: '{2}'
      namespace: '{3}'
      plural: pods


  # Disable scroll wrapper for main content card
  withScrollableMainContentCard: false

  # =========================
  # Sidebar tags for navigation
  # =========================
  sidebarTags:
    # Used to group resources in sidebar navigation
    - '{6}/{7}/{8}'

  # =========================
  # Page layout
  # =========================
  data:

    # =========================
    # Header row (resource title + actions)
    # =========================
    - type: antdFlex
      data:
        id: header-row
        align: center
        justify: space-between
        style:
          marginBottom: 24px
      children:

        # =========================
        # LEFT SIDE: Resource identity
        # =========================
        - type: antdFlex
          data:
            align: center
            gap: 6
          children:
            
            # =========================
            # Resource kind badge
            # =========================
            - type: ResourceBadge
              data:
                id: factory-resource-badge
                style:
                  fontSize: 20px
                value: '{reqsJsonPath[0][".items.0.kind"]["-"]}'
            
            # =========================
            # Resource name dropdown with redirect
            # =========================
            - type: DropdownRedirect
              data:
                # K8s resource addressing (parameterized)
                
                apiGroup: '{6}'
                apiVersion: '{7}'
                cluster: '{2}'
                namespace: '{3}'
                plural: '{8}'
            
                currentValue: "{reqsJsonPath[0]['.items.0.metadata.name']['Select item...']}"
                id: resource-name-dropdown
                jsonPath: .metadata.name
                placeholder: Select item...
                popupMatchSelectWidth: 350
            
                # Redirect URL template (parameterized)
                redirectUrl: "/openapi-ui/{2}/{3}/factory/{5}/{6}/{7}/{8}/{chosenEntryValue}"
            
            # =========================
            # Copy resource name action
            # =========================
            - type: CopyButton
              data:
                id: copy-resource-name
                copyText: "{reqsJsonPath[0]['.items.0.metadata.name']['-']}"
                successMessage: Name copied to clipboard.
                tooltip: Copy {reqsJsonPath[0]['.items.0.kind']['-']} name


        # =========================
        # RIGHT SIDE: Resource actions dropdown
        # =========================
        - type: ActionsDropdown
          data:
            id: resource-actions
            buttonText: Actions
            actions:

              # ---- Edit resource manifest ----
              
              - type: edit
                props:
                  # =========================
                  # UI metadata
                  # =========================
                  text: Edit
                  icon: EditOutlined
              
                  # =========================
                  # PERMISSION CHECK
                  # =========================
                  permissionContext:
                    
                    apiGroup: '{6}'
                    apiVersion: '{7}'
                    cluster: '{2}'
                    namespace: '{3}'
                    plural: '{8}'
              
                  # =========================
                  # API target (resource addressing)
                  # =========================
                  
                  apiGroup: '{6}'
                  apiVersion: '{7}'
                  cluster: '{2}'
                  name: '{reqsJsonPath[0][''.items.0.metadata.name''][''-'']}'
                  namespace: '{3}'
                  plural: '{8}'
              
                  # =========================
                  # Target resource identity
                  # =========================
              
                  # =========================
                  # Navigation prefix
                  # =========================
                  baseprefix: /openapi-ui

              # ---- Edit labels ----
              
              - type: editLabels
                props:
                  # =========================
                  # UI metadata
                  # =========================
                  text: Edit Labels
                  icon: TagsOutlined
              
                  # =========================
                  # PERMISSION CHECK
                  # =========================
                  permissionContext:
                    
                    apiGroup: '{6}'
                    apiVersion: '{7}'
                    cluster: '{2}'
                    namespace: '{3}'
                    plural: '{8}'
              
                  # =========================
                  # Data binding
                  # =========================
                  reqIndex: "0"
                  jsonPathToLabels: ".items.0.metadata.labels"
              
                  # =========================
                  # API endpoint (parameterized)
                  # =========================
                  endpoint: "/api/clusters/{2}/k8s/apis/{6}/{7}/namespaces/{3}/{8}/{reqsJsonPath[0]['.items.0.metadata.name']['-']}"
              
                  # =========================
                  # Patch configuration
                  # =========================
                  pathToValue: "/metadata/labels"
              
                  # =========================
                  # Modal configuration
                  # =========================
                  modalTitle: Edit Labels
                  editModalWidth: 650
                  paddingContainerEnd: "24px"
                  maxEditTagTextLength: 35

              # ---- Edit annotations ----
              
              - type: editAnnotations
                props:
                  # =========================
                  # UI metadata
                  # =========================
                  text: Edit Annotations
                  icon: FileTextOutlined
              
                  # =========================
                  # PERMISSION CHECK
                  # =========================
                  permissionContext:
                    
                    apiGroup: '{6}'
                    apiVersion: '{7}'
                    cluster: '{2}'
                    namespace: '{3}'
                    plural: '{8}'
              
                  # =========================
                  # API endpoint (parameterized)
                  # =========================
                  endpoint: "/api/clusters/{2}/k8s/apis/{6}/{7}/namespaces/{3}/{8}/{reqsJsonPath[0]['.items.0.metadata.name']['-']}"
              
                  # =========================
                  # Data binding
                  # =========================
                  reqIndex: "0"
                  jsonPathToObj: ".items.0.metadata.annotations"
              
                  # =========================
                  # Patch configuration
                  # =========================
                  pathToValue: "/metadata/annotations"
              
                  # =========================
                  # Modal configuration
                  # =========================
                  modalTitle: Edit Annotations
                  cols: [11, 11, 2]
                  editModalWidth: 800px


              # ---- Delete resource ----
              
              - type: delete
                props:
                  # =========================
                  # UI metadata
                  # =========================
                  text: Delete
                  icon: DeleteOutlined
                  danger: true
              
                  # =========================
                  # PERMISSION CHECK
                  # =========================
                  permissionContext:
                    
                    apiGroup: '{6}'
                    apiVersion: '{7}'
                    cluster: '{2}'
                    namespace: '{3}'
                    plural: '{8}'
              
                  # =========================
                  # API endpoint (parameterized)
                  # =========================
                  endpoint: "/api/clusters/{2}/k8s/apis/{6}/{7}/namespaces/{3}/{8}/{reqsJsonPath[0]['.items.0.metadata.name']['-']}"
              
                  # =========================
                  # Target resource identity
                  # =========================
                  name: "{reqsJsonPath[0]['.items.0.metadata.name']['-']}"
              
                  # =========================
                  # Post-delete redirect (parameterized)
                  # =========================
                  redirectTo: "/openapi-ui/{2}/{3}/api-table/{6}/{7}/{8}"

    # =========================
    # Tabs root
    # =========================
    - type: antdTabs
      data:
        id: tabs-root
        defaultActiveKey: details
        items:

          # =========================
          # DETAILS TAB
          # =========================
          - key: details
            label: Details
            children:
              - type: antdFlex
                data:
                  id: details-stack
                  vertical: true
                  gap: 24
                children:

                  # ---- Row 1: Resource info + Metadata counters ----
                  
                  # Reusable row with resource info (left) and metadata counters (right).
                  # Expected params:
                  # - namespaced (required)
                  # - endpoint / permissionContext (required for default metadata template)
                  # - metadataTemplate (optional, default: metadataCounters)
                  # - fieldSelector / k8sResourceToFetch (optional, used by custom metadata templates)
                  # - withResponsive (optional, default: true)
                  - type: antdRow
                    data:
                      # Keep vertical gap when columns collapse to stacked layout on smaller widths/zoom.
                      gutter: [24, 24]
                    children:
                      - type: antdCol
                        data:
                          span: 12
                          xs: 24
                          xl: 12
                        children:
                          
                          - type: ContentCard
                            data:
                              id: resource-info-card
                            children:
                          
                              # =========================
                              # Header: icon + title
                              # =========================
                              - type: DefaultDiv
                                data:
                                  id: resource-info-card-title
                                  style:
                                    display: flex
                                    gap: 12px
                                    marginBottom: 12px
                                    alignItems: center
                                children:
                                  - type: antdIcons
                                    data:
                                      id: resource-info-icon
                                      iconName: InfoCircleOutlined
                                      iconProps:
                                        size: 24
