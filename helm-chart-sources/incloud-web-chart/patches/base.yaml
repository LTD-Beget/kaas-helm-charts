            id: resource-actions
            buttonText: Actions
            actions:

              # ---- Edit resource ----
              
              - type: edit
                props:
                  # =========================
                  # UI metadata
                  # =========================
                  text: Edit
                  icon: EditOutlined
              
                  # =========================
                  # PERMISSION CHECK
                  # =========================
                  permissionContext:
                    
                    apiVersion: '{6}'
                    cluster: '{2}'
                    namespace: '{3}'
                    plural: '{7}'
              
                  # =========================
                  # API target (resource addressing)
                  # =========================
                  
                  apiVersion: '{6}'
                  cluster: '{2}'
                  name: '{reqsJsonPath[0][''.items.0.metadata.name''][''-'']}'
                  namespace: '{3}'
                  plural: '{7}'
              
                  # =========================
                  # Target resource identity
                  # =========================
              
                  # =========================
                  # Navigation prefix
                  # =========================
                  baseprefix: /openapi-ui

              # ---- Edit labels ----
              
              - type: editLabels
                props:
                  # =========================
                  # UI metadata
                  # =========================
                  text: Edit Labels
                  icon: TagsOutlined
              
                  # =========================
                  # PERMISSION CHECK
                  # =========================
                  permissionContext:
                    
                    apiVersion: '{6}'
                    cluster: '{2}'
                    namespace: '{3}'
                    plural: '{7}'
              
                  # =========================
                  # Data binding
                  # =========================
                  reqIndex: "0"
                  jsonPathToLabels: ".items.0.metadata.labels"
              
                  # =========================
                  # API endpoint (parameterized)
                  # =========================
