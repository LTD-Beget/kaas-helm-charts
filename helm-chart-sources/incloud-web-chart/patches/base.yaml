# Source: incloud-web-chart/charts/incloud-web-chart/templates/configmap.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: incloud-web-chart-incloud-web-chart-nginx-config
  namespace: default
data:
  nginx-config: |-
    # Handle WebSocket upgrade headers
    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    server {
      # Default server listening on specified port (IPv4 and IPv6)
      listen       8081 default_server;
      listen       [::]:8081 default_server;
      server_name  _;

      # Serve static JSON for cluster listing
      location ~ ^(/clusterlist|/api/clusters)$ {
        add_header Content-Type application/json;
        set $cluster_list '[{"api":"127.0.0.1","description":"default","name":"default","scheme":"http","tenant":"dev"},{"api":"93.189.231.174","description":"cluster2","name":"cluster2","scheme":"http","tenant":"dev"}]';
        return 200 $cluster_list;
      }

    
      location /api/clusters/default {
          proxy_http_version 1.1;
          proxy_set_header Upgrade $http_upgrade;
          proxy_set_header Connection $connection_upgrade;
          proxy_set_header X-Forwarded-Proto $scheme;
          proxy_set_header Host $host;
          proxy_read_timeout 86400s;
          proxy_send_timeout 86400s;

          # Remove prefix before proxying
          rewrite /api/clusters/default/(.*) /$1 break;
        
          proxy_pass http://127.0.0.1:8081;
        
      }
    
      location /api/clusters/cluster2 {
          proxy_http_version 1.1;
          proxy_set_header Upgrade $http_upgrade;
          proxy_set_header Connection $connection_upgrade;
          proxy_set_header X-Forwarded-Proto $scheme;
          proxy_set_header Host $host;
          proxy_read_timeout 86400s;
          proxy_send_timeout 86400s;

          # Remove prefix before proxying
          rewrite /api/clusters/cluster2/(.*) /$1 break;
        
          proxy_pass http://93.189.231.174;
        
      }
    

      # Proxy /k8s requests to Kubernetes API server
      location /k8s {
      
          auth_request /oauth2/userinfo;
          error_page 401 = /oauth2/sign_in;
      

        # --- WebSocket / streaming essentials ---
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host $host;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
        proxy_buffering off;           # avoid buffering for watch/WS
        proxy_request_buffering off;   # avoid request buffering

        # Remove /k8s prefix and proxy to apiserver service
        rewrite /k8s/(.*) /$1 break;
        proxy_pass https://kubernetes.default.svc:443;
      }

      # Proxy /openapi-bff to backend (BFF container)
      location /openapi-bff {
      
          auth_request /oauth2/userinfo;
          error_page 401 = /oauth2/sign_in;
      
          proxy_pass http://127.0.0.1:8082;
      }

      

      # WebSocket proxy for BFF (e.g., event streams)
      location /openapi-bff-ws/ {
      
          auth_request /oauth2/userinfo;
          error_page 401 = /oauth2/sign_in;
      

          proxy_http_version 1.1;
          proxy_set_header Upgrade $http_upgrade;
          proxy_set_header Connection $connection_upgrade;
          proxy_set_header X-Forwarded-Proto $scheme;
          proxy_set_header Host $host;
          proxy_read_timeout 86400s;
          proxy_send_timeout 86400s;

          proxy_pass http://127.0.0.1:8082;
      }

      location = / {
          return 301 http://127.0.0.1:8081/openapi-ui;
      }

      # Default route: serve frontend app from Web container
      location /openapi-ui {
      
        auth_request /oauth2/userinfo;
        error_page 401 = /oauth2/sign_in;
      

        proxy_pass http://127.0.0.1:8080;
      }

      # Healthcheck endpoint
      location /healthcheck {
          access_log off;
          return 200 "Healthy\n";
      }

    

    
      location /oauth2 {
          proxy_pass http://incloud-web-chart-oauth2-proxy:4080;
      }
    
    }
