    # =================================================
    - name: Created
      type: factory
      
      jsonPath: .metadata.creationTimestamp
      customProps:
        disableEventBubbling: true
        items:
          - type: antdFlex
            data:
              id: time-block
              align: center
              gap: 6
            children:
              - type: antdText
                data:
                  id: time-icon
                  text: "🌐"
              - type: parsedText
                data:
                  id: time-value
                  formatter: timestamp
                  text: "{reqsJsonPath[0]['.metadata.creationTimestamp']['-']}"

  # Trim long values for selected columns
  additionalPrinterColumnsTrimLengths:
    
    - key: Name
      value: 64
    
    - key: Labels
      value: 1
    
    - key: Pod Selector
      value: 5

  # Fallback values for empty or missing fields
  additionalPrinterColumnsUndefinedValues:
    
    - key: Labels
      value: "-"
    
    - key: Pod Selector
      value: "-"

  # Stable identifier used by frontend mapping
  id: stock-cluster-/apps/v1/deployments
