metadata:
  # Name of this CustomColumnsOverride resource
  name: factory-apps.v1.replicasets
spec:
  # Table columns rendered in the resource list
  additionalPrinterColumns:
    # =================================================
    # Column: Name
    # =================================================
    - name: Name
      type: factory
      
      jsonPath: .metadata.name
      customProps:
        disableEventBubbling: true
        items:
          - type: antdFlex
            data:
              id: resource-badge-link-row
              align: center
              direction: row
              gap: 6
            children:
              - type: ResourceBadge
                data:
                  id: example-resource-badge
                  value: "{reqsJsonPath[0]['.kind']['-']}"
              - type: antdLink
                data:
                  id: name-link
                  href: "/openapi-ui/{2}/{reqsJsonPath[0]['.metadata.namespace']['-']}/factory/replicaset-details/apps/v1/replicasets/{reqsJsonPath[0]['.metadata.name']['-']}"
                  text: "{reqsJsonPath[0]['.metadata.name']['-']}"
    # =================================================
    # Column: Labels
    # =================================================
    - name: Labels
      type: factory
      
      jsonPath: .metadata.labels
      customProps:
        disableEventBubbling: true
        items:
          - type: Labels
            data:
              id: labels-editor
              reqIndex: 0
              jsonPathToLabels: .metadata.labels
              endpoint: "/api/clusters/{2}/k8s/apis/apps/v1/namespaces/{3}/replicasets/{6}"
              pathToValue: /metadata/labels
              linkPrefix: "/openapi-ui/{2}/{3}/search?kinds=apps~v1~replicasets"
              inputLabel: "false"
              modalTitle: Edit labels
              modalDescriptionText: ""
              editModalWidth: 650
              maxEditTagTextLength: 35
              paddingContainerEnd: 24px
              notificationSuccessMessage: Updated successfully
              notificationSuccessMessageDescription: Labels have been updated
              selectProps:
                maxTagTextLength: 35
              readOnly: true
              verticalViewList: true
    # =================================================
    # Column: Pod Selector
    # =================================================
    - name: Pod Selector
      type: factory
      
      jsonPath: .spec.template.metadata.labels
      customProps:
        disableEventBubbling: true
        items:
          - type: LabelsToSearchParams
            data:
              id: pod-to-search-params
              reqIndex: 0
              jsonPathToLabels: .spec.template.metadata.labels
              linkPrefix: "/openapi-ui/{2}/{3}/search?kinds=~v1~pods"
              errorText: No selector
              maxTextLength: 11
              # textLink: Search
              renderLabelsAsRows: true
    # =================================================
    # Column: ownerRef
    # =================================================
    - name: ownerRef
      type: factory
      
      jsonPath: .metadata.ownerReferences
      customProps:
        disableEventBubbling: true
        items:
          - type: OwnerRefs
            data:
              id: refs
              reqIndex: 0
              cluster: "{2}"
              baseprefix: /openapi-ui
              forcedNamespace: "{reqsJsonPath[0]['.metadata.namespace']['-']}"
              jsonPathToArrayOfRefs: .metadata.ownerReferences
              errorText: error getting refs
              notArrayErrorText: refs on path are not arr
              emptyArrayErrorText: "-"
              isNotRefsArrayErrorText: objects in arr are not refs
              baseFactoryClusterSceopedAPIKey: base-factory-clusterscoped-api
              baseFactoryClusterSceopedBuiltinKey: base-factory-clusterscoped-builtin
              baseFactoryNamespacedAPIKey: base-factory-namespaced-api
              baseFactoryNamespacedBuiltinKey: base-factory-namespaced-builtin
              baseNamespaceFactoryKey: namespace-details
              baseNavigationPlural: navigations
              baseNavigationName: navigation
    # =================================================
    # Column: Created
    # =================================================
    - name: Created
      type: factory
      
      jsonPath: .metadata.creationTimestamp
      customProps:
        disableEventBubbling: true
        items:
          - type: antdFlex
            data:
              id: time-block
              align: center
              gap: 6
            children:
              - type: antdText
                data:
                  id: time-icon
                  text: "🌐"
              - type: parsedText
                data:
                  id: time-value
                  formatter: timestamp
                  text: "{reqsJsonPath[0]['.metadata.creationTimestamp']['-']}"

  # Trim long values for selected columns
  additionalPrinterColumnsTrimLengths:
    
    - key: Name
      value: 64
    
    - key: Labels
      value: 1

  # Fallback values for empty or missing fields
  additionalPrinterColumnsUndefinedValues:
    
    - key: Labels
      value: "-"

  # Stable identifier used by frontend mapping
  id: factory-/apps/v1/replicasets
