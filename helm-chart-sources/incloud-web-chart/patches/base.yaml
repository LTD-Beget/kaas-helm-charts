                                          vertical: true
                                        children:
                                          - type: antdFlex
                                            data:
                                              gap: 4
                                              id: min-available-block
                                              vertical: true
                                            children:
                                              - type: antdText
                                                data:
                                                  id: min-available-label
                                                  strong: true
                                                  text: Min available
                                              - type: parsedText
                                                data:
                                                  id: min-available-value
                                                  text: "{reqsJsonPath[0]['.items.0.spec.minAvailable']['Not configured']}"
                          
                                          - type: antdFlex
                                            data:
                                              gap: 4
                                              id: max-unavailable-block
                                              vertical: true
                                            children:
                                              - type: antdText
                                                data:
                                                  id: max-unavailable-label
                                                  strong: true
                                                  text: Max unavailable
                                              - type: parsedText
                                                data:
                                                  id: max-unavailable-value
                                                  text: "{reqsJsonPath[0]['.items.0.spec.maxUnavailable']['Not configured']}"
                          
                                  # RIGHT COLUMN — Status
                                  - type: antdCol
                                    data:
                                      id: poddisruptionbudget-col-right
                                      span: 12
                                      xs: 24
                                      xl: 12
                                    children:
                                      # Card title with icon
                                      - type: DefaultDiv
                                        data:
                                          id: poddisruptionbudget-status-card-title
                                          style:
                                            display: flex
                                            gap: 12px
                                            marginBottom: 12px
                                            alignItems: center
                                        children:
                                          - type: antdIcons
                                            data:
                                              id: poddisruptionbudget-status-icon
                                              iconName: CheckCircleOutlined
                                              iconProps:
                                                size: 24
                                                style:
                                                  fontSize: 24
                                                  color: token.colorInfo
                                          - type: antdText
                                            data:
                                              id: poddisruptionbudget-status-title-text
                                              text: "Status"
                                              style:
                                                fontSize: 16px
                                                lineHeight: 24px
                          
                                      - type: antdRow
                                        data:
                                          gutter: [24, 12]
                                          id: poddisruptionbudget-status-grid
                                        children:
                                          # LEFT STATUS COLUMN
                                          - type: antdCol
                                            data:
                                              id: poddisruptionbudget-status-col-left
                                              span: 12
                                              xs: 24
                                              xl: 12
                                            children:
                                              - type: antdFlex
                                                data:
                                                  gap: 12
                                                  vertical: true
                                                children:
                                                  - type: antdFlex
                                                    data:
                                                      gap: 4
                                                      id: disruptions-allowed-block
                                                      vertical: true
                                                    children:
                                                      - type: antdText
                                                        data:
                                                          id: disruptions-allowed-label
                                                          strong: true
                                                          text: Disruptions allowed
                                                      - type: parsedText
                                                        data:
                                                          id: disruptions-allowed-value
                                                          text: "{reqsJsonPath[0]['.items.0.status.disruptionsAllowed']['0']}"
                          
                                                  - type: antdFlex
                                                    data:
                                                      gap: 4
                                                      id: current-healthy-block
                                                      vertical: true
                                                    children:
                                                      - type: antdText
                                                        data:
                                                          id: current-healthy-label
                                                          strong: true
                                                          text: Current healthy
                                                      - type: parsedText
                                                        data:
                                                          id: current-healthy-value
                                                          text: "{reqsJsonPath[0]['.items.0.status.currentHealthy']['0']}"
                          
                                                  - type: VisibilityContainer
                                                    data:
                                                      id: condition-status-visibility
                                                      value: '{reqsJsonPath[0][".items.0.status.conditions"]}'
                                                    children:
                                                      - type: antdFlex
                                                        data:
                                                          gap: 4
                                                          id: condition-status-block
                                                          vertical: true
                                                        children:
                                                          - type: antdText
                                                            data:
                                                              id: condition-status-label
                                                              strong: true
                                                              text: Condition status
                                                          - type: parsedText
                                                            data:
                                                              id: condition-status-value
                                                              text: "{reqsJsonPath[0]['.items.0.status.conditions.0.status']['Not reported']}"
                                                          
                                          # RIGHT STATUS COLUMN
                                          - type: antdCol
                                            data:
                                              id: poddisruptionbudget-status-col-right
                                              span: 12
                                              xs: 24
                                              xl: 12
                                            children:
                                              - type: antdFlex
                                                data:
                                                  gap: 12
                                                  vertical: true
                                                children:
                                                  - type: antdFlex
                                                    data:
                                                      gap: 4
                                                      id: desired-healthy-block
                                                      vertical: true
                                                    children:
                                                      - type: antdText
                                                        data:
                                                          id: desired-healthy-label
                                                          strong: true
                                                          text: Desired healthy
                                                      - type: parsedText
                                                        data:
                                                          id: desired-healthy-value
                                                          text: "{reqsJsonPath[0]['.items.0.status.desiredHealthy']['0']}"
                          
                                                  - type: antdFlex
                                                    data:
                                                      gap: 4
                                                      id: expected-pods-block
                                                      vertical: true
                                                    children:
                                                      - type: antdText
                                                        data:
                                                          id: expected-pods-label
                                                          strong: true
                                                          text: Expected pods
                                                      - type: parsedText
                                                        data:
                                                          id: expected-pods-value
                                                          text: "{reqsJsonPath[0]['.items.0.status.expectedPods']['0']}"

                  # =========================
                  # Conditions (only when present)
                  # =========================
                  
                  # Visibility wrapper for conditions card (renders only when conditions exist)
                  - type: VisibilityContainer
                    data:
                      id: conditions-visibility-guard
                      value: '{reqsJsonPath[0][".items.0.status.conditions"]}'
                    children:
                      
                      # Content card with resource conditions table
                      - type: ContentCard
                        data:
                          id: conditions-card
                          title: Conditions
                        children:
                      
                          # =========================
                          # Header: icon + title
                          # =========================
                          - type: DefaultDiv
                            data:
                              id: conditions-card-title
                              style:
                                display: flex
                                gap: 12px
                                marginBottom: 12px
                                alignItems: center
                            children:
                              - type: antdIcons
                                data:
                                  id: conditions-info-icon
                                  iconName: CheckCircleOutlined
                                  iconProps:
                                    size: 24
                                    color: token.colorInfo
                                    style:
                                      fontSize: 24
                                      color: token.colorInfo
                      
                              - type: antdText
                                data:
                                  id: conditions-title-text
                                  text: "Conditions"
                                  style:
                                    fontSize: 16px
                                    lineHeight: 24px
                      
                          # =========================
                          # Conditions table
                          # =========================
                          - type: EnrichedTable
                            data:
                              baseprefix: /openapi-ui
                              cluster: '{2}'
                              customizationId: factory-status-conditions
                              id: conditions-table
                              pathToItems: .items.0.status.conditions
                              withoutControls: true
                      
                              # K8s resource to fetch conditions from
                              k8sResourceToFetch:
                                
                                    apiGroup: '{6}'
                                    apiVersion: '{7}'
                                    cluster: '{2}'
                                    namespace: '{3}'
                                    plural: '{8}'
                      
                              # Field selector to bind conditions to a concrete resource
                              fieldSelector:
                                
                                    metadata.name: '{9}'

          # =========================
          # YAML TAB
          # =========================
          - key: yaml
            label: YAML
            children:
              
              - type: ContentCard
                data:
                  id: yaml-editor-card
                  style:
                    marginBottom: 24px
                children:
                  - type: YamlEditorSingleton
                    data:
                      id: yaml-editor
              
                      # =========================
                      # Base editor configuration
                      # =========================
              
                      # Request index used to prefill editor with fetched resource
                      prefillValuesRequestIndex: 0
              
                      # Height subtracted from viewport to fit layout
                      substractHeight: 350
              
                      # JSONPath to resource root in API response
                      pathToData: .items.0
              
                      # Indicates whether resource is namespaced or cluster-scoped
                      isNameSpaced: true
              
                      # Editor mode/type (e.g. "api", "builtin")
                      type: api
              
                      # =========================
                      # API target (resource addressing)
                      # =========================
                      # Defines Kubernetes API location for resource CRUD
                      
                      apiGroup: '{6}'
                      apiVersion: '{7}'
                      cluster: '{2}'
                      namespace: '{3}'
                      plural: '{8}'
              
                      # =========================
                      # Permission context
                      # =========================
                      # Used by UI to validate RBAC permissions for edit actions
                      permissionContext:
                        
                        apiGroup: '{6}'
                        apiVersion: '{7}'
                        cluster: '{2}'
                        namespace: '{3}'
                        plural: '{8}'

          # =========================
          # PODS TAB
          # =========================
          - key: pods
            label: Pods
            children:
              # Related Pods list
              - type: ContentCard
                data:
                  id: pod-list-card
                  style:
                    marginBottom: 24px
                children:
                  - type: EnrichedTable
                    data:
                      id: pods-table
                      baseprefix: /openapi-ui
                      cluster: "{2}"
                      customizationId: "factory-/v1/pods"
              
                      k8sResourceToFetch:
                        apiVersion: "v1"
                        plural: "pods"
                        namespace: "{3}"
              
                      dataForControls:
                        cluster: "{2}"
                        apiVersion: "v1"
                        plural: "pods"
                        namespace: "{3}"
              
                      # Label selector (optional)
                      labelSelectorFull:
                        pathToLabels: .items.0.spec.selector.matchLabels
                        reqIndex: 0
              
                      # Field selector (optional)
              
                      pathToItems: ".items"
              
                      additionalReqsDataToEachItem:
                        - 1

          # =========================
          # EVENTS TAB
          # =========================
          - key: events
            label: Events
            children:
              # Kubernetes events related to this resource
              
              - type: ContentCard
                data:
                  id: details-card
                  style:
                    marginBottom: 24px
                children:
                  - type: Events
                    data:
                      id: events
              
                      # =========================
                      # Base configuration
                      # =========================
              
                      # Base UI prefix for resource links
                      baseprefix: "/openapi-ui"
              
                      # Target cluster identifier
                      cluster: "{2}"
              
                      # WebSocket endpoint for live events stream
                      wsUrl: "/api/clusters/{2}/openapi-bff-ws/events/eventsWs"
              
                      # Pagination and layout tuning
                      pageSize: 50
                      limit: 40
                      substractHeight: 315
              
                      # =========================
                      # Field selector: bind events to current resource
                      # =========================
                      fieldSelector:
                        regarding.kind: "{reqsJsonPath[0]['.items.0.kind']['-']}"
                        regarding.name: "{reqsJsonPath[0]['.items.0.metadata.name']['-']}"
                        regarding.namespace: "{reqsJsonPath[0]['.items.0.metadata.namespace']['-']}"
                        regarding.apiVersion: "{reqsJsonPath[0]['.items.0.apiVersion']['-']}"
                      # =========================
                      # Factory routing keys
                      # =========================
                      # Used to navigate from Event objects to resource details pages
                      baseFactoryNamespacedAPIKey: base-factory-namespaced-api
                      baseFactoryClusterSceopedAPIKey: base-factory-clusterscoped-api
                      baseFactoryNamespacedBuiltinKey: base-factory-namespaced-builtin
                      baseFactoryClusterSceopedBuiltinKey: base-factory-clusterscoped-builtin
                      baseNamespaceFactoryKey: namespace-details
---
# Source: incloud-web-chart/charts/incloud-web-chart/templates/factory/default/replicaset-details.yaml
apiVersion: front.in-cloud.io/v1alpha1
kind: Factory
metadata:
  name: replicaset-details

spec:
  key: replicaset-details

  # =========================
  # Data sources
  # =========================
  urlsToFetch:
    # Fetch selected resource by name from target cluster
    # Primary resource request (from shared factory context)
    - apiGroup: '{6}'
      apiVersion: '{7}'
      cluster: '{2}'
      fieldSelector: metadata.name={9}
      namespace: '{3}'
      plural: '{8}'

    # Related pods metrics request (metrics.k8s.io)
    - apiGroup: metrics.k8s.io
      apiVersion: v1beta1
      cluster: '{2}'
      namespace: '{3}'
      plural: pods


  # Disable scroll wrapper for main content card
  withScrollableMainContentCard: false

  # =========================
  # Sidebar tags for navigation
  # =========================
  sidebarTags:
    # Used to group resources in sidebar navigation
    - '{6}/{7}/{8}'

  # =========================
  # Page layout
  # =========================
  data:

    # =========================
    # Header row (resource title + actions)
    # =========================
    - type: antdFlex
      data:
        id: header-row
        align: center
        justify: space-between
        style:
          marginBottom: 24px
      children:

        # =========================
        # LEFT SIDE: Resource identity
        # =========================
        - type: antdFlex
          data:
            align: center
            gap: 6
          children:
            
            # =========================
            # Resource kind badge
            # =========================
            - type: ResourceBadge
              data:
                id: factory-resource-badge
                style:
                  fontSize: 20px
                value: '{reqsJsonPath[0][".items.0.kind"]["-"]}'
            
            # =========================
            # Resource name dropdown with redirect
            # =========================
            - type: DropdownRedirect
              data:
                # K8s resource addressing (parameterized)
                
                apiGroup: '{6}'
                apiVersion: '{7}'
                cluster: '{2}'
                namespace: '{3}'
                plural: '{8}'
            
                currentValue: "{reqsJsonPath[0]['.items.0.metadata.name']['Select item...']}"
                id: resource-name-dropdown
                jsonPath: .metadata.name
                placeholder: Select item...
                popupMatchSelectWidth: 350
            
                # Redirect URL template (parameterized)
                redirectUrl: "/openapi-ui/{2}/{3}/factory/{5}/{6}/{7}/{8}/{chosenEntryValue}"
            
            # =========================
            # Copy resource name action
            # =========================
            - type: CopyButton
              data:
                id: copy-resource-name
                copyText: "{reqsJsonPath[0]['.items.0.metadata.name']['-']}"
                successMessage: Name copied to clipboard.
                tooltip: Copy {reqsJsonPath[0]['.items.0.kind']['-']} name

        # =========================
        # RIGHT SIDE: Resource actions dropdown
        # =========================
        - type: ActionsDropdown
          data:
            id: resource-actions
            buttonText: Actions
            actions:

              # ---- Edit resource manifest ----
              
              - type: edit
                props:
                  # =========================
                  # UI metadata
                  # =========================
                  text: Edit
                  icon: EditOutlined
              
                  # =========================
                  # PERMISSION CHECK
                  # =========================
                  permissionContext:
                    
                    apiGroup: '{6}'
                    apiVersion: '{7}'
                    cluster: '{2}'
                    namespace: '{3}'
                    plural: '{8}'
              
                  # =========================
                  # API target (resource addressing)
                  # =========================
                  
                  apiGroup: '{6}'
                  apiVersion: '{7}'
                  cluster: '{2}'
                  name: '{reqsJsonPath[0][''.items.0.metadata.name''][''-'']}'
                  namespace: '{3}'
                  plural: '{8}'
              
                  # =========================
                  # Target resource identity
                  # =========================
              
                  # =========================
                  # Navigation prefix
                  # =========================
                  baseprefix: /openapi-ui

              # ---- Edit labels ----
              
              - type: editLabels
                props:
                  # =========================
                  # UI metadata
                  # =========================
                  text: Edit Labels
                  icon: TagsOutlined
              
                  # =========================
                  # PERMISSION CHECK
                  # =========================
                  permissionContext:
                    
                    apiGroup: '{6}'
                    apiVersion: '{7}'
                    cluster: '{2}'
                    namespace: '{3}'
                    plural: '{8}'
              
                  # =========================
                  # Data binding
                  # =========================
                  reqIndex: "0"
                  jsonPathToLabels: ".items.0.metadata.labels"
              
                  # =========================
                  # API endpoint (parameterized)
                  # =========================
                  endpoint: "/api/clusters/{2}/k8s/apis/{6}/{7}/namespaces/{3}/{8}/{reqsJsonPath[0]['.items.0.metadata.name']['-']}"
              
                  # =========================
                  # Patch configuration
                  # =========================
                  pathToValue: "/metadata/labels"
              
                  # =========================
                  # Modal configuration
                  # =========================
                  modalTitle: Edit Labels
                  editModalWidth: 650
                  paddingContainerEnd: "24px"
                  maxEditTagTextLength: 35

              # ---- Edit annotations ----
              
              - type: editAnnotations
                props:
                  # =========================
                  # UI metadata
                  # =========================
                  text: Edit Annotations
                  icon: FileTextOutlined
              
                  # =========================
                  # PERMISSION CHECK
                  # =========================
                  permissionContext:
                    
                    apiGroup: '{6}'
                    apiVersion: '{7}'
                    cluster: '{2}'
                    namespace: '{3}'
                    plural: '{8}'
              
                  # =========================
                  # API endpoint (parameterized)
                  # =========================
                  endpoint: "/api/clusters/{2}/k8s/apis/{6}/{7}/namespaces/{3}/{8}/{reqsJsonPath[0]['.items.0.metadata.name']['-']}"
              
                  # =========================
                  # Data binding
                  # =========================
                  reqIndex: "0"
                  jsonPathToObj: ".items.0.metadata.annotations"
              
                  # =========================
                  # Patch configuration
                  # =========================
                  pathToValue: "/metadata/annotations"
              
                  # =========================
                  # Modal configuration
                  # =========================
                  modalTitle: Edit Annotations
                  cols: [11, 11, 2]
                  editModalWidth: 800px
              - type: rolloutRestart
                props:
                  # =========================
                  # UI metadata
                  # =========================
                  text: Rollout Restart
                  icon: ReloadOutlined
              
                  # =========================
                  # PERMISSION CHECK
                  # =========================
                  permissionContext:
                    
                    apiGroup: '{6}'
                    apiVersion: '{7}'
                    cluster: '{2}'
                    namespace: '{3}'
                    plural: '{8}'
              
                  # =========================
                  # API endpoint (parameterized)
                  # =========================
                  endpoint: "/api/clusters/{2}/k8s/apis/{6}/{7}/namespaces/{3}/{8}/{reqsJsonPath[0]['.items.0.metadata.name']['-']}"

              # ---- Delete resource ----
              
              - type: delete
                props:
                  # =========================
                  # UI metadata
                  # =========================
                  text: Delete
                  icon: DeleteOutlined
                  danger: true
              
                  # =========================
                  # PERMISSION CHECK
                  # =========================
                  permissionContext:
                    
                    apiGroup: '{6}'
                    apiVersion: '{7}'
                    cluster: '{2}'
                    namespace: '{3}'
                    plural: '{8}'
              
                  # =========================
                  # API endpoint (parameterized)
                  # =========================
                  endpoint: "/api/clusters/{2}/k8s/apis/{6}/{7}/namespaces/{3}/{8}/{reqsJsonPath[0]['.items.0.metadata.name']['-']}"
              
                  # =========================
                  # Target resource identity
                  # =========================
                  name: "{reqsJsonPath[0]['.items.0.metadata.name']['-']}"
              
                  # =========================
                  # Post-delete redirect (parameterized)
                  # =========================
                  redirectTo: "/openapi-ui/{2}/{3}/api-table/{6}/{7}/{8}"

    # =========================
    # Tabs root
    # =========================
    - type: antdTabs
      data:
        id: tabs-root
        defaultActiveKey: details
        items:

          # =========================
          # DETAILS TAB
          # =========================
          - key: details
            label: Details
            children:
              - type: antdFlex
                data:
                  id: details-stack
                  vertical: true
                  gap: 24
                children:

                  # ---- Row 1: Resource info + Metadata counters ----
                  
                  # Reusable row with resource info (left) and metadata counters (right).
                  # Expected params:
                  # - namespaced (required)
                  # - endpoint / permissionContext (required for default metadata template)
                  # - metadataTemplate (optional, default: metadataCounters)
                  # - fieldSelector / k8sResourceToFetch (optional, used by custom metadata templates)
                  # - withResponsive (optional, default: true)
                  - type: antdRow
                    data:
                      # Keep vertical gap when columns collapse to stacked layout on smaller widths/zoom.
                      gutter: [24, 24]
                    children:
                      - type: antdCol
                        data:
                          span: 12
                          xs: 24
                          xl: 12
                        children:
                          
                          - type: ContentCard
                            data:
                              id: resource-info-card
                            children:
                          
                              # =========================
                              # Header: icon + title
                              # =========================
                              - type: DefaultDiv
                                data:
                                  id: resource-info-card-title
                                  style:
                                    display: flex
                                    gap: 12px
                                    marginBottom: 12px
                                    alignItems: center
                                children:
                                  - type: antdIcons
                                    data:
                                      id: resource-info-icon
                                      iconName: InfoCircleOutlined
                                      iconProps:
                                        size: 24
                                        color: token.colorInfo
                                        style:
                                          fontSize: 24
                                          color: token.colorInfo
                          
                                  - type: parsedText
                                    data:
                                      id: resource-info-title-text
                                      text: "{reqsJsonPath[0]['.items.0.kind']['-']} Info"
                                      style:
                                        fontSize: 16px
                                        lineHeight: 24px
                          
                              # =========================
                              # Main content grid
                              # =========================
                              - type: antdRow
                                data:
                                  gutter: [24, 0]
                                children:
                          
                                  # -------------------------
                                  # Created
                                  # -------------------------
                                  - type: antdCol
                                    data:
                                      span: 8
                                      id: resource-info-col-created
                                    children:
                                      - type: antdFlex
                                        data: { vertical: true, gap: 4 }
                                        children:
                                          - type: antdText
                                            data:
                                              strong: true
                                              text: Created
                                          - type: parsedText
                                            data:
                                              formatter: timestamp
                                              text: "{reqsJsonPath[0]['.items.0.metadata.creationTimestamp']['-']}"
                          
                                  # -------------------------
                                  # Namespace
                                  # -------------------------
                                  - type: antdCol
                                    data:
                                      span: 8
                                      id: resource-info-col-namespace
                                    children:
                                      - type: antdFlex
                                        data: { vertical: true, gap: 4 }
                                        children:
                                          - type: antdText
                                            data:
                                              id: meta-namespace-label
                                              strong: true
                                              text: Namespace
                                          - type: antdFlex
                                            data:
                                              id: namespace-badge-link-row
                                              align: center
                                              direction: row
                                              gap: 6
                                            children:
                                              - type: ResourceBadge
                                                data:
                                                  id: namespace-resource-badge
                                                  value: Namespace
                                              - type: antdLink
                                                data:
                                                  id: namespace-link
                                                  href: /openapi-ui/{2}/factory/namespace-details/v1/namespaces/{reqsJsonPath[0]['.items.0.metadata.namespace']['-']}
                                                  text: '{reqsJsonPath[0][".items.0.metadata.namespace"]["-"]}'
                          
                                  # -------------------------
                                  # OwnerRefs
                                  # -------------------------
                          
                                  - type: antdCol
                                    data:
                                      span: 8
                                      id: resource-info-col-ownerrefs
                                    children:
                                      - type: VisibilityContainer
                                        data:
                                          id: ds-init-containers-container
                                          value: "{reqsJsonPath[0]['.items.0.metadata.ownerReferences']['-']}"
                                          style:
                                            margin: 0
                                            padding: 0
                                        children:
                                          - type: antdFlex
                                            data:
                                              id: ref-link-block
                                              vertical: true
                                              gap: 8
                                            children:
                                              - type: antdText
                                                data:
                                                  id: meta-ref
                                                  text: OwnerRef
                                                  strong: true
                          
                                              - type: OwnerRefs
                                                data:
                                                  id: refs
                                                  baseprefix: /openapi-ui
                                                  cluster: '{2}'
