                  # =========================
                  endpoint: "/api/clusters/{2}/k8s/api/{6}/namespaces/{3}/{7}/{reqsJsonPath[0]['.items.0.metadata.name']['-']}"
              
                  # =========================
                  # Target resource identity
                  # =========================
                  name: "{reqsJsonPath[0]['.items.0.metadata.name']['-']}"
              
                  # =========================
                  # Post-delete redirect (parameterized)
                  # =========================
                  redirectTo: "/openapi-ui/{2}/{3}/builtin-table/{7}?resources=metrics.k8s.io/v1beta1/pods"

    # =========================
    # Tabs root
