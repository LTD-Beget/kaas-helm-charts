# Source: incloud-web-chart/charts/incloud-web-chart/templates/factory/base/base-factory-namespaced-builtin.yaml
apiVersion: front.in-cloud.io/v1alpha1
kind: Factory
metadata:
  name: base-factory-namespaced-builtin

spec:
  key: base-factory-namespaced-builtin

  # =========================
  # Data sources
  # =========================
