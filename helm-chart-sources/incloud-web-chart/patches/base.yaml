apiVersion: apps/v1
kind: Deployment
metadata:
  # Full release-specific name for the deployment
  name: incloud-web-chart-incloud-web-chart
  namespace: default
  labels:
    # Standard Helm chart and application labels
    helm.sh/chart: incloud-web-chart-1.3.0-9b1cdc4
    app.kubernetes.io/name: incloud-web-chart
    app.kubernetes.io/instance: incloud-web-chart
    app.kubernetes.io/version: main-19509fe
    app.kubernetes.io/managed-by: Helm
spec:
  # Desired number of replicas
  replicas: 1

  selector:
    matchLabels:
      # Label selector to match pods of this deployment
      app.kubernetes.io/instance: incloud-web-chart
      app.kubernetes.io/name: "web"

  strategy:
    # Rolling update strategy configuration
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1

  template:
    metadata:
      labels:
        # Base pod labels
        app.kubernetes.io/instance: incloud-web-chart
        app.kubernetes.io/name: "web"
        # Additional pod labels from values.yaml
        # Extra labels from extraTemplateMetadata.labels
      annotations:
        checksum/configmap: 100d9b4d196e06fd8212626a333ab830dbd20ad88126e7382a112eba193754c0
        # Pod annotations
        # Extra annotations from extraTemplateMetadata.annotations

    spec:
      # ServiceAccount used by the pod
      serviceAccountName: incloud-web-chart-incloud-web-chart

      # Priority class for scheduling
      priorityClassName: "system-cluster-critical"

      # Pod-level security context (render only when enabled; drop 'enabled' key)
      securityContext:
        fsGroup: 101
        fsGroupChangePolicy: OnRootMismatch

      # Image pull secrets

      # Networking and scheduling options
      dnsPolicy: ClusterFirst
      hostNetwork: false
      hostPID: false
      hostIPC: false
      enableServiceLinks: false
      schedulerName: "default-scheduler"

      # Node placement
      tolerations:
        - effect: NoSchedule
          key: node-role.kubernetes.io/control-plane
          operator: Exists
        - effect: NoSchedule
          key: node-role.kubernetes.io/master
          operator: Exists
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - topologyKey: kubernetes.io/hostname
              labelSelector:
                matchLabels:
                  app.kubernetes.io/instance: incloud-web-chart
                  app.kubernetes.io/name: "web"

      # Volumes: user-defined + NGINX config (if enabled)
      volumes:
        # User-defined volumes
        # NGINX config from ConfigMap
        - name: configuration-nginx-file
          configMap:
            defaultMode: 420
            name: incloud-web-chart-incloud-web-chart-nginx-config

      containers:
        # -------------------- BFF Container --------------------
        - name: bff
          image: "prorobotech/openapi-ui-k8s-bff:release-1.3.0-3f37f37a"
          imagePullPolicy: IfNotPresent

          # Ports
          ports:
            - name: http
              containerPort: 8082
              protocol: TCP

          # Env
          env:
            
            - name: BASE_ALLOWED_AUTH_HEADERS
              value: "user-agent,accept,content-type,origin,referer,accept-encoding,cookie,authorization"
            - name: BASE_API_GROUP
              value: "front.in-cloud.io"
            - name: BASE_API_VERSION
              value: "v1alpha1"
            - name: BASE_FACTORY_CLUSTERSCOPED_API_KEY
              value: "base-factory-clusterscoped-api"
