# Source: incloud-web-chart/charts/incloud-web-chart/templates/factory/default/deployment-details.yaml
apiVersion: front.in-cloud.io/v1alpha1
kind: Factory
metadata:
  name: deployment-details

spec:
  key: deployment-details

  # =========================
  # Data sources
  # =========================
  urlsToFetch:
    # Fetch selected resource by name from target cluster
    # Primary resource request (from shared factory context)
    - apiGroup: '{6}'
      apiVersion: '{7}'
      cluster: '{2}'
      fieldSelector: metadata.name={9}
      namespace: '{3}'
      plural: '{8}'

    # Related pods metrics request (metrics.k8s.io)
    - apiGroup: metrics.k8s.io
      apiVersion: v1beta1
      cluster: '{2}'
      namespace: '{3}'
      plural: pods


  # Disable scroll wrapper for main content card
  withScrollableMainContentCard: false

  # =========================
  # Sidebar tags for navigation
  # =========================
  sidebarTags:
    # Used to group resources in sidebar navigation
    - '{6}/{7}/{8}'

  # =========================
  # Page layout
  # =========================
  data:

    # =========================
    # Header row (resource title + actions)
    # =========================
    - type: antdFlex
      data:
        id: header-row
        align: center
        justify: space-between
        style:
          marginBottom: 24px
      children:

        # =========================
        # LEFT SIDE: Resource identity
        # =========================
        - type: antdFlex
          data:
            align: center
            gap: 6
          children:
            
            # =========================
            # Resource kind badge
            # =========================
            - type: ResourceBadge
              data:
                id: factory-resource-badge
                style:
                  fontSize: 20px
                value: '{reqsJsonPath[0][".items.0.kind"]["-"]}'
            
            # =========================
            # Resource name dropdown with redirect
            # =========================
            - type: DropdownRedirect
              data:
                # K8s resource addressing (parameterized)
                
                apiGroup: '{6}'
                apiVersion: '{7}'
                cluster: '{2}'
                namespace: '{3}'
                plural: '{8}'
            
                currentValue: "{reqsJsonPath[0]['.items.0.metadata.name']['Select item...']}"
                id: resource-name-dropdown
                jsonPath: .metadata.name
                placeholder: Select item...
                popupMatchSelectWidth: 350
            
                # Redirect URL template (parameterized)
                redirectUrl: "/openapi-ui/{2}/{3}/factory/{5}/{6}/{7}/{8}/{chosenEntryValue}"
            
            # =========================
            # Copy resource name action
            # =========================
            - type: CopyButton
              data:
                id: copy-resource-name
                copyText: "{reqsJsonPath[0]['.items.0.metadata.name']['-']}"
                successMessage: Name copied to clipboard.
                tooltip: Copy {reqsJsonPath[0]['.items.0.kind']['-']} name
            # Deployment availability badge
            - type: DefaultDiv
              data:
                id: node-status-badge
                style:
                  display: inline-flex
                  alignItems: center
                  gap: 6px
                  fontSize: 13
                  fontWeight: 500
                  color: "#065f46"
              children:
                # Deployment availability indicator
                - type: StatusText
                  data:
                    id: header-status
                    # 1) Collect all possible Deployment conditions
                    values:
                      - "{reqsJsonPath[0]['.items.0.status.conditions[*].reason']['-']}"
                
                    # 2) Criteria: positive / negative; neutral goes to fallback
                    criteriaSuccess: equals
                    valueToCompareSuccess:
                      # Positive reasons
                      - "MinimumReplicasAvailable"     # Available: all replicas are healthy
                      - "NewReplicaSetAvailable"       # Progressing: new RS serves traffic
                      - "ReplicaSetUpdated"            # Progressing: RS is updated/synced
                      - "Complete"                     # Update completed successfully
                
                    criteriaError: equals
                    valueToCompareError:
                      # Negative reasons
                      - "DeploymentReplicaFailure"     # General replica failure
                      - "FailedCreate"                 # Failed to create Pod/RS
                      - "FailedDelete"                 # Failed to delete resource
                      - "FailedScaleUp"                # Failed to scale up
                      - "FailedScaleDown"              # Failed to scale down
                
                    # 3) Texts to display
                    successText:  "Available"
                    errorText:    "Error"
                    fallbackText: "Progressing"
                
                    # Notes on neutral/fallback cases:
                    # - ReplicaSetUpdated        → neutral/positive (update in progress)
                    # - ScalingReplicaSet        → neutral (normal scale up/down)
                    # - Paused / DeploymentPaused→ neutral (manually paused by admin)
                    # - NewReplicaSetCreated     → neutral (new RS created, not yet serving)
                    # - FoundNewReplicaSet       → neutral (RS found, syncing)
                    # - MinimumReplicasUnavailable → neutral (some replicas not ready yet)
                    # - ProgressDeadlineExceeded → error-like, stuck in progress

        # =========================
        # RIGHT SIDE: Resource actions dropdown
        # =========================
        - type: ActionsDropdown
          data:
            id: resource-actions
            buttonText: Actions
            actions:

              # ---- Edit resource manifest ----
              
              - type: edit
                props:
                  # =========================
                  # UI metadata
                  # =========================
                  text: Edit
                  icon: EditOutlined
              
                  # =========================
                  # PERMISSION CHECK
                  # =========================
                  permissionContext:
                    
                    apiGroup: '{6}'
                    apiVersion: '{7}'
                    cluster: '{2}'
                    namespace: '{3}'
                    plural: '{8}'
              
                  # =========================
                  # API target (resource addressing)
                  # =========================
                  
                  apiGroup: '{6}'
                  apiVersion: '{7}'
                  cluster: '{2}'
                  name: '{reqsJsonPath[0][''.items.0.metadata.name''][''-'']}'
                  namespace: '{3}'
                  plural: '{8}'
              
                  # =========================
                  # Target resource identity
                  # =========================
              
                  # =========================
                  # Navigation prefix
                  # =========================
                  baseprefix: /openapi-ui

              # ---- Edit labels ----
              
              - type: editLabels
                props:
                  # =========================
                  # UI metadata
                  # =========================
                  text: Edit Labels
                  icon: TagsOutlined
              
                  # =========================
                  # PERMISSION CHECK
                  # =========================
                  permissionContext:
                    
                    apiGroup: '{6}'
                    apiVersion: '{7}'
                    cluster: '{2}'
                    namespace: '{3}'
                    plural: '{8}'
              
                  # =========================
                  # Data binding
                  # =========================
                  reqIndex: "0"
                  jsonPathToLabels: ".items.0.metadata.labels"
              
                  # =========================
                  # API endpoint (parameterized)
                  # =========================
                  endpoint: "/api/clusters/{2}/k8s/apis/{6}/{7}/namespaces/{3}/{8}/{reqsJsonPath[0]['.items.0.metadata.name']['-']}"
              
                  # =========================
                  # Patch configuration
                  # =========================
                  pathToValue: "/metadata/labels"
              
                  # =========================
                  # Modal configuration
                  # =========================
                  modalTitle: Edit Labels
                  editModalWidth: 650
                  paddingContainerEnd: "24px"
                  maxEditTagTextLength: 35

              # ---- Edit annotations ----
              
              - type: editAnnotations
                props:
                  # =========================
                  # UI metadata
                  # =========================
                  text: Edit Annotations
                  icon: FileTextOutlined
              
                  # =========================
                  # PERMISSION CHECK
                  # =========================
                  permissionContext:
                    
                    apiGroup: '{6}'
                    apiVersion: '{7}'
                    cluster: '{2}'
                    namespace: '{3}'
                    plural: '{8}'
              
                  # =========================
                  # API endpoint (parameterized)
                  # =========================
                  endpoint: "/api/clusters/{2}/k8s/apis/{6}/{7}/namespaces/{3}/{8}/{reqsJsonPath[0]['.items.0.metadata.name']['-']}"
              
                  # =========================
                  # Data binding
                  # =========================
                  reqIndex: "0"
                  jsonPathToObj: ".items.0.metadata.annotations"
              
                  # =========================
                  # Patch configuration
                  # =========================
                  pathToValue: "/metadata/annotations"
              
                  # =========================
                  # Modal configuration
                  # =========================
                  modalTitle: Edit Annotations
                  cols: [11, 11, 2]
                  editModalWidth: 800px
              - type: suspend
                props:
                  # =========================
                  # UI metadata
                  # =========================
                  text: Suspend
                  icon: PauseCircleOutlined
              
                  # =========================
                  # PERMISSION CHECK
                  # =========================
                  permissionContext:
                    
                    apiGroup: '{6}'
                    apiVersion: '{7}'
                    cluster: '{2}'
                    namespace: '{3}'
                    plural: '{8}'
              
                  # =========================
                  # API endpoint (parameterized)
                  # =========================
                  endpoint: "/api/clusters/{2}/k8s/apis/{6}/{7}/namespaces/{3}/{8}/{reqsJsonPath[0]['.items.0.metadata.name']['-']}"
              
                  # =========================
                  # Patch configuration
                  # =========================
                  pathToValue: "/spec/paused"
                  value: true
              
                  # =========================
                  # Visibility rules
                  # =========================
                  visibleWhen:
                    criteria: notEquals
                    value: "{reqsJsonPath[0]['.items.0.spec.paused']['-']}"
                    valueToCompare: "true"
              - type: resume
                props:
                  # =========================
                  # UI metadata
                  # =========================
                  text: Resume
                  icon: PlayCircleOutlined
              
                  # =========================
                  # PERMISSION CHECK
                  # =========================
                  permissionContext:
                    
                    apiGroup: '{6}'
                    apiVersion: '{7}'
                    cluster: '{2}'
                    namespace: '{3}'
                    plural: '{8}'
              
                  # =========================
                  # API endpoint (parameterized)
                  # =========================
                  endpoint: "/api/clusters/{2}/k8s/apis/{6}/{7}/namespaces/{3}/{8}/{reqsJsonPath[0]['.items.0.metadata.name']['-']}"
              
                  # =========================
                  # Patch configuration
                  # =========================
                  pathToValue: "/spec/paused"
                  value: false
              
                  # =========================
                  # Visibility rules
                  # =========================
                  visibleWhen:
                    criteria: equals
                    value: "{reqsJsonPath[0]['.items.0.spec.paused']['-']}"
                    valueToCompare: "true"
              - type: scale
                props:
                  # =========================
                  # UI metadata
                  # =========================
                  text: Scale
                  icon: ColumnHeightOutlined
              
                  # =========================
                  # PERMISSION CHECK
                  # =========================
                  permissionContext:
                    
                    apiGroup: '{6}'
                    apiVersion: '{7}'
                    cluster: '{2}'
                    namespace: '{3}'
                    plural: '{8}'
                    subresource: scale
              
                  # =========================
                  # API endpoint (parameterized)
                  # =========================
                  endpoint: "/api/clusters/{2}/k8s/apis/{6}/{7}/namespaces/{3}/{8}/{reqsJsonPath[0]['.items.0.metadata.name']['-']}/scale"
              
                  # =========================
                  # Scale configuration
                  # =========================
                  currentReplicas: "{reqsJsonPath[0]['.items.0.spec.replicas']['-']}"
                  name: "{reqsJsonPath[0]['.items.0.metadata.name']['-']}"
                  namespace: "{3}"
                  apiVersion: "autoscaling/v1"
              - type: rolloutRestart
                props:
                  # =========================
                  # UI metadata
                  # =========================
                  text: Rollout Restart
                  icon: ReloadOutlined
              
                  # =========================
                  # PERMISSION CHECK
                  # =========================
                  permissionContext:
                    
                    apiGroup: '{6}'
                    apiVersion: '{7}'
                    cluster: '{2}'
                    namespace: '{3}'
                    plural: '{8}'
              
                  # =========================
                  # API endpoint (parameterized)
                  # =========================
                  endpoint: "/api/clusters/{2}/k8s/apis/{6}/{7}/namespaces/{3}/{8}/{reqsJsonPath[0]['.items.0.metadata.name']['-']}"

              # ---- Delete resource ----
              
              - type: delete
                props:
                  # =========================
                  # UI metadata
                  # =========================
                  text: Delete
                  icon: DeleteOutlined
                  danger: true
              
                  # =========================
                  # PERMISSION CHECK
                  # =========================
                  permissionContext:
                    
                    apiGroup: '{6}'
                    apiVersion: '{7}'
                    cluster: '{2}'
                    namespace: '{3}'
                    plural: '{8}'
              
                  # =========================
                  # API endpoint (parameterized)
                  # =========================
                  endpoint: "/api/clusters/{2}/k8s/apis/{6}/{7}/namespaces/{3}/{8}/{reqsJsonPath[0]['.items.0.metadata.name']['-']}"
              
                  # =========================
                  # Target resource identity
                  # =========================
                  name: "{reqsJsonPath[0]['.items.0.metadata.name']['-']}"
              
                  # =========================
                  # Post-delete redirect (parameterized)
                  # =========================
                  redirectTo: "/openapi-ui/{2}/{3}/api-table/{6}/{7}/{8}"

    # =========================
