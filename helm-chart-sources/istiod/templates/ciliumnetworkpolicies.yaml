{{- if .Values.networkPolicies.enabled }}
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-egress-istiod-to-kube-apiserver-6443
  namespace: {{ .Release.Namespace }}
spec:
  endpointSelector:
    matchLabels:
      k8s:io.cilium.k8s.policy.serviceaccount: istiod
      k8s:io.kubernetes.pod.namespace: {{ .Release.Namespace }}
  ingress:
  - {}
  egress:
  - toEntities:
    - kube-apiserver
    toPorts:
    - ports:
      - port: '6443'
        protocol: TCP
  description: |
    Allows egress from istiod to the Kubernetes API server on 6443 for
    control-plane interactions.

---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-ingress-vmagent-to-istiod-11043
  namespace: {{ .Release.Namespace }}
spec:
  endpointSelector:
    matchLabels:
      k8s:io.cilium.k8s.policy.serviceaccount: istiod
      k8s:io.kubernetes.pod.namespace: {{ .Release.Namespace }}
  egress:
  - {}
  ingress:
  - fromEndpoints:
    - matchLabels:
        k8s:io.cilium.k8s.policy.serviceaccount: vmagent-vmagent
        k8s:io.kubernetes.pod.namespace: {{ .Values.companyPrefix }}-vmagent
    toPorts:
    - ports:
      - port: '11043'
        protocol: TCP
  description: |
    Allows ingress from vmagent to istiod on 11043 for metrics collection.

---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-ingress-istio-gateway-to-istiod-15012
  namespace: {{ .Release.Namespace }}
spec:
  endpointSelector:
    matchLabels:
      k8s:io.cilium.k8s.policy.serviceaccount: istiod
      k8s:io.kubernetes.pod.namespace: {{ .Release.Namespace }}
  egress:
  - {}
  ingress:
  - fromEndpoints:
    - matchLabels:
        k8s:io.cilium.k8s.policy.serviceaccount: istio-gw
        k8s:io.kubernetes.pod.namespace: {{ .Release.Namespace }}-gw
    toPorts:
    - ports:
      - port: '15012'
        protocol: TCP
  description: |
    Allows ingress from istio-gateway to istiod on 15012. Egress remains
    open in this policy.

---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-ingress-istio-gateway-to-istiod-15017
  namespace: {{ .Release.Namespace }}
spec:
  endpointSelector:
    matchLabels:
      k8s:io.cilium.k8s.policy.serviceaccount: istiod
      k8s:io.kubernetes.pod.namespace: {{ .Release.Namespace }}
  egress:
  - {}
  ingress:
  - fromEntities:
    - remote-node
    - kube-apiserver
    toPorts:
    - ports:
      - port: '15017'
        protocol: TCP
{{- end }}
