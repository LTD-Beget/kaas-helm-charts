{{- if and .Values.monitoring.enabled (eq .Values.monitoring.type "VictoriaMetrics") }}
---
apiVersion: v1
kind: Service
metadata:
  labels:
    monitoring.in-cloud.io/service: cilium-agent
  name: {{ .Release.Name }}-agent-monitoring
  namespace: {{ .Release.Namespace }}
spec:
  ports:
    - name: https-metrics
      port: 11043
      protocol: TCP
      targetPort: https-metrics
  selector:
    k8s-app: cilium
{{- end }}
