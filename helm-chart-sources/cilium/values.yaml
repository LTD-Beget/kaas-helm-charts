cilium: {}
# some values for cilium
companyPrefix: example
monitoring:
  enabled: false
  type: VictoriaMetrics
  namespace: default
  secureService:
    enabled: false
    # Create a secret containing both 'tls.crt' and 'tls.key' fields
    issuer:
      kind: ClusterIssuer
      name: default
  agent:
    serviceScrapeConfig:
      metricRelabelConfigs: []
  operator:
    serviceScrapeConfig:
      metricRelabelConfigs: []
networkPolicies:
  enabled: false
