{{- if .Values.monitoring.vmServiceScrape.enabled }}
---
apiVersion: operator.victoriametrics.com/v1beta1
kind: VMServiceScrape
metadata:
  name: {{ $.Release.Name }}
  namespace: {{ .Release.Namespace }}
spec:
  endpoints:
  - path: /metrics
    port: manager-metrics
    scheme: HTTPS
    bearerTokenFile: /var/run/secrets/kubernetes.io/serviceaccount/token
    tlsConfig:
      serverName: {{ $.Release.Name }}-provider-{{ $.Values.companyPrefix }}-controller-manager
  {{- if not .Values.certificates.useExternalIssuer }}
      insecureSkipVerify: true
  {{- end }}
  jobLabel: {{ $.Release.Name }}
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ $.Release.Name }}
      app.kubernetes.io/name: provider-{{ $.Values.companyPrefix }}-controller-manager
{{- end }}
