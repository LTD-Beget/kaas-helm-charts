{{- $appValue := .Values.appSpec.applications.providerControllerManager -}}

{{- with $appValue }}
  {{- if .enabled }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ $.Release.Name }}-{{ .name }}-metrics-auth-role
  labels:
    {{- include "providerControllerManager.labels" $ | nindent 4 }}
    {{- include "providerControllerManager.applicationSelectorLabels" (list .name $) | nindent 4 }}
rules:
  - apiGroups:
    - authentication.k8s.io
    resources:
    - tokenreviews
    verbs:
    - create
  - apiGroups:
    - authorization.k8s.io
    resources:
    - subjectaccessreviews
    verbs:
    - create
  {{- end }}
{{- end }}
