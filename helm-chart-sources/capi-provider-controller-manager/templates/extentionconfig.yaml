{{- $appValue := .Values.appSpec.applications.providerControllerManager -}}

{{- with $appValue }}
  {{- if .enabled }}
---
apiVersion: runtime.cluster.x-k8s.io/v1alpha1
kind: ExtensionConfig
metadata:
  name: {{ .name }}-runtime-extension
  annotations:
    runtime.cluster.x-k8s.io/inject-ca-from-secret: {{ $.Release.Namespace }}/{{ $.Release.Name }}-{{ .volumes.webhook.volume.name }}
spec:
  # Пустой селектор = все namespace'ы.
  namespaceSelector: {}
  clientConfig:
    service:
      namespace: {{ $.Release.Namespace }}
      name: {{ $.Release.Name }}-{{ .name }}-webhook
      port: 443

  {{- end }}
{{- end }}