{{- $appValue := .Values.appSpec.applications.providerControllerManager -}}

{{- with $appValue }}
  {{- if .enabled }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ $.Release.Name }}-{{ .name }}-leader-election-role
  namespace: {{ $.Release.Namespace }}
  labels:
    {{- include "providerControllerManager.labels" $ | nindent 4 }}
    {{- include "providerControllerManager.applicationSelectorLabels" (list .name $) | nindent 4 }}
rules:
  - apiGroups:
    - ""
    resources:
    - configmaps
    verbs:
    - get
    - list
    - watch
    - create
    - update
    - patch
    - delete
  - apiGroups:
    - coordination.k8s.io
    resources:
    - leases
    verbs:
    - get
    - list
    - watch
    - create
    - update
    - patch
    - delete
  - apiGroups:
    - ""
    resources:
    - events
    verbs:
    - create
    - patch

  {{- end }}
{{- end }}
