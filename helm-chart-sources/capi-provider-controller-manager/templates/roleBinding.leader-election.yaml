{{- $appValue := .Values.appSpec.applications.providerControllerManager -}}

{{- with $appValue }}
  {{- if .enabled }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ $.Release.Name }}-{{ .name }}-leader-election-role-binding
  namespace: {{ $.Release.Namespace }}
  labels:
    {{- include "providerControllerManager.labels" $ | nindent 4 }}
    {{- include "providerControllerManager.applicationSelectorLabels" (list .name $) | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ $.Release.Name }}-{{ .name }}-leader-election-role
subjects:
  - kind: ServiceAccount
    name: {{ $.Release.Name }}-{{ .name }}
    namespace: {{ $.Release.Namespace }}

  {{- end }}
{{- end }}
