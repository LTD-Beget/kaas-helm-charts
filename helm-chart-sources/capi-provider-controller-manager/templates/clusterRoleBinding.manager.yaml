{{- $appValue := .Values.appSpec.applications.providerControllerManager -}}

{{- with $appValue }}
  {{- if .enabled }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ $.Release.Name }}-{{ .name }}-role-binding
  labels:
    {{- include "providerControllerManager.labels" $ | nindent 4 }}
    {{- include "providerControllerManager.applicationSelectorLabels" (list .name $) | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ $.Release.Name }}-{{ .name }}-role
subjects:
  - kind: ServiceAccount
    name: {{ $.Release.Name }}-{{ .name }}
    namespace: {{ $.Release.Namespace }}

  {{- end }}
{{- end }}
