  name: grafana-dashboard-clusterclaim
  annotations:
    argocd.argoproj.io/sync-options: ServerSideApply=true
spec:
  resyncPeriod: 30s
  instanceSelector:
    matchLabels:
      dashboards: "grafana"
  json: |
    {
      "annotations": {
        "list": [
          {
            "builtIn": 1,
            "datasource": {
              "type": "grafana",
              "uid": "-- Grafana --"
