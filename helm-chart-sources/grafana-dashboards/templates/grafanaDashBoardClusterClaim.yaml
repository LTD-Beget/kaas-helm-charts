            "hide": true,
            "iconColor": "rgba(0, 211, 255, 1)",
            "name": "Annotations & Alerts",
            "type": "dashboard"
          }
        ]
      },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 0,
      "id": 26,
      "links": [],
      "panels": [
        {
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "thresholds"
              },
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "orange",
                    "value": 600
                  },
                  {
                    "color": "red",
                    "value": 900
                  }
                ]
              },
              "unit": "s"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 14,
            "w": 24,
            "x": 0,
            "y": 0
          },
          "id": 1,
          "options": {
            "colorMode": "value",
            "graphMode": "area",
            "justifyMode": "auto",
            "orientation": "auto",
            "percentChangeColorMode": "standard",
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "showPercentChange": false,
            "textMode": "auto",
            "wideLayout": true
          },
          "pluginVersion": "11.3.0",
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              },
              "editorMode": "code",
              "expr": "(\n  (\n    max by (namespace, name) (\n      in_cloud_capi_clusterclaim_infra_ready_timestamp{\n        namespace=~\"$namespace\",\n        name=~\"$clusterclaim\"\n      }\n    )\n  )\n  -\n  on(namespace, name) (\n    max by (namespace, name) (\n      in_cloud_capi_clusterclaim_created_timestamp_seconds{\n        namespace=~\"$namespace\",\n        name=~\"$clusterclaim\"\n      }\n    )\n  )\n) ",
              "format": "time_series",
              "instant": false,
              "legendFormat": "{{`{{namespace}}/{{name}}-infra`}}",
              "range": true,
              "refId": "A"
            },
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              },
              "editorMode": "code",
              "expr": "(\n  (\n    max by (namespace, name) (\n      in_cloud_capi_clusterclaim_client_ready_timestamp{\n        namespace=~\"$namespace\",\n        name=~\"$clusterclaim\"\n      }\n    )\n  )\n  -\n  on(namespace, name) (\n    max by (namespace, name) (\n      in_cloud_capi_clusterclaim_created_timestamp_seconds{\n        namespace=~\"$namespace\",\n        name=~\"$clusterclaim\"\n      }\n    )\n  )\n)",
              "format": "time_series",
              "instant": false,
              "legendFormat": "{{`{{namespace}}/{{name}}-client`}}",
              "range": true,
              "refId": "B"
            }
          ],
          "title": "Startup duration clusters",
          "type": "stat"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "thresholds"
              },
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  }
                ]
              },
              "unit": "short"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 4,
            "w": 4,
            "x": 0,
            "y": 14
          },
          "id": 14,
          "options": {
            "colorMode": "value",
            "graphMode": "none",
            "justifyMode": "auto",
            "orientation": "auto",
            "percentChangeColorMode": "standard",
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "showPercentChange": false,
            "textMode": "auto",
            "wideLayout": true
          },
          "pluginVersion": "11.3.0",
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              },
              "editorMode": "code",
              "expr": "count(max by(namespace, name) (in_cloud_capi_clusterclaim_created_timestamp_seconds{namespace=~\"$namespace\", name=~\"$clusterclaim\"}))",
              "format": "time_series",
              "instant": false,
              "legendFormat": "",
              "range": true,
              "refId": "A"
            }
          ],
          "title": "ClusterClaims",
          "type": "stat"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "thresholds"
              },
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  }
                ]
              },
              "unit": "short"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 4,
            "w": 4,
            "x": 4,
            "y": 14
          },
          "id": 2,
          "options": {
            "colorMode": "value",
            "graphMode": "none",
            "justifyMode": "auto",
            "orientation": "auto",
            "percentChangeColorMode": "standard",
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "showPercentChange": false,
            "textMode": "auto",
            "wideLayout": true
          },
          "pluginVersion": "11.3.0",
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              },
              "editorMode": "code",
              "expr": "count(max by(namespace, name) (in_cloud_capi_clusterclaim_status_phase{namespace=~\"$namespace\", name=~\"$clusterclaim\", phase=\"Ready\"} == 1))",
              "format": "time_series",
              "instant": false,
              "legendFormat": "",
              "range": true,
              "refId": "A"
            }
          ],
          "title": "Ready",
