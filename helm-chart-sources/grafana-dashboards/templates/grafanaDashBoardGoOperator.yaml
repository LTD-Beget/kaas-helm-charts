{{- if .Values.grafanaDashboards.goOperator.enabled }}
---
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: grafana-dashboard-go-operator
  annotations:
    argocd.argoproj.io/sync-options: ServerSideApply=true
spec:
  resyncPeriod: 30s
  instanceSelector:
    matchLabels:
      dashboards: "grafana"
  json: |-
    {
      "annotations": {
        "list": [
          {
            "builtIn": 1,
            "datasource": {
              "type": "grafana",
              "uid": "-- Grafana --"
            },
            "enable": true,
            "hide": true,
            "iconColor": "rgba(0, 211, 255, 1)",
            "name": "Annotations & Alerts",
            "type": "dashboard"
          }
        ]
      },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 0,
      "links": [],
      "panels": [
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 0 },
          "id": 40,
          "panels": [],
          "title": "Здоровье и пропускная способность",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "description": "Суммарная частота reconcile по контроллерам (все результаты). Базовый индикатор нагрузки. Резкий или устойчивый рост означает повышенное количество реконсиляций — либо всплеск изменений в объектах, либо self-requeue.",
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "axisLabel": "reconciles/sec",
                "axisPlacement": "auto",
                "barAlignment": 0,
                "drawStyle": "line",
                "fillOpacity": 8,
                "gradientMode": "none",
                "hideFrom": { "legend": false, "tooltip": false, "viz": false },
                "insertNulls": false,
                "lineInterpolation": "linear",
                "lineWidth": 2,
                "pointSize": 4,
                "scaleDistribution": { "type": "linear" },
                "showPoints": "auto",
                "spanNulls": false,
                "stacking": { "group": "A", "mode": "none" },
                "thresholdsStyle": { "mode": "off" }
              },
              "mappings": [],
              "thresholds": { "mode": "absolute", "steps": [ { "color": "green", "value": null } ] },
              "unit": "ops"
            },
            "overrides": []
          },
          "gridPos": { "h": 8, "w": 8, "x": 0, "y": 1 },
          "id": 20,
          "options": {
            "legend": { "calcs": [ "lastNotNull", "mean", "max" ], "displayMode": "table", "placement": "bottom", "showLegend": true },
            "tooltip": { "mode": "multi", "sort": "desc" }
          },
          "pluginVersion": "11.3.0",
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "${datasource}" },
              "editorMode": "code",
              "expr": "sum by(controller) (rate(controller_runtime_reconcile_total{cluster_full_name=~\"$cluster_full_name\", namespace=~\"$namespace\", controller=~\"$controller\"}[$__rate_interval]))",
              "legendFormat": "{{`{{controller}}`}}",
              "range": true,
              "refId": "A"
            }
          ],
          "title": "Reconcile rate by controller",
          "type": "timeseries"
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "description": "Частота ошибок reconcile: обычные ошибки (будут requeue'иться), terminal-ошибки (reconcile прекращён) и паники. Любой ненулевой terminal/panic — сигнал к разбору. Рост errors коррелирует с ростом retries и очереди.",
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "axisLabel": "errors/sec",
                "axisPlacement": "auto",
                "barAlignment": 0,
                "drawStyle": "line",
                "fillOpacity": 8,
                "gradientMode": "none",
                "hideFrom": { "legend": false, "tooltip": false, "viz": false },
                "insertNulls": false,
                "lineInterpolation": "linear",
                "lineWidth": 2,
                "pointSize": 4,
                "scaleDistribution": { "type": "linear" },
                "showPoints": "auto",
                "spanNulls": false,
                "stacking": { "group": "A", "mode": "none" },
                "thresholdsStyle": { "mode": "line" }
              },
              "mappings": [],
              "thresholds": { "mode": "absolute", "steps": [ { "color": "green", "value": null }, { "color": "orange", "value": 0.05 }, { "color": "red", "value": 0.5 } ] },
              "unit": "ops"
            },
            "overrides": []
          },
          "gridPos": { "h": 8, "w": 8, "x": 8, "y": 1 },
          "id": 21,
          "options": {
            "legend": { "calcs": [ "lastNotNull", "mean", "max" ], "displayMode": "table", "placement": "bottom", "showLegend": true },
            "tooltip": { "mode": "multi", "sort": "desc" }
          },
          "pluginVersion": "11.3.0",
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "${datasource}" },
              "editorMode": "code",
              "expr": "sum by(controller) (rate(controller_runtime_reconcile_errors_total{cluster_full_name=~\"$cluster_full_name\", namespace=~\"$namespace\", controller=~\"$controller\"}[$__rate_interval]))",
              "legendFormat": "error {{`{{controller}}`}}",
              "range": true,
              "refId": "A"
            },
            {
              "datasource": { "type": "prometheus", "uid": "${datasource}" },
              "editorMode": "code",
              "expr": "sum by(controller) (rate(controller_runtime_terminal_reconcile_errors_total{cluster_full_name=~\"$cluster_full_name\", namespace=~\"$namespace\", controller=~\"$controller\"}[$__rate_interval]))",
              "hide": false,
              "legendFormat": "terminal {{`{{controller}}`}}",
              "range": true,
              "refId": "B"
            },
            {
              "datasource": { "type": "prometheus", "uid": "${datasource}" },
              "editorMode": "code",
              "expr": "sum by(controller) (rate(controller_runtime_reconcile_panics_total{cluster_full_name=~\"$cluster_full_name\", namespace=~\"$namespace\", controller=~\"$controller\"}[$__rate_interval]))",
              "hide": false,
              "legendFormat": "panic {{`{{controller}}`}}",
              "range": true,
              "refId": "C"
            }
          ],
          "title": "Reconcile errors / terminal / panics",
          "type": "timeseries"
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "description": "Насыщение worker'ов: отношение занятых worker'ов к максимально доступным. Главное для диагностики bottleneck. Если значение стабильно около 1 и при этом queue_depth > 0, контроллер упирается в свою параллельность (max_concurrent_reconciles), а не обязательно в API throttling.",
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "axisLabel": "ratio",
                "axisPlacement": "auto",
                "barAlignment": 0,
                "drawStyle": "line",
                "fillOpacity": 10,
                "gradientMode": "none",
                "hideFrom": { "legend": false, "tooltip": false, "viz": false },
                "insertNulls": false,
                "lineInterpolation": "linear",
                "lineWidth": 2,
                "pointSize": 4,
                "scaleDistribution": { "type": "linear" },
                "showPoints": "auto",
                "spanNulls": false,
                "stacking": { "group": "A", "mode": "none" },
                "thresholdsStyle": { "mode": "line" }
              },
              "mappings": [],
              "max": 1.2,
              "min": 0,
              "thresholds": { "mode": "absolute", "steps": [ { "color": "green", "value": null }, { "color": "orange", "value": 0.7 }, { "color": "red", "value": 0.95 } ] }
            },
            "overrides": []
          },
          "gridPos": { "h": 8, "w": 8, "x": 16, "y": 1 },
          "id": 8,
          "options": {
            "legend": { "calcs": [ "lastNotNull", "mean", "max" ], "displayMode": "table", "placement": "bottom", "showLegend": true },
            "tooltip": { "mode": "single", "sort": "none" }
          },
          "pluginVersion": "11.3.0",
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "${datasource}" },
              "editorMode": "code",
              "expr": "controller_runtime_active_workers{cluster_full_name=~\"$cluster_full_name\", namespace=~\"$namespace\", controller=~\"$controller\"} / controller_runtime_max_concurrent_reconciles{cluster_full_name=~\"$cluster_full_name\", namespace=~\"$namespace\", controller=~\"$controller\"}",
              "legendFormat": "{{`{{controller}}`}}",
              "range": true,
              "refId": "A"
            }
          ],
          "title": "Worker saturation",
          "type": "timeseries"
        },
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 9 },
          "id": 41,
          "panels": [],
          "title": "Реконсиляции",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "description": "Распределение результатов reconcile по контроллерам: success, requeue, requeue_after, error. Если доминирует requeue_after, контроллер сам регулярно будит себя и может создавать искусственный backlog даже при отсутствии внешнего throttling.",
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "axisLabel": "reconciles/sec",
                "axisPlacement": "auto",
                "barAlignment": 0,
                "drawStyle": "line",
                "fillOpacity": 8,
                "gradientMode": "none",
                "hideFrom": { "legend": false, "tooltip": false, "viz": false },
                "insertNulls": false,
                "lineInterpolation": "linear",
                "lineWidth": 2,
                "pointSize": 4,
                "scaleDistribution": { "type": "linear" },
                "showPoints": "auto",
                "spanNulls": false,
                "stacking": { "group": "A", "mode": "none" },
                "thresholdsStyle": { "mode": "off" }
              },
              "mappings": [],
              "thresholds": { "mode": "absolute", "steps": [ { "color": "green", "value": null } ] },
              "unit": "ops"
            },
            "overrides": []
          },
          "gridPos": { "h": 8, "w": 8, "x": 0, "y": 10 },
          "id": 11,
          "options": {
            "legend": { "calcs": [ "lastNotNull", "mean", "max" ], "displayMode": "table", "placement": "bottom", "showLegend": true },
            "tooltip": { "mode": "multi", "sort": "desc" }
          },
          "pluginVersion": "11.3.0",
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "${datasource}" },
              "editorMode": "code",
              "expr": "sum by(controller, result) (rate(controller_runtime_reconcile_total{cluster_full_name=~\"$cluster_full_name\", namespace=~\"$namespace\", controller=~\"$controller\"}[$__rate_interval]))",
              "legendFormat": "{{`{{controller}}`}} {{`{{result}}`}}",
              "range": true,
              "refId": "A"
            }
          ],
          "title": "Reconcile result rate",
          "type": "timeseries"
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "description": "Скорость поступления новых элементов в workqueue. Это входной поток, а не скорость обработки. Если adds стабильно выше фактической пропускной способности worker'ов, очередь будет расти.",
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "axisLabel": "adds/sec",
                "axisPlacement": "auto",
                "barAlignment": 0,
                "drawStyle": "line",
                "fillOpacity": 8,
                "gradientMode": "none",
                "hideFrom": { "legend": false, "tooltip": false, "viz": false },
                "insertNulls": false,
                "lineInterpolation": "linear",
                "lineWidth": 2,
                "pointSize": 4,
                "scaleDistribution": { "type": "linear" },
                "showPoints": "auto",
                "spanNulls": false,
                "stacking": { "group": "A", "mode": "none" },
                "thresholdsStyle": { "mode": "off" }
              },
              "mappings": [],
              "thresholds": { "mode": "absolute", "steps": [ { "color": "green", "value": null }, { "color": "orange", "value": 1 }, { "color": "red", "value": 5 } ] },
              "unit": "ops"
            },
            "overrides": []
          },
          "gridPos": { "h": 8, "w": 8, "x": 8, "y": 10 },
          "id": 1,
          "options": {
            "legend": { "calcs": [ "lastNotNull", "mean", "max" ], "displayMode": "table", "placement": "bottom", "showLegend": true },
            "tooltip": { "mode": "multi", "sort": "desc" }
          },
          "pluginVersion": "11.3.0",
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "${datasource}" },
              "editorMode": "code",
              "expr": "sum by (name) (rate(workqueue_adds_total{cluster_full_name=~\"$cluster_full_name\", namespace=~\"$namespace\", controller=~\"$controller\"}[$__rate_interval]))",
              "legendFormat": "{{`{{name}}`}}",
              "range": true,
              "refId": "A"
            }
          ],
          "title": "Workqueue adds rate",
          "type": "timeseries"
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "description": "Скорость повторных постановок элементов в очередь. Если retries высоки относительно входного потока, контроллер либо часто requeue'ит сам себя, либо попадает в конфликтные/временные состояния. Одна из самых полезных метрик для поиска self-induced backlog.",
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "axisLabel": "retries/sec",
                "axisPlacement": "auto",
                "barAlignment": 0,
                "drawStyle": "line",
                "fillOpacity": 8,
                "gradientMode": "none",
                "hideFrom": { "legend": false, "tooltip": false, "viz": false },
                "insertNulls": false,
                "lineInterpolation": "linear",
                "lineWidth": 2,
                "pointSize": 4,
                "scaleDistribution": { "type": "linear" },
                "showPoints": "auto",
                "spanNulls": false,
                "stacking": { "group": "A", "mode": "none" },
                "thresholdsStyle": { "mode": "line" }
              },
              "mappings": [],
              "thresholds": { "mode": "absolute", "steps": [ { "color": "green", "value": null }, { "color": "orange", "value": 0.5 }, { "color": "red", "value": 1 } ] },
              "unit": "ops"
            },
            "overrides": []
          },
          "gridPos": { "h": 8, "w": 8, "x": 16, "y": 10 },
          "id": 10,
          "options": {
            "legend": { "calcs": [ "lastNotNull", "mean", "max" ], "displayMode": "table", "placement": "bottom", "showLegend": true },
            "tooltip": { "mode": "multi", "sort": "desc" }
          },
          "pluginVersion": "11.3.0",
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "${datasource}" },
              "editorMode": "code",
              "expr": "sum by(name) (rate(workqueue_retries_total{cluster_full_name=~\"$cluster_full_name\", namespace=~\"$namespace\", controller=~\"$controller\"}[$__rate_interval]))",
              "legendFormat": "{{`{{name}}`}}",
              "range": true,
              "refId": "A"
            }
          ],
          "title": "Workqueue retries rate",
          "type": "timeseries"
        },
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 18 },
          "id": 42,
          "panels": [],
          "title": "Очереди (workqueue)",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "description": "Текущее количество объектов, ожидающих обработки в workqueue. Основной индикатор backlog. Кратковременные пики допустимы, но плато или устойчивый рост означают, что контроллер не успевает разгребать очередь.",
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "axisLabel": "items",
                "axisPlacement": "auto",
                "barAlignment": 0,
                "drawStyle": "line",
                "fillOpacity": 10,
                "gradientMode": "none",
                "hideFrom": { "legend": false, "tooltip": false, "viz": false },
                "insertNulls": false,
                "lineInterpolation": "linear",
                "lineWidth": 2,
                "pointSize": 4,
                "scaleDistribution": { "type": "linear" },
                "showPoints": "auto",
                "spanNulls": false,
                "stacking": { "group": "A", "mode": "none" },
                "thresholdsStyle": { "mode": "line" }
              },
              "mappings": [],
              "thresholds": { "mode": "absolute", "steps": [ { "color": "green", "value": null }, { "color": "orange", "value": 10 }, { "color": "red", "value": 50 } ] }
            },
            "overrides": []
          },
          "gridPos": { "h": 8, "w": 8, "x": 0, "y": 19 },
          "id": 2,
          "options": {
            "legend": { "calcs": [ "lastNotNull", "max" ], "displayMode": "table", "placement": "bottom", "showLegend": true },
            "tooltip": { "mode": "single", "sort": "none" }
          },
          "pluginVersion": "11.3.0",
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "${datasource}" },
              "editorMode": "code",
              "expr": "sum by(name) (workqueue_depth{cluster_full_name=~\"$cluster_full_name\", namespace=~\"$namespace\", controller=~\"$controller\"})",
              "legendFormat": "{{`{{name}}`}}",
              "range": true,
              "refId": "A"
            }
          ],
          "title": "Workqueue depth",
          "type": "timeseries"
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "description": "Тренд глубины очереди (производная depth за 10m). Значение > 0, удерживающееся во времени, означает растущую очередь: входной поток превышает пропускную способность. Около 0 — очередь стабильна, < 0 — разгребается.",
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "axisCenteredZero": true,
                "axisLabel": "items/sec",
                "axisPlacement": "auto",
                "barAlignment": 0,
                "drawStyle": "line",
                "fillOpacity": 8,
                "gradientMode": "none",
                "hideFrom": { "legend": false, "tooltip": false, "viz": false },
                "insertNulls": false,
                "lineInterpolation": "linear",
                "lineWidth": 2,
                "pointSize": 4,
                "scaleDistribution": { "type": "linear" },
                "showPoints": "auto",
                "spanNulls": false,
                "stacking": { "group": "A", "mode": "none" },
                "thresholdsStyle": { "mode": "line" }
              },
              "mappings": [],
              "thresholds": { "mode": "absolute", "steps": [ { "color": "green", "value": null }, { "color": "orange", "value": 0.05 }, { "color": "red", "value": 0.5 } ] }
            },
            "overrides": []
          },
          "gridPos": { "h": 8, "w": 8, "x": 8, "y": 19 },
          "id": 23,
          "options": {
            "legend": { "calcs": [ "lastNotNull", "mean", "max" ], "displayMode": "table", "placement": "bottom", "showLegend": true },
            "tooltip": { "mode": "multi", "sort": "desc" }
          },
          "pluginVersion": "11.3.0",
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "${datasource}" },
              "editorMode": "code",
              "expr": "sum by(name) (deriv(workqueue_depth{cluster_full_name=~\"$cluster_full_name\", namespace=~\"$namespace\", controller=~\"$controller\"}[10m]))",
              "legendFormat": "{{`{{name}}`}}",
              "range": true,
              "refId": "A"
            }
          ],
          "title": "Workqueue depth trend",
          "type": "timeseries"
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "description": "unfinished_work — сколько времени накопилось у элементов, которые сейчас в работе, но ещё не завершены. longest_running_processor — длительность самого долгого текущего reconcile. Устойчивый рост любого из них указывает на застрявший/зависший reconcile, который держит worker и блокирует очередь.",
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "axisLabel": "seconds",
                "axisPlacement": "auto",
                "barAlignment": 0,
                "drawStyle": "line",
                "fillOpacity": 6,
                "gradientMode": "none",
                "hideFrom": { "legend": false, "tooltip": false, "viz": false },
                "insertNulls": false,
                "lineInterpolation": "linear",
                "lineWidth": 2,
                "pointSize": 4,
                "scaleDistribution": { "type": "linear" },
                "showPoints": "auto",
                "spanNulls": false,
                "stacking": { "group": "A", "mode": "none" },
                "thresholdsStyle": { "mode": "line" }
              },
              "mappings": [],
              "thresholds": { "mode": "absolute", "steps": [ { "color": "green", "value": null }, { "color": "orange", "value": 30 }, { "color": "red", "value": 120 } ] },
              "unit": "s"
            },
            "overrides": []
          },
          "gridPos": { "h": 8, "w": 8, "x": 16, "y": 19 },
          "id": 24,
          "options": {
            "legend": { "calcs": [ "lastNotNull", "max" ], "displayMode": "table", "placement": "bottom", "showLegend": true },
            "tooltip": { "mode": "multi", "sort": "desc" }
          },
          "pluginVersion": "11.3.0",
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "${datasource}" },
              "editorMode": "code",
              "expr": "max by(name) (workqueue_unfinished_work_seconds{cluster_full_name=~\"$cluster_full_name\", namespace=~\"$namespace\", controller=~\"$controller\"})",
              "legendFormat": "unfinished {{`{{name}}`}}",
              "range": true,
              "refId": "A"
            },
            {
              "datasource": { "type": "prometheus", "uid": "${datasource}" },
              "editorMode": "code",
              "expr": "max by(name) (workqueue_longest_running_processor_seconds{cluster_full_name=~\"$cluster_full_name\", namespace=~\"$namespace\", controller=~\"$controller\"})",
              "hide": false,
              "legendFormat": "longest {{`{{name}}`}}",
              "range": true,
              "refId": "B"
            }
          ],
          "title": "Unfinished & longest running work",
          "type": "timeseries"
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "description": "Перцентили времени ожидания элемента в очереди до того, как worker возьмёт его в работу. Это latency очереди, а не длительность reconcile. Если p90/p99 растут, а reconcile time остаётся низким, проблема обычно в backlog/недостатке concurrency, а не в медленном reconcile.",
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "axisLabel": "seconds",
                "axisPlacement": "auto",
                "barAlignment": 0,
                "drawStyle": "line",
                "fillOpacity": 6,
