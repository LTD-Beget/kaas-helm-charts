{{- if .Values.networkPolicies.enabled }}
---
# Allow `ccm-csr-controller` to talk to the Kubernetes API server.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-egress-ccm-csr-controller-to-kube-apiserver-6443
  namespace: {{ .Release.Namespace }}
spec:
  endpointSelector:
    matchLabels:
      k8s:io.cilium.k8s.policy.serviceaccount: {{ include "ccm-csr-controller.serviceAccountName" . }}
      k8s:io.kubernetes.pod.namespace: {{ .Release.Namespace }}
  egress:
  - toEntities:
    - kube-apiserver
    toPorts:
    - ports:
      - port: '6443'
        protocol: TCP
  description: Allows egress from ccm-csr-controller to the Kubernetes API server on
    6443 for control-plane interactions.
{{- end }}
