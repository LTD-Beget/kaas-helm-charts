---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-ingress-world-to-istio-gateway-80-443-15021-11043
  namespace: {{ .Release.Namespace }}
spec:
  endpointSelector:
    matchLabels:
      k8s:io.cilium.k8s.policy.serviceaccount: istio-gw
      k8s:io.kubernetes.pod.namespace: {{ .Release.Namespace }}
  ingress:
  - fromEntities:
    - world
    toPorts:
    - ports:
      - port: '80'
        protocol: TCP
      - port: '443'
        protocol: TCP
      - port: '15021'
        protocol: TCP
      - port: '11043'
        protocol: TCP
  description: |
    Allows ingress from the world to the Istio gateway listener ports used
    for HTTP, HTTPS, status, and metrics traffic.

