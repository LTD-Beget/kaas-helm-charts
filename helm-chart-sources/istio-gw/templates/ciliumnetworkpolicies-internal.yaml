{{- if .Values.networkPolicies.internal.enabled }}
---
# host to istio-gw-internal — kubelet readiness (15021) + kube-apiserver webhooks (443)
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-host-probes-istio-gw-internal-15021
  namespace: {{ .Release.Namespace }}
spec:
  description: "Allow kubelet probes and kube-apiserver webhooks to istio-gw-internal from host"
  endpointSelector:
    matchLabels:
      k8s:io.kubernetes.pod.namespace: {{ .Release.Namespace }}
      k8s:io.cilium.k8s.policy.serviceaccount: istio-gw-internal
  ingress:
  - fromEntities:
    - host
    - remote-node
    toPorts:
    - ports:
      - port: "443"
        protocol: TCP
      - port: "15021"
        protocol: TCP

---
# Allow the internal Istio gateway to talk to the Kubernetes API server.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-egress-istio-gw-internal-to-kube-apiserver-6443
  namespace: {{ .Release.Namespace }}
spec:
  endpointSelector:
    matchLabels:
      k8s:io.cilium.k8s.policy.serviceaccount: istio-gw-internal
      k8s:io.kubernetes.pod.namespace: {{ .Release.Namespace }}
  egress:
  - toEntities:
    - kube-apiserver
    - host
    - remote-node
    toPorts:
    - ports:
      - port: '6443'
        protocol: TCP
  description: Allows egress from istio-gw-internal to the Kubernetes API server on
    6443 for control-plane interactions.

