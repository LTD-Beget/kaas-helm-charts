apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ./base.yaml

patches:
  - path: ./deployment.istio-gw.yaml
    target:
      kind: Deployment
      name: istio-gw

  - path: ./service.istio-gw.yaml
    target:
      kind: Service
      name: istio-gw

  - path: ./deployment.istio-gw-internal.yaml
    target:
      kind: Deployment
      name: istio-gw-internal

  - path: ./service.istio-gw-internal.yaml
    target:
      kind: Service
      name: istio-gw-internal
