{{- $argocd := index .Values "argo-cd" -}}

{{- if and $argocd.redis.enabled .Values.monitoring.secureService.enabled }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ template "argo-cd-wrapper.redis.fullname" . }}-kube-rbac-proxy
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: kube-rbac-proxy-tokenreview
subjects:
  - kind: ServiceAccount
    name: {{ include "argo-cd-wrapper.redis.serviceAccountName" . }}
    namespace: {{ include  "argo-cd-wrapper.namespace" . }}
{{- end }}
