{{- $argocd := index .Values "argo-cd" -}}

{{- if and (gt ($argocd.server.replicas | int) 0) .Values.monitoring.enabled }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ template "argo-cd-wrapper.server.fullname" . }}-kube-rbac-proxy
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: kube-rbac-proxy-tokenreview
subjects:
  - kind: ServiceAccount
    name: {{ include "argo-cd-wrapper.server.serviceAccountName" . }}
    namespace: {{ include  "argo-cd-wrapper.namespace" . }}
{{- end }}
