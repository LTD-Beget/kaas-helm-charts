{{- $argocd := index .Values "argo-cd" -}}

{{- if and (gt ($argocd.server.replicas | int) 0) .Values.monitoring.secureService.enabled }}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ template "argo-cd-wrapper.server.fullname" . }}-metrics
  namespace: {{ include  "argo-cd-wrapper.namespace" . }}
spec:
  secretName: argocd-server-metrics
  duration: 8760h
  renewBefore: 720h
  commonName: {{ template "argo-cd-wrapper.server.fullname" . }}-metrics
  dnsNames:
    - {{ template "argo-cd-wrapper.server.fullname" . }}-metrics
    - {{ template "argo-cd-wrapper.server.fullname" . }}-metrics.{{ include  "argo-cd-wrapper.namespace" . }}
    - {{ template "argo-cd-wrapper.server.fullname" . }}-metrics.{{ include  "argo-cd-wrapper.namespace" . }}.svc
  privateKey:
    algorithm: RSA
    size: 2048
  usages:
    - digital signature
    - key encipherment
    - server auth
  issuerRef:
    kind: {{ .Values.monitoring.secureService.issuer.kind }}
    name: {{ .Values.monitoring.secureService.issuer.name }}
{{- end }}
