{{- $argocd := index .Values "argo-cd" -}}

{{- if and (gt ($argocd.repoServer.replicas | int) 0) .Values.monitoring.enabled (eq .Values.monitoring.type "VictoriaMetrics") }}
---
apiVersion: operator.victoriametrics.com/v1beta1
kind: VMServiceScrape
metadata:
  name: {{ template "argo-cd-wrapper.repoServer.fullname" . }}
  namespace: {{ include  "argo-cd-wrapper.namespace" . }}
spec:
  selector:
    matchLabels:
      monitoring.in-cloud.io/service: {{ template "argo-cd-wrapper.repoServer.fullname" . }}
  endpoints:
    - port: https-metrics
      path: /metrics
      scheme: HTTPS
      bearerTokenFile: /var/run/secrets/kubernetes.io/serviceaccount/token
      tlsConfig:
        serverName: {{ template "argo-cd-wrapper.repoServer.fullname" . }}-metrics
  jobLabel: argocd-repo-server
{{- end }}
