---
apiVersion: clusterclaim.in-cloud.io/v1alpha1
kind: ClusterClaimObserveResourceTemplate
metadata:
  name: {{ .Release.Name }}-cm-client
spec:
  apiVersion: v1
  kind: ConfigMap
  value: |
    metadata:
      labels:
        xcluster.in-cloud.io/name: {{`{{ .ClusterClaim.metadata.name }}`}}
    data:
      environment: client
      xcluster: {{`{{ .ClusterClaim.metadata.name }}`}}
      clusterClaimName: {{`{{ .ClusterClaim.metadata.name }}`}}
      customer: {{`{{ .ClusterClaim.metadata.namespace }}`}}
      systemNamespace: {{`{{ .ClusterClaim.metadata.namespace }}`}}

      clusterName: {{`{{ .ClusterClaim.metadata.name }}`}}-client
      clusterHost: {{`{{ .InfraControlPlaneEndpoint.Host }}`}}
      clusterPort: "{{`{{ .ClusterClaim.spec.client.network.kubeApiserverPort }}`}}"
      controlPlaneAvailableReplicas: "{{`{{ .InfraControlPlaneAvailableReplicas }}`}}"
      controlPlaneDesiredReplicas: "{{`{{ .InfraControlPlaneDesiredReplicas }}`}}"

      clusterClientEnabled: "{{`{{ .ClusterClaim.spec.client.enabled }}`}}"
      clusterClientName: {{`{{ .ClusterClaim.metadata.name }}`}}-client
      clusterClientPort: "{{`{{ .ClusterClaim.spec.client.network.kubeApiserverPort }}`}}"
      clientVersion: {{`{{ .ClusterClaim.spec.client.componentVersions.kubernetes.version }}`}}
      clientClusterDomain: cluster.local

      #clientServiceCidrCoredns - deprecated
      clientServiceCidrCoredns: {{`{{ .ClusterClaim.spec.client.network.clusterDNS }}`}}
      clusterDNS: {{`{{ .ClusterClaim.spec.client.network.clusterDNS }}`}}
      serviceCidr: {{`{{ .ClusterClaim.spec.client.network.serviceCidr }}`}}
      clientServiceCidr: {{`{{ .ClusterClaim.spec.client.network.serviceCidr }}`}}
      podCidr: {{`{{ .ClusterClaim.spec.client.network.podCidr }}`}}
      podCidrMaskSize: "{{`{{ .ClusterClaim.spec.client.network.podCidrMaskSize }}`}}"
      ipamMode: {{`{{ dig "spec" "client" "network" "ipamMode" "cluster-pool" .ClusterClaim | quote }}`}}

      argocdDestinationName: {{`{{ .ClusterClaim.metadata.name }}`}}-client
      argocdDestinationNamespace: {{ .Values.argocdDestinationNamespace }}
      trackingID: {{`{{ .ClusterClaim.metadata.namespace }}`}}_{{`{{ .ClusterClaim.metadata.name }}`}}:argoproj.io/Application:{{`{{ .ClusterClaim.metadata.namespace }}`}}/{{`{{ .ClusterClaim.metadata.name }}`}}

      systemEnabled: "{{`{{ hasPrefix "system" .ClusterClaim.spec.infra.role }}`}}"
      argocdServerAdminPassword: "<path:secret/data/clusters/{{`{{ .ClusterClaim.metadata.namespace }}`}}-{{`{{ .ClusterClaim.metadata.name }}`}}/argocd#admin.passwordBcrypt>"
      etcdbackupAppArgsStorecontainer: "<path:secret/data/clusters/{{`{{ .ClusterClaim.metadata.namespace }}`}}-{{`{{ .ClusterClaim.metadata.name }}`}}/etcd-backup#bucket>"
      etcdbackupS3AccessKey: "<path:secret/data/clusters/{{`{{ .ClusterClaim.metadata.namespace }}`}}-{{`{{ .ClusterClaim.metadata.name }}`}}/etcd-backup#access-key>"
      etcdbackupS3SecretAccessKey: "<path:secret/data/clusters/{{`{{ .ClusterClaim.metadata.namespace }}`}}-{{`{{ .ClusterClaim.metadata.name }}`}}/etcd-backup#secret-key>"
      etcdbackupS3SecretEndpoint: {{ .Values.extraArgs.etcdbackupS3SecretEndpoint }}
      incloudUICookieSecret: "<path:secret/data/clusters/{{`{{ .ClusterClaim.metadata.namespace }}`}}-{{`{{ .ClusterClaim.metadata.name }}`}}/incloud-web#cookie-secret>"
      argocdOidcClientSecret: "<path:secret/data/clusters/{{`{{ .ClusterClaim.metadata.namespace }}`}}-{{`{{ .ClusterClaim.metadata.name }}`}}/argocd#oidc-client-secret>"
      incloudWebOidcClientSecret: "<path:secret/data/clusters/{{`{{ .ClusterClaim.metadata.namespace }}`}}-{{`{{ .ClusterClaim.metadata.name }}`}}/incloud-web#oidc-client-secret>"
      companyPrefix: {{ .Values.extraArgs.companyPrefix }}
      companyDomain: {{ .Values.extraArgs.companyDomain }}
      companyExternalChartRegistry: {{ .Values.extraArgs.companyExternalChartRegistry }}
      companyExternalGitRepository: {{ .Values.extraArgs.companyExternalGitRepository }}

    {{`{{- if (index .ClusterClaim.spec.extraEnvs "systemIstioGwVip") }}`}}
      systemIstioGwVip: {{`{{ .ClusterClaim.spec.extraEnvs.systemIstioGwVip }}`}}
    {{`{{- else }}`}}
      systemIstioGwVip: {{ .Values.extraArgs.systemIstioGwVip }}
    {{`{{- end }}`}}
    {{`{{- if (index .ClusterClaim.spec.extraEnvs "systemIstioGwDomain") }}`}}
      systemIstioGwDomain: {{`{{ .ClusterClaim.spec.extraEnvs.systemIstioGwDomain }}`}}
    {{`{{- else }}`}}
      systemIstioGwDomain: {{ .Values.extraArgs.systemIstioGwDomain }}
    {{`{{- end }}`}}
    {{`{{- if (index .ClusterClaim.spec.extraEnvs "systemVmInsertVIP") }}`}}
      systemVmInsertVIP: {{`{{ .ClusterClaim.spec.extraEnvs.systemVmInsertVIP }}`}}
    {{`{{- else }}`}}
      systemVmInsertVIP: {{ .Values.extraArgs.systemVmInsertVIP }}
    {{`{{- end }}`}}      
