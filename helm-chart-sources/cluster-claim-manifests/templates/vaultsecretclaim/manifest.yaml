---
apiVersion: clusterclaim.in-cloud.io/v1alpha1
kind: ClusterClaimObserveResourceTemplate
metadata:
  name: {{ .Release.Name }}-vaultclaim
spec:
  apiVersion: vault.in-cloud.io/v1alpha1
  kind: VaultSecretClaim
  value: |
    metadata:
      labels:
        xcluster.in-cloud.io/name: "{{`{{ .ClusterClaim.metadata.name }}`}}"
    spec:
      vaultConfigRef:
        name: vault-secret
      clusterRef:
        name: "{{`{{ .ClusterClaim.metadata.name }}`}}"
      secretsPrefix: "clusters/{{`{{ .ClusterClaim.metadata.namespace }}`}}-{{`{{ .ClusterClaim.metadata.name }}`}}"
      deletionPolicy: Retain
      secretList:
        - name: argocd-admin
          type: generate
          destination:
            path: argocd
            key: admin.password
            hashedKey: admin.passwordBcrypt
          generate:
            length: 16
            hash: bcrypt
        - name: vmuser
          type: generate
          destination:
            path: vmuser
            key: password
          generate:
            length: 24
            hash: none
        - name: etcd-backup-s3-bucket
          type: copy
          source:
            path: clusters/SYSTEM-CLUSTER-FULLNAME/etcd-backup # TODO: зашаблонить SYSTEM-CLUSTER-FULLNAME
            key: bucket
          destination:
            path: etcd-backup
            key: bucket
        - name: etcd-backup-s3-access-key
          type: copy
          source:
            path: clusters/SYSTEM-CLUSTER-FULLNAME/etcd-backup # TODO: зашаблонить SYSTEM-CLUSTER-FULLNAME
            key: access-key
          destination:
            path: etcd-backup
            key: access-key
        - name: etcd-backup-s3-access-secret
          type: copy
          source:
            path: clusters/SYSTEM-CLUSTER-FULLNAME/etcd-backup # TODO: зашаблонить SYSTEM-CLUSTER-FULLNAME
            key: access-secret
          destination:
            path: etcd-backup
            key: access-secret
