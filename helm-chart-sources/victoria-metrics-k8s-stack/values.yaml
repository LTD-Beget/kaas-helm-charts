  enabled: false
  type: VictoriaMetrics
  secureService:
    enabled: false
    # Create a secret containing both 'tls.crt' and 'tls.key' fields
    issuer:
      kind: ClusterIssuer
      name: default
  grafana:
    vmDatasource:
      enabled: false

additionalService:
  vmcluster:
    enabled: false

tls:
  vmInsert:
    enabled: false
    issuer:
      kind: ClusterIssuer
      name: default-issuer-name
    certificate:
      name: vminsert-tls
      secretName: vminsert-tls
      duration: 8760h
      renewBefore: 720h
      commonName: vminsert
      dnsNames:
        - vminsert.default.svc
        - vminsert.default.svc.cluster.local
      ipAddresses:
        - "127.0.0.1"

  vmSelect:
    enabled: false
    issuer:
      kind: ClusterIssuer
      name: default-issuer-name
    certificate:
      name: vmselect-tls
      secretName: vmselect-tls
      duration: 8760h
      renewBefore: 720h
      commonName: vmselect
      dnsNames:
        - vmselect.default.svc
        - vmselect.default.svc.cluster.local
      ipAddresses:
        - "127.0.0.1"

  alertmanager:
    enabled: false
    issuer:
      kind: ClusterIssuer
      name: default-issuer-name
    certificate:
      name: alertmanager-tls
      secretName: alertmanager-tls
      duration: 8760h
      renewBefore: 720h
      commonName: alertmanager
      dnsNames:
        - alertmanager.default.svc
        - alertmanager.default.svc.cluster.local
      ipAddresses:
        - "127.0.0.1"

istioVirtualService:
  vmalert:
    enabled: false
    gateways:
      - istio-gw/default
    hosts:
      - "*"
    path: "/vmalert"
    http:
      name: vmalert
      route:
        host: vmalert
        port: 8080

