{{- if .Values.networkPolicies.vmagent.enabled }}
{{- $vmagentSA := printf "vmagent-%s" (include "victoria-metrics-k8s-stack.fullname" .) }}
{{- if .Values.vmInsertVIP }}
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-egress-vmagent-to-vminsert-vip
  namespace: {{ .Release.Namespace }}
spec:
  endpointSelector:
    matchLabels:
      k8s:io.cilium.k8s.policy.serviceaccount: {{ $vmagentSA }}
      k8s:io.kubernetes.pod.namespace: {{ .Release.Namespace }}
  egress:
  - toCIDR:
    - {{ .Values.vmInsertVIP }}/32
    toPorts:
    - ports:
      - port: "8480"
        protocol: TCP
  description: |
    Allows egress from vmagent to the vmInsert VIP
{{- end }}

