---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-vmagent-to-host-metrics
  namespace: {{ .Release.Namespace }}
spec:
  endpointSelector:
    matchLabels:
      k8s:io.cilium.k8s.policy.serviceaccount: {{ $vmagentSA }}
      k8s:io.kubernetes.pod.namespace: {{ .Release.Namespace }}
  egress:
    - toEntities:
      - host
      - remote-node
      toPorts:
        - ports:
            - port: "9100"
              protocol: TCP
            - port: "10250"
              protocol: TCP
            - port: "10257"
              protocol: TCP
            - port: "10259"
              protocol: TCP
            - port: "2381"
              protocol: TCP
            - port: "11038"
              protocol: TCP
            - port: "11039"
              protocol: TCP
            - port: "11043"
              protocol: TCP
            - port: "11046"
              protocol: TCP
  description: |
    Allows egress for vmagent to host metrics endpoints

