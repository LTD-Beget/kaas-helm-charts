---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-egress-vmagent-to-trivy-operator-11043
  namespace: {{ $ns }}
spec:
  endpointSelector:
    matchLabels:
      k8s:io.cilium.k8s.policy.serviceaccount: {{ $vmagentSA }}
      k8s:io.kubernetes.pod.namespace: {{ $ns }}
  egress:
  - toEndpoints:
    - matchLabels:
        k8s:io.cilium.k8s.policy.serviceaccount: trivy-operator
        k8s:io.kubernetes.pod.namespace: {{ .Values.companyPrefix }}-trivy-operator
    toPorts:
    - ports:
      - port: '11043'
        protocol: TCP
  description: Allows egress from vmagent to trivy-operator on 11043 for metrics collection.

