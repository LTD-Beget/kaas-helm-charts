{{- if .Values.networkPolicies.alertmanager.enabled }}
{{- $alertmanagerSA := printf "vmalertmanager-%s" (include "victoria-metrics-k8s-stack.fullname" .) }}
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-ingress-alertmanager-from-vmalert-9093
  namespace: {{ .Release.Namespace }}
spec:
  endpointSelector:
    matchLabels:
      k8s:io.cilium.k8s.policy.serviceaccount: {{ $alertmanagerSA }}
      k8s:io.kubernetes.pod.namespace: {{ .Release.Namespace }}
  ingress:
  - fromEndpoints:
    - matchLabels:
        k8s:io.cilium.k8s.policy.serviceaccount: vmalert-vm-alert
        k8s:io.kubernetes.pod.namespace: {{ .Values.companyPrefix }}-vmalert
    toPorts:
    - ports:
      - port: '9093'
        protocol: TCP
  description: Allows ingress from vmalert to alertmanager on 9093 for alert notifications.

---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-egress-alertmanager-to-kube-apiserver-6443
  namespace: {{ .Release.Namespace }}
spec:
  endpointSelector:
    matchLabels:
      k8s:io.cilium.k8s.policy.serviceaccount: {{ $alertmanagerSA }}
      k8s:io.kubernetes.pod.namespace: {{ .Release.Namespace }}
  egress:
  - toEntities:
    - kube-apiserver
    toPorts:
    - ports:
      - port: '6443'
        protocol: TCP
  description: Allows egress from alertmanager to the Kubernetes API server on 6443
    for control-plane interactions.

---
# Gossip egress: this replica → other replicas.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-egress-alertmanager-to-alertmanager-9094
  namespace: {{ .Release.Namespace }}
spec:
  endpointSelector:
    matchLabels:
      k8s:io.cilium.k8s.policy.serviceaccount: {{ $alertmanagerSA }}
      k8s:io.kubernetes.pod.namespace: {{ .Release.Namespace }}
  egress:
  - toEndpoints:
    - matchLabels:
        k8s:io.cilium.k8s.policy.serviceaccount: {{ $alertmanagerSA }}
        k8s:io.kubernetes.pod.namespace: {{ .Release.Namespace }}
    toPorts:
    - ports:
      - port: '9094'
        protocol: TCP
      - port: '9094'
        protocol: UDP
  description: Allows egress gossip from alertmanager replicas on 9094 for HA clustering.

---
# Gossip ingress: other replicas → this replica.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-ingress-alertmanager-from-alertmanager-9094
  namespace: {{ .Release.Namespace }}
spec:
  endpointSelector:
    matchLabels:
      k8s:io.cilium.k8s.policy.serviceaccount: {{ $alertmanagerSA }}
      k8s:io.kubernetes.pod.namespace: {{ .Release.Namespace }}
  ingress:
  - fromEndpoints:
    - matchLabels:
        k8s:io.cilium.k8s.policy.serviceaccount: {{ $alertmanagerSA }}
        k8s:io.kubernetes.pod.namespace: {{ .Release.Namespace }}
    toPorts:
    - ports:
      - port: '9094'
        protocol: TCP
      - port: '9094'
        protocol: UDP
  description: Allows ingress gossip to alertmanager replicas on 9094 for HA clustering.

