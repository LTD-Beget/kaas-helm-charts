{{- if .Values.networkPolicies.vmcluster.enabled }}
{{- $vmclusterSA := printf "vmcluster-%s" (include "victoria-metrics-k8s-stack.fullname" .) }}

# ============================================================
# vminsert — write path entry point
# ============================================================

---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-egress-vminsert-to-coredns-53
  namespace: {{ .Release.Namespace }}
spec:
  endpointSelector:
    matchLabels:
      k8s:io.cilium.k8s.policy.serviceaccount: {{ $vmclusterSA }}
      k8s:io.kubernetes.pod.namespace: {{ .Release.Namespace }}
      k8s:app.kubernetes.io/name: vminsert
  egress:
  - toEndpoints:
    - matchLabels:
        k8s:io.cilium.k8s.policy.serviceaccount: coredns
        k8s:io.kubernetes.pod.namespace: {{ .Values.companyPrefix }}-coredns
    toPorts:
    - ports:
      - port: '53'
        protocol: UDP
      - port: '53'
        protocol: TCP
  description: Allows egress from vminsert to CoreDNS on 53 for DNS resolution.

---
apiVersion: cilium.io/v2
