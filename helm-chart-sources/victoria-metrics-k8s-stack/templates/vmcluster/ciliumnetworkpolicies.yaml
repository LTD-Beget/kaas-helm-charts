      k8s:io.cilium.k8s.policy.serviceaccount: {{ $vmclusterSA }}
      k8s:io.kubernetes.pod.namespace: {{ .Release.Namespace }}
      k8s:app.kubernetes.io/name: vminsert
  egress:
  - toEntities:
    - kube-apiserver
    toPorts:
    - ports:
      - port: '6443'
        protocol: TCP
  description: Allows egress from vminsert to the Kubernetes API server on 6443 for
    control-plane interactions.

