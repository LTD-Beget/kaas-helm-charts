apiVersion: operator.victoriametrics.com/v1beta1
kind: VMRule
metadata:
  name: beget-clickhouse-client-node-rules
  namespace: {{ .Release.Namespace }}
  labels:
    in-cloud-metrics: clickhouse
spec:
  groups:
    # NODES
    - name: beget-clickhouse-client-node-rules.node
      params: {}
      rules:
        # - annotations: {}
