        - annotations: {}
          expr: |-
            sum by (cluster, nodename) (
              label_replace(
                label_replace(
                  kube_node_status_capacity{cluster_type="infra",resource="cpu"},
                  "cluster", "$1", "cluster_full_name", "(.*)"
                ),
                "nodename", "$1", "node", "(.*)"
              )
            )
          labels: {}
          record: 'beget_node_cpu_total_cores'

        - annotations: {}
          expr: |-
            sum by (cluster, nodename) (
              rate(
                label_replace(
                  label_replace(
                    node_cpu_usage_seconds_total{cluster_type="client"},
                    "cluster", "$1", "cluster_full_name", "(.*)"
                  ),
                  "nodename", "$1", "instance", "(.*)"
                )[5m]
              )
            )
          labels: {}
          record: 'beget_node_cpu_used_cores'

