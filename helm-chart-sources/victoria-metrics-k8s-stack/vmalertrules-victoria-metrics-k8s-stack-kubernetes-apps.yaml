ds has not been met for at least 15m.","runbook_url":"https://runbooks.prometheus-operator.dev/runbooks/kubernetes/kubepdbnotenoughhealthypods","summary":"PDB does not have enough healthy pods."},"expr":"(\n  kube_poddisruptionbudget_status_desired_healthy{job=\"kube-state-metrics\", namespace=~\"beget.*|kube.*|default\"}\n  -\n  kube_poddisruptionbudget_status_current_healthy{job=\"kube-state-metrics\", namespace=~\"beget.*|kube.*|default\"}\n)\n\u003e 0","for":"15m","labels":{"severity":"warning"}}]}]}}
  creationTimestamp: "2025-10-30T16:38:43Z"
