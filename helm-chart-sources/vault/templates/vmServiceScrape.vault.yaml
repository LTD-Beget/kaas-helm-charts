{{- if and .Values.monitoring.enabled (eq .Values.monitoring.type "VictoriaMetrics") }}
---
# Requires vault telemetry { unauthenticated_metrics_access = true } in vault config.
# kube-rbac-proxy sidecar is added via patches/statefulset.vault.yaml.
apiVersion: operator.victoriametrics.com/v1beta1
kind: VMServiceScrape
metadata:
  name: vault
  namespace: {{ .Release.Namespace }}
spec:
  selector:
    matchLabels:
      monitoring.in-cloud.io/service: vault
  endpoints:
    - port: https-metrics
      path: /v1/sys/metrics
      scheme: HTTPS
      bearerTokenFile: /var/run/secrets/kubernetes.io/serviceaccount/token
      params:
        format:
          - prometheus
      tlsConfig:
        serverName: vault-metrics.{{ .Release.Namespace }}.svc
        {{- if .Values.monitoring.secureService.enabled }}
        insecureSkipVerify: false
        ca:
          secret:
            name: vault-svc-tls
            key: ca.crt
        cert:
          secret:
            name: vault-svc-tls
            key: tls.crt
        keySecret:
          name: vault-svc-tls
          key: tls.key
        {{- else }}
        insecureSkipVerify: true
        {{- end }}
      {{- with .Values.monitoring.serviceScrapeConfig.metricRelabelConfigs }}
      metricRelabelConfigs:
        {{- toYaml . | nindent 8 }}
      {{- end }}
  jobLabel: "app.kubernetes.io/name"
{{- end }}
