{{- if .Values.monitoring.enabled }}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: vault-svc-tls
  namespace: {{ .Release.Namespace }}
spec:
  secretName: vault-svc-tls
  duration: 8760h
  renewBefore: 720h
  commonName: vault-metrics
  dnsNames:
    - vault-metrics
    - vault-metrics.{{ .Release.Namespace }}
    - vault-metrics.{{ .Release.Namespace }}.svc
  privateKey:
    algorithm: RSA
    size: 2048
  usages:
    - digital signature
    - key encipherment
    - server auth
  issuerRef:
    kind: {{ .Values.monitoring.secureService.issuer.kind }}
    name: {{ .Values.monitoring.secureService.issuer.name }}
{{- end }}
