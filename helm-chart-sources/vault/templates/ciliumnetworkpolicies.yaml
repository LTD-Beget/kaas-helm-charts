{{- end }}

---
# Allow vault-agent-injector to reach vault server to retrieve secrets.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-egress-vault-agent-injector-to-vault-8200
  namespace: {{ .Release.Namespace }}
spec:
  endpointSelector:
    matchLabels:
      k8s:io.cilium.k8s.policy.serviceaccount: vault-agent-injector
      k8s:io.kubernetes.pod.namespace: {{ .Release.Namespace }}
  egress:
  - toEndpoints:
    - matchLabels:
        k8s:io.cilium.k8s.policy.serviceaccount: vault
        k8s:io.kubernetes.pod.namespace: {{ .Release.Namespace }}
    toPorts:
    - ports:
      - port: '8200'
        protocol: TCP
  description: |
    Allows egress from vault-agent-injector to vault server on 8200
    to retrieve secrets for sidecar injection.
{{- end }}
