{{- if .Values.networkPolicies.enabled }}
---
# Allow vault server to talk to the Kubernetes API server (kubernetes service_registration).
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-egress-vault-to-kube-apiserver-6443
  namespace: {{ .Release.Namespace }}
spec:
  endpointSelector:
    matchLabels:
      k8s:io.cilium.k8s.policy.serviceaccount: vault
      k8s:io.kubernetes.pod.namespace: {{ .Release.Namespace }}
  egress:
  - toEntities:
    - kube-apiserver
    toPorts:
    - ports:
      - port: '6443'
        protocol: TCP
  description: |
    Allows egress from vault server to the Kubernetes API server on 6443
    for control-plane interactions and kubernetes service_registration.

---
# Allow vault server to reach etcd on control-plane nodes (storage backend).
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-egress-vault-to-etcd-2379
  namespace: {{ .Release.Namespace }}
spec:
  endpointSelector:
    matchLabels:
      k8s:io.cilium.k8s.policy.serviceaccount: vault
      k8s:io.kubernetes.pod.namespace: {{ .Release.Namespace }}
  egress:
  - toEntities:
    - host
    toPorts:
    - ports:
      - port: '2379'
        protocol: TCP
  description: |
    Allows egress from vault server to etcd on 2379 (host network of control-plane nodes)
    for the etcd storage backend.

---
# Allow vmagent to scrape vault metrics via the kube-rbac-proxy sidecar.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-ingress-vmagent-to-vault-11043
  namespace: {{ .Release.Namespace }}
spec:
  endpointSelector:
    matchLabels:
      k8s:io.cilium.k8s.policy.serviceaccount: vault
      k8s:io.kubernetes.pod.namespace: {{ .Release.Namespace }}
  ingress:
  - fromEndpoints:
    - matchLabels:
        k8s:io.cilium.k8s.policy.serviceaccount: vmagent-vmagent
        k8s:io.kubernetes.pod.namespace: {{ .Values.companyPrefix }}-vmagent
    toPorts:
    - ports:
      - port: '11043'
        protocol: TCP
  description: |
    Allows ingress from vmagent to the vault kube-rbac-proxy sidecar on 11043
    for telemetry/metrics collection.

---
# Allow configured sources to reach vault server on 8200.
# vault-operator is always included; additional sources via networkPolicies.additionalIngressSources.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-ingress-to-vault-8200
  namespace: {{ .Release.Namespace }}
spec:
  endpointSelector:
    matchLabels:
      k8s:io.cilium.k8s.policy.serviceaccount: vault
      k8s:io.kubernetes.pod.namespace: {{ .Release.Namespace }}
  ingress:
  - fromEndpoints:
    - matchLabels:
        k8s:io.cilium.k8s.policy.serviceaccount: vault-operator-controller-manager
        k8s:io.kubernetes.pod.namespace: {{ .Values.companyPrefix }}-vault-operator
    toPorts:
    - ports:
      - port: '8200'
        protocol: TCP
  description: |
    Allows ingress to vault server on 8200 from vault-operator
    {{- range .Values.networkPolicies.additionalIngressSources }} and {{ .serviceAccount }} ({{ .namespace }}){{ end }}.

{{- if .Values.prepareJob.enabled }}
---
# Allow vault-prepare job ingress to vault server on 8200.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-ingress-vault-prepare-to-vault-8200
  namespace: {{ .Release.Namespace }}
spec:
  endpointSelector:
    matchLabels:
      k8s:io.cilium.k8s.policy.serviceaccount: vault
      k8s:io.kubernetes.pod.namespace: {{ .Release.Namespace }}
  ingress:
  - fromEndpoints:
    - matchLabels:
        k8s:io.cilium.k8s.policy.serviceaccount: {{ .Release.Name }}-prepare
        k8s:io.kubernetes.pod.namespace: {{ .Release.Namespace }}
    toPorts:
    - ports:
      - port: '8200'
        protocol: TCP
  description: |
    Allows ingress from vault-prepare job to vault server on 8200
    for initial configuration (auth methods, policies, roles).
{{- end }}

