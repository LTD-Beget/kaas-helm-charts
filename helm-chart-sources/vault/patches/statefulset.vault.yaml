---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: vault
spec:
  template:
    spec:
      containers:
        - name: rbac-proxy
          image: quay.io/brancz/kube-rbac-proxy:v0.21.0
          args:
            - --secure-listen-address=0.0.0.0:11043
            - --upstream=https://127.0.0.1:8200
            - --upstream-ca-file=/vault/userconfig/vault-tls-server/ca.crt
            - --tls-cert-file=/app/config/metrics/tls/tls.crt
            - --tls-private-key-file=/app/config/metrics/tls/tls.key
            - --v=2
          ports:
            - name: https-metrics
              containerPort: 11043
              protocol: TCP
          resources:
            requests:
              memory: "32Mi"
              cpu: "10m"
            limits:
              memory: "64Mi"
              cpu: "50m"
          volumeMounts:
            - name: rbac-proxy-tls
              mountPath: /app/config/metrics/tls
              readOnly: true
            - name: vault-tls-server
              mountPath: /vault/userconfig/vault-tls-server
              readOnly: true
      volumes:
        - name: rbac-proxy-tls
          secret:
            defaultMode: 420
            secretName: vault-svc-tls
        - name: vault-tls-server
          secret:
            defaultMode: 420
            secretName: vault-tls-server
