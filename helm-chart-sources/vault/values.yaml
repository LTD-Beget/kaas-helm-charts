# vault - values for vault chart
vault:
  server:
    service:
      port: 8200

prepareJob:
  enabled: false

  image:
    repository: hashicorp/vault
    tag: ""  # defaults to .Chart.AppVersion
    pullPolicy: IfNotPresent

  # Name of the secret holding ROOT_TOKEN and UNSEAL_KEYS
  secretName: vault-keys
  rootTokenKey: ROOT_TOKEN
  # unsealKeysKey: UNSEAL_KEYS

  # Kubernetes auth mount path (typically the cluster name)
  clusterName: ""

  kubernetesAuth:
    enabled: true

  vaultOperator:
    enabled: true
    serviceAccountName: vault-operator-controller-manager
    namespace: example-vault-operator

  vaultSecretOperator:
    enabled: true
    serviceAccountName: vault-secret-operator-controller-manager
    namespace: example-vault-operator

  monitoring:
    # Disabled by default: metrics are scraped via the kube-rbac-proxy sidecar
    # (k8s RBAC), so the vault-side metrics-reader policy/role is not required.
    enabled: false
    serviceAccountName: vmagent-vmagent
    namespace: example-vmagent

  # Optional step: enable the KV v2 secrets engine.
  secretEngine:
    enabled: false
    path: secret

monitoring:
  enabled: false
  type: VictoriaMetrics
  secureService:
    enabled: false
    issuer:
      kind: ClusterIssuer
      name: default-issuer-name

tls:
  enabled: false   # общий рубильник
  # Общие дефолты (можно переопределять в server/client)
  defaults:
    duration: 8760h
    renewBefore: 720h
    privateKey:
      algorithm: RSA
      size: 2048

  server:
    enabled: false
    certificate:
      name: vault-tls-server
      secretName: vault-tls
      commonName: vault
      dnsNames:
        - vault.default.svc
        - vault.default.svc.cluster.local
      usages:
        - digital signature
        - key encipherment
        - server auth
    issuer:
      name: default-server-issuer
      kind: ClusterIssuer     # или Issuer

  client:
    enabled: false
    certificate:
      name: vault-tls-client
      secretName: vault-tls-client
      commonName: vault-client
      usages:
        - digital signature
        - key encipherment
        - client auth
    issuer:
      name: default-client-issuer
      kind: ClusterIssuer

companyPrefix: example

networkPolicies:
  enabled: false
  systemEnabled: false

istioVirtualService:
  enabled: false
  gateways:
    - istio-gw/default
  hosts:
    - "*"
