{{- if and .Values.managerClaim.enable .Values.metrics.enable }}
apiVersion: v1
kind: Service
metadata:
    labels:
        app.kubernetes.io/managed-by: {{ .Release.Service }}
        app.kubernetes.io/name: {{ include "addon-operator-claim.name" . }}
        helm.sh/chart: {{ .Chart.Name }}-{{ .Chart.Version | replace "+" "_" }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        control-plane: controller-manager-claim
    name: {{ include "addon-operator.resourceName" (dict "suffix" "controller-manager-claim-metrics" "context" $) }}
    namespace: {{ .Release.Namespace }}
spec:
    ports:
        - name: https
          port: {{ .Values.metrics.port }}
          protocol: TCP
          targetPort: {{ .Values.metrics.port }}
    selector:
        app.kubernetes.io/name: {{ include "addon-operator-claim.name" . }}
        control-plane: controller-manager-claim
{{- end }}
