{{- if and .Values.monitoring.enabled }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ template "wrapper-prometheus-process-exporter.fullname" . }}-kube-rbac-proxy
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: kube-rbac-proxy-tokenreview
subjects:
  - kind: ServiceAccount
    name: {{ template "wrapper-prometheus-process-exporter.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
