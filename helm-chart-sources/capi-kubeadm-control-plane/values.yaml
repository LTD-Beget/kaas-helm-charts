# Default values for capi-kubeadm-control-plane.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

companyPrefix: example

networkPolicies:
  enabled: false

replicaCount: 1

image:
  repository: registry.k8s.io/cluster-api/kubeadm-control-plane-controller
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""


imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Automatically mount a ServiceAccount's API credentials?
  automount: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext:
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault
  # fsGroup: 2000

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
    - ALL
  privileged: false
  runAsGroup: 65532
  runAsUser: 65532
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true

webhookService:
  type: ClusterIP
  port: 9443
  domain: "cluster.local"

metricsService:
  type: ClusterIP
  port: 8443

resources: {}
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

# Additional volumes on the output Deployment definition.
volumes: []
# - name: foo
#   secret:
#     secretName: mysecret
#     optional: false

# Additional volumeMounts on the output Deployment definition.
volumeMounts: []
# - name: foo
#   mountPath: "/etc/foo"
#   readOnly: true

nodeSelector: {}

priorityClassName: system-cluster-critical

tolerations:
  - effect: NoSchedule
    key: node-role.kubernetes.io/master
  - effect: NoSchedule
    key: node-role.kubernetes.io/control-plane
  - effect: NoSchedule
    key: node-role.kubernetes.io/data-plane
  - effect: NoSchedule
    key: node-role.kubernetes.io/b-cloud-infra

affinity: {}

certificates:
  useExternalIssuer: false
  externalIssuer:
    kind: ClusterIssuer
    name: ""

monitoring:
  serviceScrapeConfig:
    metricRelabelConfigs:
      - sourceLabels: [__name__]
        action: keep
        regex: |
          container_cpu_usage_seconds_total|
          container_memory_rss|
          container_memory_working_set_bytes|
          container_network_receive_bytes_total|
          container_network_receive_errors_total|
          container_network_receive_packets_dropped_total|
          container_network_receive_packets_total|
          container_network_transmit_bytes_total|
          container_network_transmit_errors_total|
          container_network_transmit_packets_dropped_total|
          container_network_transmit_packets_total|
          container_oom_events_total|
          controller_runtime_active_workers|
          controller_runtime_max_concurrent_reconciles|
          controller_runtime_reconcile_errors_total|
          controller_runtime_reconcile_panics_total|
          controller_runtime_reconcile_time_seconds_bucket|
          controller_runtime_reconcile_total|
          controller_runtime_terminal_reconcile_errors_total|
          go_gc_duration_seconds_count|
          go_gc_duration_seconds_sum|
          go_goroutines|
          go_memstats_alloc_bytes_total|
          go_memstats_gc_sys_bytes|
          go_memstats_heap_idle_bytes|
          go_memstats_heap_inuse_bytes|
          go_memstats_heap_released_bytes|
          go_memstats_mcache_sys_bytes|
          go_memstats_mspan_sys_bytes|
          go_memstats_other_sys_bytes|
          go_memstats_stack_inuse_bytes|
          go_memstats_sys_bytes|
          go_sched_latencies_seconds_bucket|
          kube_service_info|
          leader_election_master_status|
          node_namespace_pod:kube_pod_info:|
          process_cpu_seconds_total|
          process_max_fds|
          process_open_fds|
          process_resident_memory_bytes|
          process_start_time_seconds|
          process_virtual_memory_bytes|
          rest_client_requests_total|
          scrape_series_added|
          up|
          workqueue_adds_total|
          workqueue_depth|
          workqueue_longest_running_processor_seconds|
          workqueue_queue_duration_seconds_count|
          workqueue_queue_duration_seconds_sum|
          workqueue_retries_total|
          workqueue_unfinished_work_seconds|
          workqueue_work_duration_seconds_count|
          workqueue_work_duration_seconds_sum
  vmServiceScrape:
    enabled: false
