{{- if .Values.networkPolicies.enabled }}
---
# Allow vault-operator controller-manager to talk to the Kubernetes API server.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-egress-vault-operator-to-kube-apiserver-6443
  namespace: {{ .Release.Namespace }}
spec:
  endpointSelector:
    matchLabels:
      k8s:io.cilium.k8s.policy.serviceaccount: {{ include "vault-operator.resourceName" (dict "suffix" "controller-manager" "context" $) }}
      k8s:io.kubernetes.pod.namespace: {{ .Release.Namespace }}
  egress:
  - toEntities:
    - kube-apiserver
    toPorts:
    - ports:
      - port: '6443'
        protocol: TCP
  description: |
    Allows egress from vault-operator to the Kubernetes API server on 6443
    for control-plane interactions.

---
# Allow vmagent to scrape vault-operator metrics.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-ingress-vmagent-to-vault-operator-8443
  namespace: {{ .Release.Namespace }}
spec:
  endpointSelector:
    matchLabels:
      k8s:io.cilium.k8s.policy.serviceaccount: {{ include "vault-operator.resourceName" (dict "suffix" "controller-manager" "context" $) }}
      k8s:io.kubernetes.pod.namespace: {{ .Release.Namespace }}
  ingress:
  - fromEndpoints:
    - matchLabels:
        k8s:io.cilium.k8s.policy.serviceaccount: vmagent-vmagent
        k8s:io.kubernetes.pod.namespace: {{ .Values.companyPrefix }}-vmagent
    toPorts:
    - ports:
      - port: '{{ .Values.metrics.port }}'
        protocol: TCP
  description: |
    Allows ingress from vmagent to vault-operator on {{ .Values.metrics.port }} for metrics collection.

{{- range $name, $vc := .Values.vaultConfigs }}
{{- $addr := $vc.spec.address }}
{{- $isHttps := hasPrefix "https://" $addr }}
{{- $hostpart := $addr | trimPrefix "https://" | trimPrefix "http://" }}
{{- $hasPort := contains ":" $hostpart }}
{{- $host := $hostpart }}
{{- $port := ternary "443" "80" $isHttps }}
{{- if $hasPort }}
{{- $host = index (splitList ":" $hostpart) 0 }}
{{- $port = index (splitList ":" $hostpart) 1 }}
{{- end }}
{{- $hostParts := splitList "." $host }}
{{- $isK8s := false }}
{{- if ge (len $hostParts) 3 }}
{{- if eq (index $hostParts 2) "svc" }}
{{- $isK8s = true }}
{{- end }}
{{- end }}
---
# Allow vault-operator controller-manager to reach vault "{{ $name }}".
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-egress-vault-operator-to-vault-{{ $name }}-{{ $port }}
  namespace: {{ $.Release.Namespace }}
spec:
  endpointSelector:
    matchLabels:
      k8s:io.cilium.k8s.policy.serviceaccount: {{ include "vault-operator.resourceName" (dict "suffix" "controller-manager" "context" $) }}
      k8s:io.kubernetes.pod.namespace: {{ $.Release.Namespace }}
  egress:
  {{- if $isK8s }}
  - toEndpoints:
    - matchLabels:
        k8s:io.cilium.k8s.policy.serviceaccount: vault
        k8s:io.kubernetes.pod.namespace: {{ index $hostParts 1 }}
    toPorts:
    - ports:
      - port: '{{ $port }}'
        protocol: TCP
  {{- else }}
  - toFQDNs:
    - matchName: {{ $host }}
    toPorts:
    - ports:
      - port: '{{ $port }}'
        protocol: TCP
  {{- end }}
  description: |
    Allows egress from vault-operator to vault "{{ $name }}" ({{ $addr }}) for management operations.
{{- end }}
{{- end }}
