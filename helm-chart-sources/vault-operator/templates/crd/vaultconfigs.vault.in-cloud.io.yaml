{{- if .Values.crd.enable }}
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.19.0
  name: vaultconfigs.vault.in-cloud.io
spec:
  group: vault.in-cloud.io
  names:
    kind: VaultConfig
    listKind: VaultConfigList
    plural: vaultconfigs
    shortNames:
      - vcfg
    singular: vaultconfig
  scope: Cluster
  versions:
    - additionalPrinterColumns:
      - jsonPath: .spec.address
        name: Address
        type: string
      - jsonPath: .status.conditions[?(@.type=='VaultUnsealed')].status
        name: Unsealed
        type: string
      - jsonPath: .status.conditions[?(@.type=='Reachable')].status
        name: Reachable
        type: string
      - jsonPath: .status.referencedBy
        name: Refs
        type: integer
      - jsonPath: .metadata.creationTimestamp
        name: Age
        type: date
      name: v1alpha1
      schema:
        openAPIV3Schema:
          description: VaultConfig is the cluster-scoped Vault connection referenced by VaultClaims.
          properties:
            apiVersion:
              description: |-
                APIVersion defines the versioned schema of this representation of an object.
                Servers should convert recognized schemas to the latest internal value, and
                may reject unrecognized values.
                More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
              type: string
            kind:
              description: |-
                Kind is a string value representing the REST resource this object represents.
                Servers may infer this from the endpoint the client submits requests to.
                Cannot be updated.
                In CamelCase.
                More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
              type: string
            metadata:
              type: object
            spec:
              description: |-
                VaultConfigSpec is the cluster-scoped Vault connection. One VaultConfig
                (typically "default") is referenced by many VaultClaims; multi-Vault is
                supported via multiple named VaultConfigs (OPERATOR-SPEC §1.1, D13).
              properties:
                address:
                  description: |-
                    Address is the Vault URL. https:// in production; http:// is permitted
                    for dev-mode Vault (e2e tests). Mutable — cascade reconciles all claims.
                  minLength: 1
                  pattern: ^https?://
                  type: string
                managerAuth:
                  default:
                    method: kubernetes
                    mountPath: kubernetes-mgmt
                    role: vault-operator
                  description: |-
                    ManagerAuthSpec describes how the operator authenticates to Vault. This
                    is the "outer" auth (auth/{managerAuth.mountPath}/login), distinct from
                    the per-cluster auth mounts the operator creates for consumer pods.
                  properties:
                    method:
                      default: kubernetes
                      enum:
                        - kubernetes
                      type: string
                    mountPath:
                      default: kubernetes-mgmt
                      description: |-
                        MountPath of the auth method in Vault. Mutable, but the new mount
                        must already exist in Vault (validated at reconcile).
                      minLength: 1
                      type: string
                    role:
                      default: vault-operator
                      minLength: 1
                      type: string
                  type: object
                storage:
                  default:
                    kvMountPath: secret
                  description: |-
                    StorageSpec describes the shared KV-v2 mount that holds all clusters'
                    secrets. The mount itself is deployed by the platform; the operator only
                    writes policies referencing paths under it (OPERATOR-SPEC D2).
                  properties:
                    kvMountPath:
                      default: secret
                      description: |-
                        KvMountPath is immutable — changing it invalidates every previously
                        written policy.
                      minLength: 1
                      type: string
                  type: object
                tls:
                  description: TLSSpec describes TLS settings for connecting to Vault.
                  properties:
                    caBundleRef:
                      description: LocalObjectRef references a Secret/ConfigMap (used for CA bundle, etc.).
                      properties:
                        name:
                          minLength: 1
                          type: string
                        namespace:
                          minLength: 1
                          type: string
                      required:
                        - name
                        - namespace
                      type: object
                    serverName:
                      type: string
                  type: object
              required:
                - address
              type: object
              x-kubernetes-validations:
                - message: spec.storage.kvMountPath is immutable
                  rule: self.storage.kvMountPath == oldSelf.storage.kvMountPath
            status:
              description: VaultConfigStatus reflects the observed health of Vault.
              properties:
                conditions:
                  items:
                    description: Condition contains details for one aspect of the current state of this API Resource.
                    properties:
                      lastTransitionTime:
                        description: |-
                          lastTransitionTime is the last time the condition transitioned from one status to another.
                          This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                        format: date-time
                        type: string
                      message:
                        description: |-
                          message is a human readable message indicating details about the transition.
                          This may be an empty string.
                        maxLength: 32768
                        type: string
                      observedGeneration:
                        description: |-
                          observedGeneration represents the .metadata.generation that the condition was set based upon.
                          For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                          with respect to the current state of the instance.
                        format: int64
                        minimum: 0
                        type: integer
                      reason:
                        description: |-
                          reason contains a programmatic identifier indicating the reason for the condition's last transition.
                          Producers of specific condition types may define expected values and meanings for this field,
                          and whether the values are considered a guaranteed API.
                          The value should be a CamelCase string.
                          This field may not be empty.
                        maxLength: 1024
                        minLength: 1
                        pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                        type: string
                      status:
                        description: status of the condition, one of True, False, Unknown.
                        enum:
                          - "True"
                          - "False"
                          - Unknown
                        type: string
                      type:
                        description: type of condition in CamelCase or in foo.example.com/CamelCase.
                        maxLength: 316
                        pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                        type: string
                    required:
                      - lastTransitionTime
                      - message
                      - reason
                      - status
                      - type
                    type: object
                  type: array
                  x-kubernetes-list-map-keys:
                    - type
                  x-kubernetes-list-type: map
                lastHealthCheckAt:
                  format: date-time
                  type: string
                observedGeneration:
                  format: int64
                  type: integer
                referencedBy:
                  description: |-
                    ReferencedBy is the count of VaultClaims referencing this VaultConfig;
                    drives the deletion finalizer.
                  format: int32
                  type: integer
                sealStatus:
                  description: SealStatus mirrors GET /v1/sys/seal-status (OPERATOR-SPEC §3.8).
                  properties:
                    initialized:
                      type: boolean
                    "n":
                      description: N is the total number of Shamir shares.
                      format: int32
                      type: integer
                    progress:
                      description: Progress is the number of unseal shares submitted so far.
                      format: int32
                      type: integer
                    sealed:
                      type: boolean
                    t:
                      description: T is the threshold of Shamir shares needed for unseal.
                      format: int32
                      type: integer
                  type: object
                vaultVersion:
                  type: string
              type: object
          required:
            - spec
          type: object
      served: true
      storage: true
      subresources:
        status: {}
{{- end }}
