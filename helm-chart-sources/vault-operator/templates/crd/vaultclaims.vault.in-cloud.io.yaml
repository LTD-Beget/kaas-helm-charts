{{- if .Values.crd.enable }}
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.19.0
  name: vaultclaims.vault.in-cloud.io
spec:
  group: vault.in-cloud.io
  names:
    kind: VaultClaim
    listKind: VaultClaimList
    plural: vaultclaims
    shortNames:
      - vc
    singular: vaultclaim
  scope: Namespaced
  versions:
    - additionalPrinterColumns:
      - jsonPath: .status.phase
        name: Phase
        type: string
      - jsonPath: .spec.vaultConfigRef.name
        name: Config
        type: string
      - jsonPath: .spec.clusterRef.name
        name: Cluster
        type: string
      - jsonPath: .metadata.creationTimestamp
        name: Age
        type: date
      name: v1alpha1
      schema:
        openAPIV3Schema:
          description: |-
            VaultClaim is the per-cluster Vault configuration request, one per infra
            cluster (1:1 with ClusterClaim).
          properties:
            apiVersion:
              description: |-
                APIVersion defines the versioned schema of this representation of an object.
                Servers should convert recognized schemas to the latest internal value, and
                may reject unrecognized values.
                More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
              type: string
            kind:
              description: |-
                Kind is a string value representing the REST resource this object represents.
                Servers may infer this from the endpoint the client submits requests to.
                Cannot be updated.
                In CamelCase.
                More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
              type: string
            metadata:
              type: object
            spec:
              description: |-
                VaultClaimSpec is the desired state of a VaultClaim. One VaultClaim per
                infra cluster (1:1 with ClusterClaim).
              properties:
                auth:
                  description: AuthSpec configures the per-cluster Vault Kubernetes Auth Method.
                  properties:
                    autoCreate:
                      default: true
                      description: |-
                        AutoCreate enables the operator to POST sys/auth; when false only
                        auth/{path}/config is written, assuming the mount already exists.
                      type: boolean
                    issuer:
                      description: |-
                        Issuer is the OIDC issuer URL of the infra cluster; empty triggers
                        auto-discovery via /.well-known/openid-configuration.
                      type: string
                    mountPath:
                      description: |-
                        MountPath of the per-cluster auth method (convention:
                        "kubernetes-{metadata.name}"). Immutable.
                      minLength: 1
                      type: string
                    tokenReviewer:
                      description: TokenReviewer identifies the SA whose JWT Vault uses for TokenReview.
                      properties:
                        serviceAccount:
                          description: |-
                            ServiceAccountRef references a SA in the infra cluster and controls
                            whether the operator creates it.
                          properties:
                            autoCreate:
                              default: true
                              description: |-
                                AutoCreate enables SSA of the SA and ClusterRoleBinding
                                (system:auth-delegator) in the infra cluster.
                              type: boolean
                            name:
                              minLength: 1
                              type: string
                            namespace:
                              minLength: 1
                              type: string
                          required:
                            - name
                            - namespace
                          type: object
                        ttl:
                          default: 24h
                          description: |-
                            TTL of the JWT minted via TokenRequest. The operator rotates when less
                            than 30% TTL remains.
                          type: string
                      required:
                        - serviceAccount
                      type: object
                  required:
                    - mountPath
                    - tokenReviewer
                  type: object
                clusterRef:
                  description: |-
                    ClusterRef references the ClusterClaim and its kubeconfig Secret. Both
                    fields are immutable — changing them would re-target this VaultClaim to a
                    different cluster.
                  properties:
                    kubeconfigSecret:
                      description: KubeconfigSecret is the Secret name; defaults to "{Name}-infra-kubeconfig".
                      type: string
                    name:
                      description: Name of the ClusterClaim in the same namespace as this VaultClaim.
                      minLength: 1
                      type: string
                  required:
                    - name
                  type: object
                policies:
                  items:
                    description: |-
                      PolicySpec defines an ACL policy written as HCL into Vault. Names should
                      be prefixed with "{metadata.name}-" because Vault OSS policies live in a
                      global namespace (OPERATOR-SPEC §2.4).
                    properties:
                      name:
                        minLength: 1
                        type: string
                      rules:
                        description: |-
                          Rules is HCL ACL content; may use {{ .AuthMountAccessor }} for identity
                          templating (OPERATOR-SPEC §10).
                        minLength: 1
                        type: string
                    required:
                      - name
                      - rules
                    type: object
                  type: array
                  x-kubernetes-list-map-keys:
                    - name
                  x-kubernetes-list-type: map
                roles:
                  items:
                    description: |-
                      RoleSpec binds {SA, namespace} to a list of policies inside the
                      per-cluster auth mount.
                    properties:
                      boundServiceAccounts:
                        description: |-
                          BoundServiceAccounts identifies the single ServiceAccount allowed to log
                          in through this role.

                          This CRD intentionally binds ONE SA per role — unlike Vault's native
                          bound_service_account_names / bound_service_account_namespaces which take
                          arrays and produce a Cartesian product. Reasons:

                            - Audit clarity: a Vault login event names a role that maps 1:1 to a
                            specific SA. Multi-SA roles obscure who logged in.
                            - Per-SA tuning: TTLs, policies, and bound CIDRs can differ per role —
                            impossible to express on a shared multi-SA role.
                            - Identity mapping: Vault entity ↔ SA stays unambiguous.

                          To share a policy across SAs, declare N roles with the same `policies` —
                          policy objects are independent, only roles are scoped.
                        properties:
                          name:
                            minLength: 1
                            type: string
                          namespace:
                            minLength: 1
                            type: string
                        required:
                          - name
                          - namespace
                        type: object
                      name:
                        description: Uniqueness scoped to auth/{mountPath}/role/.
                        minLength: 1
                        type: string
                      policies:
                        items:
                          type: string
                        minItems: 1
                        type: array
                      tokenMaxTTL:
                        type: string
                      tokenTTL:
                        type: string
                    required:
                      - boundServiceAccounts
                      - name
                      - policies
                    type: object
                  type: array
                  x-kubernetes-list-map-keys:
                    - name
                  x-kubernetes-list-type: map
                secretsPrefix:
                  description: |-
                    SecretsPrefix is the path prefix under the shared KV-v2 mount used in
                    policies. Convention: "clusters/{metadata.name}". Immutable.
                  minLength: 1
                  type: string
                vaultConfigRef:
                  description: |-
                    VaultConfigRef is mutable — changing it migrates this claim to a
                    different Vault.
                  properties:
                    name:
                      minLength: 1
                      type: string
                  required:
                    - name
                  type: object
              required:
                - auth
                - clusterRef
                - secretsPrefix
                - vaultConfigRef
              type: object
              x-kubernetes-validations:
                - message: spec.secretsPrefix is immutable
                  rule: self.secretsPrefix == oldSelf.secretsPrefix
                - message: spec.clusterRef.name is immutable
                  rule: self.clusterRef.name == oldSelf.clusterRef.name
                - message: spec.auth.mountPath is immutable
                  rule: self.auth.mountPath == oldSelf.auth.mountPath
            status:
              description: VaultClaimStatus is the observed state of VaultClaim.
              properties:
                conditions:
                  items:
                    description: Condition contains details for one aspect of the current state of this API Resource.
                    properties:
                      lastTransitionTime:
                        description: |-
                          lastTransitionTime is the last time the condition transitioned from one status to another.
                          This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                        format: date-time
                        type: string
                      message:
                        description: |-
                          message is a human readable message indicating details about the transition.
                          This may be an empty string.
                        maxLength: 32768
                        type: string
                      observedGeneration:
                        description: |-
                          observedGeneration represents the .metadata.generation that the condition was set based upon.
                          For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                          with respect to the current state of the instance.
                        format: int64
                        minimum: 0
                        type: integer
                      reason:
                        description: |-
                          reason contains a programmatic identifier indicating the reason for the condition's last transition.
                          Producers of specific condition types may define expected values and meanings for this field,
                          and whether the values are considered a guaranteed API.
                          The value should be a CamelCase string.
                          This field may not be empty.
                        maxLength: 1024
                        minLength: 1
                        pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                        type: string
                      status:
                        description: status of the condition, one of True, False, Unknown.
                        enum:
                          - "True"
                          - "False"
                          - Unknown
                        type: string
                      type:
                        description: type of condition in CamelCase or in foo.example.com/CamelCase.
                        maxLength: 316
                        pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                        type: string
                    required:
                      - lastTransitionTime
                      - message
                      - reason
                      - status
                      - type
                    type: object
                  type: array
                  x-kubernetes-list-map-keys:
                    - type
                  x-kubernetes-list-type: map
                observedGeneration:
                  format: int64
                  type: integer
                phase:
                  enum:
                    - Pending
                    - Configuring
                    - Ready
                    - Failed
                    - Deleting
                  type: string
                vault:
                  description: VaultStatusSummary is a compact view of the actual Vault state.
                  properties:
                    appliedPolicies:
                      items:
                        type: string
                      type: array
                    appliedRoles:
                      items:
                        type: string
                      type: array
                    authMountAccessor:
                      description: |-
                        AuthMountAccessor is cached from Vault, populated lazily on first
                        render of a policy that uses {{ .AuthMountAccessor }}.
                      type: string
                    authMountPath:
                      type: string
                    configName:
                      type: string
                    lastDriftCheckAt:
                      description: |-
                        LastDriftCheckAt is the timestamp of the most recent drift detection
                        pass, whether drift was found or not.
                      format: date-time
                      type: string
                    lastReconcileAt:
                      format: date-time
                      type: string
                    secretsPrefix:
                      type: string
                    tokenReviewerJWT:
                      description: TokenReviewerJWTStatus tracks the reviewer JWT lifecycle.
                      properties:
                        expiresAt:
                          format: date-time
                          type: string
                        issuedAt:
                          format: date-time
                          type: string
                        lastRotated:
                          format: date-time
                          type: string
                        lastRotationAttempt:
                          description: LastRotationAttempt records the last attempt, successful or not.
                          format: date-time
                          type: string
                      type: object
                  type: object
              type: object
          required:
            - spec
          type: object
      served: true
      storage: true
      subresources:
        status: {}
{{- end }}
