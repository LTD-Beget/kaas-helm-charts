{{- if .Values.metrics.enable }}
apiVersion: v1
kind: Service
metadata:
  labels:
    {{- include "vault-operator.labels" . | nindent 4 }}
    control-plane: controller-manager
    monitoring.in-cloud.io/service: {{ include "vault-operator.resourceName" (dict "suffix" "controller-manager-metrics-service" "context" $) }}
  name: {{ include "vault-operator.resourceName" (dict "suffix" "controller-manager-metrics-service" "context" $) }}
  namespace: {{ .Release.Namespace }}
spec:
  ports:
    - name: metrics
      port: {{ .Values.metrics.port }}
      protocol: TCP
      targetPort: metrics
  selector:
    app.kubernetes.io/name: {{ include "vault-operator.name" . }}
    control-plane: controller-manager
{{- end }}
