# nameOverride: ""
# fullnameOverride: ""

companyPrefix: example
clusterDomain: cluster.local

manager:
  replicas: 1

  image:
    repository: prorobotech/vault-operator
    tag: ""
    pullPolicy: IfNotPresent

  args:
    - --leader-elect

  env: []

  imagePullSecrets: []

  podSecurityContext:
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault

  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
    readOnlyRootFilesystem: true

  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 10m
      memory: 64Mi

  affinity: {}

  nodeSelector: {}

  tolerations:
    - effect: NoExecute
      operator: Exists
    - effect: NoSchedule
      key: node-role.kubernetes.io/control-plane

rbacHelpers:
  enable: false

crd:
  enable: true
  keep: true

metrics:
  enable: false
  port: 11043       # kube-rbac-proxy HTTPS port (external)
  internalPort: 8080 # manager internal HTTP metrics port

certManager:
  enable: false

monitoring:
  serviceScrapeConfig:
    metricRelabelConfigs:
      - sourceLabels: [__name__]
        action: keep
        regex: |
          container_cpu_cfs_periods_total|
          container_cpu_cfs_throttled_periods_total|
          container_cpu_cfs_throttled_seconds_total|
          container_cpu_usage_seconds_total|
          container_memory_rss|
          container_memory_working_set_bytes|
          container_network_receive_bytes_total|
          container_network_receive_errors_total|
          container_network_receive_packets_dropped_total|
          container_network_receive_packets_total|
          container_network_transmit_bytes_total|
          container_network_transmit_errors_total|
          container_network_transmit_packets_dropped_total|
          container_network_transmit_packets_total|
          container_oom_events_total|
          controller_runtime_active_workers|
          controller_runtime_max_concurrent_reconciles|
          controller_runtime_reconcile_errors_total|
          controller_runtime_reconcile_panics_total|
          controller_runtime_reconcile_time_seconds_bucket|
          controller_runtime_reconcile_total|
          controller_runtime_terminal_reconcile_errors_total|
          go_gc_duration_seconds_count|
          go_gc_duration_seconds_sum|
          go_goroutines|
          go_memstats_alloc_bytes_total|
          go_memstats_gc_sys_bytes|
          go_memstats_heap_idle_bytes|
          go_memstats_heap_inuse_bytes|
          go_memstats_heap_released_bytes|
          go_memstats_mcache_sys_bytes|
          go_memstats_mspan_sys_bytes|
          go_memstats_other_sys_bytes|
          go_memstats_stack_inuse_bytes|
          go_memstats_sys_bytes|
          go_sched_latencies_seconds_bucket|
          kube_service_info|
          namespace_cpu|
          namespace_memory|
          node_namespace_pod:kube_pod_info:|
          process_cpu_seconds_total|
          process_max_fds|
          process_open_fds|
          process_resident_memory_bytes|
          process_start_time_seconds|
          process_virtual_memory_bytes|
          rest_client_requests_total|
          scrape_series_added|
          up|
          vault_api_responses_total|
          vault_client_token_renewal_total|
          workqueue_adds_total|
          workqueue_depth|
          workqueue_longest_running_processor_seconds|
          workqueue_queue_duration_seconds_count|
          workqueue_queue_duration_seconds_sum|
          workqueue_retries_total|
          workqueue_unfinished_work_seconds|
          workqueue_work_duration_seconds_count|
          workqueue_work_duration_seconds_sum
  enabled: false
  secureService:
    enabled: false
    issuer:
      kind: ClusterIssuer
      name: default-issuer-name

prometheus:
  enable: false

networkPolicies:
  enabled: false

vaultConfigs:
  default:
    name: default
    spec:
      address: http://vault.vault-system.svc:8200
      managerAuth:
        method: kubernetes
        mountPath: system-test
        role: vault-operator
      storage:
        kvMountPath: secret
