{{- if .Values.metrics.enable }}
apiVersion: v1
kind: Service
metadata:
    labels:
        app.kubernetes.io/managed-by: {{ .Release.Service }}
        app.kubernetes.io/name: {{ include "worker-group-claim-operator.name" . }}
        helm.sh/chart: {{ .Chart.Name }}-{{ .Chart.Version | replace "+" "_" }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        control-plane: controller-manager
        monitoring.in-cloud.io/service: {{ include "worker-group-claim-operator.resourceName" (dict "suffix" "controller-manager-metrics-service" "context" $) }}
    name: {{ include "worker-group-claim-operator.resourceName" (dict "suffix" "controller-manager-metrics-service" "context" $) }}
    namespace: {{ .Release.Namespace }}
spec:
    ports:
        - name: https-metrics
          port: {{ .Values.metrics.port }}
          protocol: TCP
          targetPort: https-metrics
    selector:
        app.kubernetes.io/name: {{ include "worker-group-claim-operator.name" . }}
        control-plane: controller-manager
{{- end }}
