{{- if .Values.networkPolicies.enabled }}
---
# Allow `worker-group-claim-operator-controller-manager` to talk to the Kubernetes API server.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-egress-worker-group-claim-operator-to-kube-apiserver-6443
  namespace: {{ include "worker-group-claim-operator.namespaceName" . }}
spec:
  endpointSelector:
    matchLabels:
      k8s:io.cilium.k8s.policy.serviceaccount: {{ include "worker-group-claim-operator.resourceName" (dict "suffix" "controller-manager" "context" $) }}
      k8s:io.kubernetes.pod.namespace: {{ include "worker-group-claim-operator.namespaceName" . }}
      k8s:app.kubernetes.io/name: {{ include "worker-group-claim-operator.name" . }}
  egress:
  - toEntities:
    - kube-apiserver
    - remote-node
    toPorts:
    - ports:
      - port: '6443'
        protocol: TCP
  description: Allows egress from worker-group-claim-operator-controller-manager to
    the Kubernetes API server on 6443 for control-plane interactions.

---
# Allow vmagent to scrape `worker-group-claim-operator` metrics via the kube-rbac-proxy sidecar.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-ingress-worker-group-claim-operator-from-vmagent-11043
  namespace: {{ include "worker-group-claim-operator.namespaceName" . }}
spec:
  endpointSelector:
    matchLabels:
      k8s:io.cilium.k8s.policy.serviceaccount: {{ include "worker-group-claim-operator.resourceName" (dict "suffix" "controller-manager" "context" $) }}
      k8s:io.kubernetes.pod.namespace: {{ include "worker-group-claim-operator.namespaceName" . }}
  ingress:
  - fromEndpoints:
    - matchLabels:
        k8s:io.cilium.k8s.policy.serviceaccount: vmagent-vmagent
        k8s:io.kubernetes.pod.namespace: {{ .Values.companyPrefix }}-vmagent
    toPorts:
    - ports:
      - port: '11043'
        protocol: TCP
  description: Allows ingress from vmagent to worker-group-claim-operator on 11043 for metrics collection.
{{- end }}
