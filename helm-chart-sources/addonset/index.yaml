  descryption:
    rus: |
      Dex — это система идентификации, которая выступает в роли шлюза между Kubernetes 
      и существующими провайдерами OIDC, SAML или LDAP. Она позволяет централизованно 
      управлять аутентификацией пользователей в кластере, делегируя её внешним поставщикам удостоверений.
    eng: |
      Dex is an identity system that acts as a gateway between Kubernetes and existing OIDC, 
      SAML, or LDAP providers. It allows for centralized management of user authentication within 
      a cluster, delegating it to external identity providers.
  links: |
    Официальный сайт: https://dexidp.io/
