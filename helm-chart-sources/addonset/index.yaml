  - us.gcr.io/k8s-artifacts-prod/kas-network-proxy/proxy-agent:v0.0.36
  descryption:
    rus: |
      Запускается на рабочих узлах. Инициирует исходящее соединение с Konnectivity Server, создавая обратный туннель. Это позволяет API Server связываться с узлом, даже если узел находится в частной сети и недоступен напрямую
    eng: ""
  links: |
    Документация: https://kamaji.clastix.io/concepts/konnectivity/
  labels: []
  tooltip:
    rus: |
      Обеспечивает безопасный обратный туннель между API Server и рабочими узлами кластера. 
      Служит концентратором, через который API Server может безопасно выполнять команды
    eng: |
      Provide a secure reverse tunnel between the API server and the required cluster nodes. 
      This serves as a hub through which the API server can securely execute commands.
  icon: assets/logos/Addons/kuber-64.png

