  descryption:
    rus: |
      Metrics Server — компонент Kubernetes, агрегирующий данные об использовании 
      ресурсов в кластере. Собирает метрики CPU и памяти с узлов и подов, предоставляя 
      их через API для горизонтального (HPA) и вертикального (VPA) автомасштабирования подов.
    eng: |
      Metrics Server is a Kubernetes component that aggregates cluster resource usage 
      data. It collects CPU and memory metrics from nodes and pods, providing them 
      through an API for horizontal (HPA) and vertical (VPA) pod autoscaling.
  links: |
