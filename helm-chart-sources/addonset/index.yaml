 
addons:
- addon_name: argocd
  app_name: Argocd
  deploy_to:
    system: true
    infra: true
    client: false
  enabled_for_client: false
  app_version: v3.3.4
  chart_version: 9.4.15-3
  chart_k8s_min_version: 1.25.0-0
  images:
  - ecr-public.aws.com/docker/library/redis:8.2.3-alpine
  - ghcr.io/oliver006/redis_exporter:v1.82.0
  - quay.io/argoproj/argocd:v3.3.4
  - quay.io/brancz/kube-rbac-proxy:v0.21.0
  descryption:
    rus: |
      Argo CD — это инструмент для непрерывной доставки в Kubernetes, реализующий 
      практики GitOps. Он автоматически синхронизирует состояние кластера с 
      конфигурацией, описанной в Git-репозитории, обеспечивая предсказуемость и 
      контроль версий развертываний приложений.
    eng: |
      Argo CD is a continuous delivery tool for Kubernetes that implements GitOps 
      practices. It automatically synchronizes cluster state with the configuration 
      described in the Git repository, ensuring predictability and version control of 
      application deployments.
  links: |-
    Официальный сайт: https://argoproj.github.io/cd/
    Документация: https://argo-cd.readthedocs.io/
  labels: []
  tooltip:
    rus: ""
    eng: ""
  icon: assets/logos/Addons/argo-cd-64.png

- addon_name: cert-manager-csi-driver
  app_name: Cert-manager CSI Driver
  deploy_to:
    system: true
    infra: true
    client: false
  enabled_for_client: true
  app_version: 0.10.4
  chart_version: 0.10.4-2
  chart_k8s_min_version: ""
  images:
  - quay.io/jetstack/cert-manager-csi-driver:v0.10.4
  - registry.k8s.io/sig-storage/csi-node-driver-registrar:v2.14.0
  - registry.k8s.io/sig-storage/livenessprobe:v2.16.0
  - quay.io/brancz/kube-rbac-proxy:v0.21.0 # only system and infra
  descryption:
    rus: |
      cert-manager-csi — аддон для Kubernetes, который выдает и монтирует TLS-сертификаты в 
      Pod через CSI volume, работая поверх cert-manager. Позволяет отказаться от хранения 
      сертификатов в виде ресурса Secret и монтировать их напрямую в файловую систему контейнера.
    eng: |
      Cert-manager CSI Driver is a CSI driver for Kubernetes that integrates with 
      cert-manager and enables dynamic provisioning of TLS certificates to pod 
      containers via mounted volumes.
  links: |-
    Оффициальный сайт: https://cert-manager.io/
    Документация: https://cert-manager.io/docs/usage/csi-driver/
  labels: []
  tooltip:
    rus: ""
    eng: ""
  icon: assets/logos/Addons/cert-manager-64.png

- addon_name: cert-manager
  app_name: Cert-manager
  deploy_to:
    system: true
    infra: true
    client: false
  enabled_for_client: true
  app_version: v1.17.1
  chart_version: v1.17.1-2
  chart_k8s_min_version: 1.22.0-0
  images:
  - quay.io/jetstack/cert-manager-cainjector:v1.17.1
  - quay.io/jetstack/cert-manager-controller:v1.17.1
  - quay.io/jetstack/cert-manager-webhook:v1.17.1
  - quay.io/brancz/kube-rbac-proxy:v0.21.0 # only system and infra
  descryption:
    rus: |
      Cert-manager — это автоматический менеджер TLS-сертификатов для Kubernetes. 
      Он упрощает получение, обновление и управление сертификатами от различных источников, 
      таких как Let's Encrypt, а также внутренними центрами сертификации (CA).
    eng: |
      cert-manager-csi is a Kubernetes addon that issues and mounts TLS certificates into 
      Pods via a CSI volume, built on top of cert-manager. It eliminates the need to store 
      certificates as Kubernetes Secrets and mounts them directly into the container filesystem.
  links: |
    Официальный сайт: https://cert-manager.io/
  labels: []
  tooltip:
    rus: ""
    eng: ""
  icon: assets/logos/Addons/cert-manager-64.png
  
