- addon_name: konnectivity-agent
  app_name: konnectivity-agent
  deploy_to:
    system: false
    infra: false
    client: true
  enabled_for_client: true
  app_version: 0.31.0
  chart_version: 0.1.0
  chart_k8s_min_version: null
