---
apiVersion: addons.in-cloud.io/v1alpha1
kind: AddonValue
metadata:
  name: addons-operator-default
  labels:
    addons.in-cloud.io/values: default
    addons.in-cloud.io/addon: addons-operator
spec:
  values: |
    certManager:
      enable: false
    managerClaim:
      image:
        repository: prorobotech/addons-operator-addonclaim
    webhook:
      enable: false
    manager:
      env:
      - name: ENABLE_WEBHOOKS
        value: false
      image:
        repository: prorobotech/addons-operator
        pullPolicy: IfNotPresent
      tolerations:
      - effect: NoExecute
        operator: Exists
      - effect: NoSchedule
        key: node-role.kubernetes.io/control-plane
      resources:
        limits:
            cpu: 500m
            memory: 512Mi
        requests:
            cpu: 100m
            memory: 128Mi
    metrics:
      enable: false
      port: 8443

---
apiVersion: addons.in-cloud.io/v1alpha1
kind: AddonValue
metadata:
  name: addons-operator-immutable
  labels:
    addons.in-cloud.io/values: immutable
    addons.in-cloud.io/addon: addons-operator
spec:
  values: ""

---
apiVersion: addons.in-cloud.io/v1alpha1
kind: AddonValue
metadata:
  name: addons-operator-cert-manager
  labels:
    addons.in-cloud.io/values: cert-manager
    addons.in-cloud.io/addon: addons-operator
spec:
  values: |
    webhook:
      enable: true
    certManager:
      enable: true
    manager:
      env:
      - name: ENABLE_WEBHOOKS
        value: true
    metrics:
      enable: true
      port: 8443

---
apiVersion: addons.in-cloud.io/v1alpha1
kind: AddonValue
metadata:
  name: addons-operator-infra
  labels:
    addons.in-cloud.io/values: infra
    addons.in-cloud.io/addon: addons-operator
spec:
  values: ""
---
apiVersion: addons.in-cloud.io/v1alpha1
kind: AddonValue
metadata:
  name: addons-operator-system
  labels:
    addons.in-cloud.io/values: system
    addons.in-cloud.io/addon: addons-operator
spec:
  values: |
    managerClaim:
      enable: true

---
apiVersion: addons.in-cloud.io/v1alpha1
kind: AddonValue
metadata:
  name: addons-operator-network-policies
  labels:
    addons.in-cloud.io/values: network-policies
    addons.in-cloud.io/addon: addons-operator
spec:
  values: |
    networkPolicies:
      enabled: true
