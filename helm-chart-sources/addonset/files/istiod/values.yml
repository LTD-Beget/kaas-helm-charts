---
apiVersion: addons.in-cloud.io/v1alpha1
kind: AddonValue
metadata:
  name: istiod-default
  labels:
    addons.in-cloud.io/values: default
    addons.in-cloud.io/addon: istiod
spec:
  values: |
    companyPrefix: {{ .Values.companyPrefix }}
    istiod:
      base:
        validationCABundle: ""
      podAnnotations:
        cluster-autoscaler.kubernetes.io/safe-to-evict: "true"
      pilot:
        autoscaleMin: 1
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
      global:
        priorityClassName: system-cluster-critical
        istioNamespace: {{ .Values.companyPrefix }}-istio
        proxy:
          tracer: zipkin
        defaultPodDisruptionBudget:
          enabled: false

---
apiVersion: addons.in-cloud.io/v1alpha1
kind: AddonValue
metadata:
  name: istiod-immutable
  labels:
    addons.in-cloud.io/values: immutable
    addons.in-cloud.io/addon: istiod
spec:
  values: ""

---
apiVersion: addons.in-cloud.io/v1alpha1
kind: AddonValue
metadata:
  name: istiod-infra
  labels:
    addons.in-cloud.io/values: infra
    addons.in-cloud.io/addon: istiod
spec:
  values: |
    {{- $a := .Values.controlPlaneDesiredReplicas -}}
    {{- $b := .Values.controlPlaneAvailableReplicas -}}
    {{- $replicas := 1 -}}
    {{- if and (gt $a $b) (gt $b 1) }}{{ $replicas = $b }}{{ end -}}
    {{- if and (gt $b $a) (gt $a 1) }}{{ $replicas = $a }}{{ end -}}
    istiod:
      replicaCount: {{ $replicas }}
      tolerations:
        - key: "node-role.kubernetes.io/control-plane"
          operator: "Exists"
          effect: "NoSchedule"
        - key: "node-role.kubernetes.io/master"
          operator: "Exists"
          effect: "NoSchedule"
      global:
        defaultPodDisruptionBudget:
          enabled: false
    networkPolicies:
      enabled: true

---
apiVersion: addons.in-cloud.io/v1alpha1
kind: AddonValue
metadata:
  name: istiod-vm-operator
  labels:
    addons.in-cloud.io/values: vm-operator
    addons.in-cloud.io/addon: istiod
spec:
  values: |
    argocdPlugins:
      kustomize: true
    monitoring:
      enabled: true
      secureService:
        enabled: true
        issuer:
          name: selfsigned-cluster-issuer

---
apiVersion: addons.in-cloud.io/v1alpha1
kind: AddonValue
metadata:
  name: istiod-client
  labels:
    addons.in-cloud.io/values: client
    addons.in-cloud.io/addon: istiod
spec:
  values: |
    istiod:
      podLabels:
        toleration.{{ .Values.companyDomain }}/ignore: "true"
      tolerations:
        - operator: "Exists"

---
apiVersion: addons.in-cloud.io/v1alpha1
kind: AddonValue
metadata:
  name: istiod-multi-control-plane
  labels:
    addons.in-cloud.io/values: multi-control-plane
    addons.in-cloud.io/addon: istiod
spec:
  values: |
    istiod:
      pilot:
        autoscaleMin: 2
      podAnnotations:
        cluster-autoscaler.kubernetes.io/safe-to-evict: "false"
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app.kubernetes.io/name: istiod
                  app.kubernetes.io/instance: istiod
              topologyKey: kubernetes.io/hostname
      global:
        defaultPodDisruptionBudget:
          enabled: true
