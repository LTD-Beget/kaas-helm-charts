---
apiVersion: addons.in-cloud.io/v1alpha1
kind: AddonValue
metadata:
  name: grafana-default
  labels:
    addons.in-cloud.io/values: default
    addons.in-cloud.io/addon: grafana
spec:
  values: |
    grafana:
      name: grafana
      labels:
        dashboards: "grafana"
        app.kubernetes.io/name: grafana
      spec:
        config:
          log:
            mode: "console"
          auth:
            disable_login_form: "true"
          server:
            root_url: /grafana/
            serve_from_sub_path: "true"
            protocol: http
            http_port: "3000"
          plugins:
            plugin_admin_enabled: "true"
            preinstall: "grafana-clickhouse-datasource@4.13.0@https://grafana.com/api/plugins/grafana-clickhouse-datasource/versions/4.13.0/download"
            preinstall_disabled: "false"
          auth.generic_oauth:
            enabled: "true"
            name: "Dex"
            allow_sign_up: "true"
            client_id: ${GRAFANA_OIDC_CLIENT_ID}
            client_secret: ${GRAFANA_OIDC_CLIENT_SECRET}
            scopes: "openid email profile groups"
            role_attribute_path: |
              contains(email, 'admin@beget.ru') && 'Admin' || 'Viewer'
            role_attribute_strict: 'true'
            tls_skip_verify_insecure: "true"
            auth_url: "http://{{ .Values.cluster.customer }}-{{ .Values.cluster.name }}.k8s.beget/auth"
            token_url: "http://{{ .Values.cluster.customer }}-{{ .Values.cluster.name }}.k8s.beget/token"
            api_url: "http://{{ .Values.cluster.customer }}-{{ .Values.cluster.name }}.k8s.beget/userinfo"
        deployment:
          spec:
            template:
              spec:
                tolerations:
                  - key: "node-role.kubernetes.io/control-plane"
                    operator: "Exists"
                    effect: "NoSchedule"
                  - key: "node-role.kubernetes.io/master"
                    operator: "Exists"
                    effect: "NoSchedule"
                priorityClassName: system-cluster-critical
                containers:
                  - name: grafana
                    env:
                      - name: GRAFANA_OIDC_CLIENT_ID
                        value: {{ .Variables.oidcClientID }}
                      - name: GRAFANA_OIDC_CLIENT_SECRET
                        value: {{ .Variables.oidcClientSecret }}
                    resources:
                      requests:
                        cpu: "100m"
                        memory: "128Mi"
                      limits:
                        cpu: "1"
                        memory: "2Gi"

    grafanaDataSources:
      victoriametrics:
        enabled: true
        spec:
          allowCrossNamespaceImport: false
          datasource:
            access: proxy
            isDefault: true
            jsonData:
              timeInterval: 5s
            name: victoriametrics
            type: prometheus
            url: https://vmselect.beget-vmcluster.svc:8481/select/0/prometheus
          instanceSelector:
            matchLabels:
              dashboards: grafana
          resyncPeriod: 10m0s

      grafana-clickhouse-datasource:
        enabled: true
        spec:
          allowCrossNamespaceImport: false
          datasource:
            jsonData:
              timeInterval: 5s
              host: clickhouse-vmstorage.beget-clickhouse-vmstorage.svc
              port: 9000
              username: default
            secureJsonData:
              password: dbpswd
            name: clickhouse-tsdb
            type: grafana-clickhouse-datasource
          instanceSelector:
            matchLabels:
              dashboards: grafana
          resyncPeriod: 10m0s

---
apiVersion: addons.in-cloud.io/v1alpha1
kind: AddonValue
metadata:
  name: grafana-immutable
  labels:
    addons.in-cloud.io/values: immutable
    addons.in-cloud.io/addon: grafana
spec:
  values: ""

---
apiVersion: addons.in-cloud.io/v1alpha1
kind: AddonValue
metadata:
  name: grafana-cert-manager
  labels:
    addons.in-cloud.io/values: "cert-manager"
    addons.in-cloud.io/addon: grafana
spec:
  values: |
    grafana:
      spec:
        config:
          auth.generic_oauth:
            auth_url: "https://{{ .Values.cluster.customer }}-{{ .Values.cluster.name }}.k8s.beget/auth"
            token_url: "https://{{ .Values.cluster.customer }}-{{ .Values.cluster.name }}.k8s.beget/token"
            api_url: "https://{{ .Values.cluster.customer }}-{{ .Values.cluster.name }}.k8s.beget/userinfo"
        deployment:
          spec:
            template:
              spec:
                containers:
                  - name: grafana
                    env:
                      - name: GRAFANA_OIDC_CLIENT_ID
                        value: {{ .Variables.oidcClientID }}
                      - name: GRAFANA_OIDC_CLIENT_SECRET
                        value: {{ .Variables.oidcClientSecret }}
                    resources:
                      requests:
                        cpu: "100m"
                        memory: "128Mi"
                      limits:
                        cpu: "1"
                        memory: "2Gi"
                    volumeMounts:
                      - mountPath: /etc/ssl/certs/ca.crt
                        subPath: ca.crt
                        name: trusted-ca-certs
                        readOnly: true
                  - name: rbac-proxy
                    image: quay.io/brancz/kube-rbac-proxy:v0.21.0
                    args:
                      - --secure-listen-address=0.0.0.0:11043
                      - --upstream=http://127.0.0.1:3000
                      - --tls-cert-file=/app/config/metrics/tls/tls.crt
                      - --tls-private-key-file=/app/config/metrics/tls/tls.key
                      - --v=2
                    ports:
                      - name: https-metrics
                        containerPort: 11043
                        protocol: TCP
                    resources:
                      requests:
                        memory: "32Mi"
                        cpu: "10m"
                      limits:
                        memory: "64Mi"
                        cpu: "50m"
                    volumeMounts:
                      - name: rbac-proxy-tls
                        mountPath: /app/config/metrics/tls
                        readOnly: true
                volumes:
                  - name: trusted-ca-certs
                    configMap:
                      name: ca
                  - name: rbac-proxy-tls
                    secret:
                      defaultMode: 420
                      secretName: grafana-monitoring-svc-tls
    monitoring:
      secureService:
        enabled: true
        issuer:
          name: selfsigned-cluster-issuer

---
apiVersion: addons.in-cloud.io/v1alpha1
kind: AddonValue
metadata:
  name: grafana-vm-operator
  labels:
    addons.in-cloud.io/values: vm-operator
    addons.in-cloud.io/addon: grafana
spec:
  values: |
    monitoring:
      enabled: true

---
apiVersion: addons.in-cloud.io/v1alpha1
kind: AddonValue
metadata:
  name: grafana-istio-gw
  labels:
    addons.in-cloud.io/values: istio-gw
    addons.in-cloud.io/addon: grafana
spec:
  values: |
    istio:
      virtualService:
        enabled: true
        gateways:
          - beget-grafana/default
        hosts:
          - "*"
        http:
          name: grafana
          route:
            host: grafana-service
            port: 3000
