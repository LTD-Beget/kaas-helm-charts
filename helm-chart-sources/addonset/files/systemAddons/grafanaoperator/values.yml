---
apiVersion: addons.in-cloud.io/v1alpha1
kind: AddonValue
metadata:
  name: grafanaoperator-default
  labels:
    addons.in-cloud.io/values: default
    addons.in-cloud.io/addon: grafanaoperator
spec:
  values: |
    grafana-operator:
      namespaceScope: false
      priorityClassName: system-cluster-critical
      tolerations:
        - key: "node-role.kubernetes.io/control-plane"
          operator: "Exists"
          effect: "NoSchedule"
        - key: "node-role.kubernetes.io/master"
          operator: "Exists"
          effect: "NoSchedule"
      resources:
        requests:
          cpu: 50m
          memory: 100Mi
        limits:
          cpu: 500m
          memory: 750Mi

---
apiVersion: addons.in-cloud.io/v1alpha1
kind: AddonValue
metadata:
  name: grafanaoperator-immutable
  labels:
    addons.in-cloud.io/values: immutable
    addons.in-cloud.io/addon: grafanaoperator
spec:
  values: ""

---
apiVersion: addons.in-cloud.io/v1alpha1
kind: AddonValue
metadata:
  name: grafanaoperator-cert-manager
  labels:
    addons.in-cloud.io/values: cert-manager
    addons.in-cloud.io/addon: grafanaoperator
spec:
  values: |
    argocdPlugins:
      kustomize: true
    monitoring:
      secureService:
        enabled: true
        issuer:
          name: selfsigned-cluster-issuer

---
apiVersion: addons.in-cloud.io/v1alpha1
kind: AddonValue
metadata:
  name: grafanaoperator-vm-operator
  labels:
    addons.in-cloud.io/values: vm-operator
    addons.in-cloud.io/addon: grafanaoperator
spec:
  values: |
    monitoring:
      enabled: true
