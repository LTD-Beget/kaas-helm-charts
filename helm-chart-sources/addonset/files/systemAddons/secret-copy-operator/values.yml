---
apiVersion: addons.in-cloud.io/v1alpha1
kind: AddonValue
metadata:
  name: secret-copy-operator-default
  labels:
    addons.in-cloud.io/values: default
    addons.in-cloud.io/addon: secret-copy-operator
spec:
  values: |
    manager:
      image:
        repository: prorobotech/secret-copy-operator
        pullPolicy: IfNotPresent
      tolerations:
      - effect: NoExecute
        operator: Exists
      - effect: NoSchedule
        key: node-role.kubernetes.io/control-plane
      args:
        - --leader-elect
        - --max-concurrent-reconciles=10
      resources:
        limits:
            cpu: 500m
            memory: 512Mi
        requests:
            cpu: 100m
            memory: 128Mi

---
apiVersion: addons.in-cloud.io/v1alpha1
kind: AddonValue
metadata:
  name: secret-copy-operator-immutable
  labels:
    addons.in-cloud.io/values: immutable
    addons.in-cloud.io/addon: secret-copy-operator
spec:
  values: ""
