---
apiVersion: addons.in-cloud.io/v1alpha1
kind: AddonValue
metadata:
  name: capi-kubeadm-bootstrap-default
  labels:
    addons.in-cloud.io/values: default
    addons.in-cloud.io/addon: capi-kubeadm-bootstrap  
spec:
  values: ""

---
apiVersion: addons.in-cloud.io/v1alpha1
kind: AddonValue
metadata:
  name: capi-kubeadm-bootstrap-vm-operator
  labels:
    addons.in-cloud.io/values: vm-operator
    addons.in-cloud.io/addon: capi-kubeadm-bootstrap
spec:
  values: |
    companyPrefix: {{ .Values.companyPrefix }}
    networkPolicies:
      enabled: true
    monitoring:
      vmServiceScrape:
        enabled: true

---
apiVersion: addons.in-cloud.io/v1alpha1
kind: AddonValue
metadata:
  name: capi-kubeadm-bootstrap-immutable
  labels:
    addons.in-cloud.io/values: immutable
    addons.in-cloud.io/addon: capi-kubeadm-bootstrap
spec:
  values: ""

---
apiVersion: addons.in-cloud.io/v1alpha1
kind: AddonValue
metadata:
  name: capi-kubeadm-bootstrap-system
  labels:
    addons.in-cloud.io/values: system
    addons.in-cloud.io/addon: capi-kubeadm-bootstrap
spec:
  values: |
    companyPrefix: {{ .Values.companyPrefix }}
    networkPolicies:
      enabled: true
    fullnameOverride: "capi-kubeadm-bootstrap"
    certificates:
      useExternalIssuer: true
      externalIssuer:
        name: selfsigned-cluster-issuer