---
apiVersion: addons.in-cloud.io/v1alpha1
kind: AddonValue
metadata:
  name: client-vm-scrape-config-initialized
  labels:
    addons.in-cloud.io/values: initialized
    addons.in-cloud.io/addon: client-vm-scrape-config
spec:
  values: |
    resources: {}

---
apiVersion: addons.in-cloud.io/v1alpha1
kind: AddonValue
metadata:
  name: client-vm-scrape-config
  labels:
    addons.in-cloud.io/values: infra
    addons.in-cloud.io/addon: client-vm-scrape-config
spec:
  values: |
    resources:
      clientClusterKubeletMetrics:
        apiVersion: operator.victoriametrics.com/v1beta1
        kind: VMScrapeConfig
        metadata:
          name: client-cluster-kubelet-metrics
          namespace: beget-system
        spec:
          scheme: https
          scrape_interval: 30s
          scrapeTimeout: 10s

          tlsConfig:
            ca:
              secret:
                name: "{{ .Values.cluster.name }}-super-admin"
                key: ca.crt
            cert:
              secret:
                name: "{{ .Values.cluster.name }}-super-admin"
                key: tls.crt
            keySecret:
              name: "{{ .Values.cluster.name }}-super-admin"
              key: tls.key

          kubernetesSDConfigs:
            - role: node
              apiServer: "https://{{ .Values.cluster.host }}:{{ .Values.cluster.port }}"
              tlsConfig:
                ca:
                  secret:
                    name: "{{ .Values.cluster.name }}-super-admin"
                    key: ca.crt
                cert:
                  secret:
                    name: "{{ .Values.cluster.name }}-super-admin"
                    key: tls.crt
                keySecret:
                  name: "{{ .Values.cluster.name }}-super-admin"
                  key: tls.key

          relabelConfigs:
            - targetLabel: __address__
              replacement: "{{ .Values.cluster.host }}:{{ .Values.cluster.port }}"
            - sourceLabels: [__meta_kubernetes_node_name]
              targetLabel: __metrics_path__
              replacement: /api/v1/nodes/$1/proxy/metrics

            - sourceLabels: [__meta_kubernetes_node_name]
              targetLabel: node
            - action: labelmap
              regex: __meta_kubernetes_node_label_(.+)

            - targetLabel: job
              replacement: kubelet
            - targetLabel: cluster_full_name
              replacement: {{ .Values.cluster.name }}
            - targetLabel: remotewrite_cluster
              replacement: {{ .Values.cluster.name }}
            - targetLabel: client_cluster
              replacement: {{ .Values.cluster.name }}
            - targetLabel: cluster_type
              replacement: client

      clientClusterKubeletCadvisor:
        apiVersion: operator.victoriametrics.com/v1beta1
        kind: VMScrapeConfig
        metadata:
          name: client-cluster-kubelet-cadvisor
          namespace: beget-system
        spec:
          scheme: https
          scrape_interval: 30s
          scrapeTimeout: 10s

          tlsConfig:
            ca:
              secret:
                name: "{{ .Values.cluster.name }}-super-admin"
                key: ca.crt
            cert:
              secret:
                name: "{{ .Values.cluster.name }}-super-admin"
                key: tls.crt
            keySecret:
              name: "{{ .Values.cluster.name }}-super-admin"
              key: tls.key

          kubernetesSDConfigs:
            - role: node
              apiServer: "https://{{ .Values.cluster.host }}:{{ .Values.cluster.port }}"
              tlsConfig:
                ca:
                  secret:
                    name: "{{ .Values.cluster.name }}-super-admin"
                    key: ca.crt
                cert:
                  secret:
                    name: "{{ .Values.cluster.name }}-super-admin"
                    key: tls.crt
                keySecret:
                  name: "{{ .Values.cluster.name }}-super-admin"
                  key: tls.key

          relabelConfigs:
            - targetLabel: __address__
              replacement: "{{ .Values.cluster.host }}:{{ .Values.cluster.port }}"
            - sourceLabels: [__meta_kubernetes_node_name]
              targetLabel: __metrics_path__
              replacement: /api/v1/nodes/$1/proxy/metrics/cadvisor

            - sourceLabels: [__meta_kubernetes_node_name]
              targetLabel: node
            - action: labelmap
              regex: __meta_kubernetes_node_label_(.+)

            - targetLabel: job
              replacement: kubelet-cadvisor
            - targetLabel: cluster_full_name
              replacement: {{ .Values.cluster.name }}
            - targetLabel: remotewrite_cluster
              replacement: {{ .Values.cluster.name }}
            - targetLabel: client_cluster
              replacement: {{ .Values.cluster.name }}
            - targetLabel: cluster_type
              replacement: client

      clientClusterKubeletProbes:
        ---
        apiVersion: operator.victoriametrics.com/v1beta1
        kind: VMScrapeConfig
        metadata:
          name: client-cluster-kubelet-probes
          namespace: beget-system
        spec:
          scheme: https
          scrape_interval: 30s
          scrapeTimeout: 10s

          tlsConfig:
            ca:
              secret:
                name: "{{ .Values.cluster.name }}-super-admin"
                key: ca.crt
            cert:
              secret:
                name: "{{ .Values.cluster.name }}-super-admin"
                key: tls.crt
            keySecret:
              name: "{{ .Values.cluster.name }}-super-admin"
              key: tls.key

          kubernetesSDConfigs:
            - role: node
              apiServer: "https://{{ .Values.cluster.host }}:{{ .Values.cluster.port }}"
              tlsConfig:
                ca:
                  secret:
                    name: "{{ .Values.cluster.name }}-super-admin"
                    key: ca.crt
                cert:
                  secret:
                    name: "{{ .Values.cluster.name }}-super-admin"
                    key: tls.crt
                keySecret:
                  name: "{{ .Values.cluster.name }}-super-admin"
                  key: tls.key

          relabelConfigs:
            - targetLabel: __address__
              replacement: "{{ .Values.cluster.host }}:{{ .Values.cluster.port }}"
            - sourceLabels: [__meta_kubernetes_node_name]
              targetLabel: __metrics_path__
              replacement: /api/v1/nodes/$1/proxy/metrics/probes

            - sourceLabels: [__meta_kubernetes_node_name]
              targetLabel: node
            - action: labelmap
              regex: __meta_kubernetes_node_label_(.+)

            - targetLabel: job
              replacement: kubelet-probes
            - targetLabel: cluster_full_name
              replacement: {{ .Values.cluster.name }}
            - targetLabel: remotewrite_cluster
              replacement: {{ .Values.cluster.name }}
            - targetLabel: client_cluster
              replacement: {{ .Values.cluster.name }}
            - targetLabel: cluster_type
              replacement: client

      clientClusterKubeletResource:
        apiVersion: operator.victoriametrics.com/v1beta1
        kind: VMScrapeConfig
        metadata:
          name: client-cluster-kubelet-resource
          namespace: beget-system
        spec:
          scheme: https
          scrape_interval: 30s
          scrapeTimeout: 10s

          tlsConfig:
            ca:
              secret:
                name: "{{ .Values.cluster.name }}-super-admin"
                key: ca.crt
            cert:
              secret:
                name: "{{ .Values.cluster.name }}-super-admin"
                key: tls.crt
            keySecret:
              name: "{{ .Values.cluster.name }}-super-admin"
              key: tls.key

          kubernetesSDConfigs:
            - role: node
              apiServer: "https://{{ .Values.cluster.host }}:{{ .Values.cluster.port }}"
              tlsConfig:
                ca:
                  secret:
                    name: "{{ .Values.cluster.name }}-super-admin"
                    key: ca.crt
                cert:
                  secret:
                    name: "{{ .Values.cluster.name }}-super-admin"
                    key: tls.crt
                keySecret:
                  name: "{{ .Values.cluster.name }}-super-admin"
                  key: tls.key

          relabelConfigs:
            - targetLabel: __address__
              replacement: "{{ .Values.cluster.host }}:{{ .Values.cluster.port }}"
            - sourceLabels: [__meta_kubernetes_node_name]
              targetLabel: __metrics_path__
              replacement: /api/v1/nodes/$1/proxy/metrics/resource

            - sourceLabels: [__meta_kubernetes_node_name]
              targetLabel: node
            - action: labelmap
              regex: __meta_kubernetes_node_label_(.+)

            - targetLabel: job
              replacement: kubelet-resource
            - targetLabel: cluster_full_name
              replacement: {{ .Values.cluster.name }}
            - targetLabel: remotewrite_cluster
              replacement: {{ .Values.cluster.name }}
            - targetLabel: client_cluster
              replacement: {{ .Values.cluster.name }}
            - targetLabel: cluster_type
              replacement: client

      clientClusterKubeApiserver:
        apiVersion: operator.victoriametrics.com/v1beta1
        kind: VMScrapeConfig
        metadata:
          name: client-cluster-kube-apiserver
          namespace: beget-system
        spec:
          scheme: https
          scrape_interval: 30s
          scrapeTimeout: 10s
          path: /metrics

          staticConfigs:
            - targets:
                - {{ .Values.cluster.host }}:{{ .Values.cluster.port }}
              labels:
                job: kube-apiserver
                cluster_full_name: {{ .Values.cluster.name }}
                remotewrite_cluster: {{ .Values.cluster.name }}
                client_cluster: {{ .Values.cluster.name }}

          tlsConfig:
            ca:
              secret:
                name: "{{ .Values.cluster.name }}-super-admin"
                key: ca.crt
            cert:
              secret:
                name: "{{ .Values.cluster.name }}-super-admin"
                key: tls.crt
            keySecret:
              name: "{{ .Values.cluster.name }}-super-admin"
              key: tls.key
            insecureSkipVerify: false

          relabelConfigs:
            - targetLabel: instance
              replacement: external-apiserver
            - targetLabel: cluster_full_name
              replacement: {{ .Values.cluster.name }}
            - targetLabel: remotewrite_cluster
              replacement: {{ .Values.cluster.name }}
            - targetLabel: client_cluster
              replacement: {{ .Values.cluster.name }}
            - targetLabel: cluster_type
              replacement: client
