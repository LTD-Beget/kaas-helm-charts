---
apiVersion: addons.in-cloud.io/v1alpha1
kind: AddonValue
metadata:
  name: kube-state-metrics-default
  labels:
    addons.in-cloud.io/values: default
    addons.in-cloud.io/addon: kube-state-metrics
spec:
  values: |
    kube-state-metrics:
      prometheusScrape: false
      metricLabelsAllowlist:
        - nodes=[node-group.{{ .Values.companyDomain }}/name]
      customLabels:
        in-cloud.io/clusterName: ""
      resources:
        limits:
          cpu: 500m
          memory: 512Mi
        requests:
          cpu: 50m
          memory: 128Mi

      kubeRBACProxy:
        enabled: true
        image:
          # registry: quay.io
          # repository: brancz/kube-rbac-proxy
          tag: v0.21.0

        extraArgs:
          - --v=2

        resources:
          requests:
            memory: "32Mi"
            cpu: "10m"
          limits:
            memory: "64Mi"
            cpu: "50m"

---
apiVersion: addons.in-cloud.io/v1alpha1
kind: AddonValue
metadata:
  name: kube-state-metrics-immutable
  labels:
    addons.in-cloud.io/values: immutable
    addons.in-cloud.io/addon: kube-state-metrics
spec:
  values: ""

---
apiVersion: addons.in-cloud.io/v1alpha1
kind: AddonValue
metadata:
  name: kube-state-metrics-infra
  labels:
    addons.in-cloud.io/values: infra
    addons.in-cloud.io/addon: kube-state-metrics
spec:
  values: |
    companyPrefix: {{ .Values.companyPrefix }}
    kube-state-metrics:
      tolerations:
        - key: "node-role.kubernetes.io/control-plane"
          operator: "Exists"
          effect: "NoSchedule"
        - key: "node-role.kubernetes.io/master"
          operator: "Exists"
          effect: "NoSchedule"
    networkPolicies:
      kubeStateMetrics:
        enabled: true


---
apiVersion: addons.in-cloud.io/v1alpha1
kind: AddonValue
metadata:
  name: kube-state-metrics-client
  labels:
    addons.in-cloud.io/values: client
    addons.in-cloud.io/addon: kube-state-metrics
spec:
  values: |
    kube-state-metrics:
      labels:
        toleration.{{ .Values.companyDomain }}/ignore: "true"
      podLabels:
        toleration.{{ .Values.companyDomain }}/ignore: "true"
      tolerations:
        - operator: "Exists"

---
apiVersion: addons.in-cloud.io/v1alpha1
kind: AddonValue
metadata:
  name: kube-state-metrics-cert-manager
  labels:
    addons.in-cloud.io/values: cert-manager
    addons.in-cloud.io/addon: kube-state-metrics
spec:
  values: |
    kube-state-metrics:
      volumes:
        - name: rbac-proxy-tls
          secret:
            defaultMode: 420
            secretName: kube-state-metrics-svc-tls

      kubeRBACProxy:
        extraArgs:
          - --tls-cert-file=/app/config/metrics/tls/tls.crt
          - --tls-private-key-file=/app/config/metrics/tls/tls.key
          - --v=2

        volumeMounts:
          - name: rbac-proxy-tls
            mountPath: /app/config/metrics/tls
            readOnly: true

    monitoring:
      secureService:
        enabled: true
        issuer:
          name: selfsigned-cluster-issuer

---
apiVersion: addons.in-cloud.io/v1alpha1
kind: AddonValue
metadata:
  name: kube-state-metrics-vm-operator
  labels:
    addons.in-cloud.io/values: vm-operator
    addons.in-cloud.io/addon: kube-state-metrics
spec:
  values: |
    monitoring:
      enabled: true
      serviceScrapeConfig:
        metricRelabelConfigs:
          - source_labels: [cluster_namespace, cluster_name]
            separator: "-"
            regex: "(.+)-(.+)"
            target_label: cluster_full_name
            replacement: "$1-$2"
            action: replace

---
# TODO: Describe AddonPhase for CAPI
apiVersion: addons.in-cloud.io/v1alpha1
kind: AddonValue
metadata:
  name: kube-state-metrics-capi
  labels:
    addons.in-cloud.io/values: capi
    addons.in-cloud.io/addon: kube-state-metrics
spec:
  values: |
    kube-state-metrics:
      customResourceState:
        enabled: true
        config:
          kind: CustomResourceStateMetrics
          spec:
            resources:
              - groupVersionKind:
                  group: clusterclaim.in-cloud.io
                  version: v1alpha1
                  kind: ClusterClaim
                metricNamePrefix: in_cloud_capi_clusterclaim
                labelsFromPath:
                  name: [metadata, name]
                  namespace: [metadata, namespace]
                metrics:
                # common
                  - name: resource_info
                    help: "ClusterClaim inventory info."
                    each:
                      type: Info
                      info:
                        labelsFromPath:
                          customer_login: [spec, extraEnvs, begetClusterCustomerLogin]
                          cluster_suspend: [spec, extraEnvs, begetCltSuspend]
                          ccm_csr_template: [spec, ccmCsrTemplateRef, name]
                          observe_template: [spec, observeTemplateRef, name]
                          replicas: [spec, replicas]

                  - name: created_timestamp_seconds
                    help: "Cluster creation timestamp."
                    each:
                      type: Gauge
                      gauge:
                        path: [metadata, creationTimestamp]

                  - name: deleted_timestamp_seconds
                    help: "Cluster deletion timestamp."
                    each:
                      type: Gauge
                      gauge:
                        path: [metadata, deletionTimestamp]
                        nilIsZero: true

                  - name: status_phase
                    help: "Cluster status phase."
                    each:
                      type: StateSet
                      stateSet:
                        labelName: phase
                        path: [status, phase]
                        list:
                          - Provisioning
                          - WaitingDependency
                          - Ready
                          - Failed
                          - Degraded
                          - Paused
                          - Deleting

                  - name: spec_paused
                    help: "Cluster paused flag."
                    each:
                      type: Gauge
                      gauge:
                        path: [spec, paused]
                        nilIsZero: true

                  - name: condition
                    help: "Cluster conditions."
                    each:
                      type: Gauge
                      gauge:
                        path: [status, conditions]
                        labelsFromPath:
                          type: [type]
                        valueFrom: [status]

                # infra
                  - name: infra_cluster_info
                    help: "Infra cluster inventory info."
                    each:
                      type: Info
                      info:
                        labelsFromPath:
                          kubernetes_version: [spec, infra, componentVersions, kubernetes, version]
                          certificate_set_template: [spec, certificateSetTemplateRef, infra, name]
                          cluster_template: [spec, clusterTemplateRef, infra, name]
                          configmap_template: [spec, configMapTemplateRef, infra, name]

                  - name: infra_condition
                    help: "Infra cluster conditions."
                    each:
                      type: Gauge
                      gauge:
                        path: [status, clusters, infra, conditions]
                        labelsFromPath:
                          type: [type]
                        valueFrom: [status]

                  - name: infra_status_phase
                    help: "Cluster status phase."
                    each:
                      type: StateSet
                      stateSet:
                        labelName: phase
                        path: [status, clusters, infra, phase]
                        list:
                          - Pending
                          - Provisioning
                          - Provisioned
                          - Deleting
                          - Failed
                          - Unknown

                  - name: infra_spec_paused
                    help: "Infra cluster paused flag."
                    each:
                      type: Gauge
                      gauge:
                        path: [spec, infra, paused]
                        nilIsZero: true

                # client
                  - name: client_cluster_info
                    help: "Client cluster inventory info."
                    each:
                      type: Info
                      info:
                        labelsFromPath:
                          enabled: [spec, client, enabled]
                          kubernetes_version: [spec, client, componentVersions, kubernetes, version]
                          certificate_set_template: [spec, certificateSetTemplateRef, client, name]
                          cluster_template: [spec, clusterTemplateRef, client, name]
                          configmap_template: [spec, configMapTemplateRef, client, name]

                  - name: client_cluster_condition
                    help: "Cluster conditions."
                    each:
                      type: Gauge
                      gauge:
                        path: [status, clusters, client, conditions]
                        labelsFromPath:
                          type: [type]
                        valueFrom: [status]

                  - name: client_status_phase
                    help: "Cluster status phase."
                    each:
                      type: StateSet
                      stateSet:
                        labelName: phase
                        path: [status, clusters, client, phase]
                        list:
                          - Pending
                          - Provisioning
                          - Provisioned
                          - Deleting
                          - Failed
                          - Unknown

                  - name: infra_spec_paused
                    help: "Infra cluster paused flag."
                    each:
                      type: Gauge
                      gauge:
                        path: [spec, client, paused]
                        nilIsZero: true

              - groupVersionKind:
                  group: cluster.x-k8s.io
                  version: v1beta2
                  kind: Cluster
                metricNamePrefix: in_cloud_capi_cluster
                labelsFromPath:
                  cluster_name: [metadata, name]
                  cluster_namespace: [metadata, namespace]
                  cluster_hash: [metadata, "xcluster.in-cloud.io/name"]
                metrics:
                  - name: resource_info
                    help: "Cluster inventory info."
                    each:
                      type: Info
                      info:
                        labelsFromPath:
                          topology_class: [spec, topology, classRef, name]
                          topology_class_namespace: [spec, topology, classRef, namespace]
                          kubernetes_version: [spec, topology, version]
                          controlplane_endpoint_host: [spec, controlPlaneEndpoint, host]
                          controlplane_endpoint_port: [spec, controlPlaneEndpoint, port]

                  - name: created_timestamp_seconds
                    help: "Cluster creation timestamp."
                    each:
                      type: Gauge
                      gauge:
                        path: [metadata, creationTimestamp]

                  - name: deleted_timestamp_seconds
                    help: "Cluster deletion timestamp."
                    each:
                      type: Gauge
                      gauge:
                        path: [metadata, deletionTimestamp]
                        nilIsZero: true

                  - name: status_phase
                    help: "Cluster status phase."
                    each:
                      type: StateSet
                      stateSet:
                        labelName: phase
                        path: [status, phase]
                        list:
                          - Pending
                          - Provisioning
                          - Provisioned
                          - Deleting
                          - Failed
                          - Unknown

                  - name: spec_paused
                    help: "Cluster paused flag."
                    each:
                      type: Gauge
                      gauge:
                        path: [spec, paused]
                        nilIsZero: true

                  - name: condition
                    help: "Cluster conditions."
                    each:
                      type: Gauge
                      gauge:
                        path: [status, conditions]
                        labelsFromPath:
                          type: [type]
                        valueFrom: [status]

                  - name: controlplane_desired_replicas
                    help: "Desired control plane replicas."
                    each:
                      type: Gauge
                      gauge:
                        path: [status, controlPlane, desiredReplicas]
                        nilIsZero: true

                  - name: controlplane_replicas
                    help: "Current control plane replicas."
                    each:
                      type: Gauge
                      gauge:
                        path: [status, controlPlane, replicas]
                        nilIsZero: true

                  - name: controlplane_ready_replicas
                    help: "Ready control plane replicas."
                    each:
                      type: Gauge
                      gauge:
                        path: [status, controlPlane, readyReplicas]
                        nilIsZero: true

                  - name: controlplane_available_replicas
                    help: "Available control plane replicas."
                    each:
                      type: Gauge
                      gauge:
                        path: [status, controlPlane, availableReplicas]
                        nilIsZero: true

                  - name: controlplane_uptodate_replicas
                    help: "Up-to-date control plane replicas."
                    each:
                      type: Gauge
                      gauge:
                        path: [status, controlPlane, upToDateReplicas]
                        nilIsZero: true

                  - name: workers_desired_replicas
                    help: "Desired worker replicas."
                    each:
                      type: Gauge
                      gauge:
                        path: [status, workers, desiredReplicas]
                        nilIsZero: true

                  - name: workers_replicas
                    help: "Current worker replicas."
                    each:
                      type: Gauge
                      gauge:
                        path: [status, workers, replicas]
                        nilIsZero: true

                  - name: workers_ready_replicas
                    help: "Ready worker replicas."
                    each:
                      type: Gauge
                      gauge:
                        path: [status, workers, readyReplicas]
                        nilIsZero: true

                  - name: workers_available_replicas
                    help: "Available worker replicas."
                    each:
                      type: Gauge
                      gauge:
                        path: [status, workers, availableReplicas]
                        nilIsZero: true

                  - name: workers_uptodate_replicas
                    help: "Up-to-date worker replicas."
                    each:
                      type: Gauge
                      gauge:
                        path: [status, workers, upToDateReplicas]
                        nilIsZero: true

                  - name: initialization_controlplane_initialized
                    help: "Whether control plane initialization is complete."
                    each:
                      type: Gauge
                      gauge:
                        path: [status, initialization, controlPlaneInitialized]
                        nilIsZero: true

                  - name: initialization_infrastructure_provisioned
                    help: "Whether infrastructure provisioning is complete."
                    each:
                      type: Gauge
                      gauge:
                        path: [status, initialization, infrastructureProvisioned]
                        nilIsZero: true
      rbac:
        extraRules:
          - apiGroups:
              - cluster.x-k8s.io
            resources:
              - clusters
            verbs:
              - list
              - watch
          - apiGroups:
              - clusterclaim.in-cloud.io
            resources:
              - clusterclaims
            verbs:
              - list
              - watch
