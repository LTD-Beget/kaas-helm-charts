---
apiVersion: addons.in-cloud.io/v1alpha1
kind: AddonValue
metadata:
  name: extra-resources-infra
  labels:
    addons.in-cloud.io/values: infra
    addons.in-cloud.io/addon: extra-resources
spec:
  values: |
    resources:
      certificate:
        apiVersion: in-cloud.io/v1alpha1
        kind: CertificateSet
        metadata:
          labels:
            cluster.x-k8s.io/cluster-name: {{ .Values.cluster.name }}
            clusterctl.cluster.x-k8s.io/move: "true"
            xcluster.in-cloud.io/name: {{ .Values.cluster.name }}
          name: {{ .Values.cluster.name }}
          namespace: {{ .Values.companyPrefix }}-system
        spec:
          environment: infra
          argocdCluster: true
          argocdEndpoint: https://kubernetes.default.svc
          issuerRef:
            apiVersion: cert-manager.io/v1
            kind: ClusterIssuer
            name: selfsigned
          issuerRefOidc:
            apiVersion: cert-manager.io/v1
            kind: ClusterIssuer
            name: selfsigned-cluster-issuer
          kubeconfig: false
          kubeconfigEndpoint: {{ printf "https://%s:%s" .Values.cluster.host .Values.cluster.port }}
      issuer:
        apiVersion: cert-manager.io/v1
        kind: ClusterIssuer
        metadata:
          name: ca{{ if eq .Values.environment "client" }}-client{{ end }}
        spec:
          ca:
            secretName: {{ .Values.cluster.name }}-ca

---
apiVersion: addons.in-cloud.io/v1alpha1
kind: AddonValue
metadata:
  name: extra-resources-network-policies
  labels:
    addons.in-cloud.io/values: network-policies-argocd
    addons.in-cloud.io/addon: extra-resources
spec:
  values: |
    resources:
      ciliumnetworkpoliciesArgocdCommon:
        apiVersion: cilium.io/v2
        kind: CiliumNetworkPolicy
        metadata:
          name: argocd-common
          namespace: {{ .Values.companyPrefix }}-argocd
        spec:
          endpointSelector: {}
          egress:
            - toEntities:
                - kube-apiserver
                - world
              toPorts:
                - ports:
                    - port: "6443"
                      protocol: TCP
            - toEntities:
                - world
              toPorts:
                - ports:
                    - port: "26443"
                      protocol: TCP
            # RepoServer отправляет запросы в эти списки
            - toFQDNs:
                - matchName: github.com
                - matchName: blog.{{ .Values.companyPrefix }}.com
                - matchName: istio-release.storage.googleapis.com
              toPorts:
                - ports:
                    - port: "443"
                      protocol: TCP
                  # rules:
                  #   dns:
                  #     - matchPattern: "*"

            # ApplicationController отправляет запросы в эти списки
            # ArgocdServer отправляет запросы в эти списки
            - toEndpoints:
                - matchLabels:
                    k8s:io.cilium.k8s.policy.serviceaccount: client-cp-control-plane-control-plane
                    k8s:io.kubernetes.pod.namespace: {{ .Values.companyPrefix }}-system
              toPorts:
                - ports:
                    - port: "26443"
                      protocol: TCP

            # ApplicationController отправляет запросы в эти списки
            # ArgocdServer отправляет запросы в эти списки
            # Redis отправляет запросы в эти списки
            # RepoServer отправляет запросы в эти списки
            - toEndpoints:
                - matchLabels:
                    k8s:io.cilium.k8s.policy.serviceaccount: coredns
                    k8s:io.kubernetes.pod.namespace: {{ .Values.companyPrefix }}-coredns
              toPorts:
                - ports:
                    - port: "53"
                      protocol: TCP
                    - port: "53"
                      protocol: UDP
                  rules:
                    dns:
                      - matchPattern: "*"

            # ApplicationController отправляет запросы в эти списки
            # RepoServer отправляет запросы в эти списки
            - toEndpoints:
                - matchLabels:
                    k8s:io.cilium.k8s.policy.serviceaccount: default
              toPorts:
                - ports:
                    - port: "6379"
                      protocol: TCP

            # ApplicationController отправляет запросы в эти списки
            - toEndpoints:
                - matchLabels:
                    k8s:io.cilium.k8s.policy.serviceaccount: argocd-repo-server
              toPorts:
                - ports:
                    - port: "8081"
                      protocol: TCP

          ingress:
            # REDIS принимает запрос от этого списка
            - fromEndpoints:
                - matchLabels:
                    k8s:io.cilium.k8s.policy.serviceaccount: argocd-application-controller
                - matchLabels:
                    k8s:io.cilium.k8s.policy.serviceaccount: argocd-repo-server
                - matchLabels:
                    k8s:io.cilium.k8s.policy.serviceaccount: argocd-server
              toPorts:
                - ports:
                    - port: "6379"
                      protocol: TCP

            # RepoServer принимает запрос от этого списка
            - fromEndpoints:
                - matchLabels:
                    k8s:io.cilium.k8s.policy.serviceaccount: argocd-application-controller
                - matchLabels:
                    k8s:io.cilium.k8s.policy.serviceaccount: argocd-server
              toPorts:
                - ports:
                    - port: "8081"
                      protocol: TCP
            - fromEndpoints:
                - matchLabels:
                    k8s:io.cilium.k8s.policy.serviceaccount: vmagent-vmagent
                    k8s:io.kubernetes.pod.namespace: {{ .Values.companyPrefix }}-vmagent
              toPorts:
                - ports:
                    - port: "11043"
                      protocol: TCP

---
apiVersion: addons.in-cloud.io/v1alpha1
kind: AddonValue
metadata:
  name: extra-resources-cluster-pdb-limits
  labels:
    addons.in-cloud.io/values: cluster-pdb-limits
    addons.in-cloud.io/addon: extra-resources
spec:
  values: |
    resources:
      vapPdbSaneLimits:
        apiVersion: admissionregistration.k8s.io/v1
        kind: ValidatingAdmissionPolicy
        metadata:
          name: pdb-sane-limits
        spec:
          failurePolicy: Fail
          matchConstraints:
            resourceRules:
              - apiGroups: ["policy"]
                apiVersions: ["v1"]
                operations: ["CREATE", "UPDATE"]
                resources: ["poddisruptionbudgets"]
          validations:
            # 1. Запрещаем maxUnavailable: 0
            - expression: "!(has(object.spec.maxUnavailable) && object.spec.maxUnavailable == 0)"
              message: "PDB with maxUnavailable=0 blocks node drain"

            # 2. Запрещаем minAvailable = replicas (через % = 100%)
            - expression: "!(has(object.spec.minAvailable) && object.spec.minAvailable == '100%')"
              message: "PDB with minAvailable=100% blocks node drain"

            # 3. Должно быть задано только одно из полей
            - expression: "!(has(object.spec.minAvailable) && has(object.spec.maxUnavailable))"
              message: "Specify only one of minAvailable or maxUnavailable"

      vapbPdbSaneLimits:
        apiVersion: admissionregistration.k8s.io/v1
        kind: ValidatingAdmissionPolicyBinding
        metadata:
          name: pdb-sane-limits-binding
        spec:
          policyName: pdb-sane-limits
          validationActions: [Deny]

---
apiVersion: addons.in-cloud.io/v1alpha1
kind: AddonValue
metadata:
  name: extra-resources-cluster-network-policies
  labels:
    addons.in-cloud.io/values: cluster-network-policies
    addons.in-cloud.io/addon: extra-resources
spec:
  values: |
    resources:
      ciliumclusternetpolicyCiliumHealth:
        apiVersion: cilium.io/v2
        kind: CiliumClusterwideNetworkPolicy
        metadata:
          name: allow-bidirectional-cilium-health-checks-4240
        spec:
          endpointSelector: {}
          ingress:
          - fromEntities:
            - remote-node
            - health
            toPorts:
            - ports:
              - port: '4240'
                protocol: TCP
          egress:
          - toEntities:
            - remote-node
            - health
            toPorts:
            - ports:
              - port: '4240'
                protocol: TCP
          description: |
            Allows bidirectional Cilium health check traffic between remote nodes
            and health endpoints on TCP/4240.
      ciliumclusternetpolicyICMP:
        apiVersion: cilium.io/v2
        kind: CiliumClusterwideNetworkPolicy
        metadata:
          name: allow-bidirectional-icmp-and-ipv6-discovery
        spec:
          endpointSelector: {}
          egress:
          - toEntities:
            - remote-node
            - host
            - world
            icmps:
            - fields:
              - type: 8
                family: IPv4
              - type: 0
                family: IPv4
              - type: 133
                family: IPv6
              - type: 134
                family: IPv6
              - type: 135
                family: IPv6
              - type: 136
                family: IPv6
              - type: 137
                family: IPv6
          ingress:
          - fromEntities:
            - remote-node
            - host
            - world
            icmps:
            - fields:
              - type: 8
                family: IPv4
              - type: 0
                family: IPv4
              - type: 133
                family: IPv6
              - type: 134
                family: IPv6
              - type: 135
                family: IPv6
              - type: 136
                family: IPv6
              - type: 137
                family: IPv6
          description: |
            Allows bidirectional ICMP echo traffic and IPv6 neighbor-discovery
            control messages for all selected endpoints in the cluster.

