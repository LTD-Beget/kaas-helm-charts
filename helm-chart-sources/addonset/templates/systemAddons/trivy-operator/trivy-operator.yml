{{- if .Values.addons.trivyoperator.enabled }}
  {{- $clientContext := set (deepCopy .) "Values" (set (deepCopy .Values) "environment" "client") -}}
  
  {{- if .Values.addons.system.enabled }}
    {{- include "trivy-operator.addon" . }}
    {{- .Files.Get "files/systemAddons/trivy-operator/values-system.yml" | nindent 0 }}
  {{- end }}

  {{- .Files.Get "files/systemAddons/trivy-operator/values.yml" | nindent 0 }}

  {{- include "trivy-operator.phase" . }}

  {{- if eq .Values.environment "infra" }}
    {{- include "trivy-operator.phase" $clientContext }}
  {{- end }}
{{- end }}