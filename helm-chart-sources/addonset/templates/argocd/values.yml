{{- $istioBaseValues  := printf `
istio:
  virtualService:
    enabled: true
    gateways:
      - {{ .Values.companyPrefix }}-istio-gw/default
    hosts:
      - "*"
    http:
      name: argocd
      route:
        host: argocd-server
        port: 443
  destinationRule:
    enabled: true
    host: argocd-server
    trafficPolicy:
      tls:
        mode: SIMPLE
        insecureSkipVerify: true
`}}

{{- $istioGwValues  := printf `
argo-cd:
  configs:
    cm:
      timeout.reconciliation: 180s
      timeout.reconciliation.jitter: 60s
`}}

{{- $systemValues  := printf `
argo-cd:
  configs:
    cm:
      url: "https://{{ .Values.systemIstioGwDomain }}/argocd"
    envFrom:
      - secretRef:
          name: avp-config
    resources:
      limits:
        cpu: 8
        memory: 8Gi
  extraObjects:
    - apiVersion: v1
      kind: Secret
      metadata:
        name: avp-config
        namespace: {{ .Values.companyPrefix }}-argocd
      type: Opaque
      stringData:
        AVP_TYPE: "vault"
        AVP_AUTH_TYPE: "k8s"
        VAULT_ADDR: "http://vault.{{ .Values.companyPrefix }}-vault.svc.cluster.local:8200"
        AVP_K8S_ROLE: "credentials-ro"
`}}

{{- $systemAndInitializedValues  := printf `
argo-cd:
  controller:
    resources:
      limits:
        cpu: '4'
        ephemeral-storage: 10Gi
      requests:
        cpu: 200m
        ephemeral-storage: 500Mi
        memory: 1Gi
  global:
    nodeSelector:
      node-role.kubernetes.io/argocd: ''
    tolerations:
      - effect: NoSchedule
        key: node-role.kubernetes.io/argocd
        operator: Exists
      - effect: NoSchedule
        key: node-role.kubernetes.io/control-plane
        operator: Exists
      - effect: NoSchedule
        key: node-role.kubernetes.io/master
        operator: Exists
  redis:
    resources:
      limits:
        cpu: 1
        memory: 1Gi
`}}

{{- range $item := list
  (dict "name" "default"                "value" $defaultValues              )
  (dict "name" "immutable"              "value" $immutableValues            )
  (dict "name" "infra"                  "value" $infraValues                )
  (dict "name" "network-policies"       "value" $networkPoliciesValues      )
  (dict "name" "trust-manager"          "value" $trustManagerValues         )
  (dict "name" "vm-operator"            "value" $vmOperatorValues           )
  (dict "name" "istio-base"             "value" $istioBaseValues            )
  (dict "name" "istio-gw"               "value" $istioGwValues              )
  (dict "name" "system"                 "value" $systemValues               )
  (dict "name" "system-and-initialized" "value" $systemAndInitializedValues )
}}
  {{- $values := set (deepCopy $addonContext.Values) "addonValueName" $item.name -}}
  {{- $_      := set $values "addonValue" $item.value -}}
  {{- include "common.addonValue" (set (deepCopy $) "Values" $values) }}
{{- end }}
