{{- range $appName, $appValue := .Values.applications }}
  {{- if $appValue.enabled }}
    {{- if and $appValue.monitoring.enabled (eq $appValue.monitoring.type "VictoriaMetrics") }}
---
apiVersion: v1
kind: Service
metadata:
  name: "{{ $.Release.Name }}-apiserver-monitoring"
  namespace: {{ $.Release.Namespace }}
  labels:
    monitoring.in-cloud.io/service: "{{ $.Release.Name }}-apiserver-monitoring"
    component: kube-apiserver-client
    jobLabel: kube-apiserver-client
spec:
  ports:
    - name: https-metrics
      port: {{ index $appValue.containers.kubeApiserver.extraArgs "secure-port" | default "443" }}
      protocol: TCP
      targetPort: {{ index $appValue.containers.kubeApiserver.extraArgs "secure-port" | default "443" }}
  selector:
    app.kubernetes.io/name: control-plane
  type: ClusterIP
    {{- end }}
  {{- end }}
{{- end }}
