{{- range $appName, $appValue := .Values.applications }}
  {{- if $appValue.enabled }}
    {{- if and $appValue.monitoring.enabled (eq $appValue.monitoring.type "VictoriaMetrics") }}
    {{- $defaultServerName := "client-cp-scheduler" }}
    {{- $serverName := "" }}
    {{- if $appValue.csiDriver }}
    {{- $serverName = index (split (dig "controlPlane" "volumes" "scheduler-server-csi" "volume" "volumeAttributes" "csi.cert-manager.io/dns-names" $defaultServerName $appValue) ",") 0 }}
    {{- else }}
    {{- $serverName = dig "controlPlane" "containers" "kubeScheduler" "certSANs" 0 $defaultServerName $appValue }}
    {{- end }}

---
apiVersion: operator.victoriametrics.com/v1beta1
kind: VMServiceScrape
metadata:
  name: "{{ $.Release.Name }}-scheduler"
  namespace: {{ $.Release.Namespace }}
spec:
  endpoints:
    - port: https-metrics
      scheme: "https"
      tlsConfig:
        serverName: "{{ $serverName }}"
        ca:
          secret:
            name: "{{ $appValue.clusterName }}-ca"
            key: ca.crt
  selector:
    matchLabels:
      monitoring.in-cloud.io/service: "{{ $.Release.Name }}-scheduler-monitoring"
  jobLabel: jobLabel
    {{- end }}
  {{- end }}
{{- end }}
