{{- range $appName, $appValue := .Values.applications }}
  {{- if $appValue.enabled }}
    {{- if and $appValue.monitoring.enabled (eq $appValue.monitoring.type "VictoriaMetrics") }}
    {{- $defaultServerName := "client-cp-controller-manager" }}
    {{- $serverName := "" }}
    {{- if $appValue.csiDriver }}
    {{- $serverName = ((dig "volumes" "controller-manager-server-csi" "volume" "volumeAttributes" "csi.cert-manager.io/dns-names" $defaultServerName $appValue) | split ",")._0 }}
    {{- else }}
    {{- $serverName = ((dig "containers" "kubeControllerManager" "certSANs" list $appValue) | first | default $defaultServerName) }}
    {{- end }}

---
apiVersion: operator.victoriametrics.com/v1beta1
kind: VMServiceScrape
metadata:
  name: "{{ $.Release.Name }}-controller-manager"
  namespace: {{ $.Release.Namespace }}
spec:
  endpoints:
    - port: https-metrics
      scheme: "https"
      tlsConfig:
        serverName: "{{ $serverName }}"
        ca:
          secret:
            name: "{{ $appValue.clusterName }}-ca"
            key: ca.crt
  selector:
    matchLabels:
      monitoring.in-cloud.io/service: "{{ $.Release.Name }}-controller-manager-monitoring"
  jobLabel: jobLabel
    {{- end }}
  {{- end }}
{{- end }}
