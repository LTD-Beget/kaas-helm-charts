{{- range $appName, $appValue := .Values.applications }}
  {{- if $appValue.enabled }}
    {{- if and $appValue.monitoring.enabled (eq $appValue.monitoring.type "VictoriaMetrics") }}
---
apiVersion: operator.victoriametrics.com/v1beta1
kind: VMServiceScrape
metadata:
  name: "{{ $.Release.Name }}-apiserver"
  namespace: {{ $.Release.Namespace }}
spec:
  endpoints:
    - port: https-metrics
      scheme: "https"
      tlsConfig:
        serverName: "{{ $.Release.Name }}-apiserver-monitoring"
        ca:
          secret:
            name: "{{ $appValue.clusterName }}-ca"
            key: ca.crt
  selector:
    matchLabels:
      monitoring.in-cloud.io/service: "{{ $.Release.Name }}-apiserver-monitoring"
  jobLabel: jobLabel
    {{- end }}
  {{- end }}
{{- end }}
