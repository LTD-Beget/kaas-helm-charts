{{- if .Values.networkPolicies.enabled }}
---
# host to certs-controller-manager — health (8081)
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-host-probes-certificate-set-8081
  namespace: {{ .Release.Namespace }}
spec:
  description: "Allow kubelet probes to certs-controller-manager"
  endpointSelector:
    matchLabels:
      k8s:io.kubernetes.pod.namespace: {{ .Release.Namespace }}
      k8s:io.cilium.k8s.policy.serviceaccount: certs-controller-manager
  ingress:
  - fromEntities:
    - host
    toPorts:
    - ports:
      - port: "8081"
        protocol: TCP

---
# Allow `certificate-set` to talk to the Kubernetes API server.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-egress-certificate-set-to-kube-apiserver-6443
  namespace: {{ .Release.Namespace }}
spec:
  endpointSelector:
    matchLabels:
      k8s:io.cilium.k8s.policy.serviceaccount: certs-controller-manager
  egress:
  - toEntities:
    - kube-apiserver
    toPorts:
    - ports:
      - port: '6443'
        protocol: TCP
  description: Allows egress from certificate-set to the Kubernetes API server on
    6443 for control-plane interactions.

---
# Allow vmagent to scrape `certificate-set` metrics via the kube-rbac-proxy sidecar.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-ingress-certificate-set-from-vmagent-11043
  namespace: {{ .Release.Namespace }}
spec:
  endpointSelector:
    matchLabels:
      k8s:io.cilium.k8s.policy.serviceaccount: certs-controller-manager
      k8s:io.kubernetes.pod.namespace: {{ .Release.Namespace }}
  ingress:
  - fromEndpoints:
    - matchLabels:
        k8s:io.cilium.k8s.policy.serviceaccount: vmagent-vmagent
        k8s:io.kubernetes.pod.namespace: {{ .Values.companyPrefix }}-vmagent
    toPorts:
    - ports:
      - port: '11043'
        protocol: TCP
  description: Allows ingress from vmagent to certificate-set on 11043 for metrics collection.
{{- end }}
