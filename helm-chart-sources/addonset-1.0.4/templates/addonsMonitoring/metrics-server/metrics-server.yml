{{- if .Values.addons.metricsserver.enabled }}
  {{- $clientContext := set (deepCopy .) "Values" (set (deepCopy .Values) "environment" "client") -}}

  {{- include "metrics-server.addon" . }}

  {{- .Files.Get "files/addonsMonitoring/metrics-server/values.yml" | nindent 0 }}

  {{- include "metrics-server.phase" . }}

  {{- if eq .Values.environment "infra" }}
    {{- include "metrics-server.phase" $clientContext }}
  {{- end }}
{{- end }}