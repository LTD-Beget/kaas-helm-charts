{{- if .Values.addons.vmalertmanager.enabled }}
  {{- $clientContext := set (deepCopy .) "Values" (set (deepCopy .Values) "environment" "client") -}}
  
  {{- if .Values.addons.system.enabled }}
    {{- include "vm-alertmanager.addon" . }}
  {{- end }}

  {{- .Files.Get "files/systemAddons/vm-alertmanager/values.yml" | nindent 0 }}

  {{- include "vm-alertmanager.phase" . }}

  {{- if eq .Values.environment "infra" }}
    {{- include "vm-alertmanager.phase" $clientContext }}
  {{- end }}
{{- end }}