{{- if .Values.addons.extraresources.enabled }}
  {{- $clientContext := set (deepCopy .) "Values" (set (deepCopy .Values) "environment" "client") -}}

  {{- include "extra-resources.addon" . }}
  
  {{- .Files.Get "files/extra-resources/values.yml" | nindent 0 }}

  {{- include "extra-resources.phase" . }}

  {{- if and .Values.clientClusterEnabled (eq .Values.environment "infra") }}
    {{- include "extra-resources.addon" $clientContext }}
    {{- include "extra-resources.phase" $clientContext }}
  {{- end }}

{{- end }}
