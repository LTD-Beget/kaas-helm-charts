{{- if and .Values.monitoring.enabled (eq .Values.monitoring.type "VictoriaMetrics") }}
{{- $scrapeConfig := .Values.monitoring.serviceScrapeConfig -}}
---
apiVersion: operator.victoriametrics.com/v1beta1
kind: VMServiceScrape
metadata:
  name: {{ include "wrapper-kube-state-metrics.name" . }}-monitoring
  namespace: {{ include "wrapper-kube-state-metrics.namespace" . }}
spec:
  selector:
    matchLabels:
      monitoring.in-cloud.io/service: {{ include "wrapper-kube-state-metrics.name" . }}
  endpoints:
    - port: https-metrics
      path: /metrics
      scheme: HTTPS
      honorLabels: true
      bearerTokenFile: /var/run/secrets/kubernetes.io/serviceaccount/token
      tlsConfig:
        serverName: {{ include "wrapper-kube-state-metrics.name" . }}
      {{- with $scrapeConfig.relabelConfigs }}
      relabelConfigs:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $scrapeConfig.metricRelabelConfigs }}
      metricRelabelConfigs:
        {{- toYaml . | nindent 8 }}
      {{- end }}
  jobLabel: {{ include "wrapper-kube-state-metrics.name" . }}
{{- end }}
