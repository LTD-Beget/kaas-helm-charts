{{- if and .Values.monitoring.enabled }}
{{- $ksm := index .Values "kube-state-metrics" -}}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "beget-kube-state-metrics.name" . }}-monitoring
  namespace: {{ include "beget-kube-state-metrics.namespace" . }}
  labels:
    monitoring.in-cloud.io/service: {{ include "beget-kube-state-metrics.name" . }}
spec:
  ports:
  - name: https-metrics
    port: {{ $ksm.service.port | default 8080}}
    protocol: TCP
    targetPort: http
  selector:
    {{- include "beget-kube-state-metrics.selectorLabels" . | indent 4 }}
{{- end }}
