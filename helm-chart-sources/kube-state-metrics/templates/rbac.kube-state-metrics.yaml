{{- if and .Values.monitoring.enabled }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "kube-state-metrics.name" . }}-kube-rbac-proxy
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: kube-rbac-proxy-tokenreview
subjects:
  - kind: ServiceAccount
    name: {{ include "kube-state-metrics.serviceAccountName" . }}
    namespace: {{ include "kube-state-metrics.namespace" . }}
{{- end }}
