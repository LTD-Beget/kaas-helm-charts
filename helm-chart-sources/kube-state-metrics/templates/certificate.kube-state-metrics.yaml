{{- if .Values.monitoring.secureService.enabled }}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ include "beget-kube-state-metrics.name" . }}-svc-tls
  namespace: {{ include "beget-kube-state-metrics.namespace" . }}
spec:
  secretName: {{ include "beget-kube-state-metrics.name" . }}-svc-tls
  duration: 8760h
  renewBefore: 720h
  commonName: {{ include "beget-kube-state-metrics.name" . }}
  dnsNames:
    - {{ include "beget-kube-state-metrics.name" . }}
    - {{ include "beget-kube-state-metrics.name" . }}.{{ include "beget-kube-state-metrics.namespace" . }}
    - {{ include "beget-kube-state-metrics.name" . }}.{{ include "beget-kube-state-metrics.namespace" . }}.svc
  privateKey:
    algorithm: RSA
    size: 2048
  usages:
    - digital signature
    - key encipherment
    - server auth
  issuerRef:
    kind: {{ .Values.monitoring.secureService.issuer.kind }}
    name: {{ .Values.monitoring.secureService.issuer.name }}
{{- end }}
