---
# Source: addonset/templates/systemAddons/secret-copy-operator/secret-copy-operator.yml
apiVersion: addons.in-cloud.io/v1alpha1
kind: Addon
metadata:
  name: secret-copy-operator
spec:
  chart: "secret-copy-operator"
  pluginName: helm-with-values
  repoURL: "example.com"
  version: "0.1.1"
  targetCluster: in-cluster
  targetNamespace: "example-system"
  variables:
    cluster_name: in-cluster
  backend:
    finalizer: true
    type: "argocd"
    namespace: "example-argocd"
    project: "default"
    syncPolicy:
      automated:
        prune: true
      managedNamespaceMetadata:
        labels:
          in-cloud.io/caBundle: approved
          in-cloud.io/clusterName: infra
      syncOptions:
        - ApplyOutOfSyncOnly=true
        - CreateNamespace=true
  valuesSelectors:
    - name: default
      priority: 0
      matchLabels:
        addons.in-cloud.io/values: default
        addons.in-cloud.io/addon: secret-copy-operator
    - name: custom
      priority: 90
      matchLabels:
        addons.in-cloud.io/values: custom
        addons.in-cloud.io/addon: secret-copy-operator
    - name: immutable
      priority: 99
      matchLabels:
        addons.in-cloud.io/values: immutable
        addons.in-cloud.io/addon: secret-copy-operator
---
# Source: addonset/templates/systemAddons/secret-copy-operator/secret-copy-operator.yml
apiVersion: addons.in-cloud.io/v1alpha1
kind: AddonValue
metadata:
  name: secret-copy-operator-default
  labels:
    addons.in-cloud.io/values: default
    addons.in-cloud.io/addon: secret-copy-operator
spec:
  values: |
    manager:
      image:
        repository: prorobotech/secret-copy-operator
        pullPolicy: IfNotPresent
      tolerations:
      - effect: NoExecute
        operator: Exists
      - effect: NoSchedule
        key: node-role.kubernetes.io/control-plane
      args:
        - --leader-elect
        - --max-concurrent-reconciles=10
        - --health-backoff-initial=30s
        - --health-backoff-max=3m
---
# Source: addonset/templates/systemAddons/secret-copy-operator/secret-copy-operator.yml
apiVersion: addons.in-cloud.io/v1alpha1
kind: AddonValue
metadata:
  name: secret-copy-operator-immutable
  labels:
    addons.in-cloud.io/values: immutable
    addons.in-cloud.io/addon: secret-copy-operator
spec:
  values: ""
---
# Source: addonset/templates/systemAddons/secret-copy-operator/secret-copy-operator.yml
apiVersion: addons.in-cloud.io/v1alpha1
kind: AddonValue
metadata:
  name: secret-copy-operator-system
  labels:
    addons.in-cloud.io/values: system
    addons.in-cloud.io/addon: secret-copy-operator
spec:
  values: |
    manager:
      resources:
        limits:
          cpu: 500m
          memory: 512Mi
        requests:
          cpu: 100m
          memory: 128Mi
