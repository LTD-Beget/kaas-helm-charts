# Source: addonset/templates/addons/coredns/values.yaml.gotmpl
apiVersion: addons.in-cloud.io/v1alpha1
kind: AddonValue
metadata:
  name: coredns-client
  labels:
    addons.in-cloud.io/values: client
    addons.in-cloud.io/addon: coredns
spec:
  values: |
    coredns:
      customLabels:
        toleration.{{ .Values.companyDomain }}/ignore: "true"
      tolerations:
