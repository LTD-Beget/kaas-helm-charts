# Source: addonset/templates/coredns/coredns.yml
apiVersion: addons.in-cloud.io/v1alpha1
kind: AddonValue
metadata:
  name: coredns-infra
  labels:
    addons.in-cloud.io/values: infra
    addons.in-cloud.io/addon: coredns
spec:
  values: |
    {{- $a := .Values.controlPlaneDesiredReplicas -}}
    {{- $b := .Values.controlPlaneAvailableReplicas -}}
    {{- $replicas := 1 -}}
    {{- if and (gt $a $b) (gt $b 1) }}{{ $replicas = $b }}{{ end -}}
    {{- if and (gt $b $a) (gt $a 1) }}{{ $replicas = $a }}{{ end -}}
    coredns:
      replicaCount: {{ $replicas }}
      tolerations:
        - key: "node-role.kubernetes.io/control-plane"
          operator: "Exists"
          effect: "NoSchedule"
        - key: "node-role.kubernetes.io/master"
          operator: "Exists"
          effect: "NoSchedule"
    monitoring:
      secureService:
        issuer:
          name: selfsigned-cluster-issuer
---
