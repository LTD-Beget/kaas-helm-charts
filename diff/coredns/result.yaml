# Source: addonset/templates/addons/coredns/values.yaml.gotmpl
apiVersion: addons.in-cloud.io/v1alpha1
kind: AddonValue
metadata:
  name: coredns-initialized
  labels:
    addons.in-cloud.io/values: initialized
    addons.in-cloud.io/addon: coredns
spec:
  values: |
    {{/*
    replicaCount = min(controlPlaneDesiredReplicas, controlPlaneAvailableReplicas), but not less than 1.
    */}}
    {{- $desired := int .Values.controlPlaneDesiredReplicas -}}
    {{- $available := int .Values.controlPlaneAvailableReplicas -}}
    {{- $replicas := $desired -}}

    {{- if lt $available $replicas -}}
      {{- $replicas = $available -}}
    {{- end -}}

    {{- if lt $replicas 1 -}}
      {{- $replicas = 1 -}}
    {{- end }}

    coredns:
      replicaCount: {{ $replicas }}
---
# Source: addonset/templates/addons/coredns/values.yaml.gotmpl
apiVersion: addons.in-cloud.io/v1alpha1
kind: AddonValue
metadata:
  name: coredns-infra
  labels:
    addons.in-cloud.io/values: infra
    addons.in-cloud.io/addon: coredns
spec:
  values: |
    {{/*
    replicaCount = min(controlPlaneDesiredReplicas, controlPlaneAvailableReplicas), but not less than 1.
    */}}
    {{- $desired := int .Values.controlPlaneDesiredReplicas -}}
    {{- $available := int .Values.controlPlaneAvailableReplicas -}}
    {{- $replicas := $desired -}}

    {{- if lt $available $replicas -}}
      {{- $replicas = $available -}}
    {{- end -}}

    {{- if lt $replicas 1 -}}
      {{- $replicas = 1 -}}
    {{- end }}

    coredns:
      replicaCount: {{ $replicas }}
      tolerations:
        - key: "node-role.kubernetes.io/control-plane"
          operator: "Exists"
          effect: "NoSchedule"
        - key: "node-role.kubernetes.io/master"
          operator: "Exists"
          effect: "NoSchedule"
