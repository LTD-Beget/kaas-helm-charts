apiVersion: addons.in-cloud.io/v1alpha1
kind: AddonValue
metadata:
  name: grafana-operator-default
  labels:
    addons.in-cloud.io/values: default
    addons.in-cloud.io/addon: grafana-operator
spec:
  values: |
    grafana-operator:
      namespaceScope: false
      priorityClassName: system-cluster-critical
      tolerations:
        - key: "node-role.kubernetes.io/control-plane"
          operator: "Exists"
          effect: "NoSchedule"
        - key: "node-role.kubernetes.io/master"
          operator: "Exists"
          effect: "NoSchedule"
      resources:
        requests:
          cpu: 50m
          memory: 100Mi
        limits:
          cpu: 500m
          memory: 750Mi
