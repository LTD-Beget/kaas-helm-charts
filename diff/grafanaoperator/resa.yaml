# Source: addonset/templates/systemAddons/grafana-operator/grafana-operator.yml
apiVersion: addons.in-cloud.io/v1alpha1
kind: Addon
metadata:
  name: grafana-operator
spec:
  chart: "grafana-operator"
  pluginName: helm-with-values
  repoURL: "example.com"
  version: "5.18.0-1"
  targetCluster: in-cluster
  targetNamespace: "example-grafana-operator"
  variables:
    cluster_name: in-cluster
    dependency: "True"
  backend:
    finalizer: true
    type: "argocd"
    namespace: "example-argocd"
    project: "default"
    syncPolicy:
      automated:
        prune: true
        selfHeal: true
      managedNamespaceMetadata:
        labels:
          in-cloud.io/caBundle: approved
          in-cloud.io/clusterName: infra
      syncOptions:
        - ApplyOutOfSyncOnly=true
        - CreateNamespace=true
        - ServerSideApply=true
  valuesSelectors:
    - name: default
      priority: 0
      matchLabels:
        addons.in-cloud.io/values: default
        addons.in-cloud.io/addon: grafana-operator
    - name: custom
      priority: 90
      matchLabels:
        addons.in-cloud.io/values: custom
        addons.in-cloud.io/addon: grafana-operator
    - name: immutable
      priority: 99
      matchLabels:
        addons.in-cloud.io/values: immutable
        addons.in-cloud.io/addon: grafana-operator
---
