---
# Source: addonset/templates/systemAddons/docker-registry/docker-registry.yml
apiVersion: addons.in-cloud.io/v1alpha1
kind: Addon
metadata:
  name: docker-registry
spec:
  chart: "docker-registry"
  pluginName: helm-with-values
  repoURL: example.com
  version: "3.0.0"
  targetCluster: in-cluster
  releaseName: docker-registry-cache
  targetNamespace: "example-docker-registry"
  variables:
    cluster_name: in-cluster
  valuesSources:
    - name: parameters-infra
      sourceRef:
        apiVersion: v1
        kind: ConfigMap
        name: parameters-infra
        namespace: example-system
      extract:
        - as: clusterName
          jsonPath: .data.clusterName
        - as: companyPrefix
          jsonPath: .data.companyPrefix
        - as: companyDomain
          jsonPath: .data.companyDomain
        - as: companyInternalDockerRegistry
          jsonPath: .data.companyInternalDockerRegistry
        - as: dockerRegistryS3AccessKey
          jsonPath: .data.dockerRegistryS3AccessKey
        - as: dockerRegistryS3SecretKey
          jsonPath: .data.dockerRegistryS3SecretKey
        - as: dockerRegistryS3Bucket
          jsonPath: .data.dockerRegistryS3Bucket
        - as: etcdbackupS3SecretEndpoint
          jsonPath: .data.etcdbackupS3SecretEndpoint
  backend:
    finalizer: true
    type: "argocd"
    namespace: "example-argocd"
    project: "default"
    syncPolicy:
      automated:
        prune: true
      managedNamespaceMetadata:
        labels:
          in-cloud.io/caBundle: approved
          in-cloud.io/clusterName: infra
      syncOptions:
        - ApplyOutOfSyncOnly=true
        - CreateNamespace=true
  valuesSelectors:
    - name: default
      priority: 0
      matchLabels:
        addons.in-cloud.io/values: default
        addons.in-cloud.io/addon: docker-registry
    - name: custom
      priority: 90
      matchLabels:
        addons.in-cloud.io/values: custom
        addons.in-cloud.io/addon: docker-registry
    - name: immutable
      priority: 99
      matchLabels:
        addons.in-cloud.io/values: immutable
        addons.in-cloud.io/addon: docker-registry
---
# Source: addonset/templates/systemAddons/docker-registry/docker-registry.yml
apiVersion: addons.in-cloud.io/v1alpha1
kind: AddonPhase
metadata:
  name: docker-registry
spec:
  rules:
    - name: cert-manager
      criteria:
        - source:
            apiVersion: addons.in-cloud.io/v1alpha1
            kind: Addon
            name: cert-manager
          jsonPath: $.status.phaseValuesSelector[?(@.name=='initialized-2')]
          operator: Exists
      selector:
        name: cert-manager
        priority: 10
        matchLabels:
          addons.in-cloud.io/values: cert-manager
          addons.in-cloud.io/addon: docker-registry
    - name: system
      criteria:
        - source:
            apiVersion: v1
            kind: ConfigMap
            name: parameters-infra
            namespace: example-system
          jsonPath: $.data.environment
          operator: Equal
          value: "infra"
      selector:
        name: system
        priority: 15
        matchLabels:
          addons.in-cloud.io/values: system
          addons.in-cloud.io/addon: docker-registry
    - name: vm-operator
      criteria:
        - source:
            apiVersion: addons.in-cloud.io/v1alpha1
            kind: Addon
            name: vm-operator
          jsonPath: $.status.conditions[?(@.type=='Ready')].status
          operator: Equal
          value: "True"
      selector:
        name: vm-operator
        priority: 20
        matchLabels:
          addons.in-cloud.io/values: vm-operator
          addons.in-cloud.io/addon: docker-registry
    - name: istio-base
      criteria:
        - source:
            apiVersion: addons.in-cloud.io/v1alpha1
            kind: Addon
            name: istio-base
          jsonPath: $.status.conditions[?(@.type=='Ready')].status
          operator: Equal
          value: "True"
        - source:
            apiVersion: addons.in-cloud.io/v1alpha1
            kind: Addon
            name: argocd
          jsonPath: $.status.conditions[?(@.type=='Ready')].status
          operator: Equal
          value: "True"
      selector:
        name: istio-base
        priority: 40
        matchLabels:
          addons.in-cloud.io/values: istio-base
          addons.in-cloud.io/addon: docker-registry
---
# Source: addonset/templates/systemAddons/docker-registry/docker-registry.yml
apiVersion: addons.in-cloud.io/v1alpha1
kind: AddonValue
metadata:
  name: docker-registry-default
  labels:
    addons.in-cloud.io/values: default
    addons.in-cloud.io/addon: docker-registry
spec:
  values: |
    default:
      metrics:
        port: 11043
---
# Source: addonset/templates/systemAddons/docker-registry/docker-registry.yml
apiVersion: addons.in-cloud.io/v1alpha1
kind: AddonValue
metadata:
  name: docker-registry-cert-manager
  labels:
    addons.in-cloud.io/values: "cert-manager"
    addons.in-cloud.io/addon: docker-registry
spec:
  values: |
    internalTLS:
      certSource: certmanager
      certmanager:
        existingIssuer:
          kind: ClusterIssuer
          name: selfsigned-cluster-issuer
    default:
      metrics:
        secureEndpoint: true
---
# Source: addonset/templates/systemAddons/docker-registry/docker-registry.yml
apiVersion: addons.in-cloud.io/v1alpha1
kind: AddonValue
metadata:
  name: docker-registry-vm-operator
  labels:
    addons.in-cloud.io/values: vm-operator
    addons.in-cloud.io/addon: docker-registry
spec:
  values: |
    default:
      metrics:
        scrape:
          enabled: true
---
# Source: addonset/templates/systemAddons/docker-registry/docker-registry.yml
apiVersion: addons.in-cloud.io/v1alpha1
kind: AddonValue
metadata:
  name: docker-registry-immutable
  labels:
    addons.in-cloud.io/values: immutable
    addons.in-cloud.io/addon: docker-registry
spec:
  values: ""
---
# Source: addonset/templates/systemAddons/docker-registry/docker-registry.yml
apiVersion: addons.in-cloud.io/v1alpha1
kind: AddonValue
metadata:
  name: docker-registry-system
  labels:
    addons.in-cloud.io/values: system
    addons.in-cloud.io/addon: docker-registry
spec:
  values: |
    expose:
      resourceType: istio
      istio:
        gateway:
          enabled: false
          name: {{ .Values.companyPrefix }}-istio-gw/default
    default:
      tolerations:
        - key: "node-role.kubernetes.io/control-plane"
          operator: "Exists"
          effect: "NoSchedule"
        - key: "node-role.kubernetes.io/master"
          operator: "Exists"
          effect: "NoSchedule"
      serviceAccount:
        create: true
      image:
        repository: ghcr.io/distribution/distribution
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          cpu: 600m
          memory: 768Mi
      metrics:
        enabled: true
      config:
        storage:
          type: s3
          s3:
            accesskey: {{ .Values.dockerRegistryS3AccessKey }}
            secretkey: {{ .Values.dockerRegistryS3SecretKey }}
            encrypt: false
            region: us-east-1
            regionendpoint: {{ .Values.etcdbackupS3SecretEndpoint }}
            bucket: {{ .Values.dockerRegistryS3Bucket }}
            loglevel: info
        log:
          level: info
    mainRegistryName: registry-{{ .Values.companyPrefix }}-ru
    proxies:
      registry-1-docker-io:
        enabled: true
        extraEnvVars:
          - name: OTEL_TRACES_EXPORTER
            value: none
          - name: REGISTRY_PROXY_USERNAME
            valueFrom:
              secretKeyRef:
                name: docker-io-creds
                key: username
          - name: REGISTRY_PROXY_PASSWORD
            valueFrom:
              secretKeyRef:
                name: docker-io-creds
                key: password
        config:
          storage:
            type: s3
            s3:
              rootdirectory: /{{ .Values.clusterName }}/registry-1-docker-io
          proxy:
            remoteurl: https://registry-1.docker.io

      europe-docker-pkg-dev:
        enabled: true
        config:
          storage:
            type: s3
            s3:
              rootdirectory: /{{ .Values.clusterName }}/europe-docker-pkg-dev
          proxy:
            remoteurl: https://europe-docker.pkg.dev

      gcr-io:
        enabled: true
        config:
          storage:
            type: s3
            s3:
              rootdirectory: /{{ .Values.clusterName }}/gcr-io
          proxy:
            remoteurl: https://gcr.io

      ghcr-io:
        enabled: true
        config:
          storage:
            type: s3
            s3:
              rootdirectory: /{{ .Values.clusterName }}/ghcr-io
          proxy:
            remoteurl: https://ghcr.io

      mirror-gcr-io:
        enabled: true
        config:
          storage:
            type: s3
            s3:
              rootdirectory: /{{ .Values.clusterName }}/mirror-gcr-io
          proxy:
            remoteurl: https://mirror.gcr.io

      public-ecr-aws:
        enabled: true
        config:
          storage:
            type: s3
            s3:
              rootdirectory: /{{ .Values.clusterName }}/public-ecr-aws
          proxy:
            remoteurl: https://public.ecr.aws

      quay-io:
        enabled: true
        config:
          storage:
            type: s3
            s3:
              rootdirectory: /{{ .Values.clusterName }}/quay-io
          proxy:
            remoteurl: https://quay.io

      registry-k8s-io:
        enabled: true
        config:
          storage:
            type: s3
            s3:
              rootdirectory: /{{ .Values.clusterName }}/registry-k8s-io
          proxy:
            remoteurl: https://registry.k8s.io

      registry-{{ .Values.companyPrefix }}-ru:
        enabled: true
        config:
          storage:
            type: s3
            s3:
              rootdirectory: /{{ .Values.clusterName }}/registry-{{ .Values.companyPrefix }}-ru
          proxy:
            remoteurl: https://{{ .Values.companyInternalDockerRegistry }}
---
# Source: addonset/templates/systemAddons/docker-registry/docker-registry.yml
apiVersion: addons.in-cloud.io/v1alpha1
kind: AddonValue
metadata:
  name: docker-registry-istio-base
  labels:
    addons.in-cloud.io/values: istio-base
    addons.in-cloud.io/addon: docker-registry
spec:
  values: |
    expose:
      enabled: true
