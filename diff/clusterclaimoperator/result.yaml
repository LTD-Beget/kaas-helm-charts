---
# Source: addonset/templates/addons/cluster-claim-operator/addon.yaml.gotmpl
apiVersion: addons.in-cloud.io/v1alpha1
kind: Addon
metadata:
  name: cluster-claim-operator
spec:
  chart: "cluster-claim-operator"
  pluginName: helm-with-values
  repoURL: example.com
  version: "0.1.0"
  targetCluster: in-cluster
  targetNamespace: "example-cluster-claim-operator"
  variables:
    cluster_name: in-cluster
  valuesSources:
    - name: parameters-infra
      sourceRef:
        apiVersion: v1
        kind: ConfigMap
        name: parameters-infra
        namespace: example-system
      extract:
        - as: companyPrefix
          jsonPath: .data.companyPrefix
        - as: companyDomain
          jsonPath: .data.companyDomain
  backend:
    finalizer: true
    type: "argocd"
    namespace: "example-argocd"
    project: "default"
    syncPolicy:
      automated:
        prune: true
        selfHeal: true
      managedNamespaceMetadata:
        labels:
          in-cloud.io/caBundle: approved
          in-cloud.io/clusterName: infra
      syncOptions:
        - ApplyOutOfSyncOnly=true
        - CreateNamespace=true
  valuesSelectors:
    - name: default
      priority: 0
      matchLabels:
        addons.in-cloud.io/values: default
        addons.in-cloud.io/addon: cluster-claim-operator
    - name: custom
      priority: 95
      matchLabels:
        addons.in-cloud.io/values: custom
        addons.in-cloud.io/addon: cluster-claim-operator
    - name: immutable
      priority: 99
      matchLabels:
        addons.in-cloud.io/values: immutable
        addons.in-cloud.io/addon: cluster-claim-operator
---
# Source: addonset/templates/addons/cluster-claim-operator/values.yaml.gotmpl
apiVersion: addons.in-cloud.io/v1alpha1
kind: AddonValue
metadata:
  name: cluster-claim-operator-default
  labels:
    addons.in-cloud.io/values: default
    addons.in-cloud.io/addon: cluster-claim-operator
spec:
  values: |
    manager:
      image:
        repository: prorobotech/cluster-claim-operator
      env:
      - name: ENABLE_WEBHOOKS
        value: false
      args:
        - --leader-elect
        - --remote-namespace={{ .Values.companyPrefix }}-system
        - --enable-webhook=false
      tolerations:
      - effect: NoExecute
        operator: Exists
      - effect: NoSchedule
        key: node-role.kubernetes.io/control-plane
---
# Source: addonset/templates/addons/cluster-claim-operator/values.yaml.gotmpl
apiVersion: addons.in-cloud.io/v1alpha1
kind: AddonValue
metadata:
  name: cluster-claim-operator-immutable
  labels:
    addons.in-cloud.io/values: immutable
    addons.in-cloud.io/addon: cluster-claim-operator
spec:
  values: |
