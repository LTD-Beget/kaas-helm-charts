# Source: addonset/templates/addons/cert-manager/values.yaml.gotmpl
apiVersion: addons.in-cloud.io/v1alpha1
kind: AddonValue
metadata:
  name: cert-manager-default
  labels:
    addons.in-cloud.io/values: default
    addons.in-cloud.io/addon: cert-manager
spec:
  values: |
    cert-manager:
      installCRDs: true
      global:
        priorityClassName: system-cluster-critical
      cainjector:
        containerSecurityContext:
          runAsNonRoot: true
        resources:
          limits:
            cpu: 250m
            memory: 256Mi
          requests:
            cpu: 50m
            memory: 128Mi
      containerSecurityContext:
        runAsNonRoot: true
      resources:
        limits:
          cpu: 200m
          memory: 256Mi
        requests:
          cpu: 100m
          memory: 128Mi
      startupapicheck:
        enabled: false
        containerSecurityContext:
          runAsNonRoot: true
      webhook:
        containerSecurityContext:
          runAsNonRoot: true
        resources:
          limits:
            cpu: 200m
            memory: 256Mi
          requests:
            cpu: 50m
            memory: 128Mi
