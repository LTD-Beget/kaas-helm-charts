apiVersion: addons.in-cloud.io/v1alpha1
kind: AddonValue
metadata:
  name: cert-manager-client
  labels:
    addons.in-cloud.io/values: client
    addons.in-cloud.io/addon: cert-manager
spec:
  values: |
    cert-manager:
      cainjector:
        podLabels:
          toleration.{{ .Values.companyDomain }}/ignore: "true"
        tolerations:
          - operator: "Exists"
      podLabels:
        toleration.{{ .Values.companyDomain }}/ignore: "true"
      tolerations:
        - operator: "Exists"
      startupapicheck:
        podLabels:
          toleration.{{ .Values.companyDomain }}/ignore: "true"
        tolerations:
          - operator: "Exists"
      webhook:
        podLabels:
          toleration.{{ .Values.companyDomain }}/ignore: "true"
        tolerations:
          - operator: "Exists"
