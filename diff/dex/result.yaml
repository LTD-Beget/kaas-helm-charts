# Source: addonset/templates/systemAddons/dex/dex.yml
apiVersion: addons.in-cloud.io/v1alpha1
kind: AddonValue
metadata:
  name: dex-system
  labels:
    addons.in-cloud.io/values: system
    addons.in-cloud.io/addon: dex
spec:
  values: |
    argocdPlugins:
      kustomize: true
    dex:
      config:
        issuer: {{ printf "https://%s" .Values.systemIstioGwDomain }}
        storage:
          type: kubernetes
          config: { inCluster: true }
        web:
          https: 0.0.0.0:5554
          tlsCert: /etc/dex/tls/tls.crt
          tlsKey:  /etc/dex/tls/tls.key
        enablePasswordDB: true
        staticPasswords:
          - email: {{ .Values.companyAdminUser }}
            username: admin
            userID: 00000000-0000-0000-0000-000000000001
            hash: {{ .Values.dexStaticPasswordsAdmin }}
        staticClients:
          - id: grafana
            name: Grafana
            secret: super-secret-grafana
            redirectURIs:
              - /grafana/login/generic_oauth
              - {{ printf "https://%s/grafana/login/generic_oauth" .Values.systemIstioGwDomainInternal }}
          - id: kubernetes
            name: incloud-web-chart-oauth2-proxy
            secret: incloud-web-chart-super-secret
            redirectURIs:
              - {{ printf "https://%s/oauth2/callback" .Values.systemIstioGwDomainInternal }}
              - "https://localhost/oauth2/callback"
          - id: argocd
            name: argocd
            secret: argo-cd-super-secret
            redirectURIs:
              - {{ printf "https://%s/argocd/auth/callback" .Values.systemIstioGwDomainInternal }}
              - "https://localhost/argocd/auth/callback"
          - id: apiserver
            name: apiserver
            redirectURIs:
              - http://localhost:8000
              - http://127.0.0.1:8000
            secret: {{ .Values.dexStaticPasswordsAdmin }}
      https:
        enabled: true
      volumeMounts:
        - name: tls
          mountPath: /etc/dex/tls
          readOnly: true
      volumes:
        - name: tls
          secret:
            secretName: {{ .Values.clusterName }}-dex-tls
      tolerations:
        - key: "node-role.kubernetes.io/control-plane"
          operator: "Exists"
          effect: "NoSchedule"
        - key: "node-role.kubernetes.io/master"
          operator: "Exists"
          effect: "NoSchedule"
    tls:
      enabled: true
      issuer:
        name: oidc-ca
        secretName: selfsigned-infra-cluster-ca
      certificate:
        name: {{ .Values.clusterName }}-dex-tls
        secretName: {{ .Values.clusterName }}-dex-tls
        commonName: dex
        ipAddresses:
          - "127.0.0.1"
        dnsNames:
          - dex.{{ .Values.companyPrefix }}-dex.svc
          - dex.{{ .Values.companyPrefix }}-dex.svc.cluster.local
    rbac:
      enabled: true
      clusterRoleBinding:
        subjects:
          kind: User
          name: "{{ .Values.companyAdminUser }}"
    monitoring:
      secureService:
        enabled: true
        issuer:
          name: selfsigned-cluster-issuer
