---
# Source: addonset/templates/addons/addon-manifests/addon.yaml.gotmpl
apiVersion: addons.in-cloud.io/v1alpha1
kind: Addon
metadata:
  name: addon-manifests
spec:
  chart: "addon-manifests"
  pluginName: helm-with-values
  repoURL: "example.com"
  version: "0.1.0"
  targetCluster: in-cluster
  targetNamespace: "example-addons-operator"
  variables:
    cluster_name: in-cluster
  valuesSources:
    - name: parameters-infra
      sourceRef:
        apiVersion: v1
        kind: ConfigMap
        name: parameters-infra
        namespace: example-system
      extract:
        - as: companyPrefix
          jsonPath: .data.companyPrefix
        - as: companyExternalChartRegistry
          jsonPath: .data.companyExternalChartRegistry
  initDependencies: 
    - name: addons-operator
      criteria:
        - jsonPath: $.status.conditions[?(@.type=='Ready')].status
          operator: Equal
          value: "True"
  backend: 
    finalizer: true
    type: "argocd"
    namespace: "example-argocd"
    project: "default"
    syncPolicy:
      automated:
        prune: true
        selfHeal: true
      managedNamespaceMetadata:
        labels:
          in-cloud.io/caBundle: approved
          in-cloud.io/clusterName: infra
      syncOptions:
        - ApplyOutOfSyncOnly=true
        - CreateNamespace=true
  valuesSelectors:
    - name: default
      priority: 0
      matchLabels:
        addons.in-cloud.io/values: default
        addons.in-cloud.io/addon: addon-manifests
    - name: custom
      priority: 90
      matchLabels:
        addons.in-cloud.io/values: custom
        addons.in-cloud.io/addon: addon-manifests
    - name: immutable
      priority: 99
      matchLabels:
        addons.in-cloud.io/values: immutable
        addons.in-cloud.io/addon: addon-manifests
---
# Source: addonset/templates/addons/addon-manifests/values.yaml.gotmpl
apiVersion: addons.in-cloud.io/v1alpha1
kind: AddonValue
metadata:
  name: addon-manifests-default
  labels:
    addons.in-cloud.io/values: default
    addons.in-cloud.io/addon: addon-manifests
spec:
  values: |
    companyPrefix: {{ .Values.companyPrefix }}
    companyExternalChartRegistry: {{ .Values.companyExternalChartRegistry }}
---
# Source: addonset/templates/addons/addon-manifests/values.yaml.gotmpl
apiVersion: addons.in-cloud.io/v1alpha1
kind: AddonValue
metadata:
  name: addon-manifests-immutable
  labels:
    addons.in-cloud.io/values: immutable
    addons.in-cloud.io/addon: addon-manifests
spec:
  values: |
