---
# Source: addonset/templates/addons/grafana-dashboards/addon.yaml.gotmpl
apiVersion: addons.in-cloud.io/v1alpha1
kind: Addon
metadata:
  name: grafana-dashboards
spec:
  chart: "grafana-dashboards"
  pluginName: helm-with-values
  repoURL: "example.com"
  version: "0.1.1"
  targetCluster: in-cluster
  targetNamespace: "example-grafana"
  variables:
    cluster_name: in-cluster
    dependency: "True"
  valuesSources: 
    - name: parameters
      sourceRef:
        apiVersion: v1
        kind: ConfigMap
        name: parameters-infra
        namespace: example-system
      extract:
        - as: companyPrefix
          jsonPath: .data.companyPrefix
        - as: companyDomain
          jsonPath: .data.companyDomain
  initDependencies:
    - name: grafana-operator
      criteria:
        - jsonPath: $.status.deployed
          operator: Equal
          value: true
          keep: false
  backend:
    finalizer: true
    type: "argocd"
    namespace: "example-argocd"
    project: "default"
    syncPolicy:
      automated:
        prune: true
        selfHeal: true
      managedNamespaceMetadata:
        labels:
          in-cloud.io/caBundle: approved
          in-cloud.io/clusterName: infra
      syncOptions:
        - ApplyOutOfSyncOnly=true
        - CreateNamespace=true
  valuesSelectors:
    - name: default
      priority: 0
      matchLabels:
        addons.in-cloud.io/values: default
        addons.in-cloud.io/addon: grafana-dashboards
    - name: custom
      priority: 95
      matchLabels:
        addons.in-cloud.io/values: custom
        addons.in-cloud.io/addon: grafana-dashboards
    - name: immutable
      priority: 99
      matchLabels:
        addons.in-cloud.io/values: immutable
        addons.in-cloud.io/addon: grafana-dashboards
---
# Source: addonset/templates/addons/grafana-dashboards/values.yaml.gotmpl
apiVersion: addons.in-cloud.io/v1alpha1
kind: AddonValue
metadata:
  name: grafana-dashboards-default
  labels:
    addons.in-cloud.io/values: default
    addons.in-cloud.io/addon: grafana-dashboards
spec:
  values: |
    companyPrefix: {{ .Values.companyPrefix }}
    grafanaDashboards:
      argocd:
        enabled: true
      ciliumAgent:
        enabled: true
      clusterclaim:
        enabled: true
      cpu:
        enabled: true
      dockerRegistry:
        enabled: true
      goOperator:
        enabled: true
      processLA:
        enabled: true
      processExporter:
        enabled: true
      metallb:
        enabled: false
      vector:
        enabled: false
      vmagent:
        enabled: true
      vmalert:
        enabled: true
      vmcluster:
        enabled: true
      vmoperator:
        enabled: true
      k8s:
        coredns:
          enabled: true
        etcd:
          enabled: true
        timex:
          enabled: true
        viewsGlobal:
          enabled: true
        viewsNamespaces:
          enabled: true
        viewsNodes:
          enabled: true
        viewsPods:
          enabled: true
---
# Source: addonset/templates/addons/grafana-dashboards/values.yaml.gotmpl
apiVersion: addons.in-cloud.io/v1alpha1
kind: AddonValue
metadata:
  name: grafana-dashboards-immutable
  labels:
    addons.in-cloud.io/values: immutable
    addons.in-cloud.io/addon: grafana-dashboards
