---
# Source: addonset/templates/systemAddons/trivy-operator/trivy-operator.yml
apiVersion: addons.in-cloud.io/v1alpha1
kind: AddonValue
metadata:
  name: trivy-operator-system
  labels:
    addons.in-cloud.io/values: system
    addons.in-cloud.io/addon: trivy-operator
spec:
  values: |
    trivy-operator:
      trivyOperator:
        scanJobNodeSelector:
          node-role.kubernetes.io/control-plane: ""
        scanJobTolerations:
          - key: "node-role.kubernetes.io/control-plane"
            operator: "Exists"
            effect: "NoSchedule"
          - key: "node-role.kubernetes.io/master"
            operator: "Exists"
            effect: "NoSchedule"
          - key: "node-role.kubernetes.io/argocd"
            operator: "Exists"
            effect: "NoSchedule"
          - key: "node-role.kubernetes.io/vm-stream"
            operator: "Exists"
            effect: "NoSchedule"
          - key: "node-role.kubernetes.io/vm-data"
            operator: "Exists"
            effect: "NoSchedule"
      nodeCollector:
        tolerations:
          - key: "node-role.kubernetes.io/control-plane"
            operator: "Exists"
            effect: "NoSchedule"
          - key: "node-role.kubernetes.io/master"
            operator: "Exists"
            effect: "NoSchedule"
          - key: "node-role.kubernetes.io/argocd"
            operator: "Exists"
            effect: "NoSchedule"
          - key: "node-role.kubernetes.io/vm-stream"
            operator: "Exists"
            effect: "NoSchedule"
          - key: "node-role.kubernetes.io/vm-data"
            operator: "Exists"
            effect: "NoSchedule"
      tolerations:
        - key: "node-role.kubernetes.io/control-plane"
          operator: "Exists"
          effect: "NoSchedule"
        - key: "node-role.kubernetes.io/master"
          operator: "Exists"
          effect: "NoSchedule"
---
# Source: addonset/templates/systemAddons/trivy-operator/trivy-operator.yml
apiVersion: addons.in-cloud.io/v1alpha1
kind: AddonValue
metadata:
  name: trivy-operator-default
  labels:
    addons.in-cloud.io/values: default
    addons.in-cloud.io/addon: trivy-operator
spec:
  values: |
    trivy-operator:
      trivy:
        storageClassEnabled: false
        severity: HIGH,CRITICAL
        resources:
          requests:
            cpu: 50m
            memory: 64M
          limits:
            cpu: 750m
            memory: 750M
        server:
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
---
# Source: addonset/templates/systemAddons/trivy-operator/trivy-operator.yml
apiVersion: addons.in-cloud.io/v1alpha1
