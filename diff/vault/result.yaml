---
# Source: addonset/templates/systemAddons/vault/vault.yml
apiVersion: addons.in-cloud.io/v1alpha1
kind: Addon
metadata:
  name: vault
spec:
  chart: "vault"
  pluginName: helm-with-values
  repoURL: example.com
  version: "0.30.1-1"
  targetCluster: in-cluster
  targetNamespace: "example-vault"
  variables:
    cluster_name: in-cluster
  valuesSources:
    - name: parameters
      sourceRef:
        apiVersion: v1
        kind: ConfigMap
        name: parameters-infra
        namespace: example-system
      extract:
        - as: cluster.name
          jsonPath: .data.clusterName
        - as: controlPlaneReplicas
          jsonPath: .data.controlPlaneReplicas
        - as: companyPrefix
          jsonPath: .data.companyPrefix
  initDependencies:
    - name: cert-manager
      criteria:
        - jsonPath: $.status.conditions[?(@.type=='Ready')].status
          operator: Equal
          value: "True"
  backend:
    finalizer: true
    type: "argocd"
    namespace: "example-argocd"
    project: "default"
    syncPolicy:
      automated:
        prune: true
      managedNamespaceMetadata:
        labels:
          in-cloud.io/caBundle: approved
          in-cloud.io/clusterName: infra
      syncOptions:
        - ApplyOutOfSyncOnly=true
        - CreateNamespace=true
  valuesSelectors:
    - name: default
      priority: 0
      matchLabels:
        addons.in-cloud.io/values: default
        addons.in-cloud.io/addon: vault
    - name: custom
      priority: 90
      matchLabels:
        addons.in-cloud.io/values: custom
        addons.in-cloud.io/addon: vault
    - name: immutable
      priority: 99
      matchLabels:
        addons.in-cloud.io/values: immutable
        addons.in-cloud.io/addon: vault
---
# Source: addonset/templates/systemAddons/vault/vault.yml
apiVersion: addons.in-cloud.io/v1alpha1
kind: AddonPhase
metadata:
  name: vault-client
spec:
  rules:
    - name: system
      criteria:
        - source:
            apiVersion: v1
            kind: ConfigMap
            name: parameters-client
            namespace: example-system
          jsonPath: $.data.environment
          operator: Equal
          value: "infra"
      selector:
        name: system
        priority: 15
        matchLabels:
          addons.in-cloud.io/values: system
          addons.in-cloud.io/addon: vault
---
# Source: addonset/templates/systemAddons/vault/vault.yml
apiVersion: addons.in-cloud.io/v1alpha1
kind: AddonPhase
metadata:
  name: vault
spec:
  rules:
    - name: system
      criteria:
        - source:
            apiVersion: v1
            kind: ConfigMap
            name: parameters-infra
            namespace: example-system
          jsonPath: $.data.environment
          operator: Equal
          value: "infra"
      selector:
        name: system
        priority: 15
        matchLabels:
          addons.in-cloud.io/values: system
          addons.in-cloud.io/addon: vault
---
# Source: addonset/templates/systemAddons/vault/vault.yml
apiVersion: addons.in-cloud.io/v1alpha1
kind: AddonValue
metadata:
  name: vault-system
  labels:
    addons.in-cloud.io/values: system
    addons.in-cloud.io/addon: vault
spec:
  values: |
    vault:
      injector:
        tolerations:
          - key: "node-role.kubernetes.io/control-plane"
            operator: "Exists"
            effect: "NoSchedule"
          - key: "node-role.kubernetes.io/master"
            operator: "Exists"
            effect: "NoSchedule"
      server:
        ha:
          enabled: true
          replicas: {{ .Values.controlPlaneReplicas }}
          config: |
            ui = true

            listener "tcp" {
              address     = "0.0.0.0:8200"
              tls_disable = "true"
            }

            storage "etcd" {
              address        = "https://HOST_IP:2379"
              etcd_api       = "v3"
              ha_enabled     = "true"
              path           = "vault/"
              tls_ca_file    = "/vault/userconfig/etcd-client-vault/ca.crt"
              tls_cert_file  = "/vault/userconfig/etcd-client-vault/tls.crt"
              tls_key_file   = "/vault/userconfig/etcd-client-vault/tls.key"
              request_timeout = "5s"
              lock_timeout    = "15s"
            }
            
            service_registration "kubernetes" {}
        dataStorage:
          enabled: false
        postStart:
            - /bin/sh
            - '-c'
            - |
              set -eu
              # Ждём, пока Vault начнёт слушать порт (до 60 сек)
              i=0
              while [ $i -lt 60 ]; do
                nc -z 127.0.0.1 8200 >/dev/null 2>&1 && break
                sleep 1
                i=$((i+1))
              done

              # Разбираем ключи по запятой (без bash-массивов)
              UNSEAL="${UNSEAL_KEYS:-}"
              # уберём возможные CR/LF
              UNSEAL=$(printf '%%s' "$UNSEAL" | tr -d '\r\n')

              OLDIFS="$IFS"
              IFS=','
              for k in $UNSEAL; do
                k=$(printf '%%s' "$k" | tr -d ' \t')
                [ -n "$k" ] || continue
                vault operator unseal "$k" || true
              done
              IFS="$OLDIFS"

              vault status || true
        extraSecretEnvironmentVars:
          - envName: UNSEAL_KEYS
            secretName: {{ .Values.clusterName }}-vault-keys
            secretKey: UNSEAL_KEYS
        nodeSelector:
          node-role.kubernetes.io/control-plane: ""
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app.kubernetes.io/name: vault
              topologyKey: "kubernetes.io/hostname"
        volumes:
          - name: etcd-client-vault
            secret:
              secretName: etcd-client-vault
        volumeMounts:
          - name: etcd-client-vault
            mountPath: /vault/userconfig/etcd-client-vault
            readOnly: true
        standalone:
          enabled: false
        service:
          standby:
            enabled: false
        tolerations:
          - key: "node-role.kubernetes.io/control-plane"
            operator: "Exists"
            effect: "NoSchedule"
          - key: "node-role.kubernetes.io/master"
            operator: "Exists"
            effect: "NoSchedule"
    tls:
      enabled: true
      server:
        enabled: false
        certificate:
          name: vault-tls-server
          secretName: vault-tls-server
          commonName: vault
          dnsNames:
            - vault.{{ .Values.companyPrefix }}-vault.svc
            - vault.{{ .Values.companyPrefix }}-vault.svc.cluster.local
          usages:
            - digital signature
            - key encipherment
            - server auth
        issuer:
          name: selfsigned
          kind: ClusterIssuer
      client:
        enabled: true
        certificate:
          name: etcd-client-vault
          secretName: etcd-client-vault
          commonName: vault-client
          usages:
            - digital signature
            - key encipherment
            - client auth
        issuer:
          name: etcd-ca
          kind: ClusterIssuer
---
