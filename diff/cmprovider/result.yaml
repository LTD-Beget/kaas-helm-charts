---
# Source: addonset/templates/systemAddons/cm-provider/cm-provider.yml
apiVersion: addons.in-cloud.io/v1alpha1
kind: Addon
metadata:
  name: example-cm-provider
spec:
  chart: "capi-provider-controller-manager"
  pluginName: helm-with-values
  repoURL: "example.com"
  version: "0.1.0"
  targetCluster: in-cluster
  targetNamespace: "example-cm-provider"
  variables:
    cluster_name: in-cluster
  valuesSources:
    - name: parameters-infra
      sourceRef:
        apiVersion: v1
        kind: ConfigMap
        name: parameters-infra
        namespace: example-system
      extract:
        - as: companyPrefix
          jsonPath: .data.companyPrefix
        - as: companyDomain
          jsonPath: .data.companyDomain
        - as: companyInternalDockerRegistry
          jsonPath: .data.companyInternalDockerRegistry
  initDependencies: 
    - name: cert-manager
      criteria:
        - jsonPath: $.status.conditions[?(@.type=='Ready')].status
          operator: Equal
          value: "True"
  backend:
    finalizer: true
    type: "argocd"
    namespace: "example-argocd"
    project: "default"
    syncPolicy:
      automated:
        prune: true
      managedNamespaceMetadata:
        labels:
          in-cloud.io/caBundle: approved
          in-cloud.io/clusterName: infra
      syncOptions:
        - ApplyOutOfSyncOnly=true
        - CreateNamespace=true
  valuesSelectors:
    - name: default
      priority: 0
      matchLabels:
        addons.in-cloud.io/values: default
        addons.in-cloud.io/addon: example-cm-provider
    - name: custom
      priority: 90
      matchLabels:
        addons.in-cloud.io/values: custom
        addons.in-cloud.io/addon: example-cm-provider
    - name: immutable
      priority: 99
      matchLabels:
        addons.in-cloud.io/values: immutable
        addons.in-cloud.io/addon: example-cm-provider
---
# Source: addonset/templates/systemAddons/cm-provider/cm-provider.yml
apiVersion: addons.in-cloud.io/v1alpha1
kind: AddonPhase
metadata:
  name: example-cm-provider
spec:
  rules:
    - name: system
      criteria:
        - source:
            apiVersion: v1
            kind: ConfigMap
            name: parameters-infra
            namespace: example-system
          jsonPath: $.data.environment
          operator: Equal
          value: "infra"
      selector:
        name: system
        priority: 15
        matchLabels:
          addons.in-cloud.io/values: system
          addons.in-cloud.io/addon: example-cm-provider
    - name: vm-operator
      criteria:
        - source:
            apiVersion: addons.in-cloud.io/v1alpha1
            kind: Addon
            name: vm-operator
          jsonPath: $.status.conditions[?(@.type=='Ready')].status
          operator: Equal
          value: "True"
      selector:
        name: vm-operator
        priority: 20
        matchLabels:
          addons.in-cloud.io/values: vm-operator
          addons.in-cloud.io/addon: example-cm-provider
---
# Source: addonset/templates/systemAddons/cm-provider/cm-provider.yml
apiVersion: addons.in-cloud.io/v1alpha1
kind: AddonValue
metadata:
  name: "example-cm-provider-default"
  labels:
    addons.in-cloud.io/values: default
    addons.in-cloud.io/addon: "example-cm-provider"
spec:
  values: ""
---
# Source: addonset/templates/systemAddons/cm-provider/cm-provider.yml
apiVersion: addons.in-cloud.io/v1alpha1
kind: AddonValue
metadata:
  name: "example-cm-provider-vm-operator"
  labels:
    addons.in-cloud.io/values: vm-operator
    addons.in-cloud.io/addon: "example-cm-provider"
spec:
  values: |
    monitoring:
      vmServiceScrape:
        enabled: true
---
# Source: addonset/templates/systemAddons/cm-provider/cm-provider.yml
apiVersion: addons.in-cloud.io/v1alpha1
kind: AddonValue
metadata:
  name: "example-cm-provider-immutable"
  labels:
    addons.in-cloud.io/values: immutable
    addons.in-cloud.io/addon: "example-cm-provider"
spec:
  values: ""
---
# Source: addonset/templates/systemAddons/cm-provider/cm-provider.yml
apiVersion: addons.in-cloud.io/v1alpha1
kind: AddonValue
metadata:
  name: "example-cm-provider-system"
  labels:
    addons.in-cloud.io/values: system
    addons.in-cloud.io/addon: "example-cm-provider"
spec:
  values: |
    companyPrefix: example
    certificates:
      useExternalIssuer: true
      externalIssuer:
        name: selfsigned-cluster-issuer
    appSpec:
      applications:
        providerControllerManager:
          name: provider-example-controller-manager
          containers:
            manager:
              extraArgs:
                metrics-cert-path: "/etc/provider-example-controller-manager/tls"
              extraVolumeMounts:
                certificate:
                  volumeMount:
                    path: "/etc/provider-example-controller-manager/tls"
              image:
                repository: {{ .Values.companyInternalDockerRegistry }}/cloud/k8s/controllers/capi-provider-example
                pullPolicy: Always
              extraResources:
                limits:
                  cpu: 500m
                  memory: 512Mi
          enabled: true
          tolerations:
          - effect: NoExecute
            operator: Exists
          - key: node-role.kubernetes.io/control-plane
            operator: Exists
            effect: NoSchedule
          imagePullSecrets:
            - name: regcred
