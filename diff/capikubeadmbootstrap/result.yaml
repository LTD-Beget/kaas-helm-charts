apiVersion: addons.in-cloud.io/v1alpha1
kind: AddonValue
metadata:
  name: capi-kubeadm-bootstrap-default
  labels:
    addons.in-cloud.io/values: default
    addons.in-cloud.io/addon: capi-kubeadm-bootstrap
spec:
  values: |
