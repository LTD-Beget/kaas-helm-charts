# Source: addonset/templates/addons/argocd/values.yaml.gotmpl
apiVersion: addons.in-cloud.io/v1alpha1
kind: AddonValue
metadata:
  name: argocd-network-policies
  labels:
    addons.in-cloud.io/values: network-policies
    addons.in-cloud.io/addon: argocd
spec:
  values: |
    companyPrefix: {{ .Values.companyPrefix }}
    networkPolicies:
      controller:
        enabled: true
      repoServer:
        enabled: true
      redis:
        enabled: true
      server:
        enabled: true
---
# Source: addonset/templates/addons/argocd/values.yaml.gotmpl
apiVersion: addons.in-cloud.io/v1alpha1
kind: AddonValue
metadata:
  name: argocd-trust-manager
  labels:
    addons.in-cloud.io/values: trust-manager
    addons.in-cloud.io/addon: argocd
spec:
  values: |
    argo-cd:
      repoServer:
        volumes:
          - configMap:
              name: argocd-cmp-cm
            name: cmp-plugin
          - name: {{ .Values.companyPrefix }}-ca
            configMap:
              name: ca
              items:
                - key: ca.crt
                  path: {{ .Values.companyPrefix }}-ca.crt
        volumeMounts:
          - name: {{ .Values.companyPrefix }}-ca
            mountPath: /etc/ssl/certs/{{ .Values.companyPrefix }}-ca.crt
            subPath: {{ .Values.companyPrefix }}-ca.crt
            readOnly: true
---
# Source: addonset/templates/addons/argocd/values.yaml.gotmpl
apiVersion: addons.in-cloud.io/v1alpha1
kind: AddonValue
metadata:
  name: argocd-vm-operator
  labels:
    addons.in-cloud.io/values: vm-operator
    addons.in-cloud.io/addon: argocd
spec:
  values: |
    argo-cd:
      redis:
        extraContainers:
          - name: rbac-proxy
            image: quay.io/brancz/kube-rbac-proxy:v0.21.0
            args:
              - --secure-listen-address=0.0.0.0:11043
              - --upstream=http://127.0.0.1:9121
              - --tls-cert-file=/app/config/metrics/tls/tls.crt
              - --tls-private-key-file=/app/config/metrics/tls/tls.key
              - --v=2
            ports:
              - name: https-metrics
                containerPort: 11043
                protocol: TCP
            resources:
              requests:
                memory: "32Mi"
                cpu: "10m"
              limits:
                memory: "64Mi"
                cpu: "50m"
            volumeMounts:
              - mountPath: /app/config/metrics/tls
                name: rbac-proxy-tls
                readOnly: true
        volumes:
          - name: rbac-proxy-tls
            secret:
              defaultMode: 420
              secretName: argocd-redis-metrics
      repoServer:
        extraContainers:
          - name: helm-with-values
            command: [/var/run/argocd/argocd-cmp-server]
            image: "dmkolbin/argocd-with-utils:v2.14.10"
            securityContext:
              runAsNonRoot: true
              runAsUser: 999
            volumeMounts:
              - mountPath: /var/run/argocd
                name: var-files
              - mountPath: /home/argocd/cmp-server/plugins
                name: plugins
              - mountPath: /home/argocd/cmp-server/config/plugin.yaml
                subPath: helm-with-values.yaml
                name: cmp-plugin
          - name: rbac-proxy
            image: quay.io/brancz/kube-rbac-proxy:v0.21.0
            args:
              - --secure-listen-address=0.0.0.0:11043
              - --upstream=http://127.0.0.1:8084
              - --tls-cert-file=/app/config/metrics/tls/tls.crt
              - --tls-private-key-file=/app/config/metrics/tls/tls.key
              - --v=2
            ports:
              - name: https-metrics
                containerPort: 11043
                protocol: TCP
            resources:
              requests:
                memory: "32Mi"
                cpu: "10m"
              limits:
                memory: "64Mi"
                cpu: "50m"
            volumeMounts:
              - mountPath: /app/config/metrics/tls
                name: rbac-proxy-tls
                readOnly: true
        volumes:
          - configMap:
              name: argocd-cmp-cm
            name: cmp-plugin
          - name: {{ .Values.companyPrefix }}-ca
            configMap:
              name: ca
              items:
                - key: ca.crt
                  path: {{ .Values.companyPrefix }}-ca.crt
          - name: rbac-proxy-tls
            secret:
              defaultMode: 420
              secretName: argocd-repo-server-metrics
      server:
        extraContainers:
          - name: rbac-proxy
            image: quay.io/brancz/kube-rbac-proxy:v0.21.0
            args:
              - --secure-listen-address=0.0.0.0:11043
              - --upstream=http://127.0.0.1:8083
              - --tls-cert-file=/app/config/metrics/tls/tls.crt
              - --tls-private-key-file=/app/config/metrics/tls/tls.key
              - --v=2
            ports:
              - name: https-metrics
                containerPort: 11043
                protocol: TCP
            resources:
              requests:
                memory: "32Mi"
                cpu: "10m"
              limits:
                memory: "64Mi"
                cpu: "50m"
            volumeMounts:
              - mountPath: /app/config/metrics/tls
                name: rbac-proxy-tls
                readOnly: true
        volumes:
          - hostPath:
              path: /etc/kubernetes/admin.conf
              type: FileOrCreate
            name: admin-conf
          - name: rbac-proxy-tls
            secret:
              defaultMode: 420
              secretName: argocd-server-metrics
      controller:
        extraContainers:
          - name: rbac-proxy
            image: quay.io/brancz/kube-rbac-proxy:v0.21.0
            args:
              - --secure-listen-address=0.0.0.0:11043
              - --upstream=http://127.0.0.1:8082
              - --tls-cert-file=/app/config/metrics/tls/tls.crt
              - --tls-private-key-file=/app/config/metrics/tls/tls.key
              - --v=2
            ports:
              - name: https-metrics
                containerPort: 11043
                protocol: TCP
            resources:
              requests:
                memory: "32Mi"
                cpu: "10m"
              limits:
                memory: "64Mi"
                cpu: "50m"
            volumeMounts:
              - mountPath: /app/config/metrics/tls
                name: rbac-proxy-tls
                readOnly: true
        volumes:
          - hostPath:
              path: /etc/kubernetes/admin.conf
              type: FileOrCreate
            name: admin-conf
          - name: rbac-proxy-tls
            secret:
              defaultMode: 420
              secretName: argocd-application-controller-metrics
      applicationSet:
        extraContainers:
          - name: rbac-proxy
            image: quay.io/brancz/kube-rbac-proxy:v0.21.0
            args:
              - --secure-listen-address=0.0.0.0:11043
              - --upstream=http://127.0.0.1:8080
              - --tls-cert-file=/app/config/metrics/tls/tls.crt
              - --tls-private-key-file=/app/config/metrics/tls/tls.key
              - --v=2
            ports:
              - name: https-metrics
                containerPort: 11043
                protocol: TCP
            resources:
              requests:
                memory: "32Mi"
                cpu: "10m"
              limits:
                memory: "64Mi"
                cpu: "50m"
            volumeMounts:
              - mountPath: /app/config/metrics/tls
                name: rbac-proxy-tls
                readOnly: true
        extraVolumes:
          - name: rbac-proxy-tls
            secret:
              defaultMode: 420
              secretName: argocd-applicationset-controller-metrics
    monitoring:
      enabled: true
      secureService:
        enabled: true
        issuer:
          name: selfsigned-cluster-issuer
---
# Source: addonset/templates/addons/argocd/values.yaml.gotmpl
apiVersion: addons.in-cloud.io/v1alpha1
kind: AddonValue
metadata:
  name: argocd-istio-base
  labels:
    addons.in-cloud.io/values: istio-base
    addons.in-cloud.io/addon: argocd
spec:
  values: |
    istio:
      virtualService:
        enabled: true
        gateways:
          - {{ .Values.companyPrefix }}-istio-gw/default
        hosts:
          - "*"
        http:
          name: argocd
          route:
            host: argocd-server
            port: 443
      destinationRule:
        enabled: true
        host: argocd-server
        trafficPolicy:
          tls:
            mode: SIMPLE
            insecureSkipVerify: true
---
# Source: addonset/templates/addons/argocd/values.yaml.gotmpl
apiVersion: addons.in-cloud.io/v1alpha1
kind: AddonValue
metadata:
  name: argocd-istio-gw
  labels:
    addons.in-cloud.io/values: istio-gw
    addons.in-cloud.io/addon: argocd
spec:
  values: |
    argo-cd:
      configs:
        cm:
          timeout.reconciliation: 180s
          timeout.reconciliation.jitter: 60s
---
# Source: addonset/templates/addons/argocd/values.yaml.gotmpl
apiVersion: addons.in-cloud.io/v1alpha1
kind: AddonValue
metadata:
  name: argocd-system
  labels:
    addons.in-cloud.io/values: system
    addons.in-cloud.io/addon: argocd
spec:
  values: |
    argo-cd:
      configs:
        cm:
          url: "https://{{ .Values.systemIstioGwDomainInternal }}/argocd"
        envFrom:
          - secretRef:
              name: avp-config
        resources:
          limits:
            cpu: 8
            memory: 8Gi
      extraObjects:
        - apiVersion: v1
          kind: Secret
          metadata:
            name: avp-config
            namespace: {{ .Values.companyPrefix }}-argocd
          type: Opaque
          stringData:
            AVP_TYPE: "vault"
            AVP_AUTH_TYPE: "k8s"
            VAULT_ADDR: "http://vault.{{ .Values.companyPrefix }}-vault.svc.cluster.local:8200"
            AVP_K8S_ROLE: "credentials-ro"
    istio:
      virtualService:
        gateways:
          - {{ .Values.companyPrefix }}-istio-gw-internal/default
---
# Source: addonset/templates/addons/argocd/values.yaml.gotmpl
apiVersion: addons.in-cloud.io/v1alpha1
kind: AddonValue
metadata:
  name: argocd-system-and-initialized
  labels:
    addons.in-cloud.io/values: system-and-initialized
    addons.in-cloud.io/addon: argocd
spec:
  values: |
    argo-cd:
      controller:
        resources:
          limits:
            cpu: '4'
            ephemeral-storage: 10Gi
          requests:
            cpu: 200m
            ephemeral-storage: 500Mi
            memory: 1Gi
      global:
        nodeSelector:
          node-role.kubernetes.io/argocd: ''
        tolerations:
          - effect: NoSchedule
            key: node-role.kubernetes.io/argocd
            operator: Exists
          - effect: NoSchedule
            key: node-role.kubernetes.io/control-plane
            operator: Exists
          - effect: NoSchedule
            key: node-role.kubernetes.io/master
            operator: Exists
      redis:
        resources:
          limits:
            cpu: 1
            memory: 1Gi
