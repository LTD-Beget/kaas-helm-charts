          # - 127.0.0.1:8081
          # - --redis
          # - 127.0.0.1:6379
          - --kubeconfig
          - /etc/kubernetes/admin.conf
        volumes:
          - hostPath:
              path: /etc/kubernetes/admin.conf
              type: FileOrCreate
            name: admin-conf
        volumeMounts:
          - mountPath: /etc/kubernetes/admin.conf
            name: admin-conf
        emptyDir:
