          enabled: true
          resources:
            limits:
              cpu: 50m
              ephemeral-storage: 10Mi
              memory: 64Mi
            requests:
              cpu: 10m
              ephemeral-storage: 10Mi
              memory: 32Mi
        metrics:
          enabled: true
        resources:
          limits:
            cpu: 100m
            ephemeral-storage: 100Mi
            memory: 192Mi
          requests:
            cpu: 50m
            ephemeral-storage: 100Mi
            memory: 64Mi
      redisSecretInit:
        enabled: true
      repoServer:
        image:
          imagePullPolicy: IfNotPresent
        # hostNetwork: true
        containerSecurityContext:
          runAsNonRoot: true
          runAsUser: 999
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
              - ALL
          seccompProfile:
            type: RuntimeDefault
        emptyDir:
          sizeLimit: 10Gi
        metrics:
          enabled: true
        rbac:
        - apiGroups:
          - '*'
          resources:
