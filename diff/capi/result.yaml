---
# Source: addonset/templates/systemAddons/capi/capi.yml
apiVersion: addons.in-cloud.io/v1alpha1
kind: Addon
metadata:
  name: capi
spec:
  chart: "capi"
  pluginName: helm-with-values
  repoURL: example.com
  version: "1.2.0"
  targetCluster: in-cluster
  targetNamespace: "example-capi"
  variables:
    cluster_name: in-cluster
  initDependencies: 
    - name: cert-manager
      criteria:
        - jsonPath: $.status.conditions[?(@.type=='Ready')].status
          operator: Equal
          value: "True"
  backend:
    finalizer: true
    type: "argocd"
    namespace: "example-argocd"
    project: "default"
    syncPolicy:
      automated:
        prune: true
      managedNamespaceMetadata:
        labels:
          in-cloud.io/caBundle: approved
          in-cloud.io/clusterName: infra
      syncOptions:
        - ApplyOutOfSyncOnly=true
        - CreateNamespace=true
  valuesSelectors:
    - name: default
      priority: 0
      matchLabels:
        addons.in-cloud.io/values: default
        addons.in-cloud.io/addon: capi
    - name: custom
      priority: 90
      matchLabels:
        addons.in-cloud.io/values: custom
        addons.in-cloud.io/addon: capi
    - name: immutable
      priority: 99
      matchLabels:
        addons.in-cloud.io/values: immutable
        addons.in-cloud.io/addon: capi
---
# Source: addonset/templates/systemAddons/capi/capi.yml
apiVersion: addons.in-cloud.io/v1alpha1
kind: AddonPhase
metadata:
  name: capi
spec:
  rules:
    - name: system
      criteria:
        - source:
            apiVersion: v1
            kind: ConfigMap
            name: parameters-infra
            namespace: example-system
          jsonPath: $.data.environment
          operator: Equal
          value: "infra"
      selector:
        name: system
        priority: 15
        matchLabels:
          addons.in-cloud.io/values: system
          addons.in-cloud.io/addon: capi
    - name: vm-operator
      criteria:
        - source:
            apiVersion: addons.in-cloud.io/v1alpha1
            kind: Addon
            name: vm-operator
          jsonPath: $.status.conditions[?(@.type=='Ready')].status
          operator: Equal
          value: "True"
      selector:
        name: vm-operator
        priority: 20
        matchLabels:
          addons.in-cloud.io/values: vm-operator
          addons.in-cloud.io/addon: capi
---
# Source: addonset/templates/systemAddons/capi/capi.yml
apiVersion: addons.in-cloud.io/v1alpha1
kind: AddonValue
metadata:
  name: capi-default
  labels:
    addons.in-cloud.io/values: default
    addons.in-cloud.io/addon: capi  
spec:
  values: ""
---
# Source: addonset/templates/systemAddons/capi/capi.yml
apiVersion: addons.in-cloud.io/v1alpha1
kind: AddonValue
metadata:
  name: capi-vm-operator
  labels:
    addons.in-cloud.io/values: vm-operator
    addons.in-cloud.io/addon: capi
spec:
  values: |
    monitoring:
      vmServiceScrape:
        enabled: true
---
# Source: addonset/templates/systemAddons/capi/capi.yml
apiVersion: addons.in-cloud.io/v1alpha1
kind: AddonValue
metadata:
  name: capi-immutable
  labels:
    addons.in-cloud.io/values: immutable
    addons.in-cloud.io/addon: capi
spec:
  values: ""
---
# Source: addonset/templates/systemAddons/capi/capi.yml
apiVersion: addons.in-cloud.io/v1alpha1
kind: AddonValue
metadata:
  name: capi-system
  labels:
    addons.in-cloud.io/values: system
    addons.in-cloud.io/addon: capi
spec:
  values: |
    certificates:
      useExternalIssuer: true
      externalIssuer:
        name: selfsigned-cluster-issuer
