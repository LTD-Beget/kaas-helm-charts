          memory: 128Mi

      kubeRBACProxy:
        enabled: true
        image:
          # registry: quay.io
          # repository: brancz/kube-rbac-proxy
          tag: v0.21.0

        extraArgs:
          - --v=2

        resources:
          requests:
            memory: "32Mi"
            cpu: "10m"
          limits:
            memory: "64Mi"
            cpu: "50m"
