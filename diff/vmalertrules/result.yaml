---
# Source: addonset/templates/addons/vm-alertrules/addon.yaml.gotmpl
apiVersion: addons.in-cloud.io/v1alpha1
kind: Addon
metadata:
  name: vm-alertrules
spec:
  chart: "alert-rules"
  pluginName: helm-with-values
  repoURL: "example.com"
  version: "0.1.3"
  targetCluster: in-cluster
  targetNamespace: "example-vmalert-rules"
  variables: 
    dependency: "True"
  valuesSources: 
    - name: parameters
      sourceRef:
        apiVersion: v1
        kind: ConfigMap
        name: parameters-infra
        namespace: example-system
      extract:
        - as: companyPrefix
          jsonPath: .data.companyPrefix
        - as: companyDomain
          jsonPath: .data.companyDomain
        - as: companyWikiAlertingUrl
          jsonPath: .data.companyWikiAlertingUrl
  initDependencies:
    - name: vm-operator 
      criteria:
        - jsonPath: $.status.deployed
          operator: Equal
          value: true
          keep: false
  backend:
    finalizer: true
    type: "argocd"
    namespace: "example-argocd"
    project: "default"
    syncPolicy:
      automated:
        prune: true
        selfHeal: true
        selfHeal: true
      managedNamespaceMetadata:
        labels:
          in-cloud.io/caBundle: approved
          in-cloud.io/clusterName: system
      syncOptions:
        - ApplyOutOfSyncOnly=true
        - CreateNamespace=true
  valuesSelectors:
    - name: default
      priority: 0
      matchLabels:
        addons.in-cloud.io/values: default
        addons.in-cloud.io/addon: vm-alertrules
    - name: custom
      priority: 95
      matchLabels:
        addons.in-cloud.io/values: custom
        addons.in-cloud.io/addon: vm-alertrules
    - name: immutable
      priority: 99
      matchLabels:
        addons.in-cloud.io/values: immutable
        addons.in-cloud.io/addon: vm-alertrules
---
# Source: addonset/templates/addons/vm-alertrules/values.yaml.gotmpl
apiVersion: addons.in-cloud.io/v1alpha1
kind: AddonValue
metadata:
  name: vm-alertrules-default
  labels:
    addons.in-cloud.io/values: default
    addons.in-cloud.io/addon: vm-alertrules
spec:
  values: |
    companyPrefix: {{ .Values.companyPrefix }}
    companyWikiAlertingUrl: {{ .Values.companyWikiAlertingUrl }}
    additionalLabels:
      monitoring.in-cloud.io/vmrules: infra
---
# Source: addonset/templates/addons/vm-alertrules/values.yaml.gotmpl
apiVersion: addons.in-cloud.io/v1alpha1
kind: AddonValue
metadata:
  name: vm-alertrules-immutable
  labels:
    addons.in-cloud.io/values: immutable
    addons.in-cloud.io/addon: vm-alertrules
spec:
  values: |
