---
# Source: addonset/templates/addonsMonitoring/clientvmscrapeconfig/clientvmscrapeconfig.yml
apiVersion: addons.in-cloud.io/v1alpha1
kind: Addon
metadata:
  name: client-vm-scrape-config
spec:
  chart: "helm-inserter"
  repoURL: "example.com"
  version: "0.2.5"
  pluginName: helm-with-values
  targetCluster: in-cluster
  targetNamespace: "example-vmagent"
  variables:
    cluster_name: in-cluster
    dependency: "True"
  valuesSources: 
    - name: parameters-client
      sourceRef:
        apiVersion: v1
        kind: ConfigMap
        name: parameters-client
        namespace: example-system
      extract:
        - as: cluster.name
          jsonPath: .data.clusterName
        - as: cluster.customer
          jsonPath: .data.customer
        - as: companyPrefix
          jsonPath: .data.companyPrefix
        - as: companyDomain
          jsonPath: .data.companyDomain
  initDependencies:
    - name: addons-operator
      criteria:
        - jsonPath: $.status.deployed
          operator: Equal
          value: true
          keep: true
    - name: addonset
      criteria:
        - jsonPath: $.status.deployed
          operator: Equal
          value: true
          keep: true
    - name: client-cp-control-plane
      criteria:
        - jsonPath: $.status.deployed
          operator: Equal
          value: true
    - name: extra-resources-client
      criteria:
        - jsonPath: $.status.deployed
          operator: Equal
          value: true
          keep: false
    - name: cert-manager
      criteria:
        - jsonPath: $.status.deployed
          operator: Equal
          value: true
          keep: false
    - name: vm-operator
      criteria:
        - jsonPath: $.status.deployed
          operator: Equal
          value: true
          keep: false
  backend:
    finalizer: true
    type: "argocd"
    namespace: "example-argocd"
    project: "default"
    syncPolicy:
      automated:
        prune: true
      managedNamespaceMetadata:
        labels:
          in-cloud.io/caBundle: approved
          in-cloud.io/clusterName: infra
      syncOptions:
        - ApplyOutOfSyncOnly=true
        - CreateNamespace=true
  valuesSelectors:
    - name: initialized
      priority: 0
      matchLabels:
        addons.in-cloud.io/values: initialized
        addons.in-cloud.io/addon: client-vm-scrape-config
    - name: custom
      priority: 90
      matchLabels:
        addons.in-cloud.io/values: custom
        addons.in-cloud.io/addon: client-vm-scrape-config
---
# Source: addonset/templates/addonsMonitoring/clientvmscrapeconfig/clientvmscrapeconfig.yml
apiVersion: addons.in-cloud.io/v1alpha1
kind: AddonPhase
metadata:
  name: client-vm-scrape-config
spec:
  rules:
    - name: infra
      criteria:
        - source:
            apiVersion: v1
            kind: ConfigMap
            name: parameters-infra
            namespace: example-system
          jsonPath: $.data.environment
          operator: Equal
          value: "infra"
      selector:
        name: infra
        priority: 15
        matchLabels:
          addons.in-cloud.io/values: infra
          addons.in-cloud.io/addon: client-vm-scrape-config
---
# Source: addonset/templates/addonsMonitoring/clientvmscrapeconfig/clientvmscrapeconfig.yml
apiVersion: addons.in-cloud.io/v1alpha1
kind: AddonValue
metadata:
  name: client-vm-scrape-config-initialized
  labels:
    addons.in-cloud.io/values: initialized
    addons.in-cloud.io/addon: client-vm-scrape-config
spec:
  values: |
    resources: {}
---
# Source: addonset/templates/addonsMonitoring/clientvmscrapeconfig/clientvmscrapeconfig.yml
apiVersion: addons.in-cloud.io/v1alpha1
kind: AddonValue
metadata:
  name: client-vm-scrape-config
  labels:
    addons.in-cloud.io/values: infra
    addons.in-cloud.io/addon: client-vm-scrape-config
spec:
  values: |
    resources:
      monitoringVmAgentCertificate:
        apiVersion: cert-manager.io/v1
        kind: Certificate
        metadata:
          name: monitoring-client
          namespace: {{ .Values.companyPrefix }}-vmagent
        spec:
          commonName: metrics-reader
          duration: 8760h
          isCA: false
          issuerRef:
            kind: ClusterIssuer
            name: ca-client
          privateKey:
            algorithm: RSA
            size: 2048
          renewBefore: 1460h
          secretName: monitoring-client
          subject:
            organizations:
              - {{ .Values.companyPrefix }}:metrics-reader
          usages:
          - client auth

      # cadvisor metrics: /api/v1/nodes/$1/proxy/metrics/cadvisor
      # Use for calculate metrics:
      # - {{ .Values.companyPrefix }}_nodegroup_memory_used_mb
      # - {{ .Values.companyPrefix }}_node_memory_used_mb
      # - {{ .Values.companyPrefix }}_nodegroup_filesystem_used_mb
      # - {{ .Values.companyPrefix }}_nodegroup_filesystem_used_percent
      # - {{ .Values.companyPrefix }}_node_filesystem_used_mb
      # - {{ .Values.companyPrefix }}_node_filesystem_used_percent
      # - {{ .Values.companyPrefix }}_pod_memory_usage_mb
      # - {{ .Values.companyPrefix }}_pod_cpu_usage_cores
      clientClusterKubeletCadvisor:
        apiVersion: operator.victoriametrics.com/v1beta1
        kind: VMScrapeConfig
        metadata:
          name: client-cluster-kubelet-cadvisor
          namespace: {{ .Values.companyPrefix }}-vmagent
        spec:
          scheme: https
          scrape_interval: 30s
          scrapeTimeout: 10s

          tlsConfig:
            ca:
              secret:
                name: monitoring-client
                key: ca.crt
            cert:
              secret:
                name: monitoring-client
                key: tls.crt
            keySecret:
              name: monitoring-client
              key: tls.key

          kubernetesSDConfigs:
            - role: node
              apiServer: "https://client-cp-control-plane-control-plane.{{ .Values.companyPrefix }}-system.svc:26443"
              tlsConfig:
                ca:
                  secret:
                    name: monitoring-client
                    key: ca.crt
                cert:
                  secret:
                    name: monitoring-client
                    key: tls.crt
                keySecret:
                  name: monitoring-client
                  key: tls.key

          relabelConfigs:
            - action: keep
              sourceLabels: [__meta_kubernetes_node_annotation_cluster_x_k8s_io_machine]
              regex: .+
            - action: keep
              sourceLabels: [__meta_kubernetes_node_label_node_group_beget_com_name]
              regex: .+
            - targetLabel: __address__
              replacement: "https://client-cp-control-plane-control-plane.{{ .Values.companyPrefix }}-system.svc:26443"
            - sourceLabels: [__meta_kubernetes_node_name]
              targetLabel: __metrics_path__
              replacement: /api/v1/nodes/$1/proxy/metrics/cadvisor

            - sourceLabels: [__meta_kubernetes_node_name]
              targetLabel: node
            - action: labelmap
              regex: __meta_kubernetes_node_label_(.+)

            - targetLabel: job
              replacement: kubelet-cadvisor
            - targetLabel: cluster_full_name
              replacement: {{ .Values.cluster.customer }}-{{ .Values.cluster.name }}
            - targetLabel: remotewrite_cluster
              replacement: {{ .Values.cluster.customer }}-{{ .Values.cluster.name }}
            - targetLabel: client_cluster
              replacement: {{ .Values.cluster.customer }}-{{ .Values.cluster.name }}
            - targetLabel: cluster_type
              replacement: client

      # resource metrics: /api/v1/nodes/$1/proxy/metrics/resource
      # Use for calculate metrics:
      # - {{ .Values.companyPrefix }}_nodegroup_cpu_used_cores
      # -{{ .Values.companyPrefix }}_node_cpu_used_cores
      clientClusterKubeletResource:
        apiVersion: operator.victoriametrics.com/v1beta1
        kind: VMScrapeConfig
        metadata:
          name: client-cluster-kubelet-resource
          namespace: {{ .Values.companyPrefix }}-vmagent
        spec:
          scheme: https
          scrape_interval: 30s
          scrapeTimeout: 10s

          tlsConfig:
            ca:
              secret:
                name: monitoring-client
                key: ca.crt
            cert:
              secret:
                name: monitoring-client
                key: tls.crt
            keySecret:
              name: monitoring-client
              key: tls.key

          kubernetesSDConfigs:
            - role: node
              apiServer: "https://client-cp-control-plane-control-plane.{{ .Values.companyPrefix }}-system.svc:26443"
              tlsConfig:
                ca:
                  secret:
                    name: monitoring-client
                    key: ca.crt
                cert:
                  secret:
                    name: monitoring-client
                    key: tls.crt
                keySecret:
                  name: monitoring-client
                  key: tls.key

          relabelConfigs:
            - action: keep
              sourceLabels: [__meta_kubernetes_node_annotation_cluster_x_k8s_io_machine]
              regex: .+
            - action: keep
              sourceLabels: [__meta_kubernetes_node_label_node_group_beget_com_name]
              regex: .+
            - targetLabel: __address__
              replacement: "https://client-cp-control-plane-control-plane.{{ .Values.companyPrefix }}-system.svc:26443"
            - sourceLabels: [__meta_kubernetes_node_name]
              targetLabel: __metrics_path__
              replacement: /api/v1/nodes/$1/proxy/metrics/resource

            - sourceLabels: [__meta_kubernetes_node_name]
              targetLabel: node
            - action: labelmap
              regex: __meta_kubernetes_node_label_(.+)

            - targetLabel: job
              replacement: kubelet-resource
            - targetLabel: cluster_full_name
              replacement: {{ .Values.cluster.customer }}-{{ .Values.cluster.name }}
            - targetLabel: remotewrite_cluster
              replacement: {{ .Values.cluster.customer }}-{{ .Values.cluster.name }}
            - targetLabel: client_cluster
              replacement: {{ .Values.cluster.customer }}-{{ .Values.cluster.name }}
            - targetLabel: cluster_type
              replacement: client
